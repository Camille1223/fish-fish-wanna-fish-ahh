<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海捕鱼 & 寿司店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
  #gameCanvas { display: block; cursor: grab; width: 100vw; height: 100vh; }
  #ui { position: absolute; top: 0; left: 0; width: 100vw; pointer-events: none; }
  .hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
  .hud-item { background: rgba(0,5,20,0.82); border: 1px solid rgba(100,200,255,0.5); border-radius: 10px; padding: 6px 14px; color: #9ef; font-size: 13px; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,100,200,0.3), inset 0 1px 0 rgba(255,255,255,0.08); }
  .oxygen-bar { width: 120px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(100,200,255,0.4); }
  .oxygen-fill { height: 100%; background: linear-gradient(90deg, #00aaff, #00ffcc); border-radius: 6px; transition: width 0.3s; box-shadow: 0 0 6px #0af; }
  #msgBox { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,5,30,0.92); border: 1px solid rgba(100,220,255,0.6); border-radius: 14px; padding: 10px 28px; color: #fff; font-size: 16px; display: none; text-align: center; pointer-events: none; box-shadow: 0 4px 20px rgba(0,150,255,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
  #sharkHint { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); color: #ff4; font-size: 14px; font-weight: bold; display: none; text-shadow: 0 0 12px #fa0, 0 0 4px #f80; pointer-events: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="hud" id="fishingHud">
    <div class="hud-item">🏆 <span id="score">0</span></div>
    <div class="hud-item">💰 <span id="coins">0</span></div>
    <div class="hud-item" style="display:flex;align-items:center;gap:6px;">
      🫧 <div class="oxygen-bar"><div class="oxygen-fill" id="oxyBar" style="width:100%"></div></div>
    </div>
    <div class="hud-item">🎒 <span id="storage">0</span>/20</div>
    <div class="hud-item" style="color:#adf;">区域: <span id="zoneName">浅海</span></div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#ffe;border-color:#ffe;" onclick="goAshore()">🏖️ 上岸 [E]</div>
  </div>
  <div class="hud" id="restaurantHud" style="display:none;">
    <div class="hud-item">💰 <span id="coins2">0</span></div>
    <div class="hud-item">😊 满意度: <span id="satisfaction">100</span>%</div>
    <div class="hud-item">📦 仓库: <span id="storageCount">0</span>条</div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#8ff;border-color:#8ff;" onclick="goDiving()">🤿 再次潜水</div>
  </div>
  <div id="msgBox"></div>
  <div id="sharkHint">🦈 快速点击鲨鱼 3 次！</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Viewport size (matches window)
let VW = window.innerWidth;
let VH = window.innerHeight;
canvas.width = VW;
canvas.height = VH;

// World size (larger than viewport — camera scrolls through it)
const WW = 3200;
const WH = 1600;

// Legacy aliases used by restaurant / UI code
const W = WW;
const H = WH;

// Camera (top-left corner of viewport in world coords)
let cam = { x: 0, y: 0 };

window.addEventListener('resize', () => {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width = VW;
  canvas.height = VH;
});

// ============ GAME STATE ============
const GS = {
  scene: 'fishing', // 'fishing' | 'restaurant' | 'transition'
  score: 0,
  coins: 0,
  satisfaction: 100,
  oxygen: 100,
  oxygenMax: 100,
  warehouse: [], // {type, name, emoji, value}
  warehouseMax: 20,
  time: 0,
  zone: 0, // 0=浅海 1=珊瑚礁 2=深海
  zoneTimer: 0,
  weather: 'normal', // normal | current | dark
  weatherTimer: 0,
  restaurantLevel: 1,
  tables: [],
  preparingDish: null, // currently selected fish for serving
  satisfaction: 100,
  msgTimer: 0,
  sharkHintTimer: 0
};

// ============ FISH TYPES ============
const FISH_TYPES = [
  { type: 'clownfish', name: '小丑鱼',   emoji: '🐠', color: '#ff6b35', bodyColor: '#ff8c42', speed: 1.0, score: 10,  value: 15,  size: 18, clicks: 1, rarity: 0.14 },
  { type: 'tuna',      name: '金枪鱼',   emoji: '🐟', color: '#4a90d9', bodyColor: '#5ba3e8', speed: 1.6, score: 30,  value: 45,  size: 26, clicks: 1, rarity: 0.12 },
  { type: 'salmon',    name: '三文鱼',   emoji: '🐡', color: '#e07b54', bodyColor: '#f09b74', speed: 1.3, score: 40,  value: 60,  size: 23, clicks: 1, rarity: 0.11 },
  { type: 'puffer',    name: '河豚',     emoji: '🐡', color: '#a8c256', bodyColor: '#c8e276', speed: 1.0, score: 50,  value: 80,  size: 20, clicks: 1, rarity: 0.10, wobble: true },
  { type: 'crab',      name: '螃蟹',     emoji: '🦀', color: '#d94f3d', bodyColor: '#f06050', speed: 0.7, score: 60,  value: 90,  size: 21, clicks: 2, rarity: 0.09, sideways: true },
  { type: 'shark',     name: '大鲨鱼',   emoji: '🦈', color: '#557799', bodyColor: '#6688aa', speed: 2.5, score: 200, value: 300, size: 44, clicks: 3, rarity: 0.06, escapes: true },
  { type: 'jellyfish', name: '水母',     emoji: '🪼', color: '#dd88ff', bodyColor: '#eeb0ff', speed: 0.4, score: 25,  value: 35,  size: 20, clicks: 1, rarity: 0.11 },
  { type: 'turtle',    name: '海龟',     emoji: '🐢', color: '#4a9a5a', bodyColor: '#5ab86a', speed: 0.9, score: 80,  value: 120, size: 30, clicks: 2, rarity: 0.07 },
  { type: 'octopus',   name: '章鱼',     emoji: '🐙', color: '#cc5577', bodyColor: '#ee7799', speed: 1.1, score: 100, value: 150, size: 28, clicks: 2, rarity: 0.07 },
  { type: 'seahorse',  name: '海马',     emoji: '🐴', color: '#ffaa33', bodyColor: '#ffcc55', speed: 0.5, score: 70,  value: 100, size: 16, clicks: 1, rarity: 0.08 },
  { type: 'anglerfish',name: '安康鱼',   emoji: '🐟', color: '#334455', bodyColor: '#445566', speed: 1.2, score: 150, value: 200, size: 32, clicks: 2, rarity: 0.05 },
];

const SUSHI_MENU = [
  { name: '金枪鱼寿司', fishType: 'tuna',       price: 80,  emoji: '🍣' },
  { name: '三文鱼寿司', fishType: 'salmon',     price: 100, emoji: '🍣' },
  { name: '螃蟹手卷',   fishType: 'crab',       price: 120, emoji: '🌯' },
  { name: '河豚刺身',   fishType: 'puffer',     price: 150, emoji: '🍱' },
  { name: '鲨鱼大餐',   fishType: 'shark',      price: 500, emoji: '🎌' },
  { name: '小丑鱼汤',   fishType: 'clownfish',  price: 50,  emoji: '🍜' },
  { name: '章鱼烧',     fishType: 'octopus',    price: 180, emoji: '🐙' },
  { name: '海龟汤',     fishType: 'turtle',     price: 200, emoji: '🍵' },
];

// ============ ENTITIES ============
let diver = { x: WW / 2, y: WH / 2, vx: 0, vy: 0, dir: 1, bubbles: [], animTime: 0 };
let fishes = [];
let bubbles = [];
let decorations = [];
let particles = [];
let customers = [];
let floatingTexts = [];
let transitionProgress = 0;
let sharkClickState = {}; // fishId -> {count, timer}

// ============ ZONES ============
const ZONES = [
  { name: '浅海', bgTop: '#1a6a9a', bgBot: '#0d3d6b', light: 0.9, fishBonus: 1.0 },
  { name: '珊瑚礁', bgTop: '#0e5c7a', bgBot: '#0a3050', light: 0.7, fishBonus: 1.3 },
  { name: '深海', bgTop: '#061828', bgBot: '#020a14', light: 0.4, fishBonus: 1.8 }
];

// ============ CORAL / SEAWEED GENERATION ============
function generateDecorations() {
  decorations = [];
  const z = GS.zone;

  // 海草 (更多，分布更广)
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * W;
    decorations.push({ type: 'seaweed', x, y: H, height: 50 + Math.random() * 110, phase: Math.random() * Math.PI * 2, color: z === 2 ? '#1a4a2a' : '#2d8a4a' });
  }

  // 珊瑚 (各区域都有)
  const coralCount = z === 0 ? 6 : z === 1 ? 14 : 5;
  for (let i = 0; i < coralCount; i++) {
    decorations.push({ type: 'coral', x: Math.random() * W, y: H - 30 + Math.random() * 20, size: 22 + Math.random() * 35, color: z === 0 ? '#ff9b6d' : z === 1 ? '#ff6b9d' : '#8855ff' });
  }

  // 岩石
  for (let i = 0; i < 10; i++) {
    decorations.push({ type: 'rock', x: Math.random() * W, y: H - 20 + Math.random() * 30, size: 18 + Math.random() * 32, color: z === 2 ? '#223344' : '#445566' });
  }

  // 海星 (浅海、珊瑚礁)
  if (z <= 1) {
    for (let i = 0; i < 7; i++) {
      decorations.push({ type: 'starfish', x: 40 + Math.random() * (W - 80), y: H - 15, size: 12 + Math.random() * 14, color: z === 0 ? '#ff7744' : '#ff44aa', angle: Math.random() * Math.PI });
    }
  }

  // 扇形珊瑚 (珊瑚礁)
  if (z === 1) {
    for (let i = 0; i < 5; i++) {
      decorations.push({ type: 'fan_coral', x: Math.random() * W, y: H - 10, height: 80 + Math.random() * 80, color: ['#ff6b9d','#ff9933','#33ccff','#ff55dd'][Math.floor(Math.random()*4)], phase: Math.random() * Math.PI * 2 });
    }
  }

  // 海底城堡 (珊瑚礁或随机)
  if (z >= 1 || Math.random() < 0.5) {
    decorations.push({ type: 'castle', x: 180 + Math.random() * (W - 360), y: H - 10 });
  }

  // 沉船 (深海为主，珊瑚礁偶尔有)
  if (z === 2 || (z === 1 && Math.random() < 0.6)) {
    decorations.push({ type: 'shipwreck', x: 100 + Math.random() * (W - 300), y: H - 20 });
  }

  // 气泡柱 (随机位置从海底冒出)
  for (let i = 0; i < 4; i++) {
    decorations.push({ type: 'vent', x: Math.random() * W, y: H - 10, phase: Math.random() * Math.PI * 2 });
  }
}

function spawnFish(forceInViewport) {
  if (fishes.length >= 35) return;
  const zone = ZONES[GS.zone];
  const r = Math.random();
  let cumulative = 0;
  let type = FISH_TYPES[0];
  for (const ft of FISH_TYPES) {
    cumulative += ft.rarity;
    if (r < cumulative) { type = ft; break; }
  }
  const spd = type.speed * (0.8 + Math.random() * 0.4);
  let spawnX, spawnY, vxSign;
  if (forceInViewport) {
    spawnX = cam.x + 60 + Math.random() * Math.max(1, VW - 120);
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = Math.random() < 0.5 ? -1 : 1;
  } else {
    const side = Math.random() < 0.5 ? -1 : 1;
    spawnX = side < 0 ? cam.x - 80 : cam.x + VW + 80;
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = side;
  }
  fishes.push({
    id: Math.random().toString(36).substr(2),
    ...type,
    x: spawnX,
    y: spawnY,
    vx: vxSign * spd,
    vy: (Math.random() - 0.5) * 0.6,
    phase: Math.random() * Math.PI * 2,
    hp: type.clicks,
    maxHp: type.clicks,
    scared: false,
    scaredTimer: 0
  });
}

// ============ BUBBLES ============
function spawnBubble(x, y) {
  bubbles.push({ x, y, r: 3 + Math.random() * 5, vy: -(0.5 + Math.random() * 1.5), life: 1.0, dx: (Math.random() - 0.5) * 0.4 });
}

// ============ DRAW FUNCTIONS ============
function drawBackground() {
  const z = ZONES[GS.zone];
  const darkMult = GS.weather === 'dark' ? 0.35 : 1.0;

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, shadeColor(z.bgTop, darkMult));
  grad.addColorStop(0.5, shadeColor(z.bgTop, darkMult * 0.75));
  grad.addColorStop(1, shadeColor(z.bgBot, darkMult));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (GS.zone < 2) {
    const hazeGrad = ctx.createRadialGradient(W / 2, 0, 50, W / 2, 0, H);
    hazeGrad.addColorStop(0, 'rgba(100,200,255,0.06)');
    hazeGrad.addColorStop(1, 'rgba(0,50,120,0)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, W, H);
  }

  if (GS.zone <= 1 && GS.weather !== 'dark') {
    ctx.save();
    const rayCount = GS.zone === 0 ? 9 : 5;
    const rayAlpha = GS.zone === 0 ? 0.07 : 0.04;
    for (let i = 0; i < rayCount; i++) {
      const rx = 80 + i * (W / rayCount) + Math.sin(GS.time * 0.4 + i * 1.3) * 30;
      const rayWidth = 45 + Math.sin(GS.time * 0.3 + i) * 18;
      const grad2 = ctx.createLinearGradient(rx, 0, rx, H);
      grad2.addColorStop(0, `rgba(180,240,255,${rayAlpha})`);
      grad2.addColorStop(0.4, `rgba(120,200,255,${rayAlpha * 0.5})`);
      grad2.addColorStop(1, 'rgba(0,100,200,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      ctx.moveTo(rx - rayWidth * 0.3, 0);
      ctx.lineTo(rx + rayWidth + Math.sin(GS.time * 0.2 + i) * 20, H);
      ctx.lineTo(rx - rayWidth * 0.5 + Math.sin(GS.time * 0.2 + i) * 20, H);
      ctx.lineTo(rx - rayWidth * 0.6, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  if (GS.zone === 0 && GS.weather !== 'dark') {
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 16; i++) {
      const cx = ((GS.time * 25 + i * 95) % (W + 100)) - 50;
      const cy = 30 + (i % 4) * 80 + Math.sin(GS.time + i) * 18;
      const r = 22 + Math.sin(GS.time * 0.7 + i) * 9;
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      cg.addColorStop(0, 'rgba(200,240,255,0.8)');
      cg.addColorStop(1, 'rgba(100,180,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, r, r * 0.5, GS.time * 0.1 + i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  if (GS.zone === 2) {
    ctx.save();
    for (let i = 0; i < 22; i++) {
      const px = (Math.sin(i * 2.3 + GS.time * 0.1) * 0.5 + 0.5) * W;
      const py = (Math.sin(i * 1.7 + GS.time * 0.08) * 0.5 + 0.5) * (H - 80) + 30;
      const pr = 2 + Math.sin(GS.time * 2 + i) * 1;
      const glow = ctx.createRadialGradient(px, py, 0, px, py, pr * 5);
      const hue = (i * 40 + GS.time * 20) % 360;
      glow.addColorStop(0, `hsla(${hue},100%,80%,0.6)`);
      glow.addColorStop(1, `hsla(${hue},100%,60%,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, pr * 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  if (GS.weather === 'current') {
    ctx.save();
    for (let i = 0; i < 8; i++) {
      const cx = ((GS.time * 90 + i * 200) % (W + 200)) - 100;
      const cy = 80 + i * 90 + Math.sin(i * 1.2) * 40;
      const cg = ctx.createLinearGradient(cx - 20, cy, cx + 100, cy);
      cg.addColorStop(0, 'rgba(100,200,255,0)');
      cg.addColorStop(0.3, 'rgba(150,220,255,0.15)');
      cg.addColorStop(1, 'rgba(100,200,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx + 40, cy, 75, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 3D 沙底
  const isDeep = GS.zone === 2;
  ctx.save();
  ctx.fillStyle = isDeep ? 'rgba(0,0,0,0.6)' : 'rgba(80,50,10,0.35)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 25) {
    ctx.lineTo(x, H - 30 + Math.sin(x * 0.035 + GS.time * 0.15) * 8 + 6);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  const sandGrad = ctx.createLinearGradient(0, H - 55, 0, H);
  if (isDeep) {
    sandGrad.addColorStop(0, '#0e1e2c');
    sandGrad.addColorStop(0.5, '#0a1520');
    sandGrad.addColorStop(1, '#060c14');
  } else if (GS.zone === 1) {
    sandGrad.addColorStop(0, '#b89050');
    sandGrad.addColorStop(0.5, '#9a7838');
    sandGrad.addColorStop(1, '#806030');
  } else {
    sandGrad.addColorStop(0, '#d4b070');
    sandGrad.addColorStop(0.5, '#c09050');
    sandGrad.addColorStop(1, '#a07838');
  }
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 25) {
    ctx.lineTo(x, H - 30 + Math.sin(x * 0.035 + GS.time * 0.15) * 8);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  if (!isDeep) {
    ctx.strokeStyle = 'rgba(255,220,130,0.22)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 25) {
        const y = H - 28 + i * 4 + Math.sin(x * 0.035 + GS.time * 0.15 + i * 0.5) * 5;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function shadeColor(hex, mult) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*mult)},${Math.round(g*mult)},${Math.round(b*mult)})`;
}

function drawDecorations() {
  // 先画阴影
  for (const d of decorations) {
    if (d.type === 'rock' || d.type === 'castle' || d.type === 'shipwreck') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      const sw = d.type === 'castle' ? 120 : d.type === 'shipwreck' ? 180 : d.size * 1.1;
      const sh = d.type === 'castle' ? 16 : d.type === 'shipwreck' ? 20 : d.size * 0.35;
      ctx.beginPath();
      ctx.ellipse((d.x || 0) + 8, (d.y || H) + 6, sw, sh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (const d of decorations) {
    if (d.type === 'seaweed') {
      const sway = Math.sin(GS.time * 1.5 + d.phase) * 14;
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(d.x + 2, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 2, d.y - d.height * 0.35, d.x + sway + 2, d.y - d.height * 0.65, d.x + sway * 1.4 + 2, d.y - d.height);
      ctx.stroke();
      const swGrad = ctx.createLinearGradient(d.x, d.y, d.x + sway * 1.4, d.y - d.height);
      swGrad.addColorStop(0, d.color);
      swGrad.addColorStop(1, GS.zone === 2 ? '#2a6a3a' : '#50c870');
      ctx.strokeStyle = swGrad;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5, d.y - d.height * 0.35, d.x + sway, d.y - d.height * 0.65, d.x + sway * 1.4, d.y - d.height);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(d.x + 1, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 1, d.y - d.height * 0.35, d.x + sway + 1, d.y - d.height * 0.65, d.x + sway * 1.4 + 1, d.y - d.height);
      ctx.stroke();
      for (let j = 0.3; j <= 0.85; j += 0.28) {
        const lx = d.x + sway * j * 1.4, ly = d.y - d.height * j;
        const la = Math.sin(GS.time * 1.8 + d.phase + j * 3) * 0.4;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(la + (j > 0.5 ? 0.3 : -0.3));
        const lG = ctx.createLinearGradient(-10, 0, 10, 0);
        lG.addColorStop(0, GS.zone === 2 ? '#1a5a2a' : '#30a850');
        lG.addColorStop(0.5, GS.zone === 2 ? '#2a7a3a' : '#50d870');
        lG.addColorStop(1, 'rgba(0,100,40,0)');
        ctx.fillStyle = lG;
        ctx.beginPath();
        ctx.ellipse(8, 0, 15, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

    } else if (d.type === 'coral') {
      const branches = [
        { ox: 0,           oy: 0, r: d.size * 0.42, h: d.size * 0.65 },
        { ox: -d.size * 0.48, oy: 5, r: d.size * 0.3,  h: d.size * 0.48 },
        { ox: d.size * 0.44,  oy: 8, r: d.size * 0.25, h: d.size * 0.38 }
      ];
      for (const b of branches) {
        const bx = d.x + b.ox, by = d.y;
        const stemG = ctx.createLinearGradient(bx - b.r * 0.5, 0, bx + b.r * 0.5, 0);
        stemG.addColorStop(0, shadeColor(d.color, 0.55));
        stemG.addColorStop(0.35, d.color);
        stemG.addColorStop(0.6, shadeColor(d.color, 1.3));
        stemG.addColorStop(1, shadeColor(d.color, 0.7));
        ctx.fillStyle = stemG;
        ctx.fillRect(bx - b.r * 0.4, by - b.h, b.r * 0.8, b.h);
        const ballG = ctx.createRadialGradient(bx - b.r * 0.25, by - b.h - b.r * 0.3, b.r * 0.05, bx, by - b.h, b.r);
        ballG.addColorStop(0, shadeColor(d.color, 1.6));
        ballG.addColorStop(0.4, d.color);
        ballG.addColorStop(1, shadeColor(d.color, 0.5));
        ctx.fillStyle = ballG;
        ctx.beginPath();
        ctx.arc(bx, by - b.h, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.h - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'rock') {
      const rockG = ctx.createRadialGradient(d.x + d.size * 0.3, d.y + d.size * 0.1, 0, d.x, d.y - d.size * 0.2, d.size * 1.2);
      rockG.addColorStop(0, '#667788');
      rockG.addColorStop(0.5, d.color);
      rockG.addColorStop(1, '#223344');
      ctx.fillStyle = rockG;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * 0.62, -0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.2, d.y - d.size * 0.2, d.size * 0.55, d.size * 0.28, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.15, d.y - d.size * 0.28, d.size * 0.2, d.size * 0.1, -0.3, 0, Math.PI * 2);
      ctx.fill();

    } else if (d.type === 'starfish') {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.angle + GS.time * 0.05);
      const sfG = ctx.createRadialGradient(0, 0, 1, 0, 0, d.size);
      sfG.addColorStop(0, shadeColor(d.color, 1.5));
      sfG.addColorStop(1, shadeColor(d.color, 0.7));
      ctx.fillStyle = sfG;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = (i * Math.PI) / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? d.size : d.size * 0.42;
        const px = Math.cos(angle) * r, py = Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(-d.size * 0.2, -d.size * 0.2, d.size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (d.type === 'fan_coral') {
      ctx.save();
      ctx.translate(d.x, d.y);
      const sway = Math.sin(GS.time * 0.8 + d.phase) * 8;
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.85;
      const branches2 = 14;
      for (let i = 0; i < branches2; i++) {
        const t = i / (branches2 - 1);
        const bx = (t - 0.5) * d.height * 0.9 + sway * (1 - t);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(bx * 0.5, -d.height * 0.55, bx, -d.height);
        ctx.stroke();
      }
      // 连接弧线
      for (let lev = 0.3; lev <= 1.0; lev += 0.2) {
        ctx.beginPath();
        for (let i = 0; i < branches2; i++) {
          const t = i / (branches2 - 1);
          const bx = ((t - 0.5) * d.height * 0.9 + sway * (1 - t)) * lev;
          const by = -d.height * lev;
          i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

    } else if (d.type === 'castle') {
      drawCastle(d.x, d.y);

    } else if (d.type === 'shipwreck') {
      drawShipwreck(d.x, d.y);

    } else if (d.type === 'vent') {
      // 海底气泡柱
      if (Math.random() < 0.15) {
        bubbles.push({ x: d.x + (Math.random() - 0.5) * 10, y: d.y - 10, r: 2 + Math.random() * 3, vy: -(0.4 + Math.random() * 0.8), life: 0.9, dx: (Math.random() - 0.5) * 0.3 });
      }
    }
  }
}

function drawCastle(x, y) {
  ctx.save();
  ctx.translate(x, y);
  const scale = 0.9;
  ctx.scale(scale, scale);

  // 城墙主体
  const wallG = ctx.createLinearGradient(-60, -100, 60, 0);
  wallG.addColorStop(0, '#8899aa');
  wallG.addColorStop(0.5, '#6677aa');
  wallG.addColorStop(1, '#445588');
  ctx.fillStyle = wallG;
  ctx.fillRect(-60, -90, 120, 90);

  // 苔藓/藻类覆盖
  ctx.fillStyle = 'rgba(40,120,60,0.35)';
  for (let i = 0; i < 8; i++) {
    const mx = -55 + i * 16, my = -90 + Math.random() * 40;
    ctx.beginPath();
    ctx.ellipse(mx, my, 8 + Math.random() * 6, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城楼 (4个)
  const towerPositions = [-55, -20, 20, 55];
  for (const tx of towerPositions) {
    const towerG = ctx.createLinearGradient(tx - 14, -145, tx + 14, -90);
    towerG.addColorStop(0, '#99aabb');
    towerG.addColorStop(1, '#556688');
    ctx.fillStyle = towerG;
    ctx.fillRect(tx - 14, -145, 28, 60);
    // 垛口
    for (let j = 0; j < 3; j++) {
      ctx.fillStyle = towerG;
      ctx.fillRect(tx - 12 + j * 10, -158, 7, 16);
    }
    // 塔顶尖
    ctx.fillStyle = '#bb5544';
    ctx.beginPath();
    ctx.moveTo(tx, -175);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx + 14, -155);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,180,0.2)';
    ctx.beginPath();
    ctx.moveTo(tx - 2, -174);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx - 6, -155);
    ctx.closePath();
    ctx.fill();
    // 小窗
    ctx.fillStyle = 'rgba(0,20,60,0.7)';
    ctx.beginPath();
    ctx.arc(tx, -120, 5, 0, Math.PI * 2);
    ctx.fill();
    // 窗户微光
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.arc(tx - 1, -121, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城堡大门
  ctx.fillStyle = 'rgba(0,10,30,0.8)';
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.rect(-20, -38, 40, 38);
  ctx.fill();
  // 门框
  ctx.strokeStyle = '#556688';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.moveTo(-20, -38); ctx.lineTo(-20, 0);
  ctx.moveTo(20, -38); ctx.lineTo(20, 0);
  ctx.stroke();
  // 门内发光
  const glowG = ctx.createRadialGradient(0, -20, 0, 0, -20, 22);
  glowG.addColorStop(0, 'rgba(80,150,255,0.25)');
  glowG.addColorStop(1, 'rgba(0,50,150,0)');
  ctx.fillStyle = glowG;
  ctx.beginPath();
  ctx.arc(0, -38, 19, Math.PI, 0);
  ctx.rect(-19, -38, 38, 38);
  ctx.fill();

  // 旗帜飘动
  const flagSway = Math.sin(GS.time * 2) * 6;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(0, -175);
  ctx.lineTo(flagSway + 22, -165 + Math.sin(GS.time * 3) * 3);
  ctx.lineTo(flagSway + 22, -155 + Math.sin(GS.time * 3 + 0.5) * 3);
  ctx.lineTo(0, -155);
  ctx.closePath();
  ctx.fill();
  // 旗杆
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -90); ctx.lineTo(0, -185);
  ctx.stroke();

  // 城墙高光
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(-60, -90, 20, 90);

  ctx.restore();
}

function drawShipwreck(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // 船壳阴影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(5, 5, 120, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // 船身主体
  const hullG = ctx.createLinearGradient(-110, -50, 110, 0);
  hullG.addColorStop(0, '#5a4020');
  hullG.addColorStop(0.4, '#7a5830');
  hullG.addColorStop(0.7, '#6a4825');
  hullG.addColorStop(1, '#3a2810');
  ctx.fillStyle = hullG;
  ctx.beginPath();
  ctx.moveTo(-110, -15);
  ctx.lineTo(-100, -50);
  ctx.lineTo(90, -50);
  ctx.lineTo(110, -20);
  ctx.lineTo(110, 0);
  ctx.lineTo(-110, 0);
  ctx.closePath();
  ctx.fill();

  // 船舷高光
  ctx.fillStyle = 'rgba(180,120,60,0.2)';
  ctx.fillRect(-100, -50, 190, 8);

  // 甲板 (倾斜破损)
  ctx.save();
  ctx.rotate(0.08);
  const deckG = ctx.createLinearGradient(0, -60, 0, -50);
  deckG.addColorStop(0, '#8a6840');
  deckG.addColorStop(1, '#6a4820');
  ctx.fillStyle = deckG;
  ctx.fillRect(-95, -68, 185, 18);
  // 甲板木纹
  ctx.strokeStyle = 'rgba(50,25,5,0.3)';
  ctx.lineWidth = 1;
  for (let i = -90; i < 90; i += 15) {
    ctx.beginPath(); ctx.moveTo(i, -68); ctx.lineTo(i, -50); ctx.stroke();
  }
  ctx.restore();

  // 折断的桅杆
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -68);
  ctx.lineTo(-30, -130);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-30, -130);
  ctx.lineTo(20, -100);  // 折断横臂
  ctx.stroke();
  // 破烂风帆
  ctx.fillStyle = 'rgba(200,180,140,0.35)';
  ctx.beginPath();
  ctx.moveTo(-30, -128);
  ctx.lineTo(15, -98);
  ctx.lineTo(0, -120);
  ctx.closePath();
  ctx.fill();

  // 炮口 (几个小洞)
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  for (const hx of [-60, -20, 20, 60]) {
    ctx.beginPath();
    ctx.ellipse(hx, -30, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 苔藓覆盖
  ctx.fillStyle = 'rgba(30,100,50,0.4)';
  for (let i = 0; i < 12; i++) {
    const mx = -100 + i * 18, my = -50 + Math.random() * 20;
    ctx.beginPath();
    ctx.ellipse(mx, my, 10 + Math.random() * 8, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 珊瑚生长
  ctx.fillStyle = '#ff6b9d';
  for (const [cx2, cy2, cr] of [[-80, -55, 8], [50, -52, 6], [85, -48, 7], [-30, -60, 5]]) {
    ctx.beginPath();
    ctx.arc(cx2, cy2, cr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(cx2 - cr * 0.25, cy2 - cr * 0.3, cr * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff6b9d';
  }

  ctx.restore();
}

function drawFish(f) {
  // 地面阴影
  if (f.y > 400) {
    const shadowAlpha = Math.max(0, (f.y - 400) / 200) * 0.35;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
    ctx.beginPath();
    ctx.ellipse(f.x, 572 + Math.sin(f.x * 0.04 + GS.time * 0.15) * 6, f.size * 1.1, f.size * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(f.x, f.y);
  const scaleX = f.vx < 0 ? -1 : 1;
  ctx.scale(scaleX, 1);

  const wobbleScale = f.wobble ? 1 + Math.sin(GS.time * 3 + f.phase) * 0.15 : 1;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const w = f.size, h = f.size * 0.6;

  if (f.type === 'shark') {
    const sharkCol = f.scared ? '#99aaaa' : f.bodyColor;
    // 身体底色阴影
    ctx.fillStyle = shadeColor(sharkCol, 0.5);
    ctx.beginPath();
    ctx.ellipse(2, 2, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 身体主渐变(球面光照)
    const sg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, w * 0.05, 0, 0, w * 1.1);
    sg.addColorStop(0, shadeColor(sharkCol, 1.5));
    sg.addColorStop(0.45, sharkCol);
    sg.addColorStop(1, shadeColor(sharkCol, 0.55));
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部浅色
    ctx.fillStyle = 'rgba(230,240,245,0.5)';
    ctx.beginPath();
    ctx.ellipse(w * 0.15, h * 0.3, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍
    const finG = ctx.createLinearGradient(-5, -h, 20, -h - 20);
    finG.addColorStop(0, shadeColor(f.scared ? '#778899' : f.color, 0.8));
    finG.addColorStop(1, shadeColor(f.scared ? '#778899' : f.color, 1.2));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-5, -h + 2);
    ctx.lineTo(12, -h - 20);
    ctx.lineTo(22, -h + 2);
    ctx.closePath();
    ctx.fill();
    // 尾鳍
    ctx.fillStyle = f.scared ? '#889aaa' : f.color;
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 16, -13);
    ctx.lineTo(-w - 16, 13);
    ctx.closePath();
    ctx.fill();
    // 眼睛(高光)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.42, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.42 + 1.5, -5.5, 2, 0, Math.PI * 2);
    ctx.fill();
    // 牙齿
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(w * 0.68, 4);
    ctx.lineTo(w * 0.78, 10);
    ctx.lineTo(w * 0.88, 4);
    ctx.fill();
    // HP条
    if (f.hp < f.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(-w, h + 5, w * 2, 7);
      ctx.fillStyle = '#f33';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 7);
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 3);
    }

  } else if (f.type === 'crab') {
    // 螃蟹 - 立体甲壳
    const cg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, h * 0.1, 0, 0, w);
    cg.addColorStop(0, shadeColor(f.bodyColor, 1.5));
    cg.addColorStop(0.5, f.bodyColor);
    cg.addColorStop(1, shadeColor(f.bodyColor, 0.55));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 甲壳高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.35, w * 0.4, h * 0.25, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 蟹钳(立体)
    for (const side of [-1, 1]) {
      const cx = side * (w + 5);
      const clawG = ctx.createRadialGradient(cx - 2, -7, 1, cx, -5, 10);
      clawG.addColorStop(0, shadeColor(f.color, 1.4));
      clawG.addColorStop(1, shadeColor(f.color, 0.7));
      ctx.fillStyle = clawG;
      ctx.beginPath();
      ctx.arc(cx, -5, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx - 2, -7, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // 蟹腿
    for (let i = -1; i <= 1; i++) {
      ctx.strokeStyle = shadeColor(f.color, 0.9);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(i * 10, h);
      ctx.lineTo(i * 15 + Math.sin(GS.time * 4 + i) * 3, h + 13);
      ctx.stroke();
    }
    // 眼睛
    for (const ex of [-8, 8]) {
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex, -5, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(ex + 1, -6.5, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

  } else if (f.type === 'jellyfish') {
    // 水母 — already translated to (f.x, f.y) by outer ctx.translate
    const jPulse = 1 + Math.sin(GS.time * 2.5 + f.phase) * 0.12;
    // 伞体
    const jG = ctx.createRadialGradient(0, -w * 0.3, 0, 0, 0, w * jPulse);
    jG.addColorStop(0, 'rgba(220,150,255,0.85)');
    jG.addColorStop(0.5, 'rgba(180,100,240,0.55)');
    jG.addColorStop(1, 'rgba(140,60,200,0)');
    ctx.fillStyle = jG;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse, Math.PI, 0);
    ctx.fill();
    // 伞边高光
    ctx.strokeStyle = 'rgba(230,180,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse * 0.95, Math.PI, 0);
    ctx.stroke();
    // 触须
    ctx.strokeStyle = 'rgba(200,120,255,0.55)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 6; i++) {
      const tx = (i / 5 - 0.5) * w * 1.2;
      const waveA = Math.sin(GS.time * 2 + i * 0.8 + f.phase) * 8;
      ctx.beginPath();
      ctx.moveTo(tx, 0);
      ctx.quadraticCurveTo(tx + waveA, h * 1.5, tx + waveA * 0.5, h * 3);
      ctx.stroke();
    }
    // 发光中心
    ctx.fillStyle = 'rgba(255,200,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, -w * 0.2, w * 0.35, w * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    // restored by outer drawFish ctx.restore()

  } else if (f.type === 'turtle') {
    // 海龟 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    const swimAngle = Math.sin(GS.time * 1.5 + f.phase) * 0.08;
    ctx.rotate(swimAngle);
    // 龟壳
    const shellG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    shellG.addColorStop(0, '#6ac87a');
    shellG.addColorStop(0.5, '#3a8a4a');
    shellG.addColorStop(1, '#1a5a2a');
    ctx.fillStyle = shellG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 龟甲纹
    ctx.strokeStyle = 'rgba(0,60,20,0.4)';
    ctx.lineWidth = 1.2;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * w * 0.35, -h); ctx.lineTo(i * w * 0.35, h);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-w, 0); ctx.lineTo(w, 0); ctx.stroke();
    // 壳高光
    ctx.fillStyle = 'rgba(150,230,170,0.25)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.3, w * 0.45, h * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 头
    const headG = ctx.createRadialGradient(w * 0.6, -h * 0.1, 1, w * 0.7, 0, h * 0.7);
    headG.addColorStop(0, '#70c880');
    headG.addColorStop(1, '#2a6a3a');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.ellipse(w * 0.82, 0, h * 0.6, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // 眼
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.92, -h * 0.2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(w * 0.93, -h * 0.2, 2, 0, Math.PI * 2); ctx.fill();
    // 鳍
    const flipT = Math.sin(GS.time * 2 + f.phase) * 0.3;
    ctx.fillStyle = '#3a8a4a';
    ctx.save(); ctx.rotate(flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, h * 0.75, h * 0.7, h * 0.25, 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(-flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, -h * 0.75, h * 0.7, h * 0.25, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'octopus') {
    // 章鱼 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    // 头部
    const oG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    oG.addColorStop(0, shadeColor(f.bodyColor, 1.4));
    oG.addColorStop(0.5, f.bodyColor);
    oG.addColorStop(1, shadeColor(f.bodyColor, 0.6));
    ctx.fillStyle = oG;
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.2, w * 0.75, h * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    // 头部高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.25, -h * 0.55, w * 0.32, h * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 8条触须
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI - Math.PI * 0.1;
      const wave = Math.sin(GS.time * 2 + i * 0.9 + f.phase) * 12;
      const ex = Math.cos(angle) * w * 0.6;
      const ey = h * 0.5 + Math.sin(angle) * h * 0.3;
      ctx.strokeStyle = shadeColor(f.color, 0.85);
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.bezierCurveTo(ex + wave, ey + h, ex + wave * 0.7, ey + h * 2, ex + wave * 0.3, ey + h * 2.8);
      ctx.stroke();
      // 吸盘
      ctx.fillStyle = shadeColor(f.bodyColor, 1.3);
      ctx.beginPath();
      ctx.arc(ex + wave * 0.5, ey + h * 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // 眼睛
    for (const ex2 of [-w * 0.28, w * 0.28]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex2, -h * 0.3, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(ex2 + 1, -h * 0.3, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(ex2 + 2, -h * 0.38, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

  } else if (f.type === 'seahorse') {
    // 海马 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    const shBob = Math.sin(GS.time * 2.5 + f.phase) * 4;
    const shSway = Math.sin(GS.time * 1.5 + f.phase) * 0.12;
    ctx.rotate(shSway);
    // 躯干
    const shG = ctx.createLinearGradient(-w * 0.5, 0, w * 0.5, 0);
    shG.addColorStop(0, shadeColor(f.bodyColor, 0.7));
    shG.addColorStop(0.4, f.bodyColor);
    shG.addColorStop(1, shadeColor(f.bodyColor, 0.85));
    ctx.fillStyle = shG;
    ctx.beginPath();
    ctx.moveTo(0, -h * 1.8 + shBob);
    ctx.bezierCurveTo(w * 0.6, -h + shBob, w * 0.5, 0, w * 0.2, h);
    ctx.bezierCurveTo(w * 0.3, h * 1.5, 0, h * 2, -w * 0.2, h * 1.6);
    ctx.bezierCurveTo(-w * 0.4, h * 0.8, -w * 0.5, 0, -w * 0.1, -h + shBob);
    ctx.closePath();
    ctx.fill();
    // 脊背棘刺
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      const sy = (-h * 1.5 + i * h * 0.5 + shBob);
      ctx.beginPath();
      ctx.moveTo(w * 0.4, sy);
      ctx.lineTo(w * 0.7, sy - 5);
      ctx.stroke();
    }
    // 头部
    ctx.fillStyle = f.bodyColor;
    ctx.beginPath();
    ctx.ellipse(w * 0.1, -h * 1.7 + shBob, w * 0.45, h * 0.55, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // 嘴/吻
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w * 0.45, -h * 1.85 + shBob);
    ctx.lineTo(w * 0.85, -h * 1.95 + shBob);
    ctx.stroke();
    // 眼
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.25, -h * 1.85 + shBob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(w * 0.3, -h * 1.9 + shBob, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍 (扇形抖动)
    ctx.fillStyle = 'rgba(255,200,80,0.55)';
    const finFlut = Math.sin(GS.time * 8 + f.phase) * 0.2;
    ctx.save();
    ctx.translate(-w * 0.15, -h * 0.6);
    ctx.rotate(finFlut);
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.55, h * 0.35, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'anglerfish') {
    // 安康鱼 (深海) — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    // 发光诱饵
    const lureTime = GS.time * 3 + f.phase;
    const lurePulse = 0.7 + Math.sin(lureTime) * 0.3;
    const lureX = w * 0.3 + Math.sin(lureTime * 0.7) * 8;
    const lureY = -h * 2.2 + Math.sin(lureTime * 1.1) * 5;
    const lureGlow = ctx.createRadialGradient(lureX, lureY, 0, lureX, lureY, 15 * lurePulse);
    lureGlow.addColorStop(0, 'rgba(180,255,100,0.9)');
    lureGlow.addColorStop(0.4, 'rgba(100,220,50,0.5)');
    lureGlow.addColorStop(1, 'rgba(50,150,20,0)');
    ctx.fillStyle = lureGlow;
    ctx.beginPath();
    ctx.arc(lureX, lureY, 15 * lurePulse, 0, Math.PI * 2);
    ctx.fill();
    // 诱饵杆
    ctx.strokeStyle = '#556';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.bezierCurveTo(w * 0.2, -h * 1.5, w * 0.3, -h * 1.8, lureX, lureY);
    ctx.stroke();
    // 身体
    const afG = ctx.createRadialGradient(-w * 0.2, -h * 0.2, 3, 0, 0, w);
    afG.addColorStop(0, '#556677');
    afG.addColorStop(0.5, f.bodyColor);
    afG.addColorStop(1, '#1a2233');
    ctx.fillStyle = afG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部斑纹
    ctx.fillStyle = 'rgba(100,120,140,0.4)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.35, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 大嘴巴
    ctx.fillStyle = '#1a2233';
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, h * 0.3, w * 0.85, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, -h * 0.05, -w * 0.3, 0.1);
    ctx.closePath();
    ctx.fill();
    // 尖牙
    ctx.fillStyle = 'rgba(220,220,200,0.9)';
    for (let i = 0; i < 5; i++) {
      const tx2 = -w * 0.2 + i * w * 0.22;
      ctx.beginPath();
      ctx.moveTo(tx2, h * 0.1);
      ctx.lineTo(tx2 + 5, h * 0.28);
      ctx.lineTo(tx2 + 10, h * 0.1);
      ctx.fill();
    }
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.55, -h * 0.25, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1520';
    ctx.beginPath(); ctx.arc(w * 0.56, -h * 0.25, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(100,255,50,0.7)';
    ctx.beginPath(); ctx.arc(w * 0.58, -h * 0.28, 2, 0, Math.PI * 2); ctx.fill();
    // 胸鳍
    ctx.fillStyle = shadeColor(f.bodyColor, 0.7);
    ctx.beginPath();
    ctx.ellipse(-w * 0.3, h * 0.4, h * 0.5, h * 0.22, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const fishG = ctx.createRadialGradient(-w * 0.25, -h * 0.4, h * 0.05, 0, 0, w * 1.05);
    fishG.addColorStop(0, shadeColor(f.bodyColor, 1.6));
    fishG.addColorStop(0.4, f.bodyColor);
    fishG.addColorStop(1, shadeColor(f.bodyColor, 0.5));
    ctx.fillStyle = fishG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鱼鳞光泽纹
    ctx.save();
    ctx.clip();
    ctx.globalAlpha = 0.12;
    for (let sx = -w + 5; sx < w; sx += 7) {
      for (let sy = -h + 3; sy < h; sy += 6) {
        ctx.fillStyle = (Math.floor(sx / 7 + sy / 6) % 2 === 0) ? '#fff' : shadeColor(f.bodyColor, 0.7);
        ctx.beginPath();
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // 腹部
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.28, w * 0.45, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 背鳍
    const finG = ctx.createLinearGradient(0, -h, 14, -h - 12);
    finG.addColorStop(0, shadeColor(f.color, 0.9));
    finG.addColorStop(1, shadeColor(f.color, 1.3));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-2, -h + 1);
    ctx.lineTo(7, -h - 11);
    ctx.lineTo(15, -h + 1);
    ctx.closePath();
    ctx.fill();

    // 尾鳍
    ctx.fillStyle = shadeColor(f.color, 1.1);
    ctx.beginPath();
    ctx.moveTo(-w + 1, 0);
    ctx.lineTo(-w - 11, -9);
    ctx.lineTo(-w - 11, 9);
    ctx.closePath();
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.5, -2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 0.5, -2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 1, -3.5, 1.3, 0, Math.PI * 2);
    ctx.fill();

    // 小丑鱼白条纹
    if (f.type === 'clownfish') {
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -h + 1); ctx.lineTo(0, h - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-w * 0.3, -h * 0.8); ctx.lineTo(-w * 0.3, h * 0.8);
      ctx.stroke();
    }

    // 河豚棘刺
    if (f.type === 'puffer') {
      ctx.strokeStyle = shadeColor(f.color, 0.7);
      ctx.lineWidth = 1.8;
      for (let a = 0; a < Math.PI * 2; a += 0.65) {
        const sx = Math.cos(a) * w, sy = Math.sin(a) * h;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(Math.cos(a) * (w + 6), Math.sin(a) * (h + 6));
        ctx.stroke();
      }
    }

    // 三文鱼侧线
    if (f.type === 'salmon') {
      ctx.strokeStyle = 'rgba(255,130,80,0.7)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-w * 0.55, 0);
      ctx.quadraticCurveTo(0, h * 0.15, w * 0.55, 0);
      ctx.stroke();
    }
  }
  ctx.restore();

  // 多击进度指示
  if (f.maxHp > 1) {
    const sc = sharkClickState[f.id];
    if (sc && sc.count > 0) {
      for (let i = 0; i < f.maxHp; i++) {
        const dotX = f.x - 10 + i * 13;
        const dotY = f.y - f.size - 16;
        ctx.beginPath();
        ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
        ctx.fillStyle = i < sc.count ? '#ff4' : 'rgba(255,255,255,0.25)';
        ctx.fill();
        if (i < sc.count) {
          ctx.strokeStyle = 'rgba(255,200,0,0.6)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
  }
}

function drawDiver() {
  const d = diver;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(d.dir, 1);

  const bob = Math.sin(GS.time * 2) * 3;

  // 地面投影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 50, 28, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 氧气罐(金属质感)
  const tankG = ctx.createLinearGradient(-30, 0, -10, 0);
  tankG.addColorStop(0, '#555');
  tankG.addColorStop(0.3, '#999');
  tankG.addColorStop(0.6, '#bbb');
  tankG.addColorStop(1, '#666');
  ctx.fillStyle = tankG;
  ctx.beginPath();
  ctx.roundRect(-28, -20 + bob, 16, 34, 6);
  ctx.fill();
  // 罐身高光
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(-26, -18 + bob, 5, 18, 3);
  ctx.fill();
  // 气管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -5 + bob); ctx.lineTo(-12, -5 + bob);
  ctx.stroke();

  // 潜水服身体(径向光照渐变)
  const bodyG = ctx.createRadialGradient(-8, -8 + bob, 4, 0, 0 + bob, 30);
  bodyG.addColorStop(0, '#7ee0ff');
  bodyG.addColorStop(0.35, '#3ab0e8');
  bodyG.addColorStop(0.7, '#1a7ab8');
  bodyG.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 26, 28, 0, 0, Math.PI * 2);
  ctx.fill();
  // 潜水服缝线
  ctx.strokeStyle = 'rgba(10,80,160,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -12 + bob); ctx.lineTo(-18, 12 + bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(14, -12 + bob); ctx.lineTo(18, 12 + bob);
  ctx.stroke();
  // 胸口徽标高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-4, -5 + bob, 12, 8, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // 面罩框架
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(4, -14 + bob, 16, 12, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩玻璃
  const maskG = ctx.createLinearGradient(-8, -22 + bob, 14, -8 + bob);
  maskG.addColorStop(0, 'rgba(180,240,255,0.7)');
  maskG.addColorStop(0.5, 'rgba(80,180,255,0.45)');
  maskG.addColorStop(1, 'rgba(20,100,200,0.3)');
  ctx.fillStyle = maskG;
  ctx.beginPath();
  ctx.ellipse(4, -15 + bob, 14, 10, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩反光斑
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(-2, -20 + bob, 5, 2.5, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-2, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(-1, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(11, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 呼吸管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();
  ctx.strokeStyle = '#fa4';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();

  // 手臂
  const armG = ctx.createLinearGradient(-30, 0, -18, 0);
  armG.addColorStop(0, '#0d4a7a');
  armG.addColorStop(0.5, '#1a7ab8');
  armG.addColorStop(1, '#3ab0e8');
  ctx.fillStyle = armG;
  ctx.beginPath();
  ctx.ellipse(-24, 5 + bob, 7, 14, 0.35, 0, Math.PI * 2);
  ctx.fill();
  const armG2 = ctx.createLinearGradient(18, 0, 30, 0);
  armG2.addColorStop(0, '#3ab0e8');
  armG2.addColorStop(0.5, '#1a7ab8');
  armG2.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = armG2;
  ctx.beginPath();
  ctx.ellipse(24, 5 + bob, 7, 14, -0.35, 0, Math.PI * 2);
  ctx.fill();

  // 脚蹼(动画)
  const flipAnim = Math.sin(GS.time * 3) * 10;
  const flipG = ctx.createLinearGradient(-20, 25, 0, 45);
  flipG.addColorStop(0, '#e05000');
  flipG.addColorStop(1, '#ff8c00');
  ctx.fillStyle = flipG;
  ctx.beginPath();
  ctx.ellipse(-10 + flipAnim, 32 + bob, 13, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 - flipAnim, 32 + bob, 13, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // 气泡(折射效果)
  for (const b of d.bubbles) {
    ctx.save();
    ctx.globalAlpha = b.life * 0.9;
    // 气泡内部折射色
    const bGrad = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.05, b.x, b.y, b.r);
    bGrad.addColorStop(0, 'rgba(220,245,255,0.5)');
    bGrad.addColorStop(0.6, 'rgba(150,210,255,0.1)');
    bGrad.addColorStop(1, 'rgba(100,180,255,0.05)');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    // 轮廓
    ctx.strokeStyle = 'rgba(180,230,255,0.75)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // 高光点
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ============ RESTAURANT DRAWING ============
function drawRestaurant() {
  // Scale restaurant scene (designed at 900×600) to fit viewport
  const rx = VW / 900;
  const ry = VH / 600;
  ctx.save();
  ctx.scale(rx, ry);

  // 天空渐变
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 260);
  skyGrad.addColorStop(0, '#5ba8d8');
  skyGrad.addColorStop(0.6, '#9fd0f0');
  skyGrad.addColorStop(1, '#c8e8f8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 900, 260);

  // 云朵
  const clouds = [
    { x: 120 + Math.sin(GS.time * 0.08) * 15, y: 40, r: 28 },
    { x: 380 + Math.sin(GS.time * 0.06 + 1) * 12, y: 55, r: 22 },

  ctx.ellipse(x + 3, y + 24, 47, 22, 0, 0, Math.PI * 2);

function drawCustomer(c, x, y) {
  ctx.save();
  ctx.translate(x, y);

  // 身体渐变
  const bodyG = ctx.createRadialGradient(-5, -5, 3, 0, 0, 22);
  bodyG.addColorStop(0, shadeColor(c.color || '#f4c88a', 1.3));
  bodyG.addColorStop(1, shadeColor(c.color || '#f4c88a', 0.75));
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  // 衣服高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-5, -8, 9, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // 头部
  const headG = ctx.createRadialGradient(-4, -32, 2, 0, -28, 15);
  headG.addColorStop(0, shadeColor(c.skinColor || '#f8d9a0', 1.2));
  headG.addColorStop(1, shadeColor(c.skinColor || '#f8d9a0', 0.85));
  ctx.fillStyle = headG;
  ctx.beginPath();
  ctx.arc(0, -28, 14, 0, Math.PI * 2);
  ctx.fill();

  // 头发
  ctx.fillStyle = c.hairColor || '#333';
  ctx.beginPath();
  ctx.arc(0, -36, 14, Math.PI, 0);
  ctx.fill();
  // 头发高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-4, -40, 7, 3.5, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#fff';
  for (const ex of [-5, 5]) {
    ctx.beginPath();
    ctx.arc(ex, -30, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#333';
  for (const ex of [-5, 5]) {
    ctx.beginPath();
    ctx.arc(ex, -30, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (const ex of [-5, 5]) {
    ctx.beginPath();
    ctx.arc(ex + 0.8, -31, 0.9, 0, Math.PI * 2);
    ctx.fill();
  }

  // 表情
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  if (c.patience > 0.5) {
    ctx.beginPath();
    ctx.arc(0, -24, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(0, -19, 5, Math.PI + 0.2, -0.2);
    ctx.stroke();
  }

  // 订单气泡
  if (c.order && c.state === 'waiting') {
    const bw = 92, bh = 42;
    // 气泡阴影
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.roundRect(13, -91, bw, bh, 9);
    ctx.fill();
    // 气泡背景
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    ctx.beginPath();
    ctx.roundRect(10, -93, bw, bh, 9);
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 三角
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    ctx.beginPath();
    ctx.moveTo(16, -51); ctx.lineTo(6, -43); ctx.lineTo(26, -51);
    ctx.fill();

    ctx.fillStyle = '#333';
    ctx.font = '13px Microsoft YaHei';
    ctx.fillText(c.order.emoji + ' ' + c.order.name, 17, -72);

    // 耐心条(圆角 + 渐变)
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath();
    ctx.roundRect(17, -61, 68, 7, 3);
    ctx.fill();
    const pColor = c.patience > 0.5 ? '#44cc44' : c.patience > 0.25 ? '#ffaa22' : '#ff3333';
    const pG = ctx.createLinearGradient(17, 0, 17 + 68 * c.patience, 0);
    pG.addColorStop(0, pColor);
    pG.addColorStop(1, shadeColor(pColor, 0.8));
    ctx.fillStyle = pG;
    ctx.beginPath();
    ctx.roundRect(17, -61, 68 * c.patience, 7, 3);
    ctx.fill();
    // 耐心条高光
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.roundRect(17, -61, 68 * c.patience, 3, 2);
    ctx.fill();
  }

  if (c.state === 'served') {
    ctx.font = '22px serif';
    ctx.fillText('😊', -11, -54);
  }

  ctx.restore();
}

// ============ FLOATING TEXTS ============
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#ff4', life: 1.0, vy: -1.5 });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.shadowColor = ft.color || '#ff4';
    ctx.shadowBlur = 8;
    ctx.fillStyle = ft.color || '#ff4';
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ TRANSITION ============
function drawTransition() {
  const p = transitionProgress;
  if (GS.scene === 'toshore') {
    ctx.fillStyle = `rgba(10,40,80,${p})`;
    ctx.fillRect(0, 0, VW, VH);
    for (let i = 0; i < 20; i++) {
      const bx = (i * 47 + GS.time * 30) % VW;
      const by = VH - (VH * p) - i * 10 + Math.sin(i + GS.time) * 20;
      ctx.strokeStyle = `rgba(200,240,255,${Math.max(0, 1 - p)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 4 * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// ============ UPDATE ============
function updateFishing(dt) {
  GS.time += dt;
  GS.zoneTimer += dt;

  // Zone switch
  if (GS.zoneTimer > 30) {
    GS.zoneTimer = 0;
    GS.zone = (GS.zone + 1) % 3;
    generateDecorations();
    showMessage(`进入 ${ZONES[GS.zone].name}！`, 2000);
  }

  // Weather events
  GS.weatherTimer += dt;
  if (GS.weatherTimer > 20) {
    GS.weatherTimer = 0;
    const weathers = ['normal', 'normal', 'current', 'dark'];
    const oldWeather = GS.weather;
    GS.weather = weathers[Math.floor(Math.random() * weathers.length)];
    if (GS.weather !== oldWeather) {
      const msgs = { current: '🌊 洋流来了！鱼群变向！', dark: '🌑 暗流！视野变暗！', normal: '☀️ 海水恢复平静' };
      if (msgs[GS.weather]) showMessage(msgs[GS.weather], 2000);
    }
  }

  // Oxygen
  GS.oxygen -= dt * 4;
  if (GS.oxygen <= 0) {
    GS.oxygen = 0;
    showMessage('氧气耗尽！自动上岸！', 1500);
    startTransitionToShore();
  }
  document.getElementById('oxyBar').style.width = (GS.oxygen / GS.oxygenMax * 100) + '%';

  // Spawn fish — 高频率保证屏幕始终有鱼
  if (Math.random() < dt * 3.5) spawnFish();

  // Update fish
  const currentDir = GS.weather === 'current' ? 1 : 0;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    f.phase += dt;

    // Shark AI - sense player and escape
    if (f.type === 'shark') {
      const dx = diver.x - f.x, dy = diver.y - f.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        f.scared = true;
        f.vx = f.vx - dx / dist * 0.3;
        f.vy = f.vy - dy / dist * 0.3;
      }
    }
    if (f.scaredTimer > 0) f.scaredTimer -= dt;
    else f.scared = false;

    // Wave motion
    f.vy += Math.sin(f.phase * 2) * 0.02;
    f.vy *= 0.98;

    // Current effect
    if (GS.weather === 'current') f.vx += currentDir * 0.05;

    f.x += f.vx;
    f.y += f.vy;

    // Boundary bounce
    if (f.y < 60) { f.y = 60; f.vy = Math.abs(f.vy); }
    if (f.y > H - 100) { f.y = H - 100; f.vy = -Math.abs(f.vy); }

    // Remove if far off viewport
    if (f.x < cam.x - 300 || f.x > cam.x + VW + 300) {
      fishes.splice(i, 1);
    }
  }

  // Shark click timeout
  for (const id in sharkClickState) {
    sharkClickState[id].timer -= dt;
    if (sharkClickState[id].timer <= 0) {
      delete sharkClickState[id];
    }
  }

  // Update diver bubbles
  if (Math.random() < dt * 3) {
    diver.bubbles.push({ x: diver.x + (diver.dir > 0 ? 18 : -18), y: diver.y - 30, r: 3 + Math.random() * 3, vy: -(0.8 + Math.random()), life: 1.0, dx: (Math.random() - 0.5) * 0.3 });
  }
  for (let i = diver.bubbles.length - 1; i >= 0; i--) {
    const b = diver.bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.life -= dt * 0.6;
    if (b.life <= 0) diver.bubbles.splice(i, 1);
  }

  // Update bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.r += 0.02;
    b.life -= dt * 0.8;
    if (b.life <= 0 || b.y < 0) bubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 1.2;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Message timer
  if (GS.msgTimer > 0) {
    GS.msgTimer -= dt * 1000;
    if (GS.msgTimer <= 0) document.getElementById('msgBox').style.display = 'none';
  }
  if (GS.sharkHintTimer > 0) {
    GS.sharkHintTimer -= dt * 1000;
    if (GS.sharkHintTimer <= 0) document.getElementById('sharkHint').style.display = 'none';
  }

  // Update HUD
  document.getElementById('score').textContent = GS.score;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('storage').textContent = GS.warehouse.length;
  document.getElementById('zoneName').textContent = ZONES[GS.zone].name;
}

function updateRestaurant(dt) {
  GS.time += dt;

  // Spawn customers
  if (GS.tables.length > 0 && Math.random() < dt * 0.3) {
    const emptyTable = GS.tables.find(t => !t.customer);
    if (emptyTable && GS.warehouse.length > 0) {
      const warehouseByType = {};
      for (const w of GS.warehouse) {
        warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
      }
      const availableDishes = SUSHI_MENU.filter(d => warehouseByType[d.fishType] > 0);
      if (availableDishes.length > 0) {
        const order = availableDishes[Math.floor(Math.random() * availableDishes.length)];
        emptyTable.customer = {
          color: ['#e8c090', '#d0a070', '#f8d0a0', '#c0a080'][Math.floor(Math.random() * 4)],
          skinColor: '#f8d9a0',
          hairColor: ['#333', '#664', '#882', '#555'][Math.floor(Math.random() * 4)],
          order,
          patience: 1.0,
          state: 'waiting',
          servedTimer: 0
        };
      }
    }
  }

  // Update customers
  for (const t of GS.tables) {
    if (t.customer) {
      const c = t.customer;
      if (c.state === 'waiting') {
        c.patience -= dt * 0.06;
        if (c.patience <= 0) {
          GS.satisfaction = Math.max(0, GS.satisfaction - 10);
          spawnFloatingText(t.x, t.y - 60, '-10 满意度 😡', '#f44');
          t.customer = null;
        }
      } else if (c.state === 'served') {
        c.servedTimer += dt;
        if (c.servedTimer > 2) t.customer = null;
      }
    }
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 0.8;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Update HUD
  document.getElementById('coins2').textContent = GS.coins;
  document.getElementById('satisfaction').textContent = GS.satisfaction;
  document.getElementById('storageCount').textContent = GS.warehouse.length;
}

const keys = {};
document.addEventListener('keydown', e => {

  if (e.key === 'e' || e.key === 'E') {

document.addEventListener('keyup', e => keys[e.key] = false);

// Drag-to-pan state
let drag = { active: false, startX: 0, startY: 0, camStartX: 0, camStartY: 0, moved: false };

canvas.addEventListener('mousedown', e => {
  if (GS.scene !== 'fishing') return;
  drag.active = true;
  drag.moved = false;
  drag.startX = e.clientX;
  drag.startY = e.clientY;
  drag.camStartX = cam.x;
  drag.camStartY = cam.y;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  if (GS.scene !== 'fishing') return;
  if (!drag.active) return;
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  cam.x = Math.max(0, Math.min(WW - VW, drag.camStartX - dx));
  cam.y = Math.max(0, Math.min(WH - VH, drag.camStartY - dy));
});

canvas.addEventListener('mouseup', e => {
  if (!drag.active) return;
  drag.active = false;
  canvas.style.cursor = 'grab';
  if (!drag.moved && GS.scene === 'fishing') {
    // Treat as click — convert screen to world coords
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) + cam.x;
    const my = (e.clientY - rect.top) + cam.y;
    handleFishingClick(mx, my);
  }
});

canvas.addEventListener('mouseleave', () => { drag.active = false; canvas.style.cursor = 'grab'; });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (GS.scene !== 'fishing') return;
  e.preventDefault();
  const t = e.touches[0];
  drag.active = true;
  drag.moved = false;
  drag.startX = t.clientX;
  drag.startY = t.clientY;
  drag.camStartX = cam.x;
  drag.camStartY = cam.y;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!drag.active) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - drag.startX;
  const dy = t.clientY - drag.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  cam.x = Math.max(0, Math.min(WW - VW, drag.camStartX - dx));
  cam.y = Math.max(0, Math.min(WH - VH, drag.camStartY - dy));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!drag.active) return;
  drag.active = false;
  if (!drag.moved && GS.scene === 'fishing') {
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) + cam.x;
    const my = (t.clientY - rect.top) + cam.y;
    handleFishingClick(mx, my);
  }
});

// Restaurant click (not drag-based)
canvas.addEventListener('click', e => {
  if (GS.scene === 'restaurant') {
    const rect = canvas.getBoundingClientRect();
    handleRestaurantClick(e.clientX - rect.left, e.clientY - rect.top);
  }
});

function handleFishingClick(mx, my) {
  if (GS.warehouse.length >= GS.warehouseMax) {
    showMessage('🎒 仓库已满！请上岸卸货', 2000);
    return;
  }

  let nearest = null, nearestDist = Infinity;
  for (const f of fishes) {
    const dx = mx - f.x, dy = my - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = f.size + 15 + (GS.upgradeNet ? 15 : 0);
    if (dist < hitRadius && dist < nearestDist) {
      nearest = f;
      nearestDist = dist;
    }
  }

  if (!nearest) {
    // Ripple effect
    for (let i = 0; i < 5; i++) {
      bubbles.push({ x: mx + (Math.random()-0.5)*20, y: my + (Math.random()-0.5)*20, r: 2, vy: -(0.5+Math.random()), life: 0.8, dx: (Math.random()-0.5)*0.5 });
    }
    return;
  }

  // Click effect
  for (let i = 0; i < 8; i++) {
    particles.push({ x: nearest.x, y: nearest.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 1.0, color: nearest.bodyColor });
  }

  if (nearest.clicks === 1) {
    // Instant catch
    catchFish(nearest);
  } else if (nearest.type === 'shark' || nearest.clicks > 1) {
    // Multi-click catch
    if (!sharkClickState[nearest.id]) {
      sharkClickState[nearest.id] = { count: 0, timer: 1.5 };
      document.getElementById('sharkHint').style.display = 'block';
      GS.sharkHintTimer = 1500;
    }
    sharkClickState[nearest.id].count++;
    sharkClickState[nearest.id].timer = 1.5;

    if (sharkClickState[nearest.id].count >= nearest.clicks) {
      delete sharkClickState[nearest.id];
      document.getElementById('sharkHint').style.display = 'none';
      // Shark tries to escape when at last click
      if (nearest.type === 'shark') {
        nearest.scared = true;
        nearest.scaredTimer = 99;
      }
      catchFish(nearest);
    } else {
      spawnFloatingText(nearest.x, nearest.y - 20, `${sharkClickState[nearest.id].count}/${nearest.clicks}`, '#ffa');
    }
  }
}

function catchFish(f) {
  const idx = fishes.indexOf(f);
  if (idx === -1) return;
  fishes.splice(idx, 1);

  GS.score += f.score;
  GS.warehouse.push({ type: f.type, name: f.name, emoji: f.emoji, value: f.value });
  spawnFloatingText(f.x, f.y - 10, `+${f.score} 分  ${f.emoji}`, '#7ff');
  showMessage(`捕获 ${f.emoji} ${f.name}！+${f.score}分`, 1200);

  // Splash particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: f.x, y: f.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1.0, color: '#7ef' });
  }
}

function handleRestaurantClick(screenX, screenY) {
  // Convert screen coords to restaurant's internal 900×600 coordinate system
  const mx = screenX / (VW / 900);
  const my = screenY / (VH / 600);

  // Check sell all button
  if (mx >= 15 && mx <= 95 && my >= 545 && my <= 570) {
    sellAll();
    return;
  }

  // Check fish items in warehouse (sell individual)
  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 410;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      // Sell button area
      if (mx >= 145 && mx <= 185 && my >= wy - 15 && my <= wy + 5) {
        // Sell one of this type
        const idx = GS.warehouse.findIndex(w => w.type === ft.type);
        if (idx !== -1) {
          const fish = GS.warehouse.splice(idx, 1)[0];
          GS.coins += fish.value;
          spawnFloatingText(165, wy - 20, `+${fish.value}💰`, '#ff4');
        }
        return;
      }
      // Select fish for serving
      if (mx >= 20 && mx <= 140 && my >= wy - 15 && my <= wy + 5) {
        GS.preparingDish = ft;
        spawnFloatingText(80, wy - 20, `选择: ${ft.name}`, '#adf');
        return;
      }
      wy += 22;
    }
  }

  // Check upgrade buttons
  const upgrades = [
    { x: 295, y: 543, w: 140, h: 40, cost: 200, action: 'net' },
    { x: 450, y: 543, w: 140, h: 40, cost: 300, action: 'speed' },
    { x: 605, y: 543, w: 140, h: 40, cost: 500, action: 'table' }
  ];
  for (const u of upgrades) {
    if (mx >= u.x && mx <= u.x + u.w && my >= u.y && my <= u.y + u.h) {
      if (GS.coins >= u.cost) {
        GS.coins -= u.cost;
        if (u.action === 'net') { GS.upgradeNet = true; showMessage('🎣 渔网已升级！捕鱼范围扩大！', 2000); }
        if (u.action === 'speed') { GS.upgradeSpeed = true; showMessage('🏃 潜水员速度提升！', 2000); }
        if (u.action === 'table') {
          if (GS.tables.length < 4) {
            addTable();
            showMessage('🏠 新桌位开放！可接待更多顾客！', 2000);
          } else {
            showMessage('餐厅已满员！', 1500);
          }
        }
      } else {
        showMessage(`💰 金币不足！需要 ${u.cost} 金币`, 1500);
      }
      return;
    }
  }

  // Serve customer - click on table with customer
  if (GS.preparingDish) {
    for (const t of GS.tables) {
      if (!t.customer) continue;
      const c = t.customer;
      const dx = mx - t.x, dy = my - t.y;
      if (Math.sqrt(dx*dx + dy*dy) < 60 && c.state === 'waiting') {
        if (c.order.fishType === GS.preparingDish.type) {
          // Serve!
          const idx = GS.warehouse.findIndex(w => w.type === GS.preparingDish.type);
          if (idx !== -1) {
            GS.warehouse.splice(idx, 1);
            const tip = Math.floor(c.patience > 0.7 ? c.order.price * 1.2 : c.order.price);
            GS.coins += tip;
            GS.score += Math.floor(c.order.price / 5);
            c.state = 'served';
            GS.preparingDish = null;
            if (c.patience > 0.8) {
              GS.satisfaction = Math.min(100, GS.satisfaction + 5);
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰 😊 快速服务！`, '#ff4');
            } else {
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰`, '#ff4');
            }
          } else {
            showMessage('仓库里没有这种鱼了！', 1500);
            GS.preparingDish = null;
          }
        } else {
          spawnFloatingText(t.x, t.y - 80, '❌ 食材不对！', '#f44');
        }
        return;
      }
    }
  }
}

function sellAll() {
  if (GS.warehouse.length === 0) { showMessage('仓库是空的！', 1500); return; }
  let total = 0;
  for (const f of GS.warehouse) total += f.value;
  GS.coins += total;
  GS.warehouse = [];
  spawnFloatingText(55, 535, `+${total}💰 全部出售！`, '#ff4');
  showMessage(`出售所有鱼类！+${total} 金币`, 2000);
}

function addTable() {
  const positions = [
    { x: 220, y: 420 }, { x: 420, y: 420 }, { x: 620, y: 420 }, { x: 820, y: 420 }
  ];
  if (GS.tables.length < positions.length) {
    GS.tables.push({ ...positions[GS.tables.length], customer: null });
  }
}

// ============ GAME LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, VW, VH);

  if (GS.scene === 'fishing') {
    document.getElementById('fishingHud').style.display = 'flex';
    document.getElementById('restaurantHud').style.display = 'none';

    // Apply camera transform for world-space drawing
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    drawBackground();
    drawDecorations();

    // Draw bubbles (折射气泡)
    for (const b of bubbles) {
      ctx.save();
      ctx.globalAlpha = b.life * 0.8;
      const bG = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.35, 0, b.x, b.y, b.r);
      bG.addColorStop(0, 'rgba(220,245,255,0.4)');
      bG.addColorStop(0.7, 'rgba(120,200,255,0.08)');
      bG.addColorStop(1, 'rgba(80,160,255,0.03)');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,230,255,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.32, b.r * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw particles (立体水花)
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      const pG = ctx.createRadialGradient(p.x - 1, p.y - 1, 0, p.x, p.y, 5);
      pG.addColorStop(0, 'rgba(255,255,255,0.9)');
      pG.addColorStop(0.4, p.color || '#7ef');
      pG.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = pG;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (const f of fishes) drawFish(f);
    drawDiver();
    drawFloatingTexts();

    // Restore camera transform — HUD drawn in screen space
    ctx.restore();

    // Update diver — auto-wander around the viewport center
    {
      // Diver lazily follows the viewport center with gentle wandering
      const wanderX = cam.x + VW / 2 + Math.sin(GS.time * 0.4) * VW * 0.25;
      const wanderY = cam.y + VH / 2 + Math.sin(GS.time * 0.27 + 1.5) * VH * 0.2;
      const lerp = 0.006;
      diver.x += (wanderX - diver.x) * lerp;
      diver.y += (wanderY - diver.y) * lerp;
      if (wanderX > diver.x + 2) diver.dir = 1;
      else if (wanderX < diver.x - 2) diver.dir = -1;
      diver.x = Math.max(40, Math.min(WW - 40, diver.x));
      diver.y = Math.max(40, Math.min(WH - 80, diver.y));
    }

    updateFishing(dt);

  } else if (GS.scene === 'toshore') {
    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    drawBackground();
    drawDecorations();
    for (const f of fishes) drawFish(f);
    drawDiver();
    ctx.restore();

    transitionProgress += dt * 1.5;
    drawTransition();

    if (transitionProgress >= 1) {
      GS.scene = 'restaurant';
      GS.oxygen = GS.oxygenMax;
      if (GS.tables.length === 0) { addTable(); addTable(); }
      document.getElementById('oxyBar').style.width = '100%';
      showMessage('欢迎回到岸上！经营你的寿司店吧！', 3000);
    }

  } else if (GS.scene === 'todive') {
    drawRestaurant();
    transitionProgress += dt * 1.5;

    ctx.fillStyle = `rgba(0,30,80,${transitionProgress})`;
    ctx.fillRect(0, 0, VW, VH);

    if (transitionProgress >= 1) {
      GS.scene = 'fishing';
      generateDecorations();
      showMessage('🤿 再次潜入深海！', 2000);
    }

  } else if (GS.scene === 'restaurant') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'flex';

    drawRestaurant();
    drawFloatingTexts();

    // Show currently selected dish
    if (GS.preparingDish) {
      ctx.fillStyle = 'rgba(255,220,0,0.15)';
      ctx.fillRect(0, 0, VW, VH);
      ctx.fillStyle = '#ff4';
      ctx.font = 'bold 16px Microsoft YaHei';
      ctx.textAlign = 'center';
      ctx.fillText(`正在准备: ${GS.preparingDish.emoji} ${GS.preparingDish.name} — 点击顾客桌子上菜！`, VW / 2, VH / 2);
      ctx.textAlign = 'left';
    }

    updateRestaurant(dt);
  }

  requestAnimationFrame(loop);
}

// ============ INIT ============
function init() {
  diver.x = WW / 2;
  diver.y = WH / 2;
  cam.x = Math.max(0, Math.min(WW - VW, WW / 2 - VW / 2));
  cam.y = Math.max(0, Math.min(WH - VH, WH / 2 - VH / 2));
  generateDecorations();
  // Spawn fish directly inside the viewport so they're visible immediately
  for (let i = 0; i < 28; i++) spawnFish(true);
  showMessage('🤿 欢迎来到深海捕鱼！拖动画面探索海洋，点击鱼来捕获！', 4000);
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
