<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海捕鱼 & 寿司店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
  #gameCanvas { display: block; cursor: crosshair; }
  #ui { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 900px; pointer-events: none; }
  .hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
  .hud-item { background: rgba(0,5,20,0.82); border: 1px solid rgba(100,200,255,0.5); border-radius: 10px; padding: 6px 14px; color: #9ef; font-size: 13px; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,100,200,0.3), inset 0 1px 0 rgba(255,255,255,0.08); }
  .oxygen-bar { width: 120px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(100,200,255,0.4); }
  .oxygen-fill { height: 100%; background: linear-gradient(90deg, #00aaff, #00ffcc); border-radius: 6px; transition: width 0.3s; box-shadow: 0 0 6px #0af; }
  #msgBox { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,5,30,0.92); border: 1px solid rgba(100,220,255,0.6); border-radius: 14px; padding: 10px 28px; color: #fff; font-size: 16px; display: none; text-align: center; pointer-events: none; box-shadow: 0 4px 20px rgba(0,150,255,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
  #sharkHint { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); color: #ff4; font-size: 14px; font-weight: bold; display: none; text-shadow: 0 0 12px #fa0, 0 0 4px #f80; pointer-events: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="hud" id="fishingHud">
    <div class="hud-item">🏆 <span id="score">0</span></div>
    <div class="hud-item">💰 <span id="coins">0</span></div>
    <div class="hud-item" style="display:flex;align-items:center;gap:6px;">
      🫧 <div class="oxygen-bar"><div class="oxygen-fill" id="oxyBar" style="width:100%"></div></div>
    </div>
    <div class="hud-item">🎒 <span id="storage">0</span>/20</div>
    <div class="hud-item" style="color:#adf;">区域: <span id="zoneName">浅海</span></div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#ffe;border-color:#ffe;" onclick="goAshore()">🏖️ 上岸 [E]</div>
  </div>
  <div class="hud" id="restaurantHud" style="display:none;">
    <div class="hud-item">💰 <span id="coins2">0</span></div>
    <div class="hud-item">😊 满意度: <span id="satisfaction">100</span>%</div>
    <div class="hud-item">📦 仓库: <span id="storageCount">0</span>条</div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#8ff;border-color:#8ff;" onclick="goDiving()">🤿 再次潜水</div>
  </div>
  <div id="msgBox"></div>
  <div id="sharkHint">🦈 快速点击鲨鱼 3 次！</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

// ============ GAME STATE ============
const GS = {
  scene: 'fishing', // 'fishing' | 'restaurant' | 'transition'
  score: 0,
  coins: 0,
  satisfaction: 100,
  oxygen: 100,
  oxygenMax: 100,
  warehouse: [], // {type, name, emoji, value}
  warehouseMax: 20,
  time: 0,
  zone: 0, // 0=浅海 1=珊瑚礁 2=深海
  zoneTimer: 0,
  weather: 'normal', // normal | current | dark
  weatherTimer: 0,
  restaurantLevel: 1,
  tables: [],
  preparingDish: null, // currently selected fish for serving
  satisfaction: 100,
  msgTimer: 0,
  sharkHintTimer: 0
};

// ============ FISH TYPES ============
const FISH_TYPES = [
  { type: 'clownfish', name: '小丑鱼', emoji: '🐠', color: '#ff6b35', bodyColor: '#ff8c42', speed: 0.8, score: 10, value: 15, size: 16, clicks: 1, rarity: 0.25 },
  { type: 'tuna',      name: '金枪鱼', emoji: '🐟', color: '#4a90d9', bodyColor: '#5ba3e8', speed: 1.4, score: 30, value: 45, size: 22, clicks: 1, rarity: 0.2 },
  { type: 'salmon',    name: '三文鱼', emoji: '🐡', color: '#e07b54', bodyColor: '#f09b74', speed: 1.2, score: 40, value: 60, size: 20, clicks: 1, rarity: 0.18 },
  { type: 'puffer',    name: '河豚',   emoji: '🐡', color: '#a8c256', bodyColor: '#c8e276', speed: 1.0, score: 50, value: 80, size: 18, clicks: 1, rarity: 0.15, wobble: true },
  { type: 'crab',      name: '螃蟹',   emoji: '🦀', color: '#d94f3d', bodyColor: '#f06050', speed: 0.7, score: 60, value: 90, size: 19, clicks: 2, rarity: 0.12, sideways: true },
  { type: 'shark',     name: '大鲨鱼', emoji: '🦈', color: '#557799', bodyColor: '#6688aa', speed: 2.5, score: 200, value: 300, size: 40, clicks: 3, rarity: 0.1, escapes: true }
];

const SUSHI_MENU = [
  { name: '金枪鱼寿司', fishType: 'tuna',      price: 80,  emoji: '🍣' },
  { name: '三文鱼寿司', fishType: 'salmon',    price: 100, emoji: '🍣' },
  { name: '螃蟹手卷',   fishType: 'crab',      price: 120, emoji: '🌯' },
  { name: '河豚刺身',   fishType: 'puffer',    price: 150, emoji: '🍱' },
  { name: '鲨鱼大餐',   fishType: 'shark',     price: 500, emoji: '🎌' },
  { name: '小丑鱼汤',   fishType: 'clownfish', price: 50,  emoji: '🍜' }
];

// ============ ENTITIES ============
let diver = { x: 450, y: 350, vx: 0, vy: 0, dir: 1, bubbles: [], animTime: 0 };
let fishes = [];
let bubbles = [];
let decorations = [];
let particles = [];
let customers = [];
let floatingTexts = [];
let transitionProgress = 0;
let sharkClickState = {}; // fishId -> {count, timer}

// ============ ZONES ============
const ZONES = [
  { name: '浅海', bgTop: '#1a6a9a', bgBot: '#0d3d6b', light: 0.9, fishBonus: 1.0 },
  { name: '珊瑚礁', bgTop: '#0e5c7a', bgBot: '#0a3050', light: 0.7, fishBonus: 1.3 },
  { name: '深海', bgTop: '#061828', bgBot: '#020a14', light: 0.4, fishBonus: 1.8 }
];

// ============ CORAL / SEAWEED GENERATION ============
function generateDecorations() {
  decorations = [];
  const z = GS.zone;
  for (let i = 0; i < 12; i++) {
    const x = Math.random() * 900;
    decorations.push({ type: 'seaweed', x, y: 600, height: 40 + Math.random() * 80, phase: Math.random() * Math.PI * 2, color: z === 2 ? '#1a4a2a' : '#2d8a4a' });
  }
  if (z >= 1) {
    for (let i = 0; i < 8; i++) {
      decorations.push({ type: 'coral', x: Math.random() * 900, y: 570 + Math.random() * 20, size: 20 + Math.random() * 30, color: z === 1 ? '#ff6b9d' : '#8855ff' });
    }
  }
  for (let i = 0; i < 6; i++) {
    decorations.push({ type: 'rock', x: Math.random() * 900, y: 560 + Math.random() * 30, size: 15 + Math.random() * 25, color: '#445566' });
  }
}

function spawnFish() {
  if (fishes.length >= 18) return;
  const zone = ZONES[GS.zone];
  const r = Math.random();
  let cumulative = 0;
  let type = FISH_TYPES[0];
  for (const ft of FISH_TYPES) {
    cumulative += ft.rarity;
    if (r < cumulative) { type = ft; break; }
  }
  const side = Math.random() < 0.5 ? -1 : 1;
  const spd = type.speed * zone.fishBonus * (0.8 + Math.random() * 0.4);
  fishes.push({
    id: Math.random().toString(36).substr(2),
    ...type,
    x: side < 0 ? -60 : 960,
    y: 80 + Math.random() * 450,
    vx: side * spd,
    vy: (Math.random() - 0.5) * 0.5,
    phase: Math.random() * Math.PI * 2,
    hp: type.clicks,
    maxHp: type.clicks,
    scared: false,
    scaredTimer: 0
  });
}

// ============ BUBBLES ============
function spawnBubble(x, y) {
  bubbles.push({ x, y, r: 3 + Math.random() * 5, vy: -(0.5 + Math.random() * 1.5), life: 1.0, dx: (Math.random() - 0.5) * 0.4 });
}

// ============ DRAW FUNCTIONS ============
function drawBackground() {
  const z = ZONES[GS.zone];
  const darkMult = GS.weather === 'dark' ? 0.35 : 1.0;

  // === 多层景深背景 ===
  // 最远层 - 深色底色
  const grad = ctx.createLinearGradient(0, 0, 0, 600);
  grad.addColorStop(0, shadeColor(z.bgTop, darkMult));
  grad.addColorStop(0.5, shadeColor(z.bgTop, darkMult * 0.75));
  grad.addColorStop(1, shadeColor(z.bgBot, darkMult));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 900, 600);

  // 中远景雾化层 - 模拟水体散射
  if (GS.zone < 2) {
    const hazeGrad = ctx.createRadialGradient(450, 0, 50, 450, 0, 700);
    hazeGrad.addColorStop(0, 'rgba(100,200,255,0.06)');
    hazeGrad.addColorStop(1, 'rgba(0,50,120,0)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, 900, 600);
  }

  // === 体积光射线 (浅海/珊瑚礁) ===
  if (GS.zone <= 1 && GS.weather !== 'dark') {
    ctx.save();
    const rayCount = GS.zone === 0 ? 7 : 4;
    const rayAlpha = GS.zone === 0 ? 0.07 : 0.04;
    for (let i = 0; i < rayCount; i++) {
      const rx = 80 + i * 130 + Math.sin(GS.time * 0.4 + i * 1.3) * 30;
      const rayWidth = 40 + Math.sin(GS.time * 0.3 + i) * 15;
      const grad2 = ctx.createLinearGradient(rx, 0, rx, 600);
      grad2.addColorStop(0, `rgba(180,240,255,${rayAlpha})`);
      grad2.addColorStop(0.4, `rgba(120,200,255,${rayAlpha * 0.5})`);
      grad2.addColorStop(1, 'rgba(0,100,200,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      ctx.moveTo(rx - rayWidth * 0.3, 0);
      ctx.lineTo(rx + rayWidth + Math.sin(GS.time * 0.2 + i) * 20, 600);
      ctx.lineTo(rx - rayWidth * 0.5 + Math.sin(GS.time * 0.2 + i) * 20, 600);
      ctx.lineTo(rx - rayWidth * 0.6, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // === 水面焦散纹理 (浅海) ===
  if (GS.zone === 0 && GS.weather !== 'dark') {
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 12; i++) {
      const cx = ((GS.time * 25 + i * 80) % 1000) - 50;
      const cy = 30 + (i % 4) * 60 + Math.sin(GS.time + i) * 15;
      const r = 20 + Math.sin(GS.time * 0.7 + i) * 8;
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      cg.addColorStop(0, 'rgba(200,240,255,0.8)');
      cg.addColorStop(1, 'rgba(100,180,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, r, r * 0.5, GS.time * 0.1 + i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // === 深海发光浮游生物 ===
  if (GS.zone === 2) {
    ctx.save();
    for (let i = 0; i < 15; i++) {
      const px = (Math.sin(i * 2.3 + GS.time * 0.1) * 0.5 + 0.5) * 900;
      const py = (Math.sin(i * 1.7 + GS.time * 0.08) * 0.5 + 0.5) * 500 + 30;
      const pr = 2 + Math.sin(GS.time * 2 + i) * 1;
      const glow = ctx.createRadialGradient(px, py, 0, px, py, pr * 4);
      const hue = (i * 40 + GS.time * 20) % 360;
      glow.addColorStop(0, `hsla(${hue},100%,80%,0.6)`);
      glow.addColorStop(1, `hsla(${hue},100%,60%,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, pr * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // === 洋流视觉效果 ===
  if (GS.weather === 'current') {
    ctx.save();
    for (let i = 0; i < 6; i++) {
      const cx = ((GS.time * 90 + i * 160) % 1200) - 100;
      const cy = 80 + i * 80 + Math.sin(i * 1.2) * 30;
      const cg = ctx.createLinearGradient(cx - 20, cy, cx + 80, cy);
      cg.addColorStop(0, 'rgba(100,200,255,0)');
      cg.addColorStop(0.3, 'rgba(150,220,255,0.15)');
      cg.addColorStop(1, 'rgba(100,200,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx + 30, cy, 60, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // === 3D 沙底 — 多层起伏 + 法线光照 ===
  const isDeep = GS.zone === 2;
  // 阴影层(最低)
  ctx.save();
  ctx.fillStyle = isDeep ? 'rgba(0,0,0,0.6)' : 'rgba(80,50,10,0.35)';
  ctx.beginPath();
  ctx.moveTo(0, 600);
  for (let x = 0; x <= 900; x += 20) {
    ctx.lineTo(x, 572 + Math.sin(x * 0.04 + GS.time * 0.15) * 6 + 4);
  }
  ctx.lineTo(900, 600); ctx.lineTo(0, 600);
  ctx.closePath();
  ctx.fill();

  // 主沙面
  const sandGrad = ctx.createLinearGradient(0, 555, 0, 600);
  if (isDeep) {
    sandGrad.addColorStop(0, '#0e1e2c');
    sandGrad.addColorStop(0.5, '#0a1520');
    sandGrad.addColorStop(1, '#060c14');
  } else if (GS.zone === 1) {
    sandGrad.addColorStop(0, '#b89050');
    sandGrad.addColorStop(0.5, '#9a7838');
    sandGrad.addColorStop(1, '#806030');
  } else {
    sandGrad.addColorStop(0, '#d4b070');
    sandGrad.addColorStop(0.5, '#c09050');
    sandGrad.addColorStop(1, '#a07838');
  }
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, 600);
  for (let x = 0; x <= 900; x += 20) {
    ctx.lineTo(x, 568 + Math.sin(x * 0.04 + GS.time * 0.15) * 6);
  }
  ctx.lineTo(900, 600); ctx.lineTo(0, 600);
  ctx.closePath();
  ctx.fill();

  // 沙纹高光层
  if (!isDeep) {
    ctx.strokeStyle = 'rgba(255,220,130,0.25)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      for (let x = 0; x <= 900; x += 20) {
        const y = 570 + i * 4 + Math.sin(x * 0.04 + GS.time * 0.15 + i * 0.5) * 4;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function shadeColor(hex, mult) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*mult)},${Math.round(g*mult)},${Math.round(b*mult)})`;
}

function drawDecorations() {
  // 先画阴影层，再画实体（增加3D景深感）
  for (const d of decorations) {
    if (d.type === 'rock') {
      // 地面阴影
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(d.x + 6, d.y + 8, d.size * 1.1, d.size * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (const d of decorations) {
    if (d.type === 'seaweed') {
      const sway = Math.sin(GS.time * 1.5 + d.phase) * 12;
      const sway2 = Math.sin(GS.time * 1.2 + d.phase + 1) * 6;
      // 阴影茎
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(d.x + 2, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 2, d.y - d.height * 0.35, d.x + sway + 2, d.y - d.height * 0.65, d.x + sway * 1.4 + 2, d.y - d.height);
      ctx.stroke();
      // 主茎(粗)
      const swGrad = ctx.createLinearGradient(d.x, d.y, d.x + sway * 1.4, d.y - d.height);
      swGrad.addColorStop(0, d.color);
      swGrad.addColorStop(1, GS.zone === 2 ? '#2a6a3a' : '#50c870');
      ctx.strokeStyle = swGrad;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5, d.y - d.height * 0.35, d.x + sway, d.y - d.height * 0.65, d.x + sway * 1.4, d.y - d.height);
      ctx.stroke();
      // 高光茎
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(d.x + 1, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 1, d.y - d.height * 0.35, d.x + sway + 1, d.y - d.height * 0.65, d.x + sway * 1.4 + 1, d.y - d.height);
      ctx.stroke();
      // 叶片
      for (let j = 0.25; j <= 0.85; j += 0.3) {
        const lx = d.x + sway * j * 1.4;
        const ly = d.y - d.height * j;
        const la = Math.sin(GS.time * 1.8 + d.phase + j * 3) * 0.4;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(la + (j > 0.5 ? 0.3 : -0.3));
        const lGrad = ctx.createLinearGradient(-10, 0, 10, 0);
        lGrad.addColorStop(0, GS.zone === 2 ? '#1a5a2a' : '#30a850');
        lGrad.addColorStop(0.5, GS.zone === 2 ? '#2a7a3a' : '#50d870');
        lGrad.addColorStop(1, 'rgba(0,100,40,0)');
        ctx.fillStyle = lGrad;
        ctx.beginPath();
        ctx.ellipse(8, 0, 14, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

    } else if (d.type === 'coral') {
      // 立体珊瑚 - 圆柱底座 + 球形顶端
      const branches = [
        { ox: 0, oy: 0, r: d.size * 0.42, h: d.size * 0.6 },
        { ox: -d.size * 0.45, oy: 5, r: d.size * 0.3, h: d.size * 0.45 },
        { ox: d.size * 0.42, oy: 8, r: d.size * 0.25, h: d.size * 0.38 }
      ];
      for (const b of branches) {
        const bx = d.x + b.ox, by = d.y;
        // 茎阴影
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(bx + 3, by + 3, b.r * 0.5, b.r * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        // 茎(圆柱侧面)
        const stemGrad = ctx.createLinearGradient(bx - b.r * 0.5, 0, bx + b.r * 0.5, 0);
        stemGrad.addColorStop(0, shadeColor(d.color, 0.55));
        stemGrad.addColorStop(0.35, d.color);
        stemGrad.addColorStop(0.6, shadeColor(d.color, 1.3));
        stemGrad.addColorStop(1, shadeColor(d.color, 0.7));
        ctx.fillStyle = stemGrad;
        ctx.beginPath();
        ctx.rect(bx - b.r * 0.4, by - b.h, b.r * 0.8, b.h);
        ctx.fill();
        // 顶端球
        const ballGrad = ctx.createRadialGradient(bx - b.r * 0.25, by - b.h - b.r * 0.3, b.r * 0.05, bx, by - b.h, b.r);
        ballGrad.addColorStop(0, shadeColor(d.color, 1.6));
        ballGrad.addColorStop(0.4, d.color);
        ballGrad.addColorStop(1, shadeColor(d.color, 0.5));
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(bx, by - b.h, b.r, 0, Math.PI * 2);
        ctx.fill();
        // 顶端高光
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.h - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'rock') {
      // 立体岩石 - 多层椭圆 + 法线光照
      // 暗面
      const rockDark = ctx.createRadialGradient(d.x + d.size * 0.3, d.y + d.size * 0.1, 0, d.x, d.y - d.size * 0.2, d.size * 1.2);
      rockDark.addColorStop(0, '#667788');
      rockDark.addColorStop(0.5, d.color);
      rockDark.addColorStop(1, '#223344');
      ctx.fillStyle = rockDark;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * 0.62, -0.1, 0, Math.PI * 2);
      ctx.fill();
      // 高光面
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.2, d.y - d.size * 0.2, d.size * 0.55, d.size * 0.28, -0.4, 0, Math.PI * 2);
      ctx.fill();
      // 顶部亮斑
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.15, d.y - d.size * 0.28, d.size * 0.2, d.size * 0.1, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // 裂缝细节
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x - d.size * 0.1, d.y - d.size * 0.15);
      ctx.lineTo(d.x + d.size * 0.2, d.y + d.size * 0.05);
      ctx.stroke();
    }
  }
}

function drawFish(f) {
  // 地面阴影
  if (f.y > 400) {
    const shadowAlpha = Math.max(0, (f.y - 400) / 200) * 0.35;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
    ctx.beginPath();
    ctx.ellipse(f.x, 572 + Math.sin(f.x * 0.04 + GS.time * 0.15) * 6, f.size * 1.1, f.size * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(f.x, f.y);
  const scaleX = f.vx < 0 ? -1 : 1;
  ctx.scale(scaleX, 1);

  const wobbleScale = f.wobble ? 1 + Math.sin(GS.time * 3 + f.phase) * 0.15 : 1;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const w = f.size, h = f.size * 0.6;

  if (f.type === 'shark') {
    const sharkCol = f.scared ? '#99aaaa' : f.bodyColor;
    // 身体底色阴影
    ctx.fillStyle = shadeColor(sharkCol, 0.5);
    ctx.beginPath();
    ctx.ellipse(2, 2, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 身体主渐变(球面光照)
    const sg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, w * 0.05, 0, 0, w * 1.1);
    sg.addColorStop(0, shadeColor(sharkCol, 1.5));
    sg.addColorStop(0.45, sharkCol);
    sg.addColorStop(1, shadeColor(sharkCol, 0.55));
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部浅色
    ctx.fillStyle = 'rgba(230,240,245,0.5)';
    ctx.beginPath();
    ctx.ellipse(w * 0.15, h * 0.3, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍
    const finG = ctx.createLinearGradient(-5, -h, 20, -h - 20);
    finG.addColorStop(0, shadeColor(f.scared ? '#778899' : f.color, 0.8));
    finG.addColorStop(1, shadeColor(f.scared ? '#778899' : f.color, 1.2));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-5, -h + 2);
    ctx.lineTo(12, -h - 20);
    ctx.lineTo(22, -h + 2);
    ctx.closePath();
    ctx.fill();
    // 尾鳍
    ctx.fillStyle = f.scared ? '#889aaa' : f.color;
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 16, -13);
    ctx.lineTo(-w - 16, 13);
    ctx.closePath();
    ctx.fill();
    // 眼睛(高光)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.42, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.42 + 1.5, -5.5, 2, 0, Math.PI * 2);
    ctx.fill();
    // 牙齿
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(w * 0.68, 4);
    ctx.lineTo(w * 0.78, 10);
    ctx.lineTo(w * 0.88, 4);
    ctx.fill();
    // HP条
    if (f.hp < f.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(-w, h + 5, w * 2, 7);
      ctx.fillStyle = '#f33';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 7);
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 3);
    }

  } else if (f.type === 'crab') {
    // 螃蟹 - 立体甲壳
    const cg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, h * 0.1, 0, 0, w);
    cg.addColorStop(0, shadeColor(f.bodyColor, 1.5));
    cg.addColorStop(0.5, f.bodyColor);
    cg.addColorStop(1, shadeColor(f.bodyColor, 0.55));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 甲壳高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.35, w * 0.4, h * 0.25, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 蟹钳(立体)
    for (const side of [-1, 1]) {
      const cx = side * (w + 5);
      const clawG = ctx.createRadialGradient(cx - 2, -7, 1, cx, -5, 10);
      clawG.addColorStop(0, shadeColor(f.color, 1.4));
      clawG.addColorStop(1, shadeColor(f.color, 0.7));
      ctx.fillStyle = clawG;
      ctx.beginPath();
      ctx.arc(cx, -5, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx - 2, -7, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // 蟹腿
    for (let i = -1; i <= 1; i++) {
      ctx.strokeStyle = shadeColor(f.color, 0.9);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(i * 10, h);
      ctx.lineTo(i * 15 + Math.sin(GS.time * 4 + i) * 3, h + 13);
      ctx.stroke();
    }
    // 眼睛
    for (const ex of [-8, 8]) {
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex, -5, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(ex + 1, -6.5, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

  } else {
    // 通用鱼 - 球面光照身体
    const fishG = ctx.createRadialGradient(-w * 0.25, -h * 0.4, h * 0.05, 0, 0, w * 1.05);
    fishG.addColorStop(0, shadeColor(f.bodyColor, 1.6));
    fishG.addColorStop(0.4, f.bodyColor);
    fishG.addColorStop(1, shadeColor(f.bodyColor, 0.5));
    ctx.fillStyle = fishG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鱼鳞光泽纹
    ctx.save();
    ctx.clip();
    ctx.globalAlpha = 0.12;
    for (let sx = -w + 5; sx < w; sx += 7) {
      for (let sy = -h + 3; sy < h; sy += 6) {
        ctx.fillStyle = (Math.floor(sx / 7 + sy / 6) % 2 === 0) ? '#fff' : shadeColor(f.bodyColor, 0.7);
        ctx.beginPath();
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // 腹部
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.28, w * 0.45, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 背鳍
    const finG = ctx.createLinearGradient(0, -h, 14, -h - 12);
    finG.addColorStop(0, shadeColor(f.color, 0.9));
    finG.addColorStop(1, shadeColor(f.color, 1.3));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-2, -h + 1);
    ctx.lineTo(7, -h - 11);
    ctx.lineTo(15, -h + 1);
    ctx.closePath();
    ctx.fill();

    // 尾鳍
    ctx.fillStyle = shadeColor(f.color, 1.1);
    ctx.beginPath();
    ctx.moveTo(-w + 1, 0);
    ctx.lineTo(-w - 11, -9);
    ctx.lineTo(-w - 11, 9);
    ctx.closePath();
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.5, -2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 0.5, -2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 1, -3.5, 1.3, 0, Math.PI * 2);
    ctx.fill();

    // 小丑鱼白条纹
    if (f.type === 'clownfish') {
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -h + 1); ctx.lineTo(0, h - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-w * 0.3, -h * 0.8); ctx.lineTo(-w * 0.3, h * 0.8);
      ctx.stroke();
    }

    // 河豚棘刺
    if (f.type === 'puffer') {
      ctx.strokeStyle = shadeColor(f.color, 0.7);
      ctx.lineWidth = 1.8;
      for (let a = 0; a < Math.PI * 2; a += 0.65) {
        const sx = Math.cos(a) * w, sy = Math.sin(a) * h;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(Math.cos(a) * (w + 6), Math.sin(a) * (h + 6));
        ctx.stroke();
      }
    }

    // 三文鱼侧线
    if (f.type === 'salmon') {
      ctx.strokeStyle = 'rgba(255,130,80,0.7)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-w * 0.55, 0);
      ctx.quadraticCurveTo(0, h * 0.15, w * 0.55, 0);
      ctx.stroke();
    }
  }
  ctx.restore();

  // 多击进度指示
  if (f.maxHp > 1) {
    const sc = sharkClickState[f.id];
    if (sc && sc.count > 0) {
      for (let i = 0; i < f.maxHp; i++) {
        const dotX = f.x - 10 + i * 13;
        const dotY = f.y - f.size - 16;
        ctx.beginPath();
        ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
        ctx.fillStyle = i < sc.count ? '#ff4' : 'rgba(255,255,255,0.25)';
        ctx.fill();
        if (i < sc.count) {
          ctx.strokeStyle = 'rgba(255,200,0,0.6)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
  }
}

function drawDiver() {
  const d = diver;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(d.dir, 1);

  const bob = Math.sin(GS.time * 2) * 3;

  // 地面投影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 50, 28, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 氧气罐(金属质感)
  const tankG = ctx.createLinearGradient(-30, 0, -10, 0);
  tankG.addColorStop(0, '#555');
  tankG.addColorStop(0.3, '#999');
  tankG.addColorStop(0.6, '#bbb');
  tankG.addColorStop(1, '#666');
  ctx.fillStyle = tankG;
  ctx.beginPath();
  ctx.roundRect(-28, -20 + bob, 16, 34, 6);
  ctx.fill();
  // 罐身高光
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(-26, -18 + bob, 5, 18, 3);
  ctx.fill();
  // 气管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -5 + bob); ctx.lineTo(-12, -5 + bob);
  ctx.stroke();

  // 潜水服身体(径向光照渐变)
  const bodyG = ctx.createRadialGradient(-8, -8 + bob, 4, 0, 0 + bob, 30);
  bodyG.addColorStop(0, '#7ee0ff');
  bodyG.addColorStop(0.35, '#3ab0e8');
  bodyG.addColorStop(0.7, '#1a7ab8');
  bodyG.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 26, 28, 0, 0, Math.PI * 2);
  ctx.fill();
  // 潜水服缝线
  ctx.strokeStyle = 'rgba(10,80,160,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -12 + bob); ctx.lineTo(-18, 12 + bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(14, -12 + bob); ctx.lineTo(18, 12 + bob);
  ctx.stroke();
  // 胸口徽标高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-4, -5 + bob, 12, 8, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // 面罩框架
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(4, -14 + bob, 16, 12, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩玻璃
  const maskG = ctx.createLinearGradient(-8, -22 + bob, 14, -8 + bob);
  maskG.addColorStop(0, 'rgba(180,240,255,0.7)');
  maskG.addColorStop(0.5, 'rgba(80,180,255,0.45)');
  maskG.addColorStop(1, 'rgba(20,100,200,0.3)');
  ctx.fillStyle = maskG;
  ctx.beginPath();
  ctx.ellipse(4, -15 + bob, 14, 10, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩反光斑
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(-2, -20 + bob, 5, 2.5, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-2, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(-1, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(11, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 呼吸管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();
  ctx.strokeStyle = '#fa4';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();

  // 手臂
  const armG = ctx.createLinearGradient(-30, 0, -18, 0);
  armG.addColorStop(0, '#0d4a7a');
  armG.addColorStop(0.5, '#1a7ab8');
  armG.addColorStop(1, '#3ab0e8');
  ctx.fillStyle = armG;
  ctx.beginPath();
  ctx.ellipse(-24, 5 + bob, 7, 14, 0.35, 0, Math.PI * 2);
  ctx.fill();
  const armG2 = ctx.createLinearGradient(18, 0, 30, 0);
  armG2.addColorStop(0, '#3ab0e8');
  armG2.addColorStop(0.5, '#1a7ab8');
  armG2.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = armG2;
  ctx.beginPath();
  ctx.ellipse(24, 5 + bob, 7, 14, -0.35, 0, Math.PI * 2);
  ctx.fill();

  // 脚蹼(动画)
  const flipAnim = Math.sin(GS.time * 3) * 10;
  const flipG = ctx.createLinearGradient(-20, 25, 0, 45);
  flipG.addColorStop(0, '#e05000');
  flipG.addColorStop(1, '#ff8c00');
  ctx.fillStyle = flipG;
  ctx.beginPath();
  ctx.ellipse(-10 + flipAnim, 32 + bob, 13, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 - flipAnim, 32 + bob, 13, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // 气泡(折射效果)
  for (const b of d.bubbles) {
    ctx.save();
    ctx.globalAlpha = b.life * 0.9;
    // 气泡内部折射色
    const bGrad = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.05, b.x, b.y, b.r);
    bGrad.addColorStop(0, 'rgba(220,245,255,0.5)');
    bGrad.addColorStop(0.6, 'rgba(150,210,255,0.1)');
    bGrad.addColorStop(1, 'rgba(100,180,255,0.05)');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    // 轮廓
    ctx.strokeStyle = 'rgba(180,230,255,0.75)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // 高光点
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ============ RESTAURANT DRAWING ============
function drawRestaurant() {
  // 天空渐变
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 260);
  skyGrad.addColorStop(0, '#5ba8d8');
  skyGrad.addColorStop(0.6, '#9fd0f0');
  skyGrad.addColorStop(1, '#c8e8f8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 900, 260);

  // 云朵
  const clouds = [
    { x: 120 + Math.sin(GS.time * 0.08) * 15, y: 40, r: 28 },
    { x: 380 + Math.sin(GS.time * 0.06 + 1) * 12, y: 55, r: 22 },
    { x: 650 + Math.sin(GS.time * 0.07 + 2) * 18, y: 35, r: 32 }
  ];
  for (const c of clouds) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    for (const [ox, oy, or] of [[-22, 8, c.r * 0.7], [0, 0, c.r], [20, 6, c.r * 0.75], [-12, 12, c.r * 0.55], [12, 12, c.r * 0.55]]) {
      ctx.beginPath();
      ctx.arc(c.x + ox, c.y + oy, or, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 太阳
  const sunG = ctx.createRadialGradient(820, 55, 5, 820, 55, 48);
  sunG.addColorStop(0, '#fff7aa');
  sunG.addColorStop(0.4, '#ffe055');
  sunG.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.fillStyle = sunG;
  ctx.beginPath();
  ctx.arc(820, 55, 48, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffe055';
  ctx.beginPath();
  ctx.arc(820, 55, 30, 0, Math.PI * 2);
  ctx.fill();

  // 海面
  const seaGrad = ctx.createLinearGradient(0, 175, 0, 255);
  seaGrad.addColorStop(0, '#2a9cc8');
  seaGrad.addColorStop(1, '#0d5a80');
  ctx.fillStyle = seaGrad;
  ctx.fillRect(0, 175, 900, 75);
  // 海浪高光
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2.5;
  for (let i = 0; i < 5; i++) {
    const wx = ((GS.time * 55 + i * 170) % 1050) - 60;
    ctx.beginPath();
    ctx.moveTo(wx, 195 + i * 9);
    ctx.quadraticCurveTo(wx + 35, 188 + i * 9, wx + 70, 195 + i * 9);
    ctx.stroke();
  }

  // 沙滩(渐变+细节)
  const beachGrad = ctx.createLinearGradient(0, 245, 0, 315);
  beachGrad.addColorStop(0, '#f0d080');
  beachGrad.addColorStop(0.5, '#ddb858');
  beachGrad.addColorStop(1, '#c8a040');
  ctx.fillStyle = beachGrad;
  ctx.fillRect(0, 245, 900, 70);
  // 沙滩光泽纹
  ctx.strokeStyle = 'rgba(255,230,150,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(0, 258 + i * 12);
    for (let x = 0; x <= 900; x += 30) {
      ctx.lineTo(x, 258 + i * 12 + Math.sin(x * 0.05 + i) * 2);
    }
    ctx.stroke();
  }

  // 餐厅地板(透视木地板)
  const floorGrad = ctx.createLinearGradient(0, 315, 0, 600);
  floorGrad.addColorStop(0, '#a0622a');
  floorGrad.addColorStop(0.3, '#8a5220');
  floorGrad.addColorStop(1, '#6a3810');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, 315, 900, 285);
  // 木地板纹路(透视感)
  for (let row = 0; row < 6; row++) {
    const y1 = 315 + row * 48;
    const y2 = y1 + 48;
    const perspective = row / 6;
    ctx.strokeStyle = `rgba(60,30,5,${0.25 + perspective * 0.15})`;
    ctx.lineWidth = 1 + perspective;
    ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(900, y2); ctx.stroke();
    // 竖向木纹(向消失点收拢)
    const vp = 450; // 消失点x
    for (let col = 0; col < 10; col++) {
      const bx = col * 90;
      const tx = vp + (bx - vp) * (1 - perspective * 0.3);

// ============ UPDATE ============
function updateFishing(dt) {
  GS.time += dt;
  GS.zoneTimer += dt;

  // Zone switch
  if (GS.zoneTimer > 30) {
    GS.zoneTimer = 0;
    GS.zone = (GS.zone + 1) % 3;
    generateDecorations();
    showMessage(`进入 ${ZONES[GS.zone].name}！`, 2000);
  }

  // Weather events
  GS.weatherTimer += dt;
  if (GS.weatherTimer > 20) {
    GS.weatherTimer = 0;
    const weathers = ['normal', 'normal', 'current', 'dark'];
    const oldWeather = GS.weather;
    GS.weather = weathers[Math.floor(Math.random() * weathers.length)];
    if (GS.weather !== oldWeather) {
      const msgs = { current: '🌊 洋流来了！鱼群变向！', dark: '🌑 暗流！视野变暗！', normal: '☀️ 海水恢复平静' };
      if (msgs[GS.weather]) showMessage(msgs[GS.weather], 2000);
    }
  }

  // Oxygen
  GS.oxygen -= dt * 4;
  if (GS.oxygen <= 0) {
    GS.oxygen = 0;
    showMessage('氧气耗尽！自动上岸！', 1500);
    startTransitionToShore();
  }
  document.getElementById('oxyBar').style.width = (GS.oxygen / GS.oxygenMax * 100) + '%';

  // Spawn fish
  if (Math.random() < dt * 0.8) spawnFish();

  // Update fish
  const currentDir = GS.weather === 'current' ? 1 : 0;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    f.phase += dt;

    // Shark AI - sense player and escape
    if (f.type === 'shark') {
      const dx = diver.x - f.x, dy = diver.y - f.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        f.scared = true;
        f.vx = f.vx - dx / dist * 0.3;
        f.vy = f.vy - dy / dist * 0.3;
      }
    }
    if (f.scaredTimer > 0) f.scaredTimer -= dt;
    else f.scared = false;

    // Wave motion
    f.vy += Math.sin(f.phase * 2) * 0.02;
    f.vy *= 0.98;

    // Current effect
    if (GS.weather === 'current') f.vx += currentDir * 0.05;

    f.x += f.vx;
    f.y += f.vy;

    // Boundary bounce
    if (f.y < 50) { f.y = 50; f.vy = Math.abs(f.vy); }
    if (f.y > 550) { f.y = 550; f.vy = -Math.abs(f.vy); }

    // Remove if off screen
    if (f.x < -100 || f.x > 1000) {
      fishes.splice(i, 1);
    }
  }

  // Shark click timeout
  for (const id in sharkClickState) {
    sharkClickState[id].timer -= dt;
    if (sharkClickState[id].timer <= 0) {
      delete sharkClickState[id];
    }
  }

  // Update diver bubbles
  if (Math.random() < dt * 3) {
    diver.bubbles.push({ x: diver.x + (diver.dir > 0 ? 18 : -18), y: diver.y - 30, r: 3 + Math.random() * 3, vy: -(0.8 + Math.random()), life: 1.0, dx: (Math.random() - 0.5) * 0.3 });
  }
  for (let i = diver.bubbles.length - 1; i >= 0; i--) {
    const b = diver.bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.life -= dt * 0.6;
    if (b.life <= 0) diver.bubbles.splice(i, 1);
  }

  // Update bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.r += 0.02;
    b.life -= dt * 0.8;
    if (b.life <= 0 || b.y < 0) bubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 1.2;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Message timer
  if (GS.msgTimer > 0) {
    GS.msgTimer -= dt * 1000;
    if (GS.msgTimer <= 0) document.getElementById('msgBox').style.display = 'none';
  }
  if (GS.sharkHintTimer > 0) {
    GS.sharkHintTimer -= dt * 1000;
    if (GS.sharkHintTimer <= 0) document.getElementById('sharkHint').style.display = 'none';
  }

  // Update HUD
  document.getElementById('score').textContent = GS.score;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('storage').textContent = GS.warehouse.length;
  document.getElementById('zoneName').textContent = ZONES[GS.zone].name;
}

function updateRestaurant(dt) {
  GS.time += dt;

  // Spawn customers
  if (GS.tables.length > 0 && Math.random() < dt * 0.3) {
    const emptyTable = GS.tables.find(t => !t.customer);
    if (emptyTable && GS.warehouse.length > 0) {
      const warehouseByType = {};
      for (const w of GS.warehouse) {
        warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
      }
      const availableDishes = SUSHI_MENU.filter(d => warehouseByType[d.fishType] > 0);
      if (availableDishes.length > 0) {
        const order = availableDishes[Math.floor(Math.random() * availableDishes.length)];
        emptyTable.customer = {
          color: ['#e8c090', '#d0a070', '#f8d0a0', '#c0a080'][Math.floor(Math.random() * 4)],
          skinColor: '#f8d9a0',
          hairColor: ['#333', '#664', '#882', '#555'][Math.floor(Math.random() * 4)],
          order,
          patience: 1.0,
          state: 'waiting',
          servedTimer: 0
        };
      }
    }
  }

  // Update customers
  for (const t of GS.tables) {
    if (t.customer) {
      const c = t.customer;
      if (c.state === 'waiting') {
        c.patience -= dt * 0.06;
        if (c.patience <= 0) {
          GS.satisfaction = Math.max(0, GS.satisfaction - 10);
          spawnFloatingText(t.x, t.y - 60, '-10 满意度 😡', '#f44');
          t.customer = null;
        }
      } else if (c.state === 'served') {
        c.servedTimer += dt;
        if (c.servedTimer > 2) t.customer = null;
      }
    }
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 0.8;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Update HUD
  document.getElementById('coins2').textContent = GS.coins;
  document.getElementById('satisfaction').textContent = GS.satisfaction;
  document.getElementById('storageCount').textContent = GS.warehouse.length;
}

// ============ INPUT ============
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'e' || e.key === 'E') {
    if (GS.scene === 'fishing') goAshore();
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousemove', e => {
  if (GS.scene !== 'fishing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (900 / rect.width);
  const my = (e.clientY - rect.top) * (600 / rect.height);
  const dx = mx - diver.x, dy = my - diver.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = GS.upgradeSpeed ? 3.5 : 2.8;
  if (dist > 5) {
    diver.vx = (dx / dist) * Math.min(speed, dist * 0.15);
    diver.vy = (dy / dist) * Math.min(speed, dist * 0.15);
    if (dx > 0) diver.dir = 1; else diver.dir = -1;
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (900 / rect.width);
  const my = (e.clientY - rect.top) * (600 / rect.height);

  if (GS.scene === 'fishing') {
    handleFishingClick(mx, my);
  } else if (GS.scene === 'restaurant') {
    handleRestaurantClick(mx, my);
  }
});

function handleFishingClick(mx, my) {
  if (GS.warehouse.length >= GS.warehouseMax) {
    showMessage('🎒 仓库已满！请上岸卸货', 2000);
    return;
  }

  let nearest = null, nearestDist = Infinity;
  for (const f of fishes) {
    const dx = mx - f.x, dy = my - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = f.size + 15 + (GS.upgradeNet ? 15 : 0);
    if (dist < hitRadius && dist < nearestDist) {
      nearest = f;
      nearestDist = dist;
    }
  }

  if (!nearest) {
    // Ripple effect
    for (let i = 0; i < 5; i++) {
      bubbles.push({ x: mx + (Math.random()-0.5)*20, y: my + (Math.random()-0.5)*20, r: 2, vy: -(0.5+Math.random()), life: 0.8, dx: (Math.random()-0.5)*0.5 });
    }
    return;
  }

  // Click effect
  for (let i = 0; i < 8; i++) {
    particles.push({ x: nearest.x, y: nearest.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 1.0, color: nearest.bodyColor });
  }

  if (nearest.clicks === 1) {
    // Instant catch
    catchFish(nearest);
  } else if (nearest.type === 'shark' || nearest.clicks > 1) {
    // Multi-click catch
    if (!sharkClickState[nearest.id]) {
      sharkClickState[nearest.id] = { count: 0, timer: 1.5 };
      document.getElementById('sharkHint').style.display = 'block';
      GS.sharkHintTimer = 1500;
    }
    sharkClickState[nearest.id].count++;
    sharkClickState[nearest.id].timer = 1.5;

    if (sharkClickState[nearest.id].count >= nearest.clicks) {
      delete sharkClickState[nearest.id];
      document.getElementById('sharkHint').style.display = 'none';
      // Shark tries to escape when at last click
      if (nearest.type === 'shark') {
        nearest.scared = true;
        nearest.scaredTimer = 99;
      }
      catchFish(nearest);
    } else {
      spawnFloatingText(nearest.x, nearest.y - 20, `${sharkClickState[nearest.id].count}/${nearest.clicks}`, '#ffa');
    }
  }
}

function catchFish(f) {
  const idx = fishes.indexOf(f);
  if (idx === -1) return;
  fishes.splice(idx, 1);

  GS.score += f.score;
  GS.warehouse.push({ type: f.type, name: f.name, emoji: f.emoji, value: f.value });
  spawnFloatingText(f.x, f.y - 10, `+${f.score} 分  ${f.emoji}`, '#7ff');
  showMessage(`捕获 ${f.emoji} ${f.name}！+${f.score}分`, 1200);

  // Splash particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: f.x, y: f.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1.0, color: '#7ef' });
  }
}

function handleRestaurantClick(mx, my) {
  // Check sell all button
  if (mx >= 15 && mx <= 95 && my >= 545 && my <= 570) {
    sellAll();
    return;
  }

  // Check fish items in warehouse (sell individual)
  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 410;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      // Sell button area
      if (mx >= 145 && mx <= 185 && my >= wy - 15 && my <= wy + 5) {
        // Sell one of this type
        const idx = GS.warehouse.findIndex(w => w.type === ft.type);
        if (idx !== -1) {
          const fish = GS.warehouse.splice(idx, 1)[0];
          GS.coins += fish.value;
          spawnFloatingText(165, wy - 20, `+${fish.value}💰`, '#ff4');
        }
        return;
      }
      // Select fish for serving
      if (mx >= 20 && mx <= 140 && my >= wy - 15 && my <= wy + 5) {
        GS.preparingDish = ft;
        spawnFloatingText(80, wy - 20, `选择: ${ft.name}`, '#adf');
        return;
      }
      wy += 22;
    }
  }

  // Check upgrade buttons
  const upgrades = [
    { x: 295, y: 543, w: 140, h: 40, cost: 200, action: 'net' },
    { x: 450, y: 543, w: 140, h: 40, cost: 300, action: 'speed' },
    { x: 605, y: 543, w: 140, h: 40, cost: 500, action: 'table' }
  ];
  for (const u of upgrades) {
    if (mx >= u.x && mx <= u.x + u.w && my >= u.y && my <= u.y + u.h) {
      if (GS.coins >= u.cost) {
        GS.coins -= u.cost;
        if (u.action === 'net') { GS.upgradeNet = true; showMessage('🎣 渔网已升级！捕鱼范围扩大！', 2000); }
        if (u.action === 'speed') { GS.upgradeSpeed = true; showMessage('🏃 潜水员速度提升！', 2000); }
        if (u.action === 'table') {
          if (GS.tables.length < 4) {
            addTable();
            showMessage('🏠 新桌位开放！可接待更多顾客！', 2000);
          } else {
            showMessage('餐厅已满员！', 1500);
          }
        }
      } else {
        showMessage(`💰 金币不足！需要 ${u.cost} 金币`, 1500);
      }
      return;
    }
  }

  // Serve customer - click on table with customer
  if (GS.preparingDish) {
    for (const t of GS.tables) {
      if (!t.customer) continue;
      const c = t.customer;
      const dx = mx - t.x, dy = my - t.y;
      if (Math.sqrt(dx*dx + dy*dy) < 60 && c.state === 'waiting') {
        if (c.order.fishType === GS.preparingDish.type) {
          // Serve!
          const idx = GS.warehouse.findIndex(w => w.type === GS.preparingDish.type);
          if (idx !== -1) {
            GS.warehouse.splice(idx, 1);
            const tip = Math.floor(c.patience > 0.7 ? c.order.price * 1.2 : c.order.price);
            GS.coins += tip;
            GS.score += Math.floor(c.order.price / 5);
            c.state = 'served';
            GS.preparingDish = null;
            if (c.patience > 0.8) {
              GS.satisfaction = Math.min(100, GS.satisfaction + 5);
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰 😊 快速服务！`, '#ff4');
            } else {
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰`, '#ff4');
            }
          } else {
            showMessage('仓库里没有这种鱼了！', 1500);
            GS.preparingDish = null;
          }
        } else {
          spawnFloatingText(t.x, t.y - 80, '❌ 食材不对！', '#f44');
        }
        return;
      }
    }
  }
}

function sellAll() {
  if (GS.warehouse.length === 0) { showMessage('仓库是空的！', 1500); return; }
  let total = 0;
  for (const f of GS.warehouse) total += f.value;
  GS.coins += total;
  GS.warehouse = [];
  spawnFloatingText(55, 535, `+${total}💰 全部出售！`, '#ff4');
  showMessage(`出售所有鱼类！+${total} 金币`, 2000);
}

function addTable() {
  const positions = [
    { x: 220, y: 420 }, { x: 420, y: 420 }, { x: 620, y: 420 }, { x: 820, y: 420 }
  ];
  if (GS.tables.length < positions.length) {
    GS.tables.push({ ...positions[GS.tables.length], customer: null });
  }
}

// ============ SCENE TRANSITIONS ============
function goAshore() {
  if (GS.scene !== 'fishing') return;
  GS.scene = 'toshore';
  transitionProgress = 0;
}

window.goAshore = goAshore;

function goDiving() {
  if (GS.scene !== 'restaurant') return;
  GS.scene = 'todive';
  transitionProgress = 0;
  GS.preparingDish = null;
}

window.goDiving = goDiving;

function startTransitionToShore() {
  GS.scene = 'toshore';
  transitionProgress = 0;
}

// ============ MESSAGE ============
function showMessage(text, duration) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.style.display = 'block';
  GS.msgTimer = duration;
}

// ============ GAME LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, 900, 600);

  if (GS.scene === 'fishing') {
    document.getElementById('fishingHud').style.display = 'flex';
    document.getElementById('restaurantHud').style.display = 'none';

    drawBackground();
    drawDecorations();

    // Draw bubbles (折射气泡)
    for (const b of bubbles) {
      ctx.save();
      ctx.globalAlpha = b.life * 0.8;
      const bG = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.35, 0, b.x, b.y, b.r);
      bG.addColorStop(0, 'rgba(220,245,255,0.4)');
      bG.addColorStop(0.7, 'rgba(120,200,255,0.08)');
      bG.addColorStop(1, 'rgba(80,160,255,0.03)');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,230,255,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.32, b.r * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw particles (立体水花)
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      const pG = ctx.createRadialGradient(p.x - 1, p.y - 1, 0, p.x, p.y, 5);
      pG.addColorStop(0, 'rgba(255,255,255,0.9)');
      pG.addColorStop(0.4, p.color || '#7ef');
      pG.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = pG;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (const f of fishes) drawFish(f);
    drawDiver();
    drawFloatingTexts();

    // Update diver position
    diver.x += diver.vx;
    diver.y += diver.vy;
    diver.vx *= 0.85;
    diver.vy *= 0.85;
    diver.x = Math.max(30, Math.min(870, diver.x));
    diver.y = Math.max(30, Math.min(540, diver.y));

    updateFishing(dt);

  } else if (GS.scene === 'toshore') {
    drawBackground();
    drawDecorations();
    for (const f of fishes) drawFish(f);
    drawDiver();

    transitionProgress += dt * 1.5;
    drawTransition();

    if (transitionProgress >= 1) {
      GS.scene = 'restaurant';
      GS.oxygen = GS.oxygenMax;
      if (GS.tables.length === 0) { addTable(); addTable(); }
      document.getElementById('oxyBar').style.width = '100%';
      showMessage('欢迎回到岸上！经营你的寿司店吧！', 3000);
    }

  } else if (GS.scene === 'todive') {
    drawRestaurant();
    transitionProgress += dt * 1.5;

    ctx.fillStyle = `rgba(0,30,80,${transitionProgress})`;
    ctx.fillRect(0, 0, 900, 600);

    if (transitionProgress >= 1) {
      GS.scene = 'fishing';
      generateDecorations();
      showMessage('🤿 再次潜入深海！', 2000);
    }

  } else if (GS.scene === 'restaurant') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'flex';

    drawRestaurant();
    drawFloatingTexts();

    // Show currently selected dish
    if (GS.preparingDish) {
      ctx.fillStyle = 'rgba(255,220,0,0.15)';
      ctx.fillRect(0, 0, 900, 600);
      ctx.fillStyle = '#ff4';
      ctx.font = 'bold 16px Microsoft YaHei';
      ctx.fillText(`正在准备: ${GS.preparingDish.emoji} ${GS.preparingDish.name} — 点击顾客桌子上菜！`, 200, 350);
    }

    updateRestaurant(dt);
  }

  requestAnimationFrame(loop);
}

// ============ INIT ============
function init() {
  generateDecorations();
  for (let i = 0; i < 8; i++) spawnFish();
  showMessage('🤿 欢迎来到深海捕鱼！移动鼠标控制潜水员，点击鱼来捕获！', 4000);
  requestAnimationFrame(loop);
}

init();
</script>

</html>
