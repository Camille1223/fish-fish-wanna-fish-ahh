// ============ FLOATING TEXTS ============
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#ff4', life: 1.0, vy: -1.5 });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.shadowColor = ft.color || '#ff4';
    ctx.shadowBlur = 8;
    ctx.fillStyle = ft.color || '#ff4';
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ TITLE SCREEN ============
function drawTitle() {
  const t = GS.time;

  // Sky gradient — deep ocean at bottom, surface at top
  const skyG = ctx.createLinearGradient(0, 0, 0, VH);
  skyG.addColorStop(0,   '#87ceeb');
  skyG.addColorStop(0.38,'#3a9fd8');
  skyG.addColorStop(0.42,'#1a6fa8');
  skyG.addColorStop(1,   '#051828');
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, VW, VH);

  // Pixel sun
  const sunX = VW * 0.78, sunY = VH * 0.13;
  ctx.fillStyle = '#ffe87a';
  ctx.fillRect(sunX - 20, sunY - 20, 40, 40);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(sunX - 14, sunY - 14, 28, 28);
  // Sun rays (pixel style)
  ctx.fillStyle = '#ffe87a';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + t * 0.3;
    const rx = sunX + Math.cos(a) * 34, ry = sunY + Math.sin(a) * 34;
    ctx.fillRect(rx - 3, ry - 3, 6, 6);
  }

  // Pixel clouds
  const cloudOffsets = [0, VW * 0.35, VW * 0.65];
  for (const ox of cloudOffsets) {
    const cx = ((ox + t * 18) % (VW + 120)) - 60;
    const cy = VH * 0.08 + Math.sin(t * 0.2 + ox) * 8;
    ctx.fillStyle = '#ffffff';
    for (const [dx, dy, w, h] of [[-20,8,40,16],[0,0,50,20],[20,6,36,16],[-10,16,60,12]]) {
      ctx.fillRect(cx + dx, cy + dy, w, h);
    }
  }

  // Ocean surface wave (pixel blocks)
  const waveY = VH * 0.42;
  ctx.fillStyle = '#2a9cc8';
  ctx.fillRect(0, waveY, VW, VH - waveY);
  ctx.fillStyle = '#1a7aa8';
  for (let x = 0; x < VW; x += 16) {
    const h = 8 + Math.sin(x * 0.05 + t * 2) * 6;
    ctx.fillRect(x, waveY - h, 16, h + 4);
  }
  // Wave shimmer
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  for (let x = 0; x < VW; x += 32) {
    const wx = (x + t * 40) % VW;
    ctx.fillRect(wx, waveY - 4, 16, 4);
  }

  // Pixel underwater bubbles
  ctx.fillStyle = 'rgba(180,230,255,0.5)';
  for (let i = 0; i < 12; i++) {
    const bx = (i * 137 + 50) % VW;
    const by = waveY + 40 + ((i * 89 + t * 30 * (1 + i % 3)) % (VH - waveY - 40));
    const bs = 4 + (i % 3) * 4;
    ctx.fillRect(bx, by, bs, bs);
  }

  // Pixel fish swimming in background
  const fishColors = ['#ff6b35','#4a90d9','#e07b54','#a8c256','#dd88ff'];
  for (let i = 0; i < 5; i++) {
    const fx = ((i * 200 + t * (30 + i * 8)) % (VW + 80)) - 40;
    const fy = waveY + 60 + i * 40 + Math.sin(t + i) * 15;
    const fc = fishColors[i];
    ctx.fillStyle = fc;
    // Pixel fish body
    ctx.fillRect(fx, fy - 6, 24, 12);
    ctx.fillRect(fx + 4, fy - 10, 16, 20);
    // Tail
    ctx.fillRect(fx - 8, fy - 8, 8, 6);
    ctx.fillRect(fx - 8, fy + 2, 8, 6);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(fx + 18, fy - 4, 4, 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(fx + 19, fy - 3, 2, 2);
    ctx.fillStyle = fc;
  }

  // Pixel seaweed at bottom
  for (let i = 0; i < 8; i++) {
    const sx = VW * 0.05 + i * (VW * 0.13);
    const sh = 40 + (i % 3) * 20;
    const sway = Math.sin(t * 1.2 + i) * 6;
    ctx.fillStyle = i % 2 === 0 ? '#2d8a4a' : '#50c870';
    for (let seg = 0; seg < sh / 8; seg++) {
      ctx.fillRect(sx + sway * (seg / (sh / 8)) - 4, VH - sh + seg * 8, 8, 8);
    }
  }

  // ── TITLE TEXT (pixel style) ──
  const titleY = VH * 0.2;

  // Shadow
  ctx.fillStyle = 'rgba(0,30,80,0.7)';
  ctx.font = 'bold 52px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FISH FISH', VW / 2 + 4, titleY + 4);
  ctx.fillText('WANNA FISH', VW / 2 + 4, titleY + 62);

  // Outline
  ctx.strokeStyle = '#003366';
  ctx.lineWidth = 6;
  ctx.strokeText('FISH FISH', VW / 2, titleY);
  ctx.strokeText('WANNA FISH', VW / 2, titleY + 58);

  // Main title — animated color cycle
  const hue1 = (t * 40) % 360;
  const hue2 = (t * 40 + 120) % 360;
  ctx.fillStyle = `hsl(${hue1},100%,65%)`;
  ctx.fillText('FISH FISH', VW / 2, titleY);
  ctx.fillStyle = `hsl(${hue2},100%,65%)`;
  ctx.fillText('WANNA FISH', VW / 2, titleY + 58);

  // Pixel decoration stars/sparkles around title
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + t;
    const sr = VW * 0.28 + Math.sin(t * 2 + i) * 20;
    const sx = VW / 2 + Math.cos(a) * sr;
    const sy = titleY - 20 + Math.sin(a) * 30;
    const ss = 3 + Math.sin(t * 3 + i) * 2;
    ctx.fillRect(sx - ss / 2, sy - ss / 2, ss, ss);
  }
  ctx.textAlign = 'left';

  // ── START BUTTON ──
  const btnW = 190, btnH = 50, btnX = VW / 2 - btnW / 2, btnY = VH * 0.56;
  const hovering = mouseScreen.x >= btnX && mouseScreen.x <= btnX + btnW &&
                   mouseScreen.y >= btnY && mouseScreen.y <= btnY + btnH;

  // Press ripple — records time of last press for ink-spread animation
  const pressAge = GS.time - (GS._btnPressT || -99);
  const rippleR = pressAge < 0.5 ? pressAge / 0.5 * (btnW * 0.9) : 0;
  const rippleA = pressAge < 0.5 ? (1 - pressAge / 0.5) * 0.35 : 0;

  ctx.save();
  ctx.translate(btnX, btnY);

  // Ink-spread ripple (drawn behind button so clipped by save/restore)
  if (rippleR > 0) {
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, btnW, btnH);
    ctx.clip();
    ctx.fillStyle = `rgba(255,255,255,${rippleA})`;
    ctx.beginPath(); ctx.arc(btnW / 2, btnH / 2, rippleR, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Button body — flat with hand-drawn border feel
  ctx.fillStyle = hovering ? '#e03030' : '#c82020';
  ctx.fillRect(0, 0, btnW, btnH);

  // Pixel-art style border: 4 separate edge rects (no corner overlap = hand-drawn feel)
  const bc = hovering ? 'rgba(255,210,210,0.9)' : 'rgba(255,160,160,0.5)';
  ctx.fillStyle = bc;
  ctx.fillRect(0, 0, btnW, 2);          // top
  ctx.fillRect(0, btnH - 2, btnW, 2);   // bottom
  ctx.fillRect(0, 2, 2, btnH - 4);      // left
  ctx.fillRect(btnW - 2, 2, 2, btnH - 4); // right

  // Inner shadow (depth without glow)
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(2, btnH - 8, btnW - 4, 6);

  // Text — no triangle, just plain characters
  ctx.fillStyle = '#fff';
  ctx.font = hovering ? 'bold 19px "Courier New", monospace' : 'bold 18px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('开始游戏', btnW / 2, btnH / 2 + 7);
  ctx.textAlign = 'left';

  ctx.restore();

  // KEY HINT — pixel style, below button
  ctx.fillStyle = hovering ? 'rgba(255,200,200,0.7)' : 'rgba(200,220,255,0.45)';
  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[ CLICK  /  TAP  /  SPACE  /  ENTER ]', VW / 2, btnY + btnH + 22);
  ctx.fillText('滑动探索海洋  触屏点击捕鱼  上岸经营寿司店', VW / 2, btnY + btnH + 40);
  ctx.textAlign = 'left';

  // Store button bounds for click detection
  GS._titleBtnBounds = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// ============ TRANSITION ============
function drawTransition() {
  const p = transitionProgress;
  if (GS.scene === 'toshore') {
    ctx.fillStyle = `rgba(10,40,80,${p})`;
    ctx.fillRect(0, 0, VW, VH);
    for (let i = 0; i < 20; i++) {
      const bx = (i * 47 + GS.time * 30) % VW;
      const by = VH - (VH * p) - i * 10 + Math.sin(i + GS.time) * 20;
      ctx.strokeStyle = `rgba(200,240,255,${Math.max(0, 1 - p)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 4 * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// ============ UPDATE ============
function updateFishing(dt) {
  GS.time += dt;
  GS.zoneTimer += dt;

  // Zone switch
  if (GS.zoneTimer > 30) {
    GS.zoneTimer = 0;
    GS.zone = (GS.zone + 1) % 3;
    generateDecorations();
    showMessage(`进入 ${ZONES[GS.zone].name}！`, 2000);
  }

  // Weather events
  GS.weatherTimer += dt;
  if (GS.weatherTimer > 20) {
    GS.weatherTimer = 0;
    const weathers = ['normal', 'normal', 'current', 'dark'];
    const oldWeather = GS.weather;
    GS.weather = weathers[Math.floor(Math.random() * weathers.length)];
    if (GS.weather !== oldWeather) {
      const msgs = { current: '🌊 洋流来了！鱼群变向！', dark: '🌑 暗流！视野变暗！', normal: '☀️ 海水恢复平静' };
      if (msgs[GS.weather]) showMessage(msgs[GS.weather], 2000);
    }
  }

  // Oxygen
  GS.oxygen -= dt * 4;
  if (GS.oxygen <= 0) {
    GS.oxygen = 0;
    showMessage('氧气耗尽！自动上岸！', 1500);
    startTransitionToShore();
  }
  document.getElementById('oxyBar').style.width = (GS.oxygen / GS.oxygenMax * 100) + '%';

  // Ambient seabed bubbles — rise continuously from the seafloor
  if (Math.random() < dt * 8) {
    const bx = cam.x + Math.random() * VW;
    const by = WH - 40 - Math.random() * 80;
    const r = 1.5 + Math.random() * 4.5;
    bubbles.push({ x: bx, y: by, r, ry: r * 0.9, vy: -(0.3 + Math.random() * 0.7), life: 1.0,
                   dx: (Math.random() - 0.5) * 0.25, wobble: Math.random() * Math.PI * 2, wobbleSpeed: 0.8 + Math.random() * 1.2 });
  }

  // Spawn fish to keep the sea populated
  if (Math.random() < dt * 3.5) spawnFish();

  // Update fish
  const currentDir = GS.weather === 'current' ? 1 : 0;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    f.phase += dt;

    // Shark AI - sense player and escape
    if (f.type === 'shark') {
      const dx = diver.x - f.x, dy = diver.y - f.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        f.scared = true;
        f.vx = f.vx - dx / dist * 0.3;
        f.vy = f.vy - dy / dist * 0.3;
      }
    }
    if (f.scaredTimer > 0) f.scaredTimer -= dt;
    else f.scared = false;

    // Wave motion
    f.vy += Math.sin(f.phase * 2) * 0.02;
    f.vy *= 0.98;

    // Current effect
    if (GS.weather === 'current') f.vx += currentDir * 0.05;

    f.x += f.vx;
    f.y += f.vy;

    // Boundary bounce
    if (f.y < 60) { f.y = 60; f.vy = Math.abs(f.vy); }
    if (f.y > H - 100) { f.y = H - 100; f.vy = -Math.abs(f.vy); }

    // Remove if far off viewport
    if (f.x < cam.x - 300 || f.x > cam.x + VW + 300) {
      fishes.splice(i, 1);
    }
  }

  // Shark click timeout
  for (const id in sharkClickState) {
    sharkClickState[id].timer -= dt;
    if (sharkClickState[id].timer <= 0) {
      delete sharkClickState[id];
    }
  }

  // Update diver bubbles
  if (Math.random() < dt * 3) {
    diver.bubbles.push({ x: diver.x + (diver.dir > 0 ? 18 : -18), y: diver.y - 30, r: 3 + Math.random() * 3, vy: -(0.8 + Math.random()), life: 1.0, dx: (Math.random() - 0.5) * 0.3 });
  }
  for (let i = diver.bubbles.length - 1; i >= 0; i--) {
    const b = diver.bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.life -= dt * 0.6;
    if (b.life <= 0) diver.bubbles.splice(i, 1);
  }

  // Update bubbles — realistic rise with wobble drift
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.wobble = (b.wobble || 0) + dt * (b.wobbleSpeed || 1.0);
    b.y += b.vy;
    b.x += b.dx + Math.sin(b.wobble) * 0.35;
    b.r += 0.018;
    b.ry = b.r * (0.85 + Math.abs(Math.sin(b.wobble * 0.5)) * 0.15);
    b.life -= dt * 0.55;
    if (b.life <= 0 || b.y < cam.y - 40) bubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 1.2;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Message timer
  if (GS.msgTimer > 0) {
    GS.msgTimer -= dt * 1000;
    if (GS.msgTimer <= 0) document.getElementById('msgBox').style.display = 'none';
  }
  if (GS.sharkHintTimer > 0) {
    GS.sharkHintTimer -= dt * 1000;
    if (GS.sharkHintTimer <= 0) document.getElementById('sharkHint').style.display = 'none';
  }

  // Update HUD
  document.getElementById('score').textContent = GS.score;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('storage').textContent = GS.warehouse.length;
  document.getElementById('zoneName').textContent = ZONES[GS.zone].name;
}

function updateRestaurant(dt) {
  GS.time += dt;

  // Spawn customers
  if (GS.tables.length > 0 && Math.random() < dt * 0.3) {
    const emptyTable = GS.tables.find(t => !t.customer);
    if (emptyTable && GS.warehouse.length > 0) {
      const warehouseByType = {};
      for (const w of GS.warehouse) {
        warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
      }
      const availableDishes = SUSHI_MENU.filter(d => warehouseByType[d.fishType] > 0);
      if (availableDishes.length > 0) {
        const order = availableDishes[Math.floor(Math.random() * availableDishes.length)];
        emptyTable.customer = {
          style: ['business', 'casual', 'lady', 'old'][Math.floor(Math.random() * 4)],
          order,
          patience: 1.0,
          state: 'waiting',
          servedTimer: 0
        };
      }
    }
  }

  // Update customers
  for (const t of GS.tables) {
    if (t.customer) {
      const c = t.customer;
      if (c.state === 'waiting') {
        c.patience -= dt * 0.06;
        if (c.patience <= 0) {
          GS.satisfaction = Math.max(0, GS.satisfaction - 10);
          spawnFloatingText(t.x, t.y - 60, '-10 满意度 😡', '#f44');
          t.customer = null;
        }
      } else if (c.state === 'served') {
        c.servedTimer += dt;
        c.eatPhase = (c.eatPhase || 0) + dt * 3.5; // eating animation speed
        if (c.servedTimer > 3.5) t.customer = null;
      }
    }
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 0.8;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Update flying dishes
  for (let i = flyingDishes.length - 1; i >= 0; i--) {
    const d = flyingDishes[i];
    d.progress += dt / d.dur;
    if (d.progress >= 1) flyingDishes.splice(i, 1);
  }

  // Update restaurant HUD
  document.getElementById('coins2').textContent = GS.coins;
  document.getElementById('satisfaction').textContent = GS.satisfaction;
  document.getElementById('storageCount').textContent = GS.warehouse.length;
}

canvas.addEventListener('mousemove', e => {

});

function handleFishingClick(mx, my) {
  if (GS.warehouse.length >= GS.warehouseMax) {
    showMessage('🎒 仓库已满！请上岸卸货', 2000);
    return;
  }

  let nearest = null, nearestDist = Infinity;
  for (const f of fishes) {
    const dx = mx - f.x, dy = my - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = f.size + 15 + (GS.upgradeNet ? 15 : 0);
    if (dist < hitRadius && dist < nearestDist) {
      nearest = f;
      nearestDist = dist;
    }
  }

  if (!nearest) {
    // Ripple effect
    for (let i = 0; i < 5; i++) {
      bubbles.push({ x: mx + (Math.random()-0.5)*20, y: my + (Math.random()-0.5)*20, r: 2, vy: -(0.5+Math.random()), life: 0.8, dx: (Math.random()-0.5)*0.5 });
    }
    return;
  }

  // Click effect
  for (let i = 0; i < 8; i++) {
    particles.push({ x: nearest.x, y: nearest.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 1.0, color: nearest.bodyColor });
  }

  if (nearest.clicks === 1) {
    // Instant catch
    catchFish(nearest);
  } else if (nearest.type === 'shark' || nearest.clicks > 1) {
    // Multi-click catch
    if (!sharkClickState[nearest.id]) {
      sharkClickState[nearest.id] = { count: 0, timer: 1.5 };
      document.getElementById('sharkHint').style.display = 'block';
      GS.sharkHintTimer = 1500;
    }
    sharkClickState[nearest.id].count++;
    sharkClickState[nearest.id].timer = 1.5;

    if (sharkClickState[nearest.id].count >= nearest.clicks) {
      delete sharkClickState[nearest.id];
      document.getElementById('sharkHint').style.display = 'none';
      // Shark tries to escape when at last click
      if (nearest.type === 'shark') {
        nearest.scared = true;
        nearest.scaredTimer = 99;
      }
      catchFish(nearest);
    } else {
      spawnFloatingText(nearest.x, nearest.y - 20, `${sharkClickState[nearest.id].count}/${nearest.clicks}`, '#ffa');
    }
  }
}

function catchFish(f) {
  const idx = fishes.indexOf(f);
  if (idx === -1) return;
  fishes.splice(idx, 1);

  GS.score += f.score;
  GS.warehouse.push({ type: f.type, name: f.name, emoji: f.emoji, value: f.value });
  spawnFloatingText(f.x, f.y - 10, `+${f.score} 分  ${f.emoji}`, '#7ff');
  showMessage(`捕获 ${f.emoji} ${f.name}！+${f.score}分`, 1200);

  // Splash particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: f.x, y: f.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1.0, color: '#7ef' });
  }
}

function handleRestaurantClick(screenX, screenY) {
  // Inverse of drawRestaurant's scale+translate
  const scale = Math.min(VW / 900, VH / 600);
  const offsetX = (VW - 900 * scale) / 2;
  const offsetY = (VH - 600 * scale) / 2;
  const mx = (screenX - offsetX) / scale;
  const my = (screenY - offsetY) / scale;

  // Check sell all button
  if (mx >= 15 && mx <= 95 && my >= 545 && my <= 570) {
    sellAll();
    return;
  }

  // Check fish items in warehouse (sell individual)
  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 410;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      // Sell button area
      if (mx >= 145 && mx <= 185 && my >= wy - 15 && my <= wy + 5) {
        // Sell one of this type
        const idx = GS.warehouse.findIndex(w => w.type === ft.type);
        if (idx !== -1) {
          const fish = GS.warehouse.splice(idx, 1)[0];
          GS.coins += fish.value;
          spawnFloatingText(165, wy - 20, `+${fish.value}💰`, '#ff4');
        }
        return;
      }
      // Select fish for serving
      if (mx >= 20 && mx <= 140 && my >= wy - 15 && my <= wy + 5) {
        GS.preparingDish = ft;
        spawnFloatingText(80, wy - 20, `选择: ${ft.name}`, '#adf');
        return;
      }
      wy += 22;
    }
  }

  // Check upgrade buttons
  const upgrades = [
    { x: 295, y: 543, w: 140, h: 40, cost: 200, action: 'net' },
    { x: 450, y: 543, w: 140, h: 40, cost: 300, action: 'speed' },
    { x: 605, y: 543, w: 140, h: 40, cost: 500, action: 'table' }
  ];
  for (const u of upgrades) {
    if (mx >= u.x && mx <= u.x + u.w && my >= u.y && my <= u.y + u.h) {
      if (GS.coins >= u.cost) {
        GS.coins -= u.cost;
        if (u.action === 'net') { GS.upgradeNet = true; showMessage('🎣 渔网已升级！捕鱼范围扩大！', 2000); }
        if (u.action === 'speed') { GS.upgradeSpeed = true; showMessage('🏃 潜水员速度提升！', 2000); }
        if (u.action === 'table') {
          if (GS.tables.length < 4) {
            addTable();
            showMessage('🏠 新桌位开放！可接待更多顾客！', 2000);
          } else {
            showMessage('餐厅已满员！', 1500);
          }
        }
      } else {
        showMessage(`💰 金币不足！需要 ${u.cost} 金币`, 1500);
      }
      return;
    }
  }

  // Serve customer - click on table with customer
  if (GS.preparingDish) {
    for (const t of GS.tables) {
      if (!t.customer) continue;
      const c = t.customer;
      const dx = mx - t.x, dy = my - t.y;
      if (Math.sqrt(dx*dx + dy*dy) < 60 && c.state === 'waiting') {
        if (c.order.fishType === GS.preparingDish.type) {
          // Serve!
          const idx = GS.warehouse.findIndex(w => w.type === GS.preparingDish.type);
          if (idx !== -1) {
            GS.warehouse.splice(idx, 1);
            const tip = Math.floor(c.patience > 0.7 ? c.order.price * 1.2 : c.order.price);
            GS.coins += tip;
            GS.score += Math.floor(c.order.price / 5);
            c.state = 'served';
            c.servedTimer = 0;
            c.servedEmoji = c.order.emoji;
            c.eatPhase = 0; // eating animation phase

            // Flying dish animation: from inventory panel → table (screen coords)
            const rScale = Math.min(VW / 900, VH / 600);
            const rOffX = (VW - 900 * rScale) / 2;
            const rOffY = (VH - 600 * rScale) / 2;
            flyingDishes.push({
              sx: rOffX + 100 * rScale,            // inventory panel center
              sy: rOffY + 430 * rScale,
              tx: rOffX + t.x * rScale,             // table screen pos
              ty: rOffY + (t.y + 10) * rScale,
              emoji: c.order.emoji,
              progress: 0,
              dur: 0.45
            });

            GS.preparingDish = null;
            if (c.patience > 0.8) {
              GS.satisfaction = Math.min(100, GS.satisfaction + 5);
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰 😊 快速服务！`, '#ff4');
            } else {
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰`, '#ff4');
            }
          } else {
            showMessage('仓库里没有这种鱼了！', 1500);
            GS.preparingDish = null;
          }
        } else {
          spawnFloatingText(t.x, t.y - 80, '❌ 食材不对！', '#f44');
        }
        return;
      }
    }
  }
}

function sellAll() {
  if (GS.warehouse.length === 0) { showMessage('仓库是空的！', 1500); return; }
  let total = 0;
  for (const f of GS.warehouse) total += f.value;
  GS.coins += total;
  GS.warehouse = [];
  spawnFloatingText(55, 535, `+${total}💰 全部出售！`, '#ff4');
  showMessage(`出售所有鱼类！+${total} 金币`, 2000);
}

function addTable() {
  const positions = [
    { x: 220, y: 420 }, { x: 420, y: 420 }, { x: 620, y: 420 }, { x: 820, y: 420 }
  ];
  if (GS.tables.length < positions.length) {

// ============ GAME LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, VW, VH);

  if (GS.scene === 'title') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'none';
    GS.time += dt;
    drawTitle();
    requestAnimationFrame(loop);
    return;
  }

  if (GS.scene === 'fishing') {
    document.getElementById('fishingHud').style.display = 'flex';
    document.getElementById('restaurantHud').style.display = 'none';

    // Apply camera transform for world-space drawing
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    drawBackground();
    drawDecorations();

    // Draw bubbles — realistic refractive spheres
    for (const b of bubbles) {
      const rx = b.r, ry = b.ry || b.r;
      ctx.save();
      ctx.globalAlpha = b.life * 0.75;
      ctx.translate(b.x, b.y);
      // Outer glow
      const outerG = ctx.createRadialGradient(0, 0, ry * 0.3, 0, 0, rx * 1.4);
      outerG.addColorStop(0, 'rgba(180,230,255,0)');
      outerG.addColorStop(1, 'rgba(100,180,255,0.06)');
      ctx.fillStyle = outerG;
      ctx.beginPath(); ctx.ellipse(0, 0, rx * 1.4, ry * 1.4, 0, 0, Math.PI * 2); ctx.fill();
      // Bubble interior — nearly transparent with subtle caustic tint
      const innerG = ctx.createRadialGradient(-rx * 0.25, -ry * 0.3, 0, 0, 0, rx);
      innerG.addColorStop(0, 'rgba(230,248,255,0.18)');
      innerG.addColorStop(0.6, 'rgba(140,210,255,0.05)');
      innerG.addColorStop(1, 'rgba(80,160,230,0.02)');
      ctx.fillStyle = innerG;
      ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
      // Rim — thin bright edge (surface tension)
      ctx.strokeStyle = 'rgba(200,238,255,0.55)';
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
      // Primary specular highlight — upper-left
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath(); ctx.ellipse(-rx * 0.30, -ry * 0.35, rx * 0.22, ry * 0.14, -0.4, 0, Math.PI * 2); ctx.fill();
      // Secondary small highlight
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath(); ctx.ellipse(rx * 0.15, -ry * 0.50, rx * 0.09, ry * 0.06, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Draw particles (立体水花)
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      const pG = ctx.createRadialGradient(p.x - 1, p.y - 1, 0, p.x, p.y, 5);
      pG.addColorStop(0, 'rgba(255,255,255,0.9)');
      pG.addColorStop(0.4, p.color || '#7ef');
      pG.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = pG;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (const f of fishes) drawFish(f);
    drawDiver();
    drawFloatingTexts();

    // Restore camera transform — HUD drawn in screen space
    ctx.restore();

    // Camera follows mouse — mouse at screen center = no offset,
    // mouse at edge = camera shifts toward that side of the world
    if (GS.scene === 'fishing') {
      // Map mouse from [0,VW] → cam target in [0, WW-VW]
      const normX = mouseScreen.x / VW; // 0..1
      const normY = mouseScreen.y / VH;
      camTarget.x = normX * (WW - VW);
      camTarget.y = normY * (WH - VH);
      cam.x += (camTarget.x - cam.x) * 0.04;
      cam.y += (camTarget.y - cam.y) * 0.04;
      cam.x = Math.max(0, Math.min(WW - VW, cam.x));
      cam.y = Math.max(0, Math.min(WH - VH, cam.y));
    }

    // Update diver — auto-wander around the viewport center
    {
      // Diver lazily follows the viewport center with gentle wandering
      const wanderX = cam.x + VW / 2 + Math.sin(GS.time * 0.4) * VW * 0.25;
      const wanderY = cam.y + VH / 2 + Math.sin(GS.time * 0.27 + 1.5) * VH * 0.2;
      const lerp = 0.006;
      diver.x += (wanderX - diver.x) * lerp;
      diver.y += (wanderY - diver.y) * lerp;
      if (wanderX > diver.x + 2) diver.dir = 1;
      else if (wanderX < diver.x - 2) diver.dir = -1;
      diver.x = Math.max(40, Math.min(WW - 40, diver.x));
      diver.y = Math.max(40, Math.min(WH - 80, diver.y));
    }

    updateFishing(dt);

  } else if (GS.scene === 'toshore') {
    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    drawBackground();
    drawDecorations();
    for (const f of fishes) drawFish(f);
    drawDiver();
    ctx.restore();

    transitionProgress += dt * 1.5;
    drawTransition();

    if (transitionProgress >= 1) {
      GS.scene = 'restaurant';
      GS.oxygen = GS.oxygenMax;
      if (GS.tables.length === 0) { addTable(); addTable(); }
      document.getElementById('oxyBar').style.width = '100%';
      showMessage('欢迎回到岸上！经营你的寿司店吧！', 3000);
    }

  } else if (GS.scene === 'todive') {
    drawRestaurant();
    transitionProgress += dt * 1.5;

    ctx.fillStyle = `rgba(0,30,80,${transitionProgress})`;
    ctx.fillRect(0, 0, VW, VH);

    if (transitionProgress >= 1) {
      GS.scene = 'fishing';
      fishes = [];
      generateDecorations();
      for (let i = 0; i < 28; i++) spawnFish(true);
      showMessage('🤿 再次潜入深海！', 2000);
    }

  } else if (GS.scene === 'restaurant') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'flex';

    drawRestaurant();
    drawFloatingTexts();

    // Flying dish animations (screen space, on top of everything)
    for (const d of flyingDishes) {
      const p = d.progress;
      // Ease out cubic
      const ep = 1 - Math.pow(1 - p, 3);
      const x = d.sx + (d.tx - d.sx) * ep;
      // Arc upward via quadratic bezier (control point above midpoint)
      const cy = Math.min(d.sy, d.ty) - 80;
      const bx = d.sx + (d.tx - d.sx) * ep;
      const t2 = ep;
      const arcY = (1-t2)*(1-t2)*d.sy + 2*(1-t2)*t2*cy + t2*t2*d.ty;
      const scale = 0.6 + 0.4 * ep;
      ctx.save();
      ctx.translate(x, arcY);
      ctx.scale(scale, scale);
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Plate shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.ellipse(2, 6, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
      // Plate
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,140,80,0.4)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillText(d.emoji, 0, -4);
      ctx.restore();
    }

    // Cursor: if holding a dish, draw emoji following mouse
    if (GS.preparingDish) {
      const cx = mouseScreen.x, cy = mouseScreen.y;
      ctx.save();
      ctx.font = '22px serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      // Small plate under food
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.ellipse(cx + 14, cy + 22, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,140,80,0.4)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(cx + 14, cy + 22, 14, 5, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillText(GS.preparingDish.emoji, cx + 4, cy + 6);
      // "点击桌子上菜" hint near cursor
      ctx.fillStyle = 'rgba(40,20,0,0.75)';
      ctx.beginPath(); ctx.roundRect(cx + 28, cy + 2, 90, 20, 4); ctx.fill();
      ctx.fillStyle = '#fff8e8';
      ctx.font = '11px Microsoft YaHei';
      ctx.textAlign = 'left';
      ctx.fillText('点击桌子上菜', cx + 32, cy + 16);
      ctx.restore();
    }

    updateRestaurant(dt);
  }

  requestAnimationFrame(loop);
}

// ============ INIT ============
function startGame() {
  generateDecorations();
  fishes = [];
  for (let i = 0; i < 28; i++) spawnFish(true);
  GS.scene = 'fishing';
  showMessage('🤿 移动鼠标探索海洋，点击或空格键捕鱼！', 4000);
}

function init() {
  diver.x = WW / 2;
  diver.y = WH / 2;
  cam.x = Math.max(0, Math.min(WW - VW, WW / 2 - VW / 2));
  cam.y = Math.max(0, Math.min(WH - VH, WH / 2 - VH / 2));
  camTarget.x = cam.x;
  camTarget.y = cam.y;
  mouseScreen.x = VW / 2;
  mouseScreen.y = VH / 2;
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
