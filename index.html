<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>深海捕鱼 & 寿司店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
  #gameCanvas { display: block; cursor: pointer; width: 100vw; height: 100vh; touch-action: none; -webkit-touch-callout: none; }
  #ui { position: absolute; top: 0; left: 0; width: 100vw; pointer-events: none; }
  .hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
  .hud-item { background: rgba(0,5,20,0.82); border: 1px solid rgba(100,200,255,0.5); border-radius: 10px; padding: 6px 14px; color: #9ef; font-size: 13px; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,100,200,0.3), inset 0 1px 0 rgba(255,255,255,0.08); min-height: 36px; display: inline-flex; align-items: center; }
  .oxygen-bar { width: 120px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(100,200,255,0.4); }
  .oxygen-fill { height: 100%; background: linear-gradient(90deg, #00aaff, #00ffcc); border-radius: 6px; transition: width 0.3s; box-shadow: 0 0 6px #0af; }
  #msgBox { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,5,30,0.92); border: 1px solid rgba(100,220,255,0.6); border-radius: 14px; padding: 10px 28px; color: #fff; font-size: 16px; display: none; text-align: center; pointer-events: none; box-shadow: 0 4px 20px rgba(0,150,255,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
  #sharkHint { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); color: #ff4; font-size: 14px; font-weight: bold; display: none; text-shadow: 0 0 12px #fa0, 0 0 4px #f80; pointer-events: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="hud" id="fishingHud">
    <div class="hud-item">🏆 <span id="score">0</span></div>
    <div class="hud-item">💰 <span id="coins">0</span></div>
    <div class="hud-item" style="display:flex;align-items:center;gap:6px;">
      🫧 <div class="oxygen-bar"><div class="oxygen-fill" id="oxyBar" style="width:100%"></div></div>
    </div>
    <div class="hud-item">🎒 <span id="storage">0</span>/20</div>
    <div class="hud-item" style="color:#adf;">区域: <span id="zoneName">浅海</span></div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#ffe;border-color:#ffe;min-height:44px;display:flex;align-items:center;" onclick="goAshore()">🏖️ 上岸</div>
  </div>
  <div class="hud" id="restaurantHud" style="display:none;">
    <div class="hud-item">💰 <span id="coins2">0</span></div>
    <div class="hud-item">😊 满意度: <span id="satisfaction">100</span>%</div>
    <div class="hud-item">📦 仓库: <span id="storageCount">0</span>条</div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#8ff;border-color:#8ff;min-height:44px;display:flex;align-items:center;" onclick="goDiving()">🤿 再次潜水</div>
  </div>
  <div id="msgBox"></div>
  <div id="sharkHint">🦈 快速点击鲨鱼 3 次！</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Viewport size (matches window)
let VW = window.innerWidth;
let VH = window.innerHeight;
canvas.width = VW;
canvas.height = VH;

// World size (larger than viewport — camera scrolls through it)
const WW = 2000;
const WH = 1600;

// Legacy aliases used by restaurant / UI code
const W = WW;
const H = WH;

// Camera (top-left corner of viewport in world coords)
let cam = { x: 0, y: 0 };
let camTarget = { x: 0, y: 0 };
let mouseScreen = { x: 0, y: 0 };

window.addEventListener('resize', () => {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width = VW;
  canvas.height = VH;
  // Re-clamp camera so it stays within world bounds after resize
  cam.x = Math.max(0, Math.min(WW - VW, cam.x));
  cam.y = Math.max(0, Math.min(WH - VH, cam.y));
  camTarget.x = cam.x;
  camTarget.y = cam.y;
  mouseScreen.x = VW / 2;
  mouseScreen.y = VH / 2;
});

// ============ GAME STATE ============
const GS = {
  scene: 'title', // 'title' | 'fishing' | 'restaurant' | 'transition'
  score: 0,
  coins: 0,
  satisfaction: 100,
  oxygen: 100,
  oxygenMax: 100,
  warehouse: [], // {type, name, emoji, value}
  warehouseMax: 20,
  time: 0,
  zone: 0, // 0=浅海 1=珊瑚礁 2=深海
  zoneTimer: 0,
  weather: 'normal', // normal | current | dark
  weatherTimer: 0,
  restaurantLevel: 1,
  tables: [],
  preparingDish: null, // currently selected fish for serving
  satisfaction: 100,
  msgTimer: 0,
  sharkHintTimer: 0
};

// ============ FISH TYPES ============
const FISH_TYPES = [
  { type: 'clownfish', name: '小丑鱼',   emoji: '🐠', color: '#ff6b35', bodyColor: '#ff8c42', speed: 1.0, score: 10,  value: 15,  size: 18, clicks: 1, rarity: 0.14 },
  { type: 'tuna',      name: '金枪鱼',   emoji: '🐟', color: '#4a90d9', bodyColor: '#5ba3e8', speed: 1.6, score: 30,  value: 45,  size: 26, clicks: 1, rarity: 0.12 },
  { type: 'salmon',    name: '三文鱼',   emoji: '🐡', color: '#e07b54', bodyColor: '#f09b74', speed: 1.3, score: 40,  value: 60,  size: 23, clicks: 1, rarity: 0.11 },
  { type: 'puffer',    name: '河豚',     emoji: '🐡', color: '#a8c256', bodyColor: '#c8e276', speed: 1.0, score: 50,  value: 80,  size: 20, clicks: 1, rarity: 0.10, wobble: true },
  { type: 'crab',      name: '螃蟹',     emoji: '🦀', color: '#d94f3d', bodyColor: '#f06050', speed: 0.7, score: 60,  value: 90,  size: 21, clicks: 2, rarity: 0.09, sideways: true },
  { type: 'shark',     name: '大鲨鱼',   emoji: '🦈', color: '#557799', bodyColor: '#6688aa', speed: 2.5, score: 200, value: 300, size: 44, clicks: 3, rarity: 0.06, escapes: true },
  { type: 'jellyfish', name: '水母',     emoji: '🪼', color: '#dd88ff', bodyColor: '#eeb0ff', speed: 0.4, score: 25,  value: 35,  size: 20, clicks: 1, rarity: 0.11 },
  { type: 'turtle',    name: '海龟',     emoji: '🐢', color: '#4a9a5a', bodyColor: '#5ab86a', speed: 0.9, score: 80,  value: 120, size: 30, clicks: 2, rarity: 0.07 },
  { type: 'octopus',   name: '章鱼',     emoji: '🐙', color: '#cc5577', bodyColor: '#ee7799', speed: 1.1, score: 100, value: 150, size: 28, clicks: 2, rarity: 0.07 },
  { type: 'seahorse',  name: '海马',     emoji: '🐴', color: '#ffaa33', bodyColor: '#ffcc55', speed: 0.5, score: 70,  value: 100, size: 16, clicks: 1, rarity: 0.08 },
  { type: 'anglerfish',name: '安康鱼',   emoji: '🐟', color: '#334455', bodyColor: '#445566', speed: 1.2, score: 150, value: 200, size: 32, clicks: 2, rarity: 0.05 },
];

const SUSHI_MENU = [
  { name: '金枪鱼寿司', fishType: 'tuna',       price: 80,  emoji: '🍣' },
  { name: '三文鱼寿司', fishType: 'salmon',     price: 100, emoji: '🍣' },
  { name: '螃蟹手卷',   fishType: 'crab',       price: 120, emoji: '🌯' },
  { name: '河豚刺身',   fishType: 'puffer',     price: 150, emoji: '🍱' },
  { name: '鲨鱼大餐',   fishType: 'shark',      price: 500, emoji: '🎌' },
  { name: '小丑鱼汤',   fishType: 'clownfish',  price: 50,  emoji: '🍜' },
  { name: '章鱼烧',     fishType: 'octopus',    price: 180, emoji: '🐙' },
  { name: '海龟汤',     fishType: 'turtle',     price: 200, emoji: '🍵' },
];

// ============ ENTITIES ============
let diver = { x: WW / 2, y: WH / 2, vx: 0, vy: 0, dir: 1, bubbles: [], animTime: 0 };
let fishes = [];
let bubbles = [];
let decorations = [];
let particles = [];
let customers = [];
let floatingTexts = [];
let flyingDishes = []; // { x, y, tx, ty, emoji, t, dur }
let transitionProgress = 0;
let sharkClickState = {}; // fishId -> {count, timer}

// ============ ZONES ============
const ZONES = [
  { name: '浅海', bgTop: '#1a6a9a', bgBot: '#0d3d6b', light: 0.9, fishBonus: 1.0 },
  { name: '珊瑚礁', bgTop: '#0e5c7a', bgBot: '#0a3050', light: 0.7, fishBonus: 1.3 },
  { name: '深海', bgTop: '#0a2a4a', bgBot: '#051828', light: 0.4, fishBonus: 1.8 }
];

// ============ CORAL / SEAWEED GENERATION ============
function generateDecorations() {
  decorations = [];
  const z = GS.zone;

  // 海草 (更多，分布更广)
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * W;
    decorations.push({ type: 'seaweed', x, y: H, height: 50 + Math.random() * 110, phase: Math.random() * Math.PI * 2, color: z === 2 ? '#1a4a2a' : '#2d8a4a' });
  }

  // 珊瑚 (各区域都有)
  const coralCount = z === 0 ? 6 : z === 1 ? 14 : 5;
  for (let i = 0; i < coralCount; i++) {
    decorations.push({ type: 'coral', x: Math.random() * W, y: H - 30 + Math.random() * 20, size: 22 + Math.random() * 35, color: z === 0 ? '#ff9b6d' : z === 1 ? '#ff6b9d' : '#8855ff' });
  }

  // 岩石
  for (let i = 0; i < 10; i++) {
    decorations.push({ type: 'rock', x: Math.random() * W, y: H - 20 + Math.random() * 30, size: 18 + Math.random() * 32, color: z === 2 ? '#223344' : '#445566' });
  }

  // 海星 (浅海、珊瑚礁)
  if (z <= 1) {
    for (let i = 0; i < 7; i++) {
      decorations.push({ type: 'starfish', x: 40 + Math.random() * (W - 80), y: H - 15, size: 12 + Math.random() * 14, color: z === 0 ? '#ff7744' : '#ff44aa', angle: Math.random() * Math.PI });
    }
  }

  // 扇形珊瑚 (珊瑚礁)
  if (z === 1) {
    for (let i = 0; i < 5; i++) {
      decorations.push({ type: 'fan_coral', x: Math.random() * W, y: H - 10, height: 80 + Math.random() * 80, color: ['#ff6b9d','#ff9933','#33ccff','#ff55dd'][Math.floor(Math.random()*4)], phase: Math.random() * Math.PI * 2 });
    }
  }

  // 海底城堡 (珊瑚礁或随机)
  if (z >= 1 || Math.random() < 0.5) {
    decorations.push({ type: 'castle', x: 180 + Math.random() * (W - 360), y: H - 10 });
  }

  // 沉船 (深海为主，珊瑚礁偶尔有)
  if (z === 2 || (z === 1 && Math.random() < 0.6)) {
    decorations.push({ type: 'shipwreck', x: 100 + Math.random() * (W - 300), y: H - 20 });
  }

  // 气泡柱 (随机位置从海底冒出)
  for (let i = 0; i < 4; i++) {
    decorations.push({ type: 'vent', x: Math.random() * W, y: H - 10, phase: Math.random() * Math.PI * 2 });
  }
}

function spawnFish(forceInViewport) {
  if (fishes.length >= 35) return;
  const zone = ZONES[GS.zone];
  const r = Math.random();
  let cumulative = 0;
  let type = FISH_TYPES[0];
  for (const ft of FISH_TYPES) {
    cumulative += ft.rarity;
    if (r < cumulative) { type = ft; break; }
  }
  const spd = type.speed * (0.8 + Math.random() * 0.4);
  let spawnX, spawnY, vxSign;
  if (forceInViewport) {
    spawnX = cam.x + 60 + Math.random() * Math.max(1, VW - 120);
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = Math.random() < 0.5 ? -1 : 1;
  } else {
    const side = Math.random() < 0.5 ? -1 : 1;
    spawnX = side < 0 ? cam.x - 80 : cam.x + VW + 80;
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = side;
  }
  fishes.push({
    id: Math.random().toString(36).substr(2),
    ...type,
    x: spawnX,
    y: spawnY,
    vx: vxSign * spd,
    vy: (Math.random() - 0.5) * 0.6,
    phase: Math.random() * Math.PI * 2,
    hp: type.clicks,
    maxHp: type.clicks,
    scared: false,
    scaredTimer: 0
  });
}

// ============ BUBBLES ============
function spawnBubble(x, y) {
  bubbles.push({ x, y, r: 3 + Math.random() * 5, vy: -(0.5 + Math.random() * 1.5), life: 1.0, dx: (Math.random() - 0.5) * 0.4 });
}

// ============ DRAW FUNCTIONS ============
function drawBackground() {
  const z = ZONES[GS.zone];
  const darkMult = GS.weather === 'dark' ? 0.35 : 1.0;

  // Fill entire viewport — gradient spans world height but we draw over viewport
  // Use cam.y to sample the right part of the vertical gradient
  const gradTop = cam.y / WH;           // 0 at top, 1 at bottom
  const gradBot = (cam.y + VH) / WH;
  const grad = ctx.createLinearGradient(0, 0, 0, VH);
  grad.addColorStop(0, shadeColor(z.bgTop, darkMult * (1 - gradTop * 0.4)));
  grad.addColorStop(0.5, shadeColor(z.bgTop, darkMult * (1 - (gradTop + gradBot) * 0.2)));
  grad.addColorStop(1, shadeColor(z.bgBot, darkMult * (1 - gradBot * 0.3)));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VW, VH);  // screen space — always covers full viewport

  if (GS.zone < 2) {
    const hazeGrad = ctx.createRadialGradient(VW / 2, 0, 50, VW / 2, 0, VH);
    hazeGrad.addColorStop(0, 'rgba(100,200,255,0.06)');
    hazeGrad.addColorStop(1, 'rgba(0,50,120,0)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, VW, VH);
  }

  // Everything below is in camera (world) space — called after ctx.translate(-cam.x,-cam.y)
  if (GS.zone <= 1 && GS.weather !== 'dark') {
    ctx.save();
    const rayCount = GS.zone === 0 ? 9 : 5;
    const rayAlpha = GS.zone === 0 ? 0.07 : 0.04;
    for (let i = 0; i < rayCount; i++) {
      const rx = 80 + i * (WW / rayCount) + Math.sin(GS.time * 0.4 + i * 1.3) * 30;
      const rayWidth = 45 + Math.sin(GS.time * 0.3 + i) * 18;
      const grad2 = ctx.createLinearGradient(rx, 0, rx, WH);
      grad2.addColorStop(0, `rgba(180,240,255,${rayAlpha})`);
      grad2.addColorStop(0.4, `rgba(120,200,255,${rayAlpha * 0.5})`);
      grad2.addColorStop(1, 'rgba(0,100,200,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      ctx.moveTo(rx - rayWidth * 0.3, 0);
      ctx.lineTo(rx + rayWidth + Math.sin(GS.time * 0.2 + i) * 20, WH);
      ctx.lineTo(rx - rayWidth * 0.5 + Math.sin(GS.time * 0.2 + i) * 20, WH);
      ctx.lineTo(rx - rayWidth * 0.6, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  if (GS.zone === 0 && GS.weather !== 'dark') {
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 16; i++) {
      const cx = ((GS.time * 25 + i * 95) % (WW + 100)) - 50;
      const cy = 30 + (i % 4) * 80 + Math.sin(GS.time + i) * 18;
      const r = 22 + Math.sin(GS.time * 0.7 + i) * 9;
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      cg.addColorStop(0, 'rgba(200,240,255,0.8)');
      cg.addColorStop(1, 'rgba(100,180,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, r, r * 0.5, GS.time * 0.1 + i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  if (GS.zone === 2) {
    ctx.save();
    for (let i = 0; i < 22; i++) {
      const px = (Math.sin(i * 2.3 + GS.time * 0.1) * 0.5 + 0.5) * WW;
      const py = (Math.sin(i * 1.7 + GS.time * 0.08) * 0.5 + 0.5) * (WH - 80) + 30;
      const pr = 2 + Math.sin(GS.time * 2 + i) * 1;
      const glow = ctx.createRadialGradient(px, py, 0, px, py, pr * 5);
      const hue = (i * 40 + GS.time * 20) % 360;
      glow.addColorStop(0, `hsla(${hue},100%,80%,0.6)`);
      glow.addColorStop(1, `hsla(${hue},100%,60%,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, pr * 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  if (GS.weather === 'current') {
    ctx.save();
    for (let i = 0; i < 8; i++) {
      const cx = ((GS.time * 90 + i * 200) % (WW + 200)) - 100;
      const cy = 80 + i * 90 + Math.sin(i * 1.2) * 40;
      const cg = ctx.createLinearGradient(cx - 20, cy, cx + 100, cy);
      cg.addColorStop(0, 'rgba(100,200,255,0)');
      cg.addColorStop(0.3, 'rgba(150,220,255,0.15)');
      cg.addColorStop(1, 'rgba(100,200,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx + 40, cy, 75, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 3D 沙底
  const isDeep = GS.zone === 2;
  ctx.save();
  ctx.fillStyle = isDeep ? 'rgba(0,0,0,0.6)' : 'rgba(80,50,10,0.35)';
  ctx.beginPath();
  ctx.moveTo(0, WH);
  for (let x = 0; x <= WW; x += 25) {
    ctx.lineTo(x, WH - 30 + Math.sin(x * 0.035 + GS.time * 0.15) * 8 + 6);
  }
  ctx.lineTo(WW, WH); ctx.lineTo(0, WH);
  ctx.closePath();
  ctx.fill();

  const sandGrad = ctx.createLinearGradient(0, WH - 55, 0, WH);
  if (isDeep) {
    sandGrad.addColorStop(0, '#0e1e2c');
    sandGrad.addColorStop(0.5, '#0a1520');
    sandGrad.addColorStop(1, '#060c14');
  } else if (GS.zone === 1) {
    sandGrad.addColorStop(0, '#b89050');
    sandGrad.addColorStop(0.5, '#9a7838');
    sandGrad.addColorStop(1, '#806030');
  } else {
    sandGrad.addColorStop(0, '#d4b070');
    sandGrad.addColorStop(0.5, '#c09050');
    sandGrad.addColorStop(1, '#a07838');
  }
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, WH);
  for (let x = 0; x <= WW; x += 25) {
    ctx.lineTo(x, WH - 30 + Math.sin(x * 0.035 + GS.time * 0.15) * 8);
  }
  ctx.lineTo(WW, WH); ctx.lineTo(0, WH);
  ctx.closePath();
  ctx.fill();

  if (!isDeep) {
    ctx.strokeStyle = 'rgba(255,220,130,0.22)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 25) {
        const y = H - 28 + i * 4 + Math.sin(x * 0.035 + GS.time * 0.15 + i * 0.5) * 5;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function shadeColor(hex, mult) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*mult)},${Math.round(g*mult)},${Math.round(b*mult)})`;
}

function drawDecorations() {
  // 先画阴影
  for (const d of decorations) {
    if (d.type === 'rock' || d.type === 'castle' || d.type === 'shipwreck') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      const sw = d.type === 'castle' ? 120 : d.type === 'shipwreck' ? 180 : d.size * 1.1;
      const sh = d.type === 'castle' ? 16 : d.type === 'shipwreck' ? 20 : d.size * 0.35;
      ctx.beginPath();
      ctx.ellipse((d.x || 0) + 8, (d.y || H) + 6, sw, sh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (const d of decorations) {
    if (d.type === 'seaweed') {
      const sway = Math.sin(GS.time * 1.5 + d.phase) * 14;
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(d.x + 2, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 2, d.y - d.height * 0.35, d.x + sway + 2, d.y - d.height * 0.65, d.x + sway * 1.4 + 2, d.y - d.height);
      ctx.stroke();
      const swGrad = ctx.createLinearGradient(d.x, d.y, d.x + sway * 1.4, d.y - d.height);
      swGrad.addColorStop(0, d.color);
      swGrad.addColorStop(1, GS.zone === 2 ? '#2a6a3a' : '#50c870');
      ctx.strokeStyle = swGrad;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5, d.y - d.height * 0.35, d.x + sway, d.y - d.height * 0.65, d.x + sway * 1.4, d.y - d.height);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(d.x + 1, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 1, d.y - d.height * 0.35, d.x + sway + 1, d.y - d.height * 0.65, d.x + sway * 1.4 + 1, d.y - d.height);
      ctx.stroke();
      for (let j = 0.3; j <= 0.85; j += 0.28) {
        const lx = d.x + sway * j * 1.4, ly = d.y - d.height * j;
        const la = Math.sin(GS.time * 1.8 + d.phase + j * 3) * 0.4;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(la + (j > 0.5 ? 0.3 : -0.3));
        const lG = ctx.createLinearGradient(-10, 0, 10, 0);
        lG.addColorStop(0, GS.zone === 2 ? '#1a5a2a' : '#30a850');
        lG.addColorStop(0.5, GS.zone === 2 ? '#2a7a3a' : '#50d870');
        lG.addColorStop(1, 'rgba(0,100,40,0)');
        ctx.fillStyle = lG;
        ctx.beginPath();
        ctx.ellipse(8, 0, 15, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

    } else if (d.type === 'coral') {
      const branches = [
        { ox: 0,           oy: 0, r: d.size * 0.42, h: d.size * 0.65 },
        { ox: -d.size * 0.48, oy: 5, r: d.size * 0.3,  h: d.size * 0.48 },
        { ox: d.size * 0.44,  oy: 8, r: d.size * 0.25, h: d.size * 0.38 }
      ];
      for (const b of branches) {
        const bx = d.x + b.ox, by = d.y;
        const stemG = ctx.createLinearGradient(bx - b.r * 0.5, 0, bx + b.r * 0.5, 0);
        stemG.addColorStop(0, shadeColor(d.color, 0.55));
        stemG.addColorStop(0.35, d.color);
        stemG.addColorStop(0.6, shadeColor(d.color, 1.3));
        stemG.addColorStop(1, shadeColor(d.color, 0.7));
        ctx.fillStyle = stemG;
        ctx.fillRect(bx - b.r * 0.4, by - b.h, b.r * 0.8, b.h);
        const ballG = ctx.createRadialGradient(bx - b.r * 0.25, by - b.h - b.r * 0.3, b.r * 0.05, bx, by - b.h, b.r);
        ballG.addColorStop(0, shadeColor(d.color, 1.6));
        ballG.addColorStop(0.4, d.color);
        ballG.addColorStop(1, shadeColor(d.color, 0.5));
        ctx.fillStyle = ballG;
        ctx.beginPath();
        ctx.arc(bx, by - b.h, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.h - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'rock') {
      const rockG = ctx.createRadialGradient(d.x + d.size * 0.3, d.y + d.size * 0.1, 0, d.x, d.y - d.size * 0.2, d.size * 1.2);
      rockG.addColorStop(0, '#667788');
      rockG.addColorStop(0.5, d.color);
      rockG.addColorStop(1, '#223344');
      ctx.fillStyle = rockG;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * 0.62, -0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.2, d.y - d.size * 0.2, d.size * 0.55, d.size * 0.28, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.15, d.y - d.size * 0.28, d.size * 0.2, d.size * 0.1, -0.3, 0, Math.PI * 2);
      ctx.fill();

    } else if (d.type === 'starfish') {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.angle + GS.time * 0.05);
      const sfG = ctx.createRadialGradient(0, 0, 1, 0, 0, d.size);
      sfG.addColorStop(0, shadeColor(d.color, 1.5));
      sfG.addColorStop(1, shadeColor(d.color, 0.7));
      ctx.fillStyle = sfG;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = (i * Math.PI) / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? d.size : d.size * 0.42;
        const px = Math.cos(angle) * r, py = Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(-d.size * 0.2, -d.size * 0.2, d.size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (d.type === 'fan_coral') {
      ctx.save();
      ctx.translate(d.x, d.y);
      const sway = Math.sin(GS.time * 0.8 + d.phase) * 8;
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.85;
      const branches2 = 14;
      for (let i = 0; i < branches2; i++) {
        const t = i / (branches2 - 1);
        const bx = (t - 0.5) * d.height * 0.9 + sway * (1 - t);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(bx * 0.5, -d.height * 0.55, bx, -d.height);
        ctx.stroke();
      }
      // 连接弧线
      for (let lev = 0.3; lev <= 1.0; lev += 0.2) {
        ctx.beginPath();
        for (let i = 0; i < branches2; i++) {
          const t = i / (branches2 - 1);
          const bx = ((t - 0.5) * d.height * 0.9 + sway * (1 - t)) * lev;
          const by = -d.height * lev;
          i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

    } else if (d.type === 'castle') {
      drawCastle(d.x, d.y);

    } else if (d.type === 'shipwreck') {
      drawShipwreck(d.x, d.y);

    } else if (d.type === 'vent') {
      // 海底气泡柱
      if (Math.random() < 0.15) {
        bubbles.push({ x: d.x + (Math.random() - 0.5) * 10, y: d.y - 10, r: 2 + Math.random() * 3, vy: -(0.4 + Math.random() * 0.8), life: 0.9, dx: (Math.random() - 0.5) * 0.3 });
      }
    }
  }
}

function drawCastle(x, y) {
  ctx.save();
  ctx.translate(x, y);
  const scale = 0.9;
  ctx.scale(scale, scale);

  // 城墙主体
  const wallG = ctx.createLinearGradient(-60, -100, 60, 0);
  wallG.addColorStop(0, '#8899aa');
  wallG.addColorStop(0.5, '#6677aa');
  wallG.addColorStop(1, '#445588');
  ctx.fillStyle = wallG;
  ctx.fillRect(-60, -90, 120, 90);

  // 苔藓/藻类覆盖
  ctx.fillStyle = 'rgba(40,120,60,0.35)';
  for (let i = 0; i < 8; i++) {
    const mx = -55 + i * 16, my = -90 + Math.random() * 40;
    ctx.beginPath();
    ctx.ellipse(mx, my, 8 + Math.random() * 6, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城楼 (4个)
  const towerPositions = [-55, -20, 20, 55];
  for (const tx of towerPositions) {
    const towerG = ctx.createLinearGradient(tx - 14, -145, tx + 14, -90);
    towerG.addColorStop(0, '#99aabb');
    towerG.addColorStop(1, '#556688');
    ctx.fillStyle = towerG;
    ctx.fillRect(tx - 14, -145, 28, 60);
    // 垛口
    for (let j = 0; j < 3; j++) {
      ctx.fillStyle = towerG;
      ctx.fillRect(tx - 12 + j * 10, -158, 7, 16);
    }
    // 塔顶尖
    ctx.fillStyle = '#bb5544';
    ctx.beginPath();
    ctx.moveTo(tx, -175);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx + 14, -155);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,180,0.2)';
    ctx.beginPath();
    ctx.moveTo(tx - 2, -174);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx - 6, -155);
    ctx.closePath();
    ctx.fill();
    // 小窗
    ctx.fillStyle = 'rgba(0,20,60,0.7)';
    ctx.beginPath();
    ctx.arc(tx, -120, 5, 0, Math.PI * 2);
    ctx.fill();
    // 窗户微光
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.arc(tx - 1, -121, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城堡大门
  ctx.fillStyle = 'rgba(0,10,30,0.8)';
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.rect(-20, -38, 40, 38);
  ctx.fill();
  // 门框
  ctx.strokeStyle = '#556688';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.moveTo(-20, -38); ctx.lineTo(-20, 0);
  ctx.moveTo(20, -38); ctx.lineTo(20, 0);
  ctx.stroke();
  // 门内发光
  const glowG = ctx.createRadialGradient(0, -20, 0, 0, -20, 22);
  glowG.addColorStop(0, 'rgba(80,150,255,0.25)');
  glowG.addColorStop(1, 'rgba(0,50,150,0)');
  ctx.fillStyle = glowG;
  ctx.beginPath();
  ctx.arc(0, -38, 19, Math.PI, 0);
  ctx.rect(-19, -38, 38, 38);
  ctx.fill();

  // 旗帜飘动
  const flagSway = Math.sin(GS.time * 2) * 6;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(0, -175);
  ctx.lineTo(flagSway + 22, -165 + Math.sin(GS.time * 3) * 3);
  ctx.lineTo(flagSway + 22, -155 + Math.sin(GS.time * 3 + 0.5) * 3);
  ctx.lineTo(0, -155);
  ctx.closePath();
  ctx.fill();
  // 旗杆
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -90); ctx.lineTo(0, -185);
  ctx.stroke();

  // 城墙高光
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(-60, -90, 20, 90);

  ctx.restore();
}

function drawShipwreck(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // 船壳阴影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(5, 5, 120, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // 船身主体
  const hullG = ctx.createLinearGradient(-110, -50, 110, 0);
  hullG.addColorStop(0, '#5a4020');
  hullG.addColorStop(0.4, '#7a5830');
  hullG.addColorStop(0.7, '#6a4825');
  hullG.addColorStop(1, '#3a2810');
  ctx.fillStyle = hullG;
  ctx.beginPath();
  ctx.moveTo(-110, -15);
  ctx.lineTo(-100, -50);
  ctx.lineTo(90, -50);
  ctx.lineTo(110, -20);
  ctx.lineTo(110, 0);
  ctx.lineTo(-110, 0);
  ctx.closePath();
  ctx.fill();

  // 船舷高光
  ctx.fillStyle = 'rgba(180,120,60,0.2)';
  ctx.fillRect(-100, -50, 190, 8);

  // 甲板 (倾斜破损)
  ctx.save();
  ctx.rotate(0.08);
  const deckG = ctx.createLinearGradient(0, -60, 0, -50);
  deckG.addColorStop(0, '#8a6840');
  deckG.addColorStop(1, '#6a4820');
  ctx.fillStyle = deckG;
  ctx.fillRect(-95, -68, 185, 18);
  // 甲板木纹
  ctx.strokeStyle = 'rgba(50,25,5,0.3)';
  ctx.lineWidth = 1;
  for (let i = -90; i < 90; i += 15) {
    ctx.beginPath(); ctx.moveTo(i, -68); ctx.lineTo(i, -50); ctx.stroke();
  }
  ctx.restore();

  // 折断的桅杆
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -68);
  ctx.lineTo(-30, -130);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-30, -130);
  ctx.lineTo(20, -100);  // 折断横臂
  ctx.stroke();
  // 破烂风帆
  ctx.fillStyle = 'rgba(200,180,140,0.35)';
  ctx.beginPath();
  ctx.moveTo(-30, -128);
  ctx.lineTo(15, -98);
  ctx.lineTo(0, -120);
  ctx.closePath();
  ctx.fill();

  // 炮口 (几个小洞)
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  for (const hx of [-60, -20, 20, 60]) {
    ctx.beginPath();
    ctx.ellipse(hx, -30, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 苔藓覆盖
  ctx.fillStyle = 'rgba(30,100,50,0.4)';
  for (let i = 0; i < 12; i++) {
    const mx = -100 + i * 18, my = -50 + Math.random() * 20;
    ctx.beginPath();
    ctx.ellipse(mx, my, 10 + Math.random() * 8, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 珊瑚生长
  ctx.fillStyle = '#ff6b9d';
  for (const [cx2, cy2, cr] of [[-80, -55, 8], [50, -52, 6], [85, -48, 7], [-30, -60, 5]]) {
    ctx.beginPath();
    ctx.arc(cx2, cy2, cr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(cx2 - cr * 0.25, cy2 - cr * 0.3, cr * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff6b9d';
  }

  ctx.restore();
}

function drawFish(f) {
  // 地面阴影
  if (f.y > 400) {
    const shadowAlpha = Math.max(0, (f.y - 400) / 200) * 0.35;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
    ctx.beginPath();
    ctx.ellipse(f.x, 572 + Math.sin(f.x * 0.04 + GS.time * 0.15) * 6, f.size * 1.1, f.size * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(f.x, f.y);
  const scaleX = f.vx < 0 ? -1 : 1;
  ctx.scale(scaleX, 1);

  const wobbleScale = f.wobble ? 1 + Math.sin(GS.time * 3 + f.phase) * 0.15 : 1;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const w = f.size, h = f.size * 0.6;

  if (f.type === 'shark') {
    const sharkCol = f.scared ? '#99aaaa' : f.bodyColor;
    // 身体底色阴影
    ctx.fillStyle = shadeColor(sharkCol, 0.5);
    ctx.beginPath();
    ctx.ellipse(2, 2, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 身体主渐变(球面光照)
    const sg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, w * 0.05, 0, 0, w * 1.1);
    sg.addColorStop(0, shadeColor(sharkCol, 1.5));
    sg.addColorStop(0.45, sharkCol);
    sg.addColorStop(1, shadeColor(sharkCol, 0.55));
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部浅色
    ctx.fillStyle = 'rgba(230,240,245,0.5)';
    ctx.beginPath();
    ctx.ellipse(w * 0.15, h * 0.3, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍
    const finG = ctx.createLinearGradient(-5, -h, 20, -h - 20);
    finG.addColorStop(0, shadeColor(f.scared ? '#778899' : f.color, 0.8));
    finG.addColorStop(1, shadeColor(f.scared ? '#778899' : f.color, 1.2));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-5, -h + 2);
    ctx.lineTo(12, -h - 20);
    ctx.lineTo(22, -h + 2);
    ctx.closePath();
    ctx.fill();
    // 尾鳍
    ctx.fillStyle = f.scared ? '#889aaa' : f.color;
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 16, -13);
    ctx.lineTo(-w - 16, 13);
    ctx.closePath();
    ctx.fill();
    // 眼睛(高光)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.42, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.42 + 1.5, -5.5, 2, 0, Math.PI * 2);
    ctx.fill();
    // 牙齿
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(w * 0.68, 4);
    ctx.lineTo(w * 0.78, 10);
    ctx.lineTo(w * 0.88, 4);
    ctx.fill();
    // HP条
    if (f.hp < f.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(-w, h + 5, w * 2, 7);
      ctx.fillStyle = '#f33';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 7);
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 3);
    }

  } else if (f.type === 'crab') {
    // 螃蟹 - 立体甲壳
    const cg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, h * 0.1, 0, 0, w);
    cg.addColorStop(0, shadeColor(f.bodyColor, 1.5));
    cg.addColorStop(0.5, f.bodyColor);
    cg.addColorStop(1, shadeColor(f.bodyColor, 0.55));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 甲壳高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.35, w * 0.4, h * 0.25, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 蟹钳(立体)
    for (const side of [-1, 1]) {
      const cx = side * (w + 5);
      const clawG = ctx.createRadialGradient(cx - 2, -7, 1, cx, -5, 10);
      clawG.addColorStop(0, shadeColor(f.color, 1.4));
      clawG.addColorStop(1, shadeColor(f.color, 0.7));
      ctx.fillStyle = clawG;
      ctx.beginPath();
      ctx.arc(cx, -5, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx - 2, -7, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // 蟹腿
    for (let i = -1; i <= 1; i++) {
      ctx.strokeStyle = shadeColor(f.color, 0.9);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(i * 10, h);
      ctx.lineTo(i * 15 + Math.sin(GS.time * 4 + i) * 3, h + 13);
      ctx.stroke();
    }
    // 眼睛
    for (const ex of [-8, 8]) {
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex, -5, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(ex + 1, -6.5, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

  } else if (f.type === 'jellyfish') {
    // 水母 — already translated to (f.x, f.y) by outer ctx.translate
    const jPulse = 1 + Math.sin(GS.time * 2.5 + f.phase) * 0.12;
    // 伞体
    const jG = ctx.createRadialGradient(0, -w * 0.3, 0, 0, 0, w * jPulse);
    jG.addColorStop(0, 'rgba(220,150,255,0.85)');
    jG.addColorStop(0.5, 'rgba(180,100,240,0.55)');
    jG.addColorStop(1, 'rgba(140,60,200,0)');
    ctx.fillStyle = jG;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse, Math.PI, 0);
    ctx.fill();
    // 伞边高光
    ctx.strokeStyle = 'rgba(230,180,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse * 0.95, Math.PI, 0);
    ctx.stroke();
    // 触须
    ctx.strokeStyle = 'rgba(200,120,255,0.55)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 6; i++) {
      const tx = (i / 5 - 0.5) * w * 1.2;
      const waveA = Math.sin(GS.time * 2 + i * 0.8 + f.phase) * 8;
      ctx.beginPath();
      ctx.moveTo(tx, 0);
      ctx.quadraticCurveTo(tx + waveA, h * 1.5, tx + waveA * 0.5, h * 3);
      ctx.stroke();
    }
    // 发光中心
    ctx.fillStyle = 'rgba(255,200,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, -w * 0.2, w * 0.35, w * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    // restored by outer drawFish ctx.restore()

  } else if (f.type === 'turtle') {
    // 海龟 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    const swimAngle = Math.sin(GS.time * 1.5 + f.phase) * 0.08;
    ctx.rotate(swimAngle);
    // 龟壳
    const shellG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    shellG.addColorStop(0, '#6ac87a');
    shellG.addColorStop(0.5, '#3a8a4a');
    shellG.addColorStop(1, '#1a5a2a');
    ctx.fillStyle = shellG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 龟甲纹
    ctx.strokeStyle = 'rgba(0,60,20,0.4)';
    ctx.lineWidth = 1.2;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * w * 0.35, -h); ctx.lineTo(i * w * 0.35, h);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-w, 0); ctx.lineTo(w, 0); ctx.stroke();
    // 壳高光
    ctx.fillStyle = 'rgba(150,230,170,0.25)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.3, w * 0.45, h * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 头
    const headG = ctx.createRadialGradient(w * 0.6, -h * 0.1, 1, w * 0.7, 0, h * 0.7);
    headG.addColorStop(0, '#70c880');
    headG.addColorStop(1, '#2a6a3a');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.ellipse(w * 0.82, 0, h * 0.6, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // 眼
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.92, -h * 0.2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(w * 0.93, -h * 0.2, 2, 0, Math.PI * 2); ctx.fill();
    // 鳍
    const flipT = Math.sin(GS.time * 2 + f.phase) * 0.3;
    ctx.fillStyle = '#3a8a4a';
    ctx.save(); ctx.rotate(flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, h * 0.75, h * 0.7, h * 0.25, 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(-flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, -h * 0.75, h * 0.7, h * 0.25, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'octopus') {
    // 章鱼 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    // 头部
    const oG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    oG.addColorStop(0, shadeColor(f.bodyColor, 1.4));
    oG.addColorStop(0.5, f.bodyColor);
    oG.addColorStop(1, shadeColor(f.bodyColor, 0.6));
    ctx.fillStyle = oG;
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.2, w * 0.75, h * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    // 头部高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.25, -h * 0.55, w * 0.32, h * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 8条触须
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI - Math.PI * 0.1;
      const wave = Math.sin(GS.time * 2 + i * 0.9 + f.phase) * 12;
      const ex = Math.cos(angle) * w * 0.6;
      const ey = h * 0.5 + Math.sin(angle) * h * 0.3;
      ctx.strokeStyle = shadeColor(f.color, 0.85);
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.bezierCurveTo(ex + wave, ey + h, ex + wave * 0.7, ey + h * 2, ex + wave * 0.3, ey + h * 2.8);
      ctx.stroke();
      // 吸盘
      ctx.fillStyle = shadeColor(f.bodyColor, 1.3);
      ctx.beginPath();
      ctx.arc(ex + wave * 0.5, ey + h * 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // 眼睛
    for (const ex2 of [-w * 0.28, w * 0.28]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex2, -h * 0.3, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(ex2 + 1, -h * 0.3, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(ex2 + 2, -h * 0.38, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

  } else if (f.type === 'seahorse') {
    // 海马 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    const shBob = Math.sin(GS.time * 2.5 + f.phase) * 4;
    const shSway = Math.sin(GS.time * 1.5 + f.phase) * 0.12;
    ctx.rotate(shSway);
    // 躯干
    const shG = ctx.createLinearGradient(-w * 0.5, 0, w * 0.5, 0);
    shG.addColorStop(0, shadeColor(f.bodyColor, 0.7));
    shG.addColorStop(0.4, f.bodyColor);
    shG.addColorStop(1, shadeColor(f.bodyColor, 0.85));
    ctx.fillStyle = shG;
    ctx.beginPath();
    ctx.moveTo(0, -h * 1.8 + shBob);
    ctx.bezierCurveTo(w * 0.6, -h + shBob, w * 0.5, 0, w * 0.2, h);
    ctx.bezierCurveTo(w * 0.3, h * 1.5, 0, h * 2, -w * 0.2, h * 1.6);
    ctx.bezierCurveTo(-w * 0.4, h * 0.8, -w * 0.5, 0, -w * 0.1, -h + shBob);
    ctx.closePath();
    ctx.fill();
    // 脊背棘刺
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      const sy = (-h * 1.5 + i * h * 0.5 + shBob);
      ctx.beginPath();
      ctx.moveTo(w * 0.4, sy);
      ctx.lineTo(w * 0.7, sy - 5);
      ctx.stroke();
    }
    // 头部
    ctx.fillStyle = f.bodyColor;
    ctx.beginPath();
    ctx.ellipse(w * 0.1, -h * 1.7 + shBob, w * 0.45, h * 0.55, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // 嘴/吻
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w * 0.45, -h * 1.85 + shBob);
    ctx.lineTo(w * 0.85, -h * 1.95 + shBob);
    ctx.stroke();
    // 眼
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.25, -h * 1.85 + shBob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(w * 0.3, -h * 1.9 + shBob, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍 (扇形抖动)
    ctx.fillStyle = 'rgba(255,200,80,0.55)';
    const finFlut = Math.sin(GS.time * 8 + f.phase) * 0.2;
    ctx.save();
    ctx.translate(-w * 0.15, -h * 0.6);
    ctx.rotate(finFlut);
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.55, h * 0.35, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'anglerfish') {
    // 安康鱼 (深海) — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    // 发光诱饵
    const lureTime = GS.time * 3 + f.phase;
    const lurePulse = 0.7 + Math.sin(lureTime) * 0.3;
    const lureX = w * 0.3 + Math.sin(lureTime * 0.7) * 8;
    const lureY = -h * 2.2 + Math.sin(lureTime * 1.1) * 5;
    const lureGlow = ctx.createRadialGradient(lureX, lureY, 0, lureX, lureY, 15 * lurePulse);
    lureGlow.addColorStop(0, 'rgba(180,255,100,0.9)');
    lureGlow.addColorStop(0.4, 'rgba(100,220,50,0.5)');
    lureGlow.addColorStop(1, 'rgba(50,150,20,0)');
    ctx.fillStyle = lureGlow;
    ctx.beginPath();
    ctx.arc(lureX, lureY, 15 * lurePulse, 0, Math.PI * 2);
    ctx.fill();
    // 诱饵杆
    ctx.strokeStyle = '#556';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.bezierCurveTo(w * 0.2, -h * 1.5, w * 0.3, -h * 1.8, lureX, lureY);
    ctx.stroke();
    // 身体
    const afG = ctx.createRadialGradient(-w * 0.2, -h * 0.2, 3, 0, 0, w);
    afG.addColorStop(0, '#556677');
    afG.addColorStop(0.5, f.bodyColor);
    afG.addColorStop(1, '#1a2233');
    ctx.fillStyle = afG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部斑纹
    ctx.fillStyle = 'rgba(100,120,140,0.4)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.35, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 大嘴巴
    ctx.fillStyle = '#1a2233';
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, h * 0.3, w * 0.85, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, -h * 0.05, -w * 0.3, 0.1);
    ctx.closePath();
    ctx.fill();
    // 尖牙
    ctx.fillStyle = 'rgba(220,220,200,0.9)';
    for (let i = 0; i < 5; i++) {
      const tx2 = -w * 0.2 + i * w * 0.22;
      ctx.beginPath();
      ctx.moveTo(tx2, h * 0.1);
      ctx.lineTo(tx2 + 5, h * 0.28);
      ctx.lineTo(tx2 + 10, h * 0.1);
      ctx.fill();
    }
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.55, -h * 0.25, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1520';
    ctx.beginPath(); ctx.arc(w * 0.56, -h * 0.25, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(100,255,50,0.7)';
    ctx.beginPath(); ctx.arc(w * 0.58, -h * 0.28, 2, 0, Math.PI * 2); ctx.fill();
    // 胸鳍
    ctx.fillStyle = shadeColor(f.bodyColor, 0.7);
    ctx.beginPath();
    ctx.ellipse(-w * 0.3, h * 0.4, h * 0.5, h * 0.22, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const fishG = ctx.createRadialGradient(-w * 0.25, -h * 0.4, h * 0.05, 0, 0, w * 1.05);
    fishG.addColorStop(0, shadeColor(f.bodyColor, 1.6));
    fishG.addColorStop(0.4, f.bodyColor);
    fishG.addColorStop(1, shadeColor(f.bodyColor, 0.5));
    ctx.fillStyle = fishG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鱼鳞光泽纹
    ctx.save();
    ctx.clip();
    ctx.globalAlpha = 0.12;
    for (let sx = -w + 5; sx < w; sx += 7) {
      for (let sy = -h + 3; sy < h; sy += 6) {
        ctx.fillStyle = (Math.floor(sx / 7 + sy / 6) % 2 === 0) ? '#fff' : shadeColor(f.bodyColor, 0.7);
        ctx.beginPath();
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // 腹部
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.28, w * 0.45, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 背鳍
    const finG = ctx.createLinearGradient(0, -h, 14, -h - 12);
    finG.addColorStop(0, shadeColor(f.color, 0.9));
    finG.addColorStop(1, shadeColor(f.color, 1.3));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-2, -h + 1);
    ctx.lineTo(7, -h - 11);
    ctx.lineTo(15, -h + 1);
    ctx.closePath();
    ctx.fill();

    // 尾鳍
    ctx.fillStyle = shadeColor(f.color, 1.1);
    ctx.beginPath();
    ctx.moveTo(-w + 1, 0);
    ctx.lineTo(-w - 11, -9);
    ctx.lineTo(-w - 11, 9);
    ctx.closePath();
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.5, -2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 0.5, -2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 1, -3.5, 1.3, 0, Math.PI * 2);
    ctx.fill();

    // 小丑鱼白条纹
    if (f.type === 'clownfish') {
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -h + 1); ctx.lineTo(0, h - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-w * 0.3, -h * 0.8); ctx.lineTo(-w * 0.3, h * 0.8);
      ctx.stroke();
    }

    // 河豚棘刺
    if (f.type === 'puffer') {
      ctx.strokeStyle = shadeColor(f.color, 0.7);
      ctx.lineWidth = 1.8;
      for (let a = 0; a < Math.PI * 2; a += 0.65) {
        const sx = Math.cos(a) * w, sy = Math.sin(a) * h;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(Math.cos(a) * (w + 6), Math.sin(a) * (h + 6));
        ctx.stroke();
      }
    }

    // 三文鱼侧线
    if (f.type === 'salmon') {
      ctx.strokeStyle = 'rgba(255,130,80,0.7)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-w * 0.55, 0);
      ctx.quadraticCurveTo(0, h * 0.15, w * 0.55, 0);
      ctx.stroke();
    }
  }
  ctx.restore();

  // 多击进度指示
  if (f.maxHp > 1) {
    const sc = sharkClickState[f.id];
    if (sc && sc.count > 0) {
      for (let i = 0; i < f.maxHp; i++) {
        const dotX = f.x - 10 + i * 13;
        const dotY = f.y - f.size - 16;
        ctx.beginPath();
        ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
        ctx.fillStyle = i < sc.count ? '#ff4' : 'rgba(255,255,255,0.25)';
        ctx.fill();
        if (i < sc.count) {
          ctx.strokeStyle = 'rgba(255,200,0,0.6)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
  }
}

function drawDiver() {
  const d = diver;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(d.dir, 1);

  const bob = Math.sin(GS.time * 2) * 3;

  // 地面投影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 50, 28, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 氧气罐(金属质感)
  const tankG = ctx.createLinearGradient(-30, 0, -10, 0);
  tankG.addColorStop(0, '#555');
  tankG.addColorStop(0.3, '#999');
  tankG.addColorStop(0.6, '#bbb');
  tankG.addColorStop(1, '#666');
  ctx.fillStyle = tankG;
  ctx.beginPath();
  ctx.roundRect(-28, -20 + bob, 16, 34, 6);
  ctx.fill();
  // 罐身高光
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(-26, -18 + bob, 5, 18, 3);
  ctx.fill();
  // 气管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -5 + bob); ctx.lineTo(-12, -5 + bob);
  ctx.stroke();

  // 潜水服身体(径向光照渐变)
  const bodyG = ctx.createRadialGradient(-8, -8 + bob, 4, 0, 0 + bob, 30);
  bodyG.addColorStop(0, '#7ee0ff');
  bodyG.addColorStop(0.35, '#3ab0e8');
  bodyG.addColorStop(0.7, '#1a7ab8');
  bodyG.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 26, 28, 0, 0, Math.PI * 2);
  ctx.fill();
  // 潜水服缝线
  ctx.strokeStyle = 'rgba(10,80,160,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -12 + bob); ctx.lineTo(-18, 12 + bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(14, -12 + bob); ctx.lineTo(18, 12 + bob);
  ctx.stroke();
  // 胸口徽标高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-4, -5 + bob, 12, 8, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // 面罩框架
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(4, -14 + bob, 16, 12, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩玻璃
  const maskG = ctx.createLinearGradient(-8, -22 + bob, 14, -8 + bob);
  maskG.addColorStop(0, 'rgba(180,240,255,0.7)');
  maskG.addColorStop(0.5, 'rgba(80,180,255,0.45)');
  maskG.addColorStop(1, 'rgba(20,100,200,0.3)');
  ctx.fillStyle = maskG;
  ctx.beginPath();
  ctx.ellipse(4, -15 + bob, 14, 10, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩反光斑
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(-2, -20 + bob, 5, 2.5, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-2, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(-1, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(11, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 呼吸管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();
  ctx.strokeStyle = '#fa4';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();

  // 手臂
  const armG = ctx.createLinearGradient(-30, 0, -18, 0);
  armG.addColorStop(0, '#0d4a7a');
  armG.addColorStop(0.5, '#1a7ab8');
  armG.addColorStop(1, '#3ab0e8');
  ctx.fillStyle = armG;
  ctx.beginPath();
  ctx.ellipse(-24, 5 + bob, 7, 14, 0.35, 0, Math.PI * 2);
  ctx.fill();
  const armG2 = ctx.createLinearGradient(18, 0, 30, 0);
  armG2.addColorStop(0, '#3ab0e8');
  armG2.addColorStop(0.5, '#1a7ab8');
  armG2.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = armG2;
  ctx.beginPath();
  ctx.ellipse(24, 5 + bob, 7, 14, -0.35, 0, Math.PI * 2);
  ctx.fill();

  // 脚蹼(动画)
  const flipAnim = Math.sin(GS.time * 3) * 10;
  const flipG = ctx.createLinearGradient(-20, 25, 0, 45);
  flipG.addColorStop(0, '#e05000');
  flipG.addColorStop(1, '#ff8c00');
  ctx.fillStyle = flipG;
  ctx.beginPath();
  ctx.ellipse(-10 + flipAnim, 32 + bob, 13, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 - flipAnim, 32 + bob, 13, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Diver exhaust bubbles
  for (const b of d.bubbles) {
    const rx = b.r, ry = b.r;
    ctx.save();
    ctx.globalAlpha = b.life * 0.85;
    ctx.translate(b.x, b.y);
    const innerG = ctx.createRadialGradient(-rx * 0.25, -ry * 0.3, 0, 0, 0, rx);
    innerG.addColorStop(0, 'rgba(230,248,255,0.22)');
    innerG.addColorStop(0.6, 'rgba(140,210,255,0.06)');
    innerG.addColorStop(1, 'rgba(80,160,230,0.02)');
    ctx.fillStyle = innerG;
    ctx.beginPath(); ctx.arc(0, 0, rx, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(200,238,255,0.6)';
    ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(0, 0, rx, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.beginPath(); ctx.ellipse(-rx * 0.28, -ry * 0.34, rx * 0.22, ry * 0.14, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ============ RESTAURANT DRAWING ============
function drawRestaurant() {
  // Light warm background
  ctx.fillStyle = '#f5ede0';
  ctx.fillRect(0, 0, VW, VH);

  // Scale restaurant (designed at 900×600) to fit entirely within viewport
  const scale = Math.min(VW / 900, VH / 600);
  const offsetX = (VW - 900 * scale) / 2;
  const offsetY = (VH - 600 * scale) / 2;
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Background — bright warm interior
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 600);
  bgGrad.addColorStop(0, '#faf3e8');
  bgGrad.addColorStop(0.55, '#f2e8d8');
  bgGrad.addColorStop(1, '#e8dcc8');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 900, 600);

  // Warm sunlight wash from upper-right
  const sunWash = ctx.createRadialGradient(820, 0, 20, 820, 0, 550);
  sunWash.addColorStop(0, 'rgba(255,235,180,0.22)');
  sunWash.addColorStop(1, 'rgba(255,235,180,0)');
  ctx.fillStyle = sunWash;
  ctx.fillRect(0, 0, 900, 600);

  // Ceiling beam
  ctx.fillStyle = '#c8a878';
  ctx.fillRect(0, 0, 900, 44);
  ctx.fillStyle = '#b89060';
  ctx.fillRect(0, 40, 900, 6);
  // Ceiling grain lines
  ctx.strokeStyle = 'rgba(160,110,50,0.15)';
  ctx.lineWidth = 1;
  for (let px = 0; px < 900; px += 80) {
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px + 20, 46); ctx.stroke();
  }
  // Pendant lamps
  const lampPositions = [160, 350, 550, 740];
  for (const lx of lampPositions) {
    ctx.strokeStyle = '#8a6040';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, 44); ctx.lineTo(lx, 82); ctx.stroke();
    // Shade
    ctx.fillStyle = '#d4a840';
    ctx.beginPath();
    ctx.moveTo(lx - 20, 82); ctx.lineTo(lx + 20, 82);
    ctx.lineTo(lx + 12, 104); ctx.lineTo(lx - 12, 104);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#f0c860';
    ctx.beginPath();
    ctx.moveTo(lx - 20, 82); ctx.lineTo(lx + 20, 82);
    ctx.lineTo(lx + 18, 90); ctx.lineTo(lx - 18, 90);
    ctx.closePath(); ctx.fill();
    // Warm light pool on wall/floor
    const glow = ctx.createRadialGradient(lx, 104, 4, lx, 240, 200);
    glow.addColorStop(0, 'rgba(255,230,140,0.28)');
    glow.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(lx - 200, 82, 400, 380);
    // Bulb
    ctx.fillStyle = 'rgba(255,248,200,1)';
    ctx.beginPath(); ctx.arc(lx, 103, 5, 0, Math.PI * 2); ctx.fill();
  }

  // Back wall — warm cream with wainscoting
  ctx.fillStyle = '#f0e4cc';
  ctx.fillRect(0, 48, 900, 225);
  // Wainscot panels
  ctx.strokeStyle = 'rgba(160,120,70,0.18)';
  ctx.lineWidth = 1.5;
  for (let px = 60; px < 900; px += 140) {
    ctx.strokeRect(px, 70, 120, 140);
    ctx.strokeRect(px + 6, 76, 108, 128);
  }
  ctx.beginPath(); ctx.moveTo(0, 170); ctx.lineTo(900, 170); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 176); ctx.lineTo(900, 176); ctx.stroke();

  // Restaurant name sign — warm wood look
  const signG = ctx.createLinearGradient(200, 65, 200, 128);
  signG.addColorStop(0, '#c8904a');
  signG.addColorStop(1, '#a87030');
  ctx.fillStyle = signG;
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 60, 5); ctx.fill();
  ctx.fillStyle = '#d4a060';
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 10, [5, 5, 0, 0]); ctx.fill();
  ctx.strokeStyle = 'rgba(80,40,10,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 60, 5); ctx.stroke();
  ctx.fillStyle = '#fff8e8';
  ctx.font = 'bold 26px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(80,30,0,0.4)';
  ctx.shadowBlur = 4;
  ctx.fillText('🍣  深海寿司  DEEP SEA SUSHI  🐟', 450, 104);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Floor — warm wood planks
  const floorG = ctx.createLinearGradient(0, 268, 0, 600);
  floorG.addColorStop(0, '#c8944a');
  floorG.addColorStop(0.5, '#b8803a');
  floorG.addColorStop(1, '#a06828');
  ctx.fillStyle = floorG;
  ctx.fillRect(0, 268, 900, 332);
  // Plank lines
  ctx.strokeStyle = 'rgba(80,40,10,0.12)';
  ctx.lineWidth = 1;
  for (let fy = 268; fy < 600; fy += 44) {
    ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(900, fy); ctx.stroke();
  }
  // Plank vertical joints (staggered)
  for (let row = 0; row < 8; row++) {
    const fy = 268 + row * 44;
    const offset = (row % 2) * 90;
    for (let fx = offset; fx < 900; fx += 180) {
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy + 44); ctx.stroke();
    }
  }
  // Floor highlight (window light)
  const floorRef = ctx.createLinearGradient(0, 268, 0, 310);
  floorRef.addColorStop(0, 'rgba(255,220,150,0.18)');
  floorRef.addColorStop(1, 'rgba(255,220,150,0)');
  ctx.fillStyle = floorRef;
  ctx.fillRect(0, 268, 900, 42);

  // Counter — light wood + marble top
  const counterBody = ctx.createLinearGradient(300, 268, 300, 330);
  counterBody.addColorStop(0, '#d4a050');
  counterBody.addColorStop(1, '#a87030');
  ctx.fillStyle = counterBody;
  ctx.beginPath(); ctx.roundRect(300, 270, 300, 58, 4); ctx.fill();
  // Marble top
  const marbleG = ctx.createLinearGradient(298, 258, 602, 274);
  marbleG.addColorStop(0, '#f8f4ee');
  marbleG.addColorStop(0.3, '#ece8e0');
  marbleG.addColorStop(0.6, '#f4f0ea');
  marbleG.addColorStop(1, '#e8e4dc');
  ctx.fillStyle = marbleG;
  ctx.beginPath(); ctx.roundRect(298, 258, 304, 16, 3); ctx.fill();
  // Marble veins
  ctx.strokeStyle = 'rgba(160,150,140,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(320, 260); ctx.bezierCurveTo(380, 266, 420, 262, 480, 268); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(500, 259); ctx.bezierCurveTo(540, 265, 560, 261, 590, 268); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,190,180,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(298, 258, 304, 16, 3); ctx.stroke();

  // Tables
  for (const t of GS.tables) drawTable(t);

  // ── INVENTORY PANEL (left) — warm wood card ──
  ctx.fillStyle = 'rgba(255,248,235,0.94)';
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 310, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,50,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 310, 10); ctx.stroke();
  ctx.fillStyle = '#c87830';
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 3, [3, 3, 0, 0]); ctx.fill();

  ctx.fillStyle = '#8a4818';
  ctx.font = 'bold 13px Microsoft YaHei';
  ctx.fillText('📦 仓库', 18, 301);
  ctx.fillStyle = 'rgba(160,110,50,0.2)';
  ctx.fillRect(10, 308, 188, 1);

  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 325;
  ctx.font = '13px Microsoft YaHei';
  let totalItems = 0;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      totalItems++;
      const isSelected = GS.preparingDish && GS.preparingDish.type === ft.type;
      if (isSelected) {
        ctx.fillStyle = 'rgba(220,140,30,0.14)';
        ctx.beginPath(); ctx.roundRect(14, wy - 14, 180, 20, 4); ctx.fill();
      }
      ctx.fillStyle = isSelected ? '#c06010' : '#4a3020';
      ctx.fillText(`${ft.emoji} ${ft.name}  ×${cnt}`, 20, wy);
      ctx.fillStyle = isSelected ? '#e05010' : '#c05830';
      ctx.font = '11px Microsoft YaHei';
      ctx.fillText('[出售]', 160, wy);
      ctx.font = '13px Microsoft YaHei';
      wy += 22;
    }
  }
  if (totalItems === 0) {
    ctx.fillStyle = '#b09070';
    ctx.font = '13px Microsoft YaHei';
    ctx.fillText('仓库空空如也...', 28, 345);
    ctx.fillText('去潜水捕鱼吧！', 32, 368);
  }

  // Sell button
  const sellG = ctx.createLinearGradient(16, 552, 96, 576);
  sellG.addColorStop(0, '#2aaa60'); sellG.addColorStop(1, '#168840');
  ctx.fillStyle = sellG;
  ctx.beginPath(); ctx.roundRect(16, 550, 82, 26, 6); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(16, 550, 82, 11, [6, 6, 0, 0]); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Microsoft YaHei';
  ctx.fillText('全部出售', 30, 567);

  ctx.fillStyle = '#8a4010';
  ctx.font = 'bold 14px Microsoft YaHei';
  ctx.fillText(`💰 ${GS.coins}`, 18, 585);

  // ── MENU PANEL (right) — warm card ──
  ctx.fillStyle = 'rgba(255,248,235,0.94)';
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 210, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,50,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 210, 10); ctx.stroke();
  ctx.fillStyle = '#c87830';
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 3, [3, 3, 0, 0]); ctx.fill();

  ctx.fillStyle = '#8a4818';
  ctx.font = 'bold 13px Microsoft YaHei';
  ctx.fillText('📋 今日菜单', 715, 301);
  ctx.fillStyle = 'rgba(160,110,50,0.2)';
  ctx.fillRect(704, 308, 186, 1);

  ctx.font = '12px Microsoft YaHei';
  let my = 324;
  for (const dish of SUSHI_MENU) {
    const hasIngredient = (warehouseByType[dish.fishType] || 0) > 0;
    if (hasIngredient) {
      ctx.fillStyle = 'rgba(80,180,80,0.1)';
      ctx.beginPath(); ctx.roundRect(707, my - 13, 180, 18, 3); ctx.fill();
    }
    ctx.fillStyle = hasIngredient ? '#2a6a20' : '#b09878';
    ctx.fillText(`${dish.emoji} ${dish.name}`, 712, my);
    ctx.fillStyle = hasIngredient ? '#b86010' : '#b09878';
    ctx.fillText(`¥${dish.price}`, 852, my);
    my += 24;
  }

  drawUpgradeShop();

  ctx.restore(); // end restaurant scale

  // ── ORDER BUBBLES — drawn in SCREEN SPACE, above everything ──
  // Convert table coords (900×600 space) → screen coords
  const rScale = Math.min(VW / 900, VH / 600);
  const rOffX = (VW - 900 * rScale) / 2;
  const rOffY = (VH - 600 * rScale) / 2;
  const HEAD_R = 18, LEG_H = 18, BODY_H = 34;
  const headY_local = -LEG_H - BODY_H - HEAD_R + 4;  // in 900×600 space, relative to feet

  for (const t of GS.tables) {
    if (t.customer && t.customer.order && t.customer.state === 'waiting') {
      const c = t.customer;
      // feet position in 900×600 space
      const feetX = t.x;
      const feetY = t.y + 50;
      // head position in 900×600 space
      const headX_900 = feetX;
      const headY_900 = feetY + headY_local;
      // convert to screen
      const sx = rOffX + headX_900 * rScale;
      const sy = rOffY + headY_900 * rScale;
      // bubble size in screen pixels
      const bw = 100 * rScale, bh = 48 * rScale;
      const bx = sx + 14 * rScale, by = sy - (HEAD_R + 52) * rScale;

      ctx.save();
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.roundRect(bx + 2, by + 3, bw, bh, 10 * rScale); ctx.fill();
      // Bubble body — white card
      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.strokeStyle = 'rgba(200,150,80,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10 * rScale); ctx.fill(); ctx.stroke();
      // Tail pointing down-left
      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.beginPath();
      ctx.moveTo(bx + 10 * rScale, by + bh);
      ctx.lineTo(sx + 4 * rScale, by + bh + 12 * rScale);
      ctx.lineTo(bx + 24 * rScale, by + bh);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(200,150,80,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx + 10 * rScale, by + bh);
      ctx.lineTo(sx + 4 * rScale, by + bh + 12 * rScale);
      ctx.lineTo(bx + 24 * rScale, by + bh);
      ctx.stroke();
      // Order text
      ctx.fillStyle = '#2a1a08';
      ctx.font = `bold ${Math.round(13 * rScale)}px Microsoft YaHei`;
      ctx.fillText(c.order.emoji + ' ' + c.order.name, bx + 8 * rScale, by + 18 * rScale);
      // Patience bar track
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath(); ctx.roundRect(bx + 8 * rScale, by + 28 * rScale, 76 * rScale, 8 * rScale, 3 * rScale); ctx.fill();
      const pColor = c.patience > 0.5 ? '#44cc55' : c.patience > 0.25 ? '#ffaa22' : '#ff3333';
      const pG = ctx.createLinearGradient(bx + 8 * rScale, 0, bx + (8 + 76 * c.patience) * rScale, 0);
      pG.addColorStop(0, pColor); pG.addColorStop(1, shadeColor(pColor, 0.75));
      ctx.fillStyle = pG;
      ctx.beginPath(); ctx.roundRect(bx + 8 * rScale, by + 28 * rScale, 76 * c.patience * rScale, 8 * rScale, 3 * rScale); ctx.fill();
      ctx.restore();
    }
  }
}

function drawTable(t) {
  const { x, y, customer } = t;

  // Floor shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x, y + 52, 52, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Chair legs — warm wood
  for (const side of [-1, 1]) {
    const cx = x + side * 38;
    ctx.fillStyle = '#7a4818';
    ctx.fillRect(cx - 3, y + 28, 6, 24);
    ctx.fillStyle = 'rgba(255,200,120,0.2)';
    ctx.fillRect(cx - 1, y + 28, 2, 24);
  }

  // Table leg — single pedestal, wood
  ctx.fillStyle = '#8a5020';
  ctx.fillRect(x - 5, y + 22, 10, 30);
  ctx.fillStyle = 'rgba(255,200,100,0.2)';
  ctx.fillRect(x - 2, y + 22, 3, 30);

  // Chair seats — warm fabric cushion
  for (const side of [-1, 1]) {
    const cx = x + side * 38;
    const cy = y + 24;
    ctx.fillStyle = 'rgba(80,30,0,0.2)';
    ctx.beginPath(); ctx.ellipse(cx + 2, cy + 2, 14, 7, 0, 0, Math.PI * 2); ctx.fill();
    const chairG = ctx.createRadialGradient(cx - 4, cy - 2, 1, cx, cy, 14);
    chairG.addColorStop(0, '#c87840');
    chairG.addColorStop(1, '#8a4820');
    ctx.fillStyle = chairG;
    ctx.beginPath(); ctx.ellipse(cx, cy, 14, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(180,100,40,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(cx, cy, 14, 7, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,220,150,0.22)';
    ctx.beginPath(); ctx.ellipse(cx - 4, cy - 2, 6, 3, -0.3, 0, Math.PI * 2); ctx.fill();
  }

  // Table top shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x + 3, y + 23, 48, 20, 0, 0, Math.PI * 2); ctx.fill();

  // Table surface — light wood
  const tableG = ctx.createRadialGradient(x - 15, y + 8, 4, x, y + 20, 50);
  tableG.addColorStop(0, '#e8b870');
  tableG.addColorStop(0.5, '#c89448');
  tableG.addColorStop(1, '#a07030');
  ctx.fillStyle = tableG;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 47, 21, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,120,50,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 47, 21, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,230,160,0.22)';
  ctx.beginPath(); ctx.ellipse(x - 10, y + 14, 24, 8, -0.3, 0, Math.PI * 2); ctx.fill();
  // Plate
  ctx.fillStyle = 'rgba(255,248,235,0.9)';
  ctx.beginPath(); ctx.ellipse(x, y + 20, 11, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,80,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 11, 5, 0, 0, Math.PI * 2); ctx.stroke();

  if (customer) drawCustomer(customer, x, y + 50);
}

function drawCustomer(c, x, y) {
  // Origin (x,y) = customer feet center, in restaurant's 900×600 space
  ctx.save();
  ctx.translate(x, y);

  const style = c.style || 'business';
  const STYLES = {
    business: { shirt: '#3a6fd8', pants: '#1a2a4a', skin: '#f5c89a', hair: '#1a1a1a' },
    casual:   { shirt: '#e05030', pants: '#4a7ac8', skin: '#f0b87a', hair: '#6a3a10' },
    lady:     { shirt: '#d04080', pants: '#d04080', skin: '#fad0a0', hair: '#cc2266' },
    old:      { shirt: '#708060', pants: '#506050', skin: '#e8c090', hair: '#cccccc' },
  };
  const S = STYLES[style] || STYLES.business;

  const HEAD_R = 18, BODY_W = 28, BODY_H = 34;
  const ARM_W = 10, ARM_H = 22, LEG_W = 10, LEG_H = 18;

  // ── 腿 + 鞋 ──
  for (const side of [-1, 1]) {
    const lx = side * 7;
    // 腿
    ctx.fillStyle = S.pants;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(lx - LEG_W / 2, -LEG_H, LEG_W, LEG_H, 4);
    ctx.fill(); ctx.stroke();
    // 鞋
    ctx.fillStyle = '#2a1a0a';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(lx + side * 3, -2, 9, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  }

  // ── 身体 ──
  const bodyG = ctx.createLinearGradient(-BODY_W / 2, -LEG_H - BODY_H, BODY_W / 2, -LEG_H);
  bodyG.addColorStop(0, shadeColor(S.shirt, 1.25));
  bodyG.addColorStop(1, shadeColor(S.shirt, 0.7));
  ctx.fillStyle = bodyG;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-BODY_W / 2, -LEG_H - BODY_H, BODY_W, BODY_H, [8, 8, 4, 4]);
  ctx.fill(); ctx.stroke();

  // 衣领高光
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(-BODY_W / 2 + 3, -LEG_H - BODY_H + 3, BODY_W - 6, 12, 5);
  ctx.fill();

  // ── 手臂 ──
  for (const side of [-1, 1]) {
    const ax = side * (BODY_W / 2 + ARM_W / 2 - 1);
    // Eating animation: right arm (side=1) lifts up and down while served
    let armAngle = 0;
    let armOffY = 0;
    if (c.state === 'served' && side === 1) {
      // Raise right arm rhythmically: chopstick/fork motion
      armOffY = -Math.abs(Math.sin((c.eatPhase || 0) * 0.8)) * 14;
    }
    const armG = ctx.createLinearGradient(ax - ARM_W / 2, 0, ax + ARM_W / 2, 0);
    armG.addColorStop(0, shadeColor(S.shirt, side < 0 ? 1.1 : 0.75));
    armG.addColorStop(1, shadeColor(S.shirt, side < 0 ? 0.75 : 1.1));
    ctx.fillStyle = armG;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(ax - ARM_W / 2, -LEG_H - BODY_H + 4 + armOffY, ARM_W, ARM_H, 5);
    ctx.fill(); ctx.stroke();
    // 手
    ctx.fillStyle = S.skin;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(ax, -LEG_H - BODY_H + 4 + ARM_H + 5 + armOffY, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Chopsticks in right hand when eating
    if (c.state === 'served' && side === 1) {
      ctx.strokeStyle = '#c89050';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      const hy = -LEG_H - BODY_H + 4 + ARM_H + armOffY - 2;
      ctx.beginPath(); ctx.moveTo(ax - 2, hy); ctx.lineTo(ax, hy - 18); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ax + 2, hy); ctx.lineTo(ax + 5, hy - 16); ctx.stroke();
    }
  }

  // ── 裙摆（lady 专用，盖在腿上） ──
  if (style === 'lady') {
    const skirtG = ctx.createLinearGradient(0, -LEG_H - 6, 0, -2);
    skirtG.addColorStop(0, shadeColor(S.pants, 1.1));
    skirtG.addColorStop(1, shadeColor(S.pants, 0.7));
    ctx.fillStyle = skirtG;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-BODY_W / 2, -LEG_H - 6);
    ctx.lineTo(-BODY_W / 2 - 8, -2);
    ctx.lineTo(BODY_W / 2 + 8, -2);
    ctx.lineTo(BODY_W / 2, -LEG_H - 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  // ── 头部 ──
  const headY = -LEG_H - BODY_H - HEAD_R + 4;
  const headG = ctx.createRadialGradient(-5, headY - 6, 2, 0, headY, HEAD_R);
  headG.addColorStop(0, shadeColor(S.skin, 1.2));
  headG.addColorStop(1, shadeColor(S.skin, 0.85));
  ctx.fillStyle = headG;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, headY, HEAD_R, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // ── 头发 ──
  ctx.fillStyle = S.hair;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.5;
  if (style === 'lady') {
    // 长发：头顶弧 + 两侧垂发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(side * (HEAD_R - 2), headY + 10, 6, 16, side * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (style === 'old') {
    // 稀疏白发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI * 1.1, Math.PI * 1.9);
    ctx.fill(); ctx.stroke();
  } else {
    // 普通短发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.lineTo(HEAD_R * 0.7, headY + 4);
    ctx.lineTo(-HEAD_R * 0.7, headY + 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  // 发丝高光
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(-5, headY - HEAD_R + 5, 7, 3, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── 眼睛（卡通大眼） ──
  for (const side of [-1, 1]) {
    const ex = side * 7, ey = headY - 2;
    // 眼白
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // 虹膜
    const irisColor = style === 'casual' ? '#4a7a30' : style === 'lady' ? '#6644cc' : '#3355aa';
    ctx.fillStyle = irisColor;
    ctx.beginPath();
    ctx.ellipse(ex, ey + 1, 4, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 瞳孔
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(ex, ey + 1, 2.5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(ex + 1.5, ey - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex - 1, ey + 1.5, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 嘴 ──
  ctx.strokeStyle = 'rgba(80,20,20,0.8)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  if (c.patience > 0.5) {
    // 微笑
    ctx.beginPath();
    ctx.arc(0, headY + 8, 7, 0.25, Math.PI - 0.25);
    ctx.stroke();
    // 嘴角酒窝
    ctx.fillStyle = 'rgba(200,100,100,0.3)';
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(side * 7, headY + 10, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (c.patience > 0.2) {
    // 平嘴
    ctx.beginPath();
    ctx.moveTo(-5, headY + 9);
    ctx.lineTo(5, headY + 9);
    ctx.stroke();
  } else {
    // 皱眉 + 下弯嘴
    ctx.beginPath();
    ctx.arc(0, headY + 14, 7, Math.PI + 0.25, -0.25);
    ctx.stroke();
    // 皱眉线
    ctx.strokeStyle = 'rgba(80,40,0,0.6)';
    ctx.lineWidth = 1.5;
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(side * 3, headY - 8);
      ctx.lineTo(side * 8, headY - 12);
      ctx.stroke();
    }
  }

  // ── 装饰 ──
  if (style === 'business') {
    // 领带
    ctx.fillStyle = '#cc2222';
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, -LEG_H - BODY_H + 14);
    ctx.lineTo(3, -LEG_H - BODY_H + 14);
    ctx.lineTo(5, -LEG_H - BODY_H + 28);
    ctx.lineTo(0, -LEG_H - BODY_H + 34);
    ctx.lineTo(-5, -LEG_H - BODY_H + 28);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if (style === 'casual') {
    // 棒球帽
    ctx.fillStyle = shadeColor(S.shirt, 0.85);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    // 帽檐
    ctx.beginPath();
    ctx.ellipse(HEAD_R * 0.3, headY, HEAD_R * 1.25, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // 帽徽
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★', 0, headY - HEAD_R / 2);
    ctx.textAlign = 'left';
  } else if (style === 'old') {
    // 胡须
    ctx.fillStyle = '#cccccc';
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, headY + 12, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(150,150,150,0.6)';
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 3, headY + 7);
      ctx.lineTo(i * 3.5, headY + 18);
      ctx.stroke();
    }
  }


  // ── 已上菜：大笑嘴 + 桌上食物 ──
  if (c.state === 'served') {
    // Cover the patience-based mouth drawn above with skin color
    ctx.fillStyle = S.skin;
    ctx.beginPath(); ctx.ellipse(0, headY + 11, 11, 9, 0, 0, Math.PI * 2); ctx.fill();

    // Big open happy mouth
    ctx.strokeStyle = 'rgba(80,20,20,0.85)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, headY + 12, 9, 0.1, Math.PI - 0.1);
    ctx.stroke();
    ctx.fillStyle = '#3a0808';
    ctx.beginPath();
    ctx.arc(0, headY + 12, 7.5, 0.2, Math.PI - 0.2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, headY + 9, 12, 4);
    // Rosy cheeks
    ctx.fillStyle = 'rgba(255,120,120,0.22)';
    ctx.beginPath(); ctx.ellipse(-11, headY + 8, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11, headY + 8, 6, 4, 0, 0, Math.PI * 2); ctx.fill();

    // Food on plate at table surface
    const foodY = -LEG_H - 4;
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath(); ctx.ellipse(1, foodY + 6, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(180,140,80,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(0, foodY + 4, 15, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    const foodBob = Math.sin((c.eatPhase || 0) * 0.8) * 1.5;
    ctx.font = '15px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.servedEmoji || '🍣', 0, foodY - 3 + foodBob);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  ctx.restore();
}
