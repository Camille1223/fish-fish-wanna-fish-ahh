<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海捕鱼 & 寿司店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
  #gameCanvas { display: block; cursor: crosshair; }
  #ui { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 900px; pointer-events: none; }
  .hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
  .hud-item { background: rgba(0,0,30,0.7); border: 1px solid rgba(100,200,255,0.4); border-radius: 8px; padding: 6px 12px; color: #7ef; font-size: 13px; }
  .oxygen-bar { width: 120px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(100,200,255,0.4); }
  .oxygen-fill { height: 100%; background: linear-gradient(90deg, #00aaff, #00ffcc); border-radius: 6px; transition: width 0.3s; }
  #msgBox { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,50,0.9); border: 2px solid #7ef; border-radius: 12px; padding: 10px 24px; color: #fff; font-size: 16px; display: none; text-align: center; pointer-events: none; }
  #sharkHint { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); color: #ff4; font-size: 14px; font-weight: bold; display: none; text-shadow: 0 0 8px #fa0; pointer-events: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="hud" id="fishingHud">
    <div class="hud-item">🏆 <span id="score">0</span></div>
    <div class="hud-item">💰 <span id="coins">0</span></div>
    <div class="hud-item" style="display:flex;align-items:center;gap:6px;">
      🫧 <div class="oxygen-bar"><div class="oxygen-fill" id="oxyBar" style="width:100%"></div></div>
    </div>
    <div class="hud-item">🎒 <span id="storage">0</span>/20</div>
    <div class="hud-item" style="color:#adf;">区域: <span id="zoneName">浅海</span></div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#ffe;border-color:#ffe;" onclick="goAshore()">🏖️ 上岸 [E]</div>
  </div>
  <div class="hud" id="restaurantHud" style="display:none;">
    <div class="hud-item">💰 <span id="coins2">0</span></div>
    <div class="hud-item">😊 满意度: <span id="satisfaction">100</span>%</div>
    <div class="hud-item">📦 仓库: <span id="storageCount">0</span>条</div>
    <div class="hud-item" style="pointer-events:all;cursor:pointer;color:#8ff;border-color:#8ff;" onclick="goDiving()">🤿 再次潜水</div>
  </div>
  <div id="msgBox"></div>
  <div id="sharkHint">🦈 快速点击鲨鱼 3 次！</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

// ============ GAME STATE ============
const GS = {
  scene: 'fishing', // 'fishing' | 'restaurant' | 'transition'
  score: 0,
  coins: 0,
  satisfaction: 100,
  oxygen: 100,
  oxygenMax: 100,
  warehouse: [], // {type, name, emoji, value}
  warehouseMax: 20,
  time: 0,
  zone: 0, // 0=浅海 1=珊瑚礁 2=深海
  zoneTimer: 0,
  weather: 'normal', // normal | current | dark
  weatherTimer: 0,
  restaurantLevel: 1,
  tables: [],
  preparingDish: null, // currently selected fish for serving
  satisfaction: 100,
  msgTimer: 0,
  sharkHintTimer: 0
};

// ============ FISH TYPES ============
const FISH_TYPES = [
  { type: 'clownfish', name: '小丑鱼', emoji: '🐠', color: '#ff6b35', bodyColor: '#ff8c42', speed: 0.8, score: 10, value: 15, size: 16, clicks: 1, rarity: 0.25 },
  { type: 'tuna',      name: '金枪鱼', emoji: '🐟', color: '#4a90d9', bodyColor: '#5ba3e8', speed: 1.4, score: 30, value: 45, size: 22, clicks: 1, rarity: 0.2 },
  { type: 'salmon',    name: '三文鱼', emoji: '🐡', color: '#e07b54', bodyColor: '#f09b74', speed: 1.2, score: 40, value: 60, size: 20, clicks: 1, rarity: 0.18 },
  { type: 'puffer',    name: '河豚',   emoji: '🐡', color: '#a8c256', bodyColor: '#c8e276', speed: 1.0, score: 50, value: 80, size: 18, clicks: 1, rarity: 0.15, wobble: true },
  { type: 'crab',      name: '螃蟹',   emoji: '🦀', color: '#d94f3d', bodyColor: '#f06050', speed: 0.7, score: 60, value: 90, size: 19, clicks: 2, rarity: 0.12, sideways: true },
  { type: 'shark',     name: '大鲨鱼', emoji: '🦈', color: '#557799', bodyColor: '#6688aa', speed: 2.5, score: 200, value: 300, size: 40, clicks: 3, rarity: 0.1, escapes: true }
];

const SUSHI_MENU = [
  { name: '金枪鱼寿司', fishType: 'tuna',      price: 80,  emoji: '🍣' },
  { name: '三文鱼寿司', fishType: 'salmon',    price: 100, emoji: '🍣' },
  { name: '螃蟹手卷',   fishType: 'crab',      price: 120, emoji: '🌯' },
  { name: '河豚刺身',   fishType: 'puffer',    price: 150, emoji: '🍱' },
  { name: '鲨鱼大餐',   fishType: 'shark',     price: 500, emoji: '🎌' },
  { name: '小丑鱼汤',   fishType: 'clownfish', price: 50,  emoji: '🍜' }
];

// ============ ENTITIES ============
let diver = { x: 450, y: 350, vx: 0, vy: 0, dir: 1, bubbles: [], animTime: 0 };
let fishes = [];
let bubbles = [];
let decorations = [];
let particles = [];
let customers = [];
let floatingTexts = [];
let transitionProgress = 0;
let sharkClickState = {}; // fishId -> {count, timer}

// ============ ZONES ============
const ZONES = [
  { name: '浅海', bgTop: '#1a6a9a', bgBot: '#0d3d6b', light: 0.9, fishBonus: 1.0 },
  { name: '珊瑚礁', bgTop: '#0e5c7a', bgBot: '#0a3050', light: 0.7, fishBonus: 1.3 },
  { name: '深海', bgTop: '#061828', bgBot: '#020a14', light: 0.4, fishBonus: 1.8 }
];

// ============ CORAL / SEAWEED GENERATION ============
function generateDecorations() {
  decorations = [];
  const z = GS.zone;
  for (let i = 0; i < 12; i++) {
    const x = Math.random() * 900;
    decorations.push({ type: 'seaweed', x, y: 600, height: 40 + Math.random() * 80, phase: Math.random() * Math.PI * 2, color: z === 2 ? '#1a4a2a' : '#2d8a4a' });
  }
  if (z >= 1) {
    for (let i = 0; i < 8; i++) {
      decorations.push({ type: 'coral', x: Math.random() * 900, y: 570 + Math.random() * 20, size: 20 + Math.random() * 30, color: z === 1 ? '#ff6b9d' : '#8855ff' });
    }
  }
  for (let i = 0; i < 6; i++) {
    decorations.push({ type: 'rock', x: Math.random() * 900, y: 560 + Math.random() * 30, size: 15 + Math.random() * 25, color: '#445566' });
  }
}

function spawnFish() {
  if (fishes.length >= 18) return;
  const zone = ZONES[GS.zone];
  const r = Math.random();
  let cumulative = 0;
  let type = FISH_TYPES[0];
  for (const ft of FISH_TYPES) {
    cumulative += ft.rarity;
    if (r < cumulative) { type = ft; break; }
  }
  const side = Math.random() < 0.5 ? -1 : 1;
  const spd = type.speed * zone.fishBonus * (0.8 + Math.random() * 0.4);
  fishes.push({
    id: Math.random().toString(36).substr(2),
    ...type,
    x: side < 0 ? -60 : 960,
    y: 80 + Math.random() * 450,
    vx: side * spd,
    vy: (Math.random() - 0.5) * 0.5,
    phase: Math.random() * Math.PI * 2,
    hp: type.clicks,
    maxHp: type.clicks,
    scared: false,
    scaredTimer: 0
  });
}

// ============ BUBBLES ============
function spawnBubble(x, y) {
  bubbles.push({ x, y, r: 3 + Math.random() * 5, vy: -(0.5 + Math.random() * 1.5), life: 1.0, dx: (Math.random() - 0.5) * 0.4 });
}

// ============ DRAW FUNCTIONS ============
function drawBackground() {
  const z = ZONES[GS.zone];
  const darkMult = GS.weather === 'dark' ? 0.4 : 1.0;
  const grad = ctx.createLinearGradient(0, 0, 0, 600);
  grad.addColorStop(0, shadeColor(z.bgTop, darkMult));
  grad.addColorStop(1, shadeColor(z.bgBot, darkMult));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 900, 600);

  // Light rays in shallow zone
  if (GS.zone === 0 && GS.weather !== 'dark') {
    ctx.save();
    for (let i = 0; i < 5; i++) {
      const rx = 100 + i * 180 + Math.sin(GS.time * 0.5 + i) * 20;
      const grad2 = ctx.createLinearGradient(rx, 0, rx + 40, 600);
      grad2.addColorStop(0, 'rgba(255,255,255,0.04)');
      grad2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      ctx.moveTo(rx, 0);
      ctx.lineTo(rx + 50, 600);
      ctx.lineTo(rx - 10, 600);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // Current indicator
  if (GS.weather === 'current') {
    ctx.save();
    ctx.fillStyle = 'rgba(100,200,255,0.12)';
    for (let i = 0; i < 8; i++) {
      const cx = ((GS.time * 80 + i * 120) % 1100) - 100;
      const cy = 100 + i * 60;
      ctx.font = '28px serif';
      ctx.fillText('〜', cx, cy);
    }
    ctx.restore();
  }

  // Sand bottom
  const sandGrad = ctx.createLinearGradient(0, 555, 0, 600);
  sandGrad.addColorStop(0, GS.zone === 2 ? '#111a22' : '#c8a060');
  sandGrad.addColorStop(1, GS.zone === 2 ? '#080e14' : '#a07840');
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, 580);
  for (let x = 0; x <= 900; x += 30) {
    ctx.lineTo(x, 565 + Math.sin(x * 0.05 + GS.time * 0.2) * 8);
  }
  ctx.lineTo(900, 600); ctx.lineTo(0, 600);
  ctx.closePath();
  ctx.fill();
}

function shadeColor(hex, mult) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*mult)},${Math.round(g*mult)},${Math.round(b*mult)})`;
}

function drawDecorations() {
  for (const d of decorations) {
    if (d.type === 'seaweed') {
      const sway = Math.sin(GS.time * 1.5 + d.phase) * 10;
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.quadraticCurveTo(d.x + sway, d.y - d.height * 0.5, d.x + sway * 1.5, d.y - d.height);
      ctx.stroke();
    } else if (d.type === 'coral') {
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.arc(d.x - d.size * 0.4, d.y + 5, d.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x + d.size * 0.4, d.y + 8, d.size * 0.25, 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 'rock') {
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#556677';
      ctx.beginPath();
      ctx.ellipse(d.x - 5, d.y - 5, d.size * 0.5, d.size * 0.3, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawFish(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  const scaleX = f.vx < 0 ? -1 : 1;
  ctx.scale(scaleX, 1);

  // wobble for puffer
  const wobbleScale = f.wobble ? 1 + Math.sin(GS.time * 3 + f.phase) * 0.15 : 1;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const w = f.size, h = f.size * 0.6;

  // Shark - special draw
  if (f.type === 'shark') {
    ctx.fillStyle = f.scared ? '#aab' : f.bodyColor;
    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // fin
    ctx.fillStyle = f.scared ? '#889' : f.color;
    ctx.beginPath();
    ctx.moveTo(-5, -h);
    ctx.lineTo(10, -h - 18);
    ctx.lineTo(20, -h);
    ctx.closePath();
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 15, -12);
    ctx.lineTo(-w - 15, 12);
    ctx.closePath();
    ctx.fill();
    // eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(w * 0.4, -3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.4 + 1, -4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // teeth
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(w * 0.7, 3);
    ctx.lineTo(w * 0.8, 8);
    ctx.lineTo(w * 0.9, 3);
    ctx.fill();
    // HP bar for shark
    if (f.hp < f.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(-w, h + 4, w * 2, 6);
      ctx.fillStyle = '#f44';
      ctx.fillRect(-w, h + 4, w * 2 * (f.hp / f.maxHp), 6);
    }
  } else if (f.type === 'crab') {
    // crab body
    ctx.fillStyle = f.bodyColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // claws
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(-w - 5, -5, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w + 5, -5, 8, 0, Math.PI * 2);
    ctx.fill();
    // legs
    for (let i = -1; i <= 1; i += 1) {
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(i * 10, h);
      ctx.lineTo(i * 14, h + 12);
      ctx.stroke();
    }
    // eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-8, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -5, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Generic fish body
    ctx.fillStyle = f.bodyColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // Fin
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.moveTo(-2, -h);
    ctx.lineTo(6, -h - 10);
    ctx.lineTo(14, -h);
    ctx.closePath();
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 10, -8);
    ctx.lineTo(-w - 10, 8);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.5, -2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(w * 0.5 + 1, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Stripe for clownfish
    if (f.type === 'clownfish') {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -h); ctx.lineTo(0, h);
      ctx.stroke();
    }
    // Spikes for puffer
    if (f.type === 'puffer') {
      for (let a = 0; a < Math.PI * 2; a += 0.7) {
        ctx.strokeStyle = '#9a0';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * w, Math.sin(a) * h);
        ctx.lineTo(Math.cos(a) * (w + 5), Math.sin(a) * (h + 5));
        ctx.stroke();
      }
    }
    // Salmon stripe
    if (f.type === 'salmon') {
      ctx.strokeStyle = '#ff8060';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-w * 0.6, 0);
      ctx.lineTo(w * 0.6, 0);
      ctx.stroke();
    }
  }
  ctx.restore();

  // catch progress dots for multi-click fish
  if (f.maxHp > 1) {
    const sc = sharkClickState[f.id];
    if (sc && sc.count > 0) {
      for (let i = 0; i < f.maxHp; i++) {
        ctx.beginPath();
        ctx.arc(f.x - 10 + i * 12, f.y - f.size - 14, 5, 0, Math.PI * 2);
        ctx.fillStyle = i < sc.count ? '#ff4' : 'rgba(255,255,255,0.3)';
        ctx.fill();
      }
    }
  }
}

function drawDiver() {
  const d = diver;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(d.dir, 1);

  // swim bob
  const bob = Math.sin(GS.time * 2) * 3;

  // Oxygen tank (back)
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.roundRect(-28, -20 + bob, 16, 34, 5);
  ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.beginPath();
  ctx.roundRect(-26, -18 + bob, 12, 20, 3);
  ctx.fill();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-20, -5 + bob); ctx.lineTo(-12, -5 + bob);
  ctx.stroke();

  // Body (big blue blob)
  const bodyGrad = ctx.createRadialGradient(-5, -5 + bob, 5, 0, 0 + bob, 26);
  bodyGrad.addColorStop(0, '#5bc8f0');
  bodyGrad.addColorStop(1, '#1a7ab8');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 26, 28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wetsuit lines
  ctx.strokeStyle = '#1560a0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-15, -10 + bob); ctx.lineTo(-20, 10 + bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(15, -10 + bob); ctx.lineTo(20, 10 + bob);
  ctx.stroke();

  // Mask
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.ellipse(4, -14 + bob, 15, 11, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(100,200,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(4, -15 + bob, 13, 9, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Eyes through mask
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, -15 + bob, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -15 + bob, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-2, -15 + bob, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -15 + bob, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Snorkel tube
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(18, -36); ctx.lineTo(22, -36);
  ctx.stroke();

  // Flippers
  ctx.fillStyle = '#f80';
  const flipperX = Math.sin(GS.time * 3) * 8;
  ctx.beginPath();
  ctx.ellipse(-10 + flipperX, 32 + bob, 12, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 - flipperX, 32 + bob, 12, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Arms
  ctx.fillStyle = '#1a7ab8';
  ctx.beginPath();
  ctx.ellipse(-24, 5 + bob, 7, 14, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(24, 5 + bob, 7, 14, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Diver bubbles
  for (const b of d.bubbles) {
    ctx.save();
    ctx.globalAlpha = b.life;
    ctx.strokeStyle = 'rgba(200,240,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ============ RESTAURANT DRAWING ============
function drawRestaurant() {
  // Background - beach/restaurant scene
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 250);
  skyGrad.addColorStop(0, '#87ceeb');
  skyGrad.addColorStop(1, '#b8e4f7');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 900, 250);

  // Sun
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.arc(820, 60, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ffdd44';
  ctx.lineWidth = 3;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
    ctx.beginPath();
    ctx.moveTo(820 + Math.cos(a) * 48, 60 + Math.sin(a) * 48);
    ctx.lineTo(820 + Math.cos(a) * 58, 60 + Math.sin(a) * 58);
    ctx.stroke();
  }

  // Ocean bg
  const seaGrad = ctx.createLinearGradient(0, 180, 0, 250);
  seaGrad.addColorStop(0, '#1a8cb8');
  seaGrad.addColorStop(1, '#0d5a80');
  ctx.fillStyle = seaGrad;
  ctx.fillRect(0, 180, 900, 70);
  // Waves
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;

function drawTable(t) {
  const { x, y, customer } = t;
  // Table
  ctx.fillStyle = '#8b6040';
  ctx.beginPath();
  ctx.ellipse(x, y + 20, 45, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6b4020';
  ctx.beginPath();
  ctx.rect(x - 5, y + 20, 10, 25);
  ctx.fill();

  // Chairs
  ctx.fillStyle = '#5a3818';
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath();
    ctx.arc(x + i * 38, y + 22, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  if (customer) {
    drawCustomer(customer, x, y - 20);
  }
}

function drawCustomer(c, x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = c.color || '#f4c88a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = c.skinColor || '#f8d9a0';
  ctx.beginPath();
  ctx.arc(0, -28, 14, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = c.hairColor || '#333';
  ctx.beginPath();
  ctx.arc(0, -36, 14, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-5, -30, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5, -30, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Smile or impatient
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  if (c.patience > 0.5) {
    ctx.beginPath();
    ctx.arc(0, -23, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(0, -18, 5, Math.PI + 0.2, -0.2);
    ctx.stroke();
  }

  // Order bubble
  if (c.order && c.state === 'waiting') {
    const bw = 90, bh = 40;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.roundRect(10, -90, bw, bh, 8);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, -90, bw, bh);
    // Triangle
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.moveTo(15, -50); ctx.lineTo(5, -42); ctx.lineTo(25, -50);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = '13px Microsoft YaHei';
    ctx.fillText(c.order.emoji + ' ' + c.order.name, 16, -70);

    // Patience bar
    ctx.fillStyle = '#ddd';
    ctx.fillRect(16, -58, 70, 6);
    const patienceColor = c.patience > 0.5 ? '#4c4' : c.patience > 0.25 ? '#fa4' : '#f44';
    ctx.fillStyle = patienceColor;
    ctx.fillRect(16, -58, 70 * c.patience, 6);
  }

  if (c.state === 'served') {
    ctx.font = '20px serif';
    ctx.fillText('😊', -10, -55);
  }

  ctx.restore();
}

// ============ FLOATING TEXTS ============
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#ff4', life: 1.0, vy: -1.5 });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

// ============ TRANSITION ============
function drawTransition() {
  const p = transitionProgress;
  if (GS.scene === 'toshore') {
    // Bubble rise effect
    ctx.fillStyle = `rgba(10,40,80,${p})`;
    ctx.fillRect(0, 0, 900, 600);
    for (let i = 0; i < 20; i++) {
      const bx = (i * 47 + GS.time * 30) % 900;
      const by = 600 - (600 * p) - i * 10 + Math.sin(i + GS.time) * 20;
      ctx.strokeStyle = `rgba(200,240,255,${Math.max(0, 1 - p)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 4 * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// ============ UPDATE ============
function updateFishing(dt) {
  GS.time += dt;
  GS.zoneTimer += dt;

  // Zone switch
  if (GS.zoneTimer > 30) {
    GS.zoneTimer = 0;
    GS.zone = (GS.zone + 1) % 3;
    generateDecorations();
    showMessage(`进入 ${ZONES[GS.zone].name}！`, 2000);
  }

  // Weather events
  GS.weatherTimer += dt;
  if (GS.weatherTimer > 20) {
    GS.weatherTimer = 0;
    const weathers = ['normal', 'normal', 'current', 'dark'];
    const oldWeather = GS.weather;
    GS.weather = weathers[Math.floor(Math.random() * weathers.length)];
    if (GS.weather !== oldWeather) {
      const msgs = { current: '🌊 洋流来了！鱼群变向！', dark: '🌑 暗流！视野变暗！', normal: '☀️ 海水恢复平静' };
      if (msgs[GS.weather]) showMessage(msgs[GS.weather], 2000);
    }
  }

  // Oxygen
  GS.oxygen -= dt * 4;
  if (GS.oxygen <= 0) {
    GS.oxygen = 0;
    showMessage('氧气耗尽！自动上岸！', 1500);
    startTransitionToShore();
  }
  document.getElementById('oxyBar').style.width = (GS.oxygen / GS.oxygenMax * 100) + '%';

  // Spawn fish
  if (Math.random() < dt * 0.8) spawnFish();

  // Update fish
  const currentDir = GS.weather === 'current' ? 1 : 0;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    f.phase += dt;

    // Shark AI - sense player and escape
    if (f.type === 'shark') {
      const dx = diver.x - f.x, dy = diver.y - f.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        f.scared = true;
        f.vx = f.vx - dx / dist * 0.3;
        f.vy = f.vy - dy / dist * 0.3;
      }
    }
    if (f.scaredTimer > 0) f.scaredTimer -= dt;
    else f.scared = false;

    // Wave motion
    f.vy += Math.sin(f.phase * 2) * 0.02;
    f.vy *= 0.98;

    // Current effect
    if (GS.weather === 'current') f.vx += currentDir * 0.05;

    f.x += f.vx;
    f.y += f.vy;

    // Boundary bounce
    if (f.y < 50) { f.y = 50; f.vy = Math.abs(f.vy); }
    if (f.y > 550) { f.y = 550; f.vy = -Math.abs(f.vy); }

    // Remove if off screen
    if (f.x < -100 || f.x > 1000) {
      fishes.splice(i, 1);
    }
  }

  // Shark click timeout
  for (const id in sharkClickState) {
    sharkClickState[id].timer -= dt;
    if (sharkClickState[id].timer <= 0) {
      delete sharkClickState[id];
    }
  }

  // Update diver bubbles
  if (Math.random() < dt * 3) {
    diver.bubbles.push({ x: diver.x + (diver.dir > 0 ? 18 : -18), y: diver.y - 30, r: 3 + Math.random() * 3, vy: -(0.8 + Math.random()), life: 1.0, dx: (Math.random() - 0.5) * 0.3 });
  }
  for (let i = diver.bubbles.length - 1; i >= 0; i--) {
    const b = diver.bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.life -= dt * 0.6;
    if (b.life <= 0) diver.bubbles.splice(i, 1);
  }

  // Update bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.r += 0.02;
    b.life -= dt * 0.8;
    if (b.life <= 0 || b.y < 0) bubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 1.2;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Message timer
  if (GS.msgTimer > 0) {
    GS.msgTimer -= dt * 1000;
    if (GS.msgTimer <= 0) document.getElementById('msgBox').style.display = 'none';
  }
  if (GS.sharkHintTimer > 0) {
    GS.sharkHintTimer -= dt * 1000;
    if (GS.sharkHintTimer <= 0) document.getElementById('sharkHint').style.display = 'none';
  }

  // Update HUD
  document.getElementById('score').textContent = GS.score;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('storage').textContent = GS.warehouse.length;
  document.getElementById('zoneName').textContent = ZONES[GS.zone].name;
}

function updateRestaurant(dt) {
  GS.time += dt;

  // Spawn customers
  if (GS.tables.length > 0 && Math.random() < dt * 0.3) {
    const emptyTable = GS.tables.find(t => !t.customer);
    if (emptyTable && GS.warehouse.length > 0) {
      const warehouseByType = {};
      for (const w of GS.warehouse) {
        warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
      }
      const availableDishes = SUSHI_MENU.filter(d => warehouseByType[d.fishType] > 0);
      if (availableDishes.length > 0) {
        const order = availableDishes[Math.floor(Math.random() * availableDishes.length)];
        emptyTable.customer = {
          color: ['#e8c090', '#d0a070', '#f8d0a0', '#c0a080'][Math.floor(Math.random() * 4)],
          skinColor: '#f8d9a0',
          hairColor: ['#333', '#664', '#882', '#555'][Math.floor(Math.random() * 4)],
          order,
          patience: 1.0,
          state: 'waiting',
          servedTimer: 0
        };
      }
    }
  }

  // Update customers
  for (const t of GS.tables) {
    if (t.customer) {
      const c = t.customer;
      if (c.state === 'waiting') {
        c.patience -= dt * 0.06;
        if (c.patience <= 0) {
          GS.satisfaction = Math.max(0, GS.satisfaction - 10);
          spawnFloatingText(t.x, t.y - 60, '-10 满意度 😡', '#f44');
          t.customer = null;
        }
      } else if (c.state === 'served') {
        c.servedTimer += dt;
        if (c.servedTimer > 2) t.customer = null;
      }
    }
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 0.8;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Update HUD
  document.getElementById('coins2').textContent = GS.coins;
  document.getElementById('satisfaction').textContent = GS.satisfaction;
  document.getElementById('storageCount').textContent = GS.warehouse.length;
}

// ============ INPUT ============
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'e' || e.key === 'E') {
    if (GS.scene === 'fishing') goAshore();
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousemove', e => {
  if (GS.scene !== 'fishing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (900 / rect.width);
  const my = (e.clientY - rect.top) * (600 / rect.height);
  const dx = mx - diver.x, dy = my - diver.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = GS.upgradeSpeed ? 3.5 : 2.8;
  if (dist > 5) {
    diver.vx = (dx / dist) * Math.min(speed, dist * 0.15);
    diver.vy = (dy / dist) * Math.min(speed, dist * 0.15);
    if (dx > 0) diver.dir = 1; else diver.dir = -1;
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (900 / rect.width);
  const my = (e.clientY - rect.top) * (600 / rect.height);

  if (GS.scene === 'fishing') {
    handleFishingClick(mx, my);
  } else if (GS.scene === 'restaurant') {
    handleRestaurantClick(mx, my);
  }
});

function handleFishingClick(mx, my) {
  if (GS.warehouse.length >= GS.warehouseMax) {
    showMessage('🎒 仓库已满！请上岸卸货', 2000);
    return;
  }

  let nearest = null, nearestDist = Infinity;
  for (const f of fishes) {
    const dx = mx - f.x, dy = my - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = f.size + 15 + (GS.upgradeNet ? 15 : 0);
    if (dist < hitRadius && dist < nearestDist) {
      nearest = f;
      nearestDist = dist;
    }
  }

  if (!nearest) {
    // Ripple effect
    for (let i = 0; i < 5; i++) {
      bubbles.push({ x: mx + (Math.random()-0.5)*20, y: my + (Math.random()-0.5)*20, r: 2, vy: -(0.5+Math.random()), life: 0.8, dx: (Math.random()-0.5)*0.5 });
    }
    return;
  }

  // Click effect
  for (let i = 0; i < 8; i++) {
    particles.push({ x: nearest.x, y: nearest.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 1.0, color: nearest.bodyColor });
  }

  if (nearest.clicks === 1) {
    // Instant catch
    catchFish(nearest);
  } else if (nearest.type === 'shark' || nearest.clicks > 1) {
    // Multi-click catch
    if (!sharkClickState[nearest.id]) {
      sharkClickState[nearest.id] = { count: 0, timer: 1.5 };
      document.getElementById('sharkHint').style.display = 'block';
      GS.sharkHintTimer = 1500;
    }
    sharkClickState[nearest.id].count++;
    sharkClickState[nearest.id].timer = 1.5;

    if (sharkClickState[nearest.id].count >= nearest.clicks) {
      delete sharkClickState[nearest.id];
      document.getElementById('sharkHint').style.display = 'none';
      // Shark tries to escape when at last click
      if (nearest.type === 'shark') {
        nearest.scared = true;
        nearest.scaredTimer = 99;
      }
      catchFish(nearest);
    } else {
      spawnFloatingText(nearest.x, nearest.y - 20, `${sharkClickState[nearest.id].count}/${nearest.clicks}`, '#ffa');
    }
  }
}

function catchFish(f) {
  const idx = fishes.indexOf(f);
  if (idx === -1) return;
  fishes.splice(idx, 1);

  GS.score += f.score;
  GS.warehouse.push({ type: f.type, name: f.name, emoji: f.emoji, value: f.value });
  spawnFloatingText(f.x, f.y - 10, `+${f.score} 分  ${f.emoji}`, '#7ff');
  showMessage(`捕获 ${f.emoji} ${f.name}！+${f.score}分`, 1200);

  // Splash particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: f.x, y: f.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1.0, color: '#7ef' });
  }
}

function handleRestaurantClick(mx, my) {
  // Check sell all button
  if (mx >= 15 && mx <= 95 && my >= 545 && my <= 570) {
    sellAll();
    return;
  }

  // Check fish items in warehouse (sell individual)
  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 410;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      // Sell button area
      if (mx >= 145 && mx <= 185 && my >= wy - 15 && my <= wy + 5) {
        // Sell one of this type
        const idx = GS.warehouse.findIndex(w => w.type === ft.type);
        if (idx !== -1) {
          const fish = GS.warehouse.splice(idx, 1)[0];
          GS.coins += fish.value;
          spawnFloatingText(165, wy - 20, `+${fish.value}💰`, '#ff4');
        }
        return;
      }
      // Select fish for serving
      if (mx >= 20 && mx <= 140 && my >= wy - 15 && my <= wy + 5) {
        GS.preparingDish = ft;
        spawnFloatingText(80, wy - 20, `选择: ${ft.name}`, '#adf');
        return;
      }
      wy += 22;
    }
  }

  // Check upgrade buttons
  const upgrades = [
    { x: 295, y: 543, w: 140, h: 40, cost: 200, action: 'net' },
    { x: 450, y: 543, w: 140, h: 40, cost: 300, action: 'speed' },
    { x: 605, y: 543, w: 140, h: 40, cost: 500, action: 'table' }
  ];
  for (const u of upgrades) {
    if (mx >= u.x && mx <= u.x + u.w && my >= u.y && my <= u.y + u.h) {
      if (GS.coins >= u.cost) {
        GS.coins -= u.cost;
        if (u.action === 'net') { GS.upgradeNet = true; showMessage('🎣 渔网已升级！捕鱼范围扩大！', 2000); }
        if (u.action === 'speed') { GS.upgradeSpeed = true; showMessage('🏃 潜水员速度提升！', 2000); }
        if (u.action === 'table') {
          if (GS.tables.length < 4) {
            addTable();
            showMessage('🏠 新桌位开放！可接待更多顾客！', 2000);
          } else {
            showMessage('餐厅已满员！', 1500);
          }
        }
      } else {
        showMessage(`💰 金币不足！需要 ${u.cost} 金币`, 1500);
      }
      return;
    }
  }

  // Serve customer - click on table with customer
  if (GS.preparingDish) {
    for (const t of GS.tables) {
      if (!t.customer) continue;
      const c = t.customer;
      const dx = mx - t.x, dy = my - t.y;
      if (Math.sqrt(dx*dx + dy*dy) < 60 && c.state === 'waiting') {
        if (c.order.fishType === GS.preparingDish.type) {
          // Serve!
          const idx = GS.warehouse.findIndex(w => w.type === GS.preparingDish.type);
          if (idx !== -1) {
            GS.warehouse.splice(idx, 1);
            const tip = Math.floor(c.patience > 0.7 ? c.order.price * 1.2 : c.order.price);
            GS.coins += tip;
            GS.score += Math.floor(c.order.price / 5);
            c.state = 'served';
            GS.preparingDish = null;
            if (c.patience > 0.8) {
              GS.satisfaction = Math.min(100, GS.satisfaction + 5);
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰 😊 快速服务！`, '#ff4');
            } else {
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰`, '#ff4');
            }
          } else {
            showMessage('仓库里没有这种鱼了！', 1500);
            GS.preparingDish = null;
          }
        } else {
          spawnFloatingText(t.x, t.y - 80, '❌ 食材不对！', '#f44');
        }
        return;
      }
    }
  }
}

function sellAll() {
  if (GS.warehouse.length === 0) { showMessage('仓库是空的！', 1500); return; }
  let total = 0;
  for (const f of GS.warehouse) total += f.value;
  GS.coins += total;
  GS.warehouse = [];
  spawnFloatingText(55, 535, `+${total}💰 全部出售！`, '#ff4');
  showMessage(`出售所有鱼类！+${total} 金币`, 2000);
}

function addTable() {
  const positions = [
    { x: 220, y: 420 }, { x: 420, y: 420 }, { x: 620, y: 420 }, { x: 820, y: 420 }
  ];
  if (GS.tables.length < positions.length) {
    GS.tables.push({ ...positions[GS.tables.length], customer: null });
  }
}

// ============ SCENE TRANSITIONS ============
function goAshore() {
  if (GS.scene !== 'fishing') return;
  GS.scene = 'toshore';
  transitionProgress = 0;
}

window.goAshore = goAshore;

function goDiving() {
  if (GS.scene !== 'restaurant') return;
  GS.scene = 'todive';
  transitionProgress = 0;
  GS.preparingDish = null;
}

window.goDiving = goDiving;

function startTransitionToShore() {
  GS.scene = 'toshore';
  transitionProgress = 0;
}

// ============ MESSAGE ============
function showMessage(text, duration) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.style.display = 'block';
  GS.msgTimer = duration;
}

// ============ GAME LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, 900, 600);

  if (GS.scene === 'fishing') {
    document.getElementById('fishingHud').style.display = 'flex';
    document.getElementById('restaurantHud').style.display = 'none';

    drawBackground();
    drawDecorations();

    // Draw bubbles
    for (const b of bubbles) {
      ctx.save();
      ctx.globalAlpha = b.life * 0.7;
      ctx.strokeStyle = 'rgba(200,240,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Draw particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color || '#7ef';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (const f of fishes) drawFish(f);
    drawDiver();
    drawFloatingTexts();

    // Update diver position
    diver.x += diver.vx;
    diver.y += diver.vy;
    diver.vx *= 0.85;
    diver.vy *= 0.85;
    diver.x = Math.max(30, Math.min(870, diver.x));
    diver.y = Math.max(30, Math.min(540, diver.y));

    updateFishing(dt);

  } else if (GS.scene === 'toshore') {
    drawBackground();
    drawDecorations();
    for (const f of fishes) drawFish(f);
    drawDiver();

    transitionProgress += dt * 1.5;
    drawTransition();

    if (transitionProgress >= 1) {
      GS.scene = 'restaurant';
      GS.oxygen = GS.oxygenMax;
      if (GS.tables.length === 0) { addTable(); addTable(); }
      document.getElementById('oxyBar').style.width = '100%';
      showMessage('欢迎回到岸上！经营你的寿司店吧！', 3000);
    }

  } else if (GS.scene === 'todive') {
    drawRestaurant();
    transitionProgress += dt * 1.5;

    ctx.fillStyle = `rgba(0,30,80,${transitionProgress})`;
    ctx.fillRect(0, 0, 900, 600);

    if (transitionProgress >= 1) {
      GS.scene = 'fishing';
      generateDecorations();
      showMessage('🤿 再次潜入深海！', 2000);
    }

  } else if (GS.scene === 'restaurant') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'flex';

    drawRestaurant();
    drawFloatingTexts();

    // Show currently selected dish
    if (GS.preparingDish) {
      ctx.fillStyle = 'rgba(255,220,0,0.15)';
      ctx.fillRect(0, 0, 900, 600);
      ctx.fillStyle = '#ff4';
      ctx.font = 'bold 16px Microsoft YaHei';
      ctx.fillText(`正在准备: ${GS.preparingDish.emoji} ${GS.preparingDish.name} — 点击顾客桌子上菜！`, 200, 350);
    }

    updateRestaurant(dt);
  }

  requestAnimationFrame(loop);
}

// ============ INIT ============
function init() {
  generateDecorations();
  for (let i = 0; i < 8; i++) spawnFish();
  showMessage('🤿 欢迎来到深海捕鱼！移动鼠标控制潜水员，点击鱼来捕获！', 4000);
  requestAnimationFrame(loop);
}

init();
</script>
