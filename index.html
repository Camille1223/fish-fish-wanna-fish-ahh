  ctx.shadowBlur = 0;
  applyDepthHaze(fz, w * 1.2, h * 1.6);

  ctx.restore();

  // 多击进度指示
  if (f.maxHp > 1) {
    const sc = sharkClickState[f.id];
    if (sc && sc.count > 0) {
      for (let i = 0; i < f.maxHp; i++) {
        const dotX = f.x - 10 + i * 13;
        const dotY = f.y - f.size - 16;
        ctx.beginPath();
        ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
        ctx.fillStyle = i < sc.count ? '#ff4' : 'rgba(255,255,255,0.25)';
        ctx.fill();
        if (i < sc.count) {
          ctx.strokeStyle = 'rgba(255,200,0,0.6)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
  }
}

function drawDiver() {
  const d = diver;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(d.dir, 1);

  const bob = Math.sin(GS.time * 2) * 3;

  // 地面投影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 50, 28, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 氧气罐(金属质感)
  const tankG = ctx.createLinearGradient(-30, 0, -10, 0);
  tankG.addColorStop(0, '#555');
  tankG.addColorStop(0.3, '#999');
  tankG.addColorStop(0.6, '#bbb');
  tankG.addColorStop(1, '#666');
  ctx.fillStyle = tankG;
  ctx.beginPath();
  ctx.roundRect(-28, -20 + bob, 16, 34, 6);
  ctx.fill();
  // 罐身高光
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(-26, -18 + bob, 5, 18, 3);
  ctx.fill();
  // 气管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -5 + bob); ctx.lineTo(-12, -5 + bob);
  ctx.stroke();

  // 潜水服身体(径向光照渐变)
  const bodyG = ctx.createRadialGradient(-8, -8 + bob, 4, 0, 0 + bob, 30);
  bodyG.addColorStop(0, '#7ee0ff');
  bodyG.addColorStop(0.35, '#3ab0e8');
  bodyG.addColorStop(0.7, '#1a7ab8');
  bodyG.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 26, 28, 0, 0, Math.PI * 2);
  ctx.fill();
  // 潜水服缝线
  ctx.strokeStyle = 'rgba(10,80,160,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -12 + bob); ctx.lineTo(-18, 12 + bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(14, -12 + bob); ctx.lineTo(18, 12 + bob);
  ctx.stroke();
  // 胸口徽标高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-4, -5 + bob, 12, 8, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // 面罩框架
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(4, -14 + bob, 16, 12, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩玻璃
  const maskG = ctx.createLinearGradient(-8, -22 + bob, 14, -8 + bob);
  maskG.addColorStop(0, 'rgba(180,240,255,0.7)');
  maskG.addColorStop(0.5, 'rgba(80,180,255,0.45)');
  maskG.addColorStop(1, 'rgba(20,100,200,0.3)');
  ctx.fillStyle = maskG;
  ctx.beginPath();
  ctx.ellipse(4, -15 + bob, 14, 10, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 面罩反光斑
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(-2, -20 + bob, 5, 2.5, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -15 + bob, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-2, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -15 + bob, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(-1, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(11, -16.5 + bob, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 呼吸管
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();
  ctx.strokeStyle = '#fa4';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(16, -20 + bob); ctx.lineTo(19, -38); ctx.lineTo(24, -38);
  ctx.stroke();

  // 手臂
  const armG = ctx.createLinearGradient(-30, 0, -18, 0);
  armG.addColorStop(0, '#0d4a7a');
  armG.addColorStop(0.5, '#1a7ab8');
  armG.addColorStop(1, '#3ab0e8');
  ctx.fillStyle = armG;
  ctx.beginPath();
  ctx.ellipse(-24, 5 + bob, 7, 14, 0.35, 0, Math.PI * 2);
  ctx.fill();
  const armG2 = ctx.createLinearGradient(18, 0, 30, 0);
  armG2.addColorStop(0, '#3ab0e8');
  armG2.addColorStop(0.5, '#1a7ab8');
  armG2.addColorStop(1, '#0d4a7a');
  ctx.fillStyle = armG2;
  ctx.beginPath();
  ctx.ellipse(24, 5 + bob, 7, 14, -0.35, 0, Math.PI * 2);
  ctx.fill();

  // 脚蹼(动画)
  const flipAnim = Math.sin(GS.time * 3) * 10;
  const flipG = ctx.createLinearGradient(-20, 25, 0, 45);
  flipG.addColorStop(0, '#e05000');
  flipG.addColorStop(1, '#ff8c00');
  ctx.fillStyle = flipG;
  ctx.beginPath();
  ctx.ellipse(-10 + flipAnim, 32 + bob, 13, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 - flipAnim, 32 + bob, 13, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Diver exhaust bubbles
  for (const b of d.bubbles) {
    const rx = b.r, ry = b.r;
    ctx.save();
    ctx.globalAlpha = b.life * 0.85;
    ctx.translate(b.x, b.y);
    const innerG = ctx.createRadialGradient(-rx * 0.25, -ry * 0.3, 0, 0, 0, rx);
    innerG.addColorStop(0, 'rgba(230,248,255,0.22)');
    innerG.addColorStop(0.6, 'rgba(140,210,255,0.06)');
    innerG.addColorStop(1, 'rgba(80,160,230,0.02)');
    ctx.fillStyle = innerG;
    ctx.beginPath(); ctx.arc(0, 0, rx, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(200,238,255,0.6)';
    ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(0, 0, rx, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.beginPath(); ctx.ellipse(-rx * 0.28, -ry * 0.34, rx * 0.22, ry * 0.14, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ============ RESTAURANT DRAWING ============
function drawRestaurant() {
  // Light warm background
  ctx.fillStyle = '#f5ede0';
  ctx.fillRect(0, 0, VW, VH);

  // Scale restaurant (designed at 900×600) to fit entirely within viewport
  const scale = Math.min(VW / 900, VH / 600);
  const offsetX = (VW - 900 * scale) / 2;
  const offsetY = (VH - 600 * scale) / 2;
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Background — bright warm interior
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 600);
  bgGrad.addColorStop(0, '#faf3e8');
  bgGrad.addColorStop(0.55, '#f2e8d8');
  bgGrad.addColorStop(1, '#e8dcc8');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 900, 600);

  // Warm sunlight wash from upper-right
  const sunWash = ctx.createRadialGradient(820, 0, 20, 820, 0, 550);
  sunWash.addColorStop(0, 'rgba(255,235,180,0.22)');
  sunWash.addColorStop(1, 'rgba(255,235,180,0)');
  ctx.fillStyle = sunWash;
  ctx.fillRect(0, 0, 900, 600);

  // Ceiling beam
  ctx.fillStyle = '#c8a878';
  ctx.fillRect(0, 0, 900, 44);
  ctx.fillStyle = '#b89060';
  ctx.fillRect(0, 40, 900, 6);
  // Ceiling grain lines
  ctx.strokeStyle = 'rgba(160,110,50,0.15)';
  ctx.lineWidth = 1;
  for (let px = 0; px < 900; px += 80) {
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px + 20, 46); ctx.stroke();
  }
  // Pendant lamps
  const lampPositions = [160, 350, 550, 740];
  for (const lx of lampPositions) {
    ctx.strokeStyle = '#8a6040';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, 44); ctx.lineTo(lx, 82); ctx.stroke();
    // Shade
    ctx.fillStyle = '#d4a840';
    ctx.beginPath();
    ctx.moveTo(lx - 20, 82); ctx.lineTo(lx + 20, 82);
    ctx.lineTo(lx + 12, 104); ctx.lineTo(lx - 12, 104);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#f0c860';
    ctx.beginPath();
    ctx.moveTo(lx - 20, 82); ctx.lineTo(lx + 20, 82);
    ctx.lineTo(lx + 18, 90); ctx.lineTo(lx - 18, 90);
    ctx.closePath(); ctx.fill();
    // Warm light pool on wall/floor
    const glow = ctx.createRadialGradient(lx, 104, 4, lx, 240, 200);
    glow.addColorStop(0, 'rgba(255,230,140,0.28)');
    glow.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(lx - 200, 82, 400, 380);
    // Bulb
    ctx.fillStyle = 'rgba(255,248,200,1)';
    ctx.beginPath(); ctx.arc(lx, 103, 5, 0, Math.PI * 2); ctx.fill();
  }

  // Back wall — warm cream with wainscoting
  ctx.fillStyle = '#f0e4cc';
  ctx.fillRect(0, 48, 900, 225);
  // Wainscot panels
  ctx.strokeStyle = 'rgba(160,120,70,0.18)';
  ctx.lineWidth = 1.5;
  for (let px = 60; px < 900; px += 140) {
    ctx.strokeRect(px, 70, 120, 140);
    ctx.strokeRect(px + 6, 76, 108, 128);
  }
  ctx.beginPath(); ctx.moveTo(0, 170); ctx.lineTo(900, 170); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 176); ctx.lineTo(900, 176); ctx.stroke();

  // Restaurant name sign — warm wood look
  const signG = ctx.createLinearGradient(200, 65, 200, 128);
  signG.addColorStop(0, '#c8904a');
  signG.addColorStop(1, '#a87030');
  ctx.fillStyle = signG;
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 60, 5); ctx.fill();
  ctx.fillStyle = '#d4a060';
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 10, [5, 5, 0, 0]); ctx.fill();
  ctx.strokeStyle = 'rgba(80,40,10,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(202, 66, 496, 60, 5); ctx.stroke();
  ctx.fillStyle = '#fff8e8';
  ctx.font = 'bold 26px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(80,30,0,0.4)';
  ctx.shadowBlur = 4;
  ctx.fillText('🍣  深海寿司  DEEP SEA SUSHI  🐟', 450, 104);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Floor — warm wood planks
  const floorG = ctx.createLinearGradient(0, 268, 0, 600);
  floorG.addColorStop(0, '#c8944a');
  floorG.addColorStop(0.5, '#b8803a');
  floorG.addColorStop(1, '#a06828');
  ctx.fillStyle = floorG;
  ctx.fillRect(0, 268, 900, 332);
  // Plank lines
  ctx.strokeStyle = 'rgba(80,40,10,0.12)';
  ctx.lineWidth = 1;
  for (let fy = 268; fy < 600; fy += 44) {
    ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(900, fy); ctx.stroke();
  }
  // Plank vertical joints (staggered)
  for (let row = 0; row < 8; row++) {
    const fy = 268 + row * 44;
    const offset = (row % 2) * 90;
    for (let fx = offset; fx < 900; fx += 180) {
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy + 44); ctx.stroke();
    }
  }
  // Floor highlight (window light)
  const floorRef = ctx.createLinearGradient(0, 268, 0, 310);
  floorRef.addColorStop(0, 'rgba(255,220,150,0.18)');
  floorRef.addColorStop(1, 'rgba(255,220,150,0)');
  ctx.fillStyle = floorRef;
  ctx.fillRect(0, 268, 900, 42);

  // Counter — light wood + marble top
  const counterBody = ctx.createLinearGradient(300, 268, 300, 330);
  counterBody.addColorStop(0, '#d4a050');
  counterBody.addColorStop(1, '#a87030');
  ctx.fillStyle = counterBody;
  ctx.beginPath(); ctx.roundRect(300, 270, 300, 58, 4); ctx.fill();
  // Marble top
  const marbleG = ctx.createLinearGradient(298, 258, 602, 274);
  marbleG.addColorStop(0, '#f8f4ee');
  marbleG.addColorStop(0.3, '#ece8e0');
  marbleG.addColorStop(0.6, '#f4f0ea');
  marbleG.addColorStop(1, '#e8e4dc');
  ctx.fillStyle = marbleG;
  ctx.beginPath(); ctx.roundRect(298, 258, 304, 16, 3); ctx.fill();
  // Marble veins
  ctx.strokeStyle = 'rgba(160,150,140,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(320, 260); ctx.bezierCurveTo(380, 266, 420, 262, 480, 268); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(500, 259); ctx.bezierCurveTo(540, 265, 560, 261, 590, 268); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,190,180,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(298, 258, 304, 16, 3); ctx.stroke();

  // Tables
  for (const t of GS.tables) drawTable(t);

  // ── INVENTORY PANEL (left) — warm wood card ──
  ctx.fillStyle = 'rgba(255,248,235,0.94)';
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 310, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,50,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 310, 10); ctx.stroke();
  ctx.fillStyle = '#c87830';
  ctx.beginPath(); ctx.roundRect(10, 280, 188, 3, [3, 3, 0, 0]); ctx.fill();

  ctx.fillStyle = '#8a4818';
  ctx.font = 'bold 13px Microsoft YaHei';
  ctx.fillText('📦 仓库', 18, 301);
  ctx.fillStyle = 'rgba(160,110,50,0.2)';
  ctx.fillRect(10, 308, 188, 1);

  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 325;
  ctx.font = '13px Microsoft YaHei';
  let totalItems = 0;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      totalItems++;
      const isSelected = GS.preparingDish && GS.preparingDish.type === ft.type;
      if (isSelected) {
        ctx.fillStyle = 'rgba(220,140,30,0.14)';
        ctx.beginPath(); ctx.roundRect(14, wy - 14, 180, 20, 4); ctx.fill();
      }
      ctx.fillStyle = isSelected ? '#c06010' : '#4a3020';
      ctx.fillText(`${ft.emoji} ${ft.name}  ×${cnt}`, 20, wy);
      ctx.fillStyle = isSelected ? '#e05010' : '#c05830';
      ctx.font = '11px Microsoft YaHei';
      ctx.fillText('[出售]', 160, wy);
      ctx.font = '13px Microsoft YaHei';
      wy += 22;
    }
  }
  if (totalItems === 0) {
    ctx.fillStyle = '#b09070';
    ctx.font = '13px Microsoft YaHei';
    ctx.fillText('仓库空空如也...', 28, 345);
    ctx.fillText('去潜水捕鱼吧！', 32, 368);
  }

  // Sell button
  const sellG = ctx.createLinearGradient(16, 552, 96, 576);
  sellG.addColorStop(0, '#2aaa60'); sellG.addColorStop(1, '#168840');
  ctx.fillStyle = sellG;
  ctx.beginPath(); ctx.roundRect(16, 550, 82, 26, 6); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(16, 550, 82, 11, [6, 6, 0, 0]); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Microsoft YaHei';
  ctx.fillText('全部出售', 30, 567);

  ctx.fillStyle = '#8a4010';
  ctx.font = 'bold 14px Microsoft YaHei';
  ctx.fillText(`💰 ${GS.coins}`, 18, 585);

  // ── MENU PANEL (right) — warm card ──
  ctx.fillStyle = 'rgba(255,248,235,0.94)';
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 210, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,50,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 210, 10); ctx.stroke();
  ctx.fillStyle = '#c87830';
  ctx.beginPath(); ctx.roundRect(704, 280, 186, 3, [3, 3, 0, 0]); ctx.fill();

  ctx.fillStyle = '#8a4818';
  ctx.font = 'bold 13px Microsoft YaHei';
  ctx.fillText('📋 今日菜单', 715, 301);
  ctx.fillStyle = 'rgba(160,110,50,0.2)';
  ctx.fillRect(704, 308, 186, 1);

  ctx.font = '12px Microsoft YaHei';
  let my = 324;
  for (const dish of SUSHI_MENU) {
    const hasIngredient = (warehouseByType[dish.fishType] || 0) > 0;
    if (hasIngredient) {
      ctx.fillStyle = 'rgba(80,180,80,0.1)';
      ctx.beginPath(); ctx.roundRect(707, my - 13, 180, 18, 3); ctx.fill();
    }
    ctx.fillStyle = hasIngredient ? '#2a6a20' : '#b09878';
    ctx.fillText(`${dish.emoji} ${dish.name}`, 712, my);
    ctx.fillStyle = hasIngredient ? '#b86010' : '#b09878';
    ctx.fillText(`¥${dish.price}`, 852, my);
    my += 24;
  }

  drawUpgradeShop();

  ctx.restore(); // end restaurant scale

  // ── ORDER BUBBLES — drawn in SCREEN SPACE, above everything ──
  // Convert table coords (900×600 space) → screen coords
  const rScale = Math.min(VW / 900, VH / 600);
  const rOffX = (VW - 900 * rScale) / 2;
  const rOffY = (VH - 600 * rScale) / 2;
  const HEAD_R = 18, LEG_H = 18, BODY_H = 34;
  const headY_local = -LEG_H - BODY_H - HEAD_R + 4;  // in 900×600 space, relative to feet

  for (const t of GS.tables) {
    if (t.customer && t.customer.order && t.customer.state === 'waiting') {
      const c = t.customer;
      // feet position in 900×600 space
      const feetX = t.x;
      const feetY = t.y + 50;
      // head position in 900×600 space
      const headX_900 = feetX;
      const headY_900 = feetY + headY_local;
      // convert to screen
      const sx = rOffX + headX_900 * rScale;
      const sy = rOffY + headY_900 * rScale;
      // bubble size in screen pixels
      const bw = 100 * rScale, bh = 48 * rScale;
      const bx = sx + 14 * rScale, by = sy - (HEAD_R + 52) * rScale;

      ctx.save();
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.roundRect(bx + 2, by + 3, bw, bh, 10 * rScale); ctx.fill();
      // Bubble body — white card
      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.strokeStyle = 'rgba(200,150,80,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10 * rScale); ctx.fill(); ctx.stroke();
      // Tail pointing down-left
      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.beginPath();
      ctx.moveTo(bx + 10 * rScale, by + bh);
      ctx.lineTo(sx + 4 * rScale, by + bh + 12 * rScale);
      ctx.lineTo(bx + 24 * rScale, by + bh);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(200,150,80,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx + 10 * rScale, by + bh);
      ctx.lineTo(sx + 4 * rScale, by + bh + 12 * rScale);
      ctx.lineTo(bx + 24 * rScale, by + bh);
      ctx.stroke();
      // Order text
      ctx.fillStyle = '#2a1a08';
      ctx.font = `bold ${Math.round(13 * rScale)}px Microsoft YaHei`;
      ctx.fillText(c.order.emoji + ' ' + c.order.name, bx + 8 * rScale, by + 18 * rScale);
      // Patience bar track
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath(); ctx.roundRect(bx + 8 * rScale, by + 28 * rScale, 76 * rScale, 8 * rScale, 3 * rScale); ctx.fill();
      const pColor = c.patience > 0.5 ? '#44cc55' : c.patience > 0.25 ? '#ffaa22' : '#ff3333';
      const pG = ctx.createLinearGradient(bx + 8 * rScale, 0, bx + (8 + 76 * c.patience) * rScale, 0);
      pG.addColorStop(0, pColor); pG.addColorStop(1, shadeColor(pColor, 0.75));
      ctx.fillStyle = pG;
      ctx.beginPath(); ctx.roundRect(bx + 8 * rScale, by + 28 * rScale, 76 * c.patience * rScale, 8 * rScale, 3 * rScale); ctx.fill();
      ctx.restore();
    }
  }
}

function drawTable(t) {
  const { x, y, customer } = t;

  // Floor shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x, y + 52, 52, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Chair legs — warm wood
  for (const side of [-1, 1]) {
    const cx = x + side * 38;
    ctx.fillStyle = '#7a4818';
    ctx.fillRect(cx - 3, y + 28, 6, 24);
    ctx.fillStyle = 'rgba(255,200,120,0.2)';
    ctx.fillRect(cx - 1, y + 28, 2, 24);
  }

  // Table leg — single pedestal, wood
  ctx.fillStyle = '#8a5020';
  ctx.fillRect(x - 5, y + 22, 10, 30);
  ctx.fillStyle = 'rgba(255,200,100,0.2)';
  ctx.fillRect(x - 2, y + 22, 3, 30);

  // Chair seats — warm fabric cushion
  for (const side of [-1, 1]) {
    const cx = x + side * 38;
    const cy = y + 24;
    ctx.fillStyle = 'rgba(80,30,0,0.2)';
    ctx.beginPath(); ctx.ellipse(cx + 2, cy + 2, 14, 7, 0, 0, Math.PI * 2); ctx.fill();
    const chairG = ctx.createRadialGradient(cx - 4, cy - 2, 1, cx, cy, 14);
    chairG.addColorStop(0, '#c87840');
    chairG.addColorStop(1, '#8a4820');
    ctx.fillStyle = chairG;
    ctx.beginPath(); ctx.ellipse(cx, cy, 14, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(180,100,40,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(cx, cy, 14, 7, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,220,150,0.22)';
    ctx.beginPath(); ctx.ellipse(cx - 4, cy - 2, 6, 3, -0.3, 0, Math.PI * 2); ctx.fill();
  }

  // Table top shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x + 3, y + 23, 48, 20, 0, 0, Math.PI * 2); ctx.fill();

  // Table surface — light wood
  const tableG = ctx.createRadialGradient(x - 15, y + 8, 4, x, y + 20, 50);
  tableG.addColorStop(0, '#e8b870');
  tableG.addColorStop(0.5, '#c89448');
  tableG.addColorStop(1, '#a07030');
  ctx.fillStyle = tableG;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 47, 21, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,120,50,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 47, 21, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,230,160,0.22)';
  ctx.beginPath(); ctx.ellipse(x - 10, y + 14, 24, 8, -0.3, 0, Math.PI * 2); ctx.fill();
  // Plate
  ctx.fillStyle = 'rgba(255,248,235,0.9)';
  ctx.beginPath(); ctx.ellipse(x, y + 20, 11, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,80,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(x, y + 20, 11, 5, 0, 0, Math.PI * 2); ctx.stroke();

  if (customer) drawCustomer(customer, x, y + 50);
}

function drawCustomer(c, x, y) {
  // Origin (x,y) = customer feet center, in restaurant's 900×600 space
  ctx.save();
  ctx.translate(x, y);

  const style = c.style || 'business';
  const STYLES = {
    business: { shirt: '#3a6fd8', pants: '#1a2a4a', skin: '#f5c89a', hair: '#1a1a1a' },
    casual:   { shirt: '#e05030', pants: '#4a7ac8', skin: '#f0b87a', hair: '#6a3a10' },
    lady:     { shirt: '#d04080', pants: '#d04080', skin: '#fad0a0', hair: '#cc2266' },
    old:      { shirt: '#708060', pants: '#506050', skin: '#e8c090', hair: '#cccccc' },
  };
  const S = STYLES[style] || STYLES.business;

  const HEAD_R = 18, BODY_W = 28, BODY_H = 34;
  const ARM_W = 10, ARM_H = 22, LEG_W = 10, LEG_H = 18;

  // ── 腿 + 鞋 ──
  for (const side of [-1, 1]) {
    const lx = side * 7;
    // 腿
    ctx.fillStyle = S.pants;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(lx - LEG_W / 2, -LEG_H, LEG_W, LEG_H, 4);
    ctx.fill(); ctx.stroke();
    // 鞋
    ctx.fillStyle = '#2a1a0a';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(lx + side * 3, -2, 9, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  }

  // ── 身体 ──
  const bodyG = ctx.createLinearGradient(-BODY_W / 2, -LEG_H - BODY_H, BODY_W / 2, -LEG_H);
  bodyG.addColorStop(0, shadeColor(S.shirt, 1.25));
  bodyG.addColorStop(1, shadeColor(S.shirt, 0.7));
  ctx.fillStyle = bodyG;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-BODY_W / 2, -LEG_H - BODY_H, BODY_W, BODY_H, [8, 8, 4, 4]);
  ctx.fill(); ctx.stroke();

  // 衣领高光
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(-BODY_W / 2 + 3, -LEG_H - BODY_H + 3, BODY_W - 6, 12, 5);
  ctx.fill();

  // ── 手臂 ──
  for (const side of [-1, 1]) {
    const ax = side * (BODY_W / 2 + ARM_W / 2 - 1);
    // Eating animation: right arm (side=1) lifts up and down while served
    let armAngle = 0;
    let armOffY = 0;
    if (c.state === 'served' && side === 1) {
      // Raise right arm rhythmically: chopstick/fork motion
      armOffY = -Math.abs(Math.sin((c.eatPhase || 0) * 0.8)) * 14;
    }
    const armG = ctx.createLinearGradient(ax - ARM_W / 2, 0, ax + ARM_W / 2, 0);
    armG.addColorStop(0, shadeColor(S.shirt, side < 0 ? 1.1 : 0.75));
    armG.addColorStop(1, shadeColor(S.shirt, side < 0 ? 0.75 : 1.1));
    ctx.fillStyle = armG;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(ax - ARM_W / 2, -LEG_H - BODY_H + 4 + armOffY, ARM_W, ARM_H, 5);
    ctx.fill(); ctx.stroke();
    // 手
    ctx.fillStyle = S.skin;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(ax, -LEG_H - BODY_H + 4 + ARM_H + 5 + armOffY, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Chopsticks in right hand when eating
    if (c.state === 'served' && side === 1) {
      ctx.strokeStyle = '#c89050';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      const hy = -LEG_H - BODY_H + 4 + ARM_H + armOffY - 2;
      ctx.beginPath(); ctx.moveTo(ax - 2, hy); ctx.lineTo(ax, hy - 18); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ax + 2, hy); ctx.lineTo(ax + 5, hy - 16); ctx.stroke();
    }
  }

  // ── 裙摆（lady 专用，盖在腿上） ──
  if (style === 'lady') {
    const skirtG = ctx.createLinearGradient(0, -LEG_H - 6, 0, -2);
    skirtG.addColorStop(0, shadeColor(S.pants, 1.1));
    skirtG.addColorStop(1, shadeColor(S.pants, 0.7));
    ctx.fillStyle = skirtG;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-BODY_W / 2, -LEG_H - 6);
    ctx.lineTo(-BODY_W / 2 - 8, -2);
    ctx.lineTo(BODY_W / 2 + 8, -2);
    ctx.lineTo(BODY_W / 2, -LEG_H - 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  // ── 头部 ──
  const headY = -LEG_H - BODY_H - HEAD_R + 4;
  const headG = ctx.createRadialGradient(-5, headY - 6, 2, 0, headY, HEAD_R);
  headG.addColorStop(0, shadeColor(S.skin, 1.2));
  headG.addColorStop(1, shadeColor(S.skin, 0.85));
  ctx.fillStyle = headG;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, headY, HEAD_R, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // ── 头发 ──
  ctx.fillStyle = S.hair;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.5;
  if (style === 'lady') {
    // 长发：头顶弧 + 两侧垂发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(side * (HEAD_R - 2), headY + 10, 6, 16, side * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (style === 'old') {
    // 稀疏白发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI * 1.1, Math.PI * 1.9);
    ctx.fill(); ctx.stroke();
  } else {
    // 普通短发
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.lineTo(HEAD_R * 0.7, headY + 4);
    ctx.lineTo(-HEAD_R * 0.7, headY + 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  // 发丝高光
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(-5, headY - HEAD_R + 5, 7, 3, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── 眼睛（卡通大眼） ──
  for (const side of [-1, 1]) {
    const ex = side * 7, ey = headY - 2;
    // 眼白
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // 虹膜
    const irisColor = style === 'casual' ? '#4a7a30' : style === 'lady' ? '#6644cc' : '#3355aa';
    ctx.fillStyle = irisColor;
    ctx.beginPath();
    ctx.ellipse(ex, ey + 1, 4, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 瞳孔
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(ex, ey + 1, 2.5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(ex + 1.5, ey - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex - 1, ey + 1.5, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 嘴 ──
  ctx.strokeStyle = 'rgba(80,20,20,0.8)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  if (c.patience > 0.5) {
    // 微笑
    ctx.beginPath();
    ctx.arc(0, headY + 8, 7, 0.25, Math.PI - 0.25);
    ctx.stroke();
    // 嘴角酒窝
    ctx.fillStyle = 'rgba(200,100,100,0.3)';
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(side * 7, headY + 10, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (c.patience > 0.2) {
    // 平嘴
    ctx.beginPath();
    ctx.moveTo(-5, headY + 9);
    ctx.lineTo(5, headY + 9);
    ctx.stroke();
  } else {
    // 皱眉 + 下弯嘴
    ctx.beginPath();
    ctx.arc(0, headY + 14, 7, Math.PI + 0.25, -0.25);
    ctx.stroke();
    // 皱眉线
    ctx.strokeStyle = 'rgba(80,40,0,0.6)';
    ctx.lineWidth = 1.5;
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(side * 3, headY - 8);
      ctx.lineTo(side * 8, headY - 12);
      ctx.stroke();
    }
  }

  // ── 装饰 ──
  if (style === 'business') {
    // 领带
    ctx.fillStyle = '#cc2222';
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, -LEG_H - BODY_H + 14);
    ctx.lineTo(3, -LEG_H - BODY_H + 14);
    ctx.lineTo(5, -LEG_H - BODY_H + 28);
    ctx.lineTo(0, -LEG_H - BODY_H + 34);
    ctx.lineTo(-5, -LEG_H - BODY_H + 28);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if (style === 'casual') {
    // 棒球帽
    ctx.fillStyle = shadeColor(S.shirt, 0.85);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, headY, HEAD_R, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    // 帽檐
    ctx.beginPath();
    ctx.ellipse(HEAD_R * 0.3, headY, HEAD_R * 1.25, 5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // 帽徽
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★', 0, headY - HEAD_R / 2);
    ctx.textAlign = 'left';
  } else if (style === 'old') {
    // 胡须
    ctx.fillStyle = '#cccccc';
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, headY + 12, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(150,150,150,0.6)';
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 3, headY + 7);
      ctx.lineTo(i * 3.5, headY + 18);
      ctx.stroke();
    }
  }


  // ── 已上菜：大笑嘴 + 桌上食物 ──
  if (c.state === 'served') {
    // Cover the patience-based mouth drawn above with skin color
    ctx.fillStyle = S.skin;
    ctx.beginPath(); ctx.ellipse(0, headY + 11, 11, 9, 0, 0, Math.PI * 2); ctx.fill();

    // Big open happy mouth
    ctx.strokeStyle = 'rgba(80,20,20,0.85)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, headY + 12, 9, 0.1, Math.PI - 0.1);
    ctx.stroke();
    ctx.fillStyle = '#3a0808';
    ctx.beginPath();
    ctx.arc(0, headY + 12, 7.5, 0.2, Math.PI - 0.2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, headY + 9, 12, 4);
    // Rosy cheeks
    ctx.fillStyle = 'rgba(255,120,120,0.22)';
    ctx.beginPath(); ctx.ellipse(-11, headY + 8, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11, headY + 8, 6, 4, 0, 0, Math.PI * 2); ctx.fill();

    // Food on plate at table surface
    const foodY = -LEG_H - 4;
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath(); ctx.ellipse(1, foodY + 6, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(180,140,80,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(0, foodY + 4, 15, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    const foodBob = Math.sin((c.eatPhase || 0) * 0.8) * 1.5;
    ctx.font = '15px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.servedEmoji || '🍣', 0, foodY - 3 + foodBob);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

function drawUpgradeShop() {
  ctx.fillStyle = 'rgba(255,248,235,0.94)';
  ctx.beginPath(); ctx.roundRect(205, 540, 500, 52, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,50,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(205, 540, 500, 52, 8); ctx.stroke();
  ctx.fillStyle = '#c87830';
  ctx.beginPath(); ctx.roundRect(205, 540, 500, 3, [3, 3, 0, 0]); ctx.fill();

  ctx.fillStyle = '#8a4818';
  ctx.font = 'bold 12px Microsoft YaHei';
  ctx.fillText('🔧 升级', 214, 558);

  const upgrades = [
    { label: '🎣 渔网', desc: '捕鱼范围 +20%', cost: 200, key: 'netLevel' },
    { label: '🏃 速度', desc: '潜水速度 +20%', cost: 300, key: 'speedLevel' },

  let ux = 295;

    ctx.fillStyle = canAfford ? '#1a6a28' : '#a08060';

}

// ============ FLOATING TEXTS ============
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#ff4', life: 1.0, vy: -1.5 });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.shadowColor = ft.color || '#ff4';
    ctx.shadowBlur = 8;
    ctx.fillStyle = ft.color || '#ff4';
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ TITLE SCREEN ============
function drawTitle() {
  const t = GS.time;

  // ── Background: sky → ocean surface → underwater ──
  const skyG = ctx.createLinearGradient(0, 0, 0, VH);
  skyG.addColorStop(0,    '#4a90c8');
  skyG.addColorStop(0.28, '#2878b0');
  skyG.addColorStop(0.36, '#1860a0');
  skyG.addColorStop(0.40, '#0e5090');
  skyG.addColorStop(0.46, '#0a4080');
  skyG.addColorStop(0.60, '#083570');
  skyG.addColorStop(0.80, '#051e4a');
  skyG.addColorStop(1,    '#020a1e');
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, VW, VH);

  const waveY = VH * 0.40;

  // ── Sky atmosphere: sun glow ──
  const sunX = VW * 0.75, sunY = VH * 0.10;
  const sunGlow = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, VH * 0.45);
  sunGlow.addColorStop(0,   'rgba(255,255,210,0.55)');
  sunGlow.addColorStop(0.08,'rgba(255,230,160,0.30)');
  sunGlow.addColorStop(0.25,'rgba(255,200,100,0.10)');
  sunGlow.addColorStop(1,   'rgba(255,180,80,0)');
  ctx.fillStyle = sunGlow;
  ctx.fillRect(0, 0, VW, VH);

  // Sun disc
  ctx.save();
  ctx.shadowColor = 'rgba(255,240,180,0.8)';
  ctx.shadowBlur = 40;
  const sunDiscG = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 22);
  sunDiscG.addColorStop(0,   '#fffae0');
  sunDiscG.addColorStop(0.5, '#ffe870');
  sunDiscG.addColorStop(1,   'rgba(255,200,60,0)');
  ctx.fillStyle = sunDiscG;
  ctx.beginPath();
  ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Realistic clouds ──
  const cloudDefs = [
    { ox: 0,        oy: VH * 0.06, sc: 1.0 },
    { ox: VW * 0.38,oy: VH * 0.11, sc: 0.75 },
    { ox: VW * 0.65,oy: VH * 0.04, sc: 1.2 },
  ];
  for (const cd of cloudDefs) {
    const cx = ((cd.ox + t * 14) % (VW + 180)) - 90;
    const cy = cd.oy + Math.sin(t * 0.18 + cd.ox) * 5;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(cd.sc, cd.sc);
    const blobs = [[0,10,38,22],[25,-4,48,26],[55,6,36,22],[-18,14,32,18],[68,12,30,18]];
    for (const [bx, by, bw, bh] of blobs) {
      const cg = ctx.createRadialGradient(bx, by - bh * 0.2, 2, bx, by, Math.max(bw, bh) * 0.6);
      cg.addColorStop(0,   'rgba(255,255,255,0.92)');
      cg.addColorStop(0.5, 'rgba(240,248,255,0.75)');
      cg.addColorStop(1,   'rgba(200,230,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(bx, by, bw, bh, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── Ocean surface: layered waves ──
  // Deep ocean fill below wave line
  ctx.fillStyle = '#0a5a8a';
  ctx.fillRect(0, waveY, VW, VH - waveY);

  // Wave layers
  const waveLayers = [
    { speed: 1.2, amp: 7,  col: '#1278a8', offset: 0 },
    { speed: 0.9, amp: 5,  col: '#0d6898', offset: 1.5 },
    { speed: 1.5, amp: 4,  col: '#0a5580', offset: 3.0 },
  ];
  for (const wl of waveLayers) {
    ctx.fillStyle = wl.col;
    ctx.beginPath();
    ctx.moveTo(0, waveY);
    for (let x = 0; x <= VW; x += 8) {
      const wy = waveY - wl.amp + Math.sin(x * 0.018 + t * wl.speed + wl.offset) * wl.amp
               + Math.sin(x * 0.035 + t * wl.speed * 0.7 + wl.offset) * wl.amp * 0.4;
      ctx.lineTo(x, wy);
    }
    ctx.lineTo(VW, VH); ctx.lineTo(0, VH);
    ctx.closePath();
    ctx.fill();
  }

  // Wave foam / specular sparkles on surface
  ctx.save();
  for (let i = 0; i < 18; i++) {
    const wx2 = ((i * 113.7 + t * 50) % (VW + 60)) - 30;
    const wy2 = waveY - 2 + Math.sin(wx2 * 0.02 + t * 1.2) * 6;
    const wr = 1.5 + (i % 3) * 1.2;
    const wg = ctx.createRadialGradient(wx2, wy2, 0, wx2, wy2, wr * 3);
    wg.addColorStop(0, 'rgba(255,255,255,0.9)');
    wg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.ellipse(wx2, wy2, wr * 3, wr, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // ── Underwater god rays from surface ──
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const rx = VW * (i / 8) + Math.sin(t * 0.4 + i * 1.4) * 30;
    const spread = 55 + Math.sin(t * 0.3 + i) * 20;
    const rayG = ctx.createLinearGradient(0, waveY, 0, VH);
    const alpha = 0.04 + Math.sin(t * 0.5 + i) * 0.015;
    rayG.addColorStop(0,   `rgba(180,235,255,${alpha * 1.8})`);
    rayG.addColorStop(0.3, `rgba(120,200,250,${alpha})`);
    rayG.addColorStop(1,   'rgba(40,100,180,0)');
    ctx.fillStyle = rayG;
    ctx.beginPath();
    const tw = 5;
    ctx.moveTo(rx - tw, waveY);
    ctx.lineTo(rx + tw, waveY);
    ctx.lineTo(rx + spread, VH);
    ctx.lineTo(rx - spread * 0.7, VH);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // ── Caustic shimmer patches in water ──
  ctx.save();
  for (let i = 0; i < 20; i++) {
    const cx2 = ((i * 89.3 + t * 22) % (VW + 60)) - 30;
    const cy2 = waveY + 30 + (i % 5) * ((VH - waveY - 40) / 5) + Math.sin(t + i) * 15;
    const cr = 10 + Math.sin(t * 1.2 + i) * 6;
    const ca = (0.04 + Math.sin(t * 1.5 + i) * 0.02) * (1 - (cy2 - waveY) / (VH - waveY) * 1.5);
    if (ca <= 0) continue;
    const cg = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, cr);
    cg.addColorStop(0, `rgba(200,245,255,${ca * 2})`);
    cg.addColorStop(1, 'rgba(100,190,230,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2, cr, cr * 0.5, t * 0.3 + i * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // ── Floating bubbles ──
  ctx.save();
  for (let i = 0; i < 16; i++) {
    const bx2 = (i * 137 + 50) % VW;
    const by2 = waveY + 40 + ((i * 89 + t * 35 * (1 + i % 3)) % (VH - waveY - 50));
    const br = 2 + (i % 4) * 1.5;
    ctx.globalAlpha = 0.5 + Math.sin(t + i) * 0.2;
    // Rim
    ctx.strokeStyle = 'rgba(200,240,255,0.7)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(bx2, by2, br, 0, Math.PI * 2); ctx.stroke();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.ellipse(bx2 - br * 0.3, by2 - br * 0.35, br * 0.28, br * 0.18, -0.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── Silhouette fish in background ──
  const titleFishData = [
    { col: '#1a6090', size: 22, speed: 35 },
    { col: '#134870', size: 16, speed: 28 },
    { col: '#1a7898', size: 28, speed: 42 },
    { col: '#0e3860', size: 14, speed: 20 },
    { col: '#157090', size: 19, speed: 38 },
  ];
  for (let i = 0; i < titleFishData.length; i++) {
    const fd = titleFishData[i];
    const fx = ((i * 250 + t * fd.speed) % (VW + 120)) - 60;
    const fy = waveY + 50 + i * ((VH - waveY - 80) / 5) + Math.sin(t * 0.8 + i) * 18;
    ctx.save();
    ctx.globalAlpha = 0.35 + i * 0.05;
    ctx.fillStyle = fd.col;
    const s = fd.size;
    // Body
    ctx.beginPath();
    ctx.ellipse(fx, fy, s, s * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(fx - s, fy);
    ctx.lineTo(fx - s - s * 0.6, fy - s * 0.4);
    ctx.lineTo(fx - s - s * 0.6, fy + s * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ── Seaweed silhouettes at bottom ──
  for (let i = 0; i < 9; i++) {
    const sx = VW * 0.04 + i * (VW * 0.12);
    const sh = VH * 0.12 + (i % 3) * VH * 0.04;
    const sway = Math.sin(t * 1.1 + i * 0.8) * 10;
    const swG = ctx.createLinearGradient(sx, VH, sx + sway, VH - sh);
    swG.addColorStop(0, '#0d5a2a');
    swG.addColorStop(1, '#1a8040');
    ctx.strokeStyle = swG;
    ctx.lineWidth = 5 + (i % 3);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx, VH);
    ctx.bezierCurveTo(sx + sway * 0.4, VH - sh * 0.35, sx + sway, VH - sh * 0.65, sx + sway * 1.3, VH - sh);
    ctx.stroke();
  }

  // ── Marine snow particles ──
  ctx.save();
  for (let i = 0; i < 30; i++) {
    const px = (i * 61.8 + t * 8) % VW;
    const py = waveY + 20 + ((i * 113.7 + t * (5 + i % 4)) % (VH - waveY));
    ctx.globalAlpha = 0.2 + Math.sin(t + i) * 0.1;
    ctx.fillStyle = 'rgba(200,240,255,1)';
    ctx.beginPath();
    ctx.arc(px, py, 0.8 + (i % 3) * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── TITLE TEXT — cinematic ocean style ──
  const isLand = VW > VH;
  const titleFontSize = isLand ? 40 : 54;
  const titleY = isLand ? VH * 0.18 : VH * 0.20;
  const titleLineH = isLand ? 48 : 62;
  ctx.textAlign = 'center';

  // Outer glow halo
  ctx.save();
  ctx.shadowColor = 'rgba(80,200,255,0.6)';
  ctx.shadowBlur = 55;
  ctx.fillStyle = 'rgba(80,200,255,0.12)';
  ctx.font = `bold ${titleFontSize}px "Georgia", serif`;
  ctx.fillText('FISH FISH', VW / 2, titleY);
  ctx.fillText('WANNA FISH', VW / 2, titleY + titleLineH);
  ctx.restore();

  // Dark depth shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,15,40,0.75)';
  ctx.font = `bold ${titleFontSize}px "Georgia", serif`;
  ctx.fillText('FISH FISH', VW / 2 + 3, titleY + 4);
  ctx.fillText('WANNA FISH', VW / 2 + 3, titleY + titleLineH + 4);
  ctx.restore();

  // Main title with ocean-shimmer gradient
  ctx.save();
  const titleGrad = ctx.createLinearGradient(VW * 0.2, titleY - 50, VW * 0.8, titleY + 70);
  titleGrad.addColorStop(0,    '#c8f0ff');
  titleGrad.addColorStop(0.25, '#80d8f8');
  titleGrad.addColorStop(0.5,  `hsl(${190 + Math.sin(t * 0.8) * 20},90%,75%)`);
  titleGrad.addColorStop(0.75, '#60c8f0');
  titleGrad.addColorStop(1,    '#a0e8ff');
  ctx.fillStyle = titleGrad;
  ctx.font = `bold ${titleFontSize}px "Georgia", serif`;
  ctx.fillText('FISH FISH', VW / 2, titleY);
  ctx.fillText('WANNA FISH', VW / 2, titleY + titleLineH);
  ctx.restore();

  // Subtitle
  ctx.save();
  ctx.fillStyle = 'rgba(160,225,255,0.85)';
  ctx.font = `${isLand ? 13 : 16}px "Georgia", serif`;
  ctx.fillText('深海捕鱼  ✦  寿司经营', VW / 2, titleY + titleLineH + (isLand ? 28 : 34));
  ctx.restore();

  // Shimmering water caustic overlay on title
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + t * 0.6;
    const sr = VW * 0.25 + Math.sin(t * 1.5 + i) * 15;
    const sx2 = VW / 2 + Math.cos(a) * sr;
    const sy2 = titleY - 15 + Math.sin(a) * 22;
    const sparkR = 2.5 + Math.sin(t * 3 + i) * 1.5;
    ctx.globalAlpha = 0.5 + Math.sin(t * 2 + i) * 0.3;
    const spG = ctx.createRadialGradient(sx2, sy2, 0, sx2, sy2, sparkR * 3);
    spG.addColorStop(0,   'rgba(255,255,255,0.9)');
    spG.addColorStop(0.4, 'rgba(180,240,255,0.5)');
    spG.addColorStop(1,   'rgba(100,200,255,0)');
    ctx.fillStyle = spG;
    ctx.beginPath();
    ctx.arc(sx2, sy2, sparkR * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.textAlign = 'left';

  // ── START BUTTON — ocean glass style ──
  const isLandscape = VW > VH;
  const btnW = isLandscape ? 200 : 220;
  const btnH = isLandscape ? 46 : 58;
  const btnX = VW / 2 - btnW / 2;
  const btnY = isLandscape ? VH * 0.68 : VH * 0.56;
  const hovering = mouseScreen.x >= btnX && mouseScreen.x <= btnX + btnW &&
                   mouseScreen.y >= btnY && mouseScreen.y <= btnY + btnH;
  // Store with extra touch padding for easier tap targeting
  GS._titleBtnBounds = { x: btnX - 16, y: btnY - 14, w: btnW + 32, h: btnH + 28 };
  const hovering = mouseScreen.x >= btnX && mouseScreen.x <= btnX + btnW &&
                   mouseScreen.y >= btnY && mouseScreen.y <= btnY + btnH;

  // Press ripple
  const pressAge = GS.time - (GS._btnPressT || -99);
  const rippleR = pressAge < 0.5 ? pressAge / 0.5 * (btnW * 0.9) : 0;
  const rippleA = pressAge < 0.5 ? (1 - pressAge / 0.5) * 0.3 : 0;

  ctx.save();
  ctx.translate(btnX, btnY);

  // Outer glow
  if (hovering) {
    ctx.shadowColor = 'rgba(80,210,255,0.7)';
    ctx.shadowBlur = 22;
  }

  // Glass body
  const btnBodyG = ctx.createLinearGradient(0, 0, 0, btnH);
  if (hovering) {
    btnBodyG.addColorStop(0, 'rgba(20,140,200,0.90)');
    btnBodyG.addColorStop(0.5, 'rgba(10,100,170,0.85)');
    btnBodyG.addColorStop(1, 'rgba(5,70,130,0.90)');
  } else {
    btnBodyG.addColorStop(0, 'rgba(10,100,180,0.80)');
    btnBodyG.addColorStop(0.5, 'rgba(5,70,150,0.75)');
    btnBodyG.addColorStop(1, 'rgba(3,45,110,0.80)');
  }
  ctx.fillStyle = btnBodyG;
  ctx.beginPath();
  ctx.roundRect(0, 0, btnW, btnH, 10);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ripple
  if (rippleR > 0) {
    ctx.save();
    ctx.beginPath(); ctx.roundRect(0, 0, btnW, btnH, 10); ctx.clip();
    ctx.fillStyle = `rgba(255,255,255,${rippleA})`;
    ctx.beginPath(); ctx.arc(btnW / 2, btnH / 2, rippleR, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Glass top sheen
  const sheenG = ctx.createLinearGradient(0, 0, 0, btnH * 0.5);
  sheenG.addColorStop(0, 'rgba(255,255,255,0.28)');
  sheenG.addColorStop(1, 'rgba(255,255,255,0.04)');
  ctx.fillStyle = sheenG;
  ctx.beginPath();
  ctx.roundRect(2, 2, btnW - 4, btnH * 0.45, [8, 8, 0, 0]);
  ctx.fill();

  // Border
  ctx.strokeStyle = hovering ? 'rgba(140,225,255,0.9)' : 'rgba(100,190,240,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(0, 0, btnW, btnH, 10);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#e8f8ff';
  ctx.font = hovering ? 'bold 20px "Georgia", serif' : 'bold 18px "Georgia", serif';
  ctx.textAlign = 'center';
  ctx.fillText('🤿  开始游戏', btnW / 2, btnH / 2 + 7);
  ctx.textAlign = 'left';

  ctx.restore();

  // KEY HINT — below button
  ctx.fillStyle = 'rgba(160,220,255,0.55)';
  ctx.font = '11px "Georgia", serif';
  ctx.textAlign = 'center';
  ctx.fillText('CLICK  /  TAP  /  SPACE  /  ENTER', VW / 2, btnY + btnH + 20);
  ctx.fillStyle = 'rgba(120,190,230,0.45)';
  ctx.font = '10px "Georgia", serif';
  ctx.fillText('滑动探索海洋  触屏点击捕鱼  上岸经营寿司店', VW / 2, btnY + btnH + 36);
  ctx.textAlign = 'left';
}

// ============ TRANSITION ============
function drawTransition() {
  const p = transitionProgress;
  if (GS.scene === 'toshore') {
    ctx.fillStyle = `rgba(10,40,80,${p})`;
    ctx.fillRect(0, 0, VW, VH);
    for (let i = 0; i < 20; i++) {
      const bx = (i * 47 + GS.time * 30) % VW;
      const by = VH - (VH * p) - i * 10 + Math.sin(i + GS.time) * 20;
      ctx.strokeStyle = `rgba(200,240,255,${Math.max(0, 1 - p)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 4 * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// ============ UPDATE ============
function updateFishing(dt) {
  GS.time += dt;
  GS.zoneTimer += dt;

  // Zone switch
  if (GS.zoneTimer > 30) {
    GS.zoneTimer = 0;
    GS.zone = (GS.zone + 1) % 3;
    generateDecorations();
    showMessage(`进入 ${ZONES[GS.zone].name}！`, 2000);
  }

  // Weather events
  GS.weatherTimer += dt;
  if (GS.weatherTimer > 20) {
    GS.weatherTimer = 0;
    const weathers = ['normal', 'normal', 'current', 'dark'];
    const oldWeather = GS.weather;
    GS.weather = weathers[Math.floor(Math.random() * weathers.length)];
    if (GS.weather !== oldWeather) {
      const msgs = { current: '🌊 洋流来了！鱼群变向！', dark: '🌑 暗流！视野变暗！', normal: '☀️ 海水恢复平静' };
      if (msgs[GS.weather]) showMessage(msgs[GS.weather], 2000);
    }
  }

  // Oxygen
  GS.oxygen -= dt * 4;
  if (GS.oxygen <= 0) {
    GS.oxygen = 0;
    showMessage('氧气耗尽！自动上岸！', 1500);
    startTransitionToShore();
  }
  document.getElementById('oxyBar').style.width = (GS.oxygen / GS.oxygenMax * 100) + '%';

  // Ambient seabed bubbles — rise continuously from the seafloor
  if (Math.random() < dt * 8) {
    const bx = cam.x + Math.random() * VW;
    const by = currentWH - 40 - Math.random() * 80;
    const r = 1.5 + Math.random() * 4.5;
    bubbles.push({ x: bx, y: by, r, ry: r * 0.9, vy: -(0.3 + Math.random() * 0.7), life: 1.0,
                   dx: (Math.random() - 0.5) * 0.25, wobble: Math.random() * Math.PI * 2, wobbleSpeed: 0.8 + Math.random() * 1.2 });
  }

  // Spawn fish to keep the sea populated
  if (Math.random() < dt * 3.5) spawnFish();

  // Update fish
  const currentDir = GS.weather === 'current' ? 1 : 0;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    f.phase += dt;

    // Shark AI - sense player and escape
    if (f.type === 'shark') {
      const dx = diver.x - f.x, dy = diver.y - f.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        f.scared = true;
        f.vx = f.vx - dx / dist * 0.3;
        f.vy = f.vy - dy / dist * 0.3;
      }
    }
    if (f.scaredTimer > 0) f.scaredTimer -= dt;
    else f.scared = false;

    // Wave motion
    f.vy += Math.sin(f.phase * 2) * 0.02;
    f.vy *= 0.98;

    // Current effect
    if (GS.weather === 'current') f.vx += currentDir * 0.05;

    f.x += f.vx;
    f.y += f.vy;

    // Boundary bounce
    if (f.y < 60) { f.y = 60; f.vy = Math.abs(f.vy); }
    if (f.y > currentWH - 100) { f.y = currentWH - 100; f.vy = -Math.abs(f.vy); }

    // Remove if far off viewport (check both axes for portrait mode)
    if (f.x < cam.x - 300 || f.x > cam.x + VW + 300 ||
        f.y < cam.y - 300 || f.y > cam.y + VH + 300) {
      fishes.splice(i, 1);
    }
  }

  // Shark click timeout
  for (const id in sharkClickState) {
    sharkClickState[id].timer -= dt;
    if (sharkClickState[id].timer <= 0) {
      delete sharkClickState[id];
    }
  }

  // Update diver bubbles
  if (Math.random() < dt * 3) {
    diver.bubbles.push({ x: diver.x + (diver.dir > 0 ? 18 : -18), y: diver.y - 30, r: 3 + Math.random() * 3, vy: -(0.8 + Math.random()), life: 1.0, dx: (Math.random() - 0.5) * 0.3 });
  }
  for (let i = diver.bubbles.length - 1; i >= 0; i--) {
    const b = diver.bubbles[i];
    b.y += b.vy;
    b.x += b.dx;
    b.life -= dt * 0.6;
    if (b.life <= 0) diver.bubbles.splice(i, 1);
  }

  // Update bubbles — realistic rise with wobble drift
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.wobble = (b.wobble || 0) + dt * (b.wobbleSpeed || 1.0);
    b.y += b.vy;
    b.x += b.dx + Math.sin(b.wobble) * 0.35;
    b.r += 0.018;
    b.ry = b.r * (0.85 + Math.abs(Math.sin(b.wobble * 0.5)) * 0.15);
    b.life -= dt * 0.55;
    if (b.life <= 0 || b.y < cam.y - 40) bubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 1.2;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Message timer
  if (GS.msgTimer > 0) {
    GS.msgTimer -= dt * 1000;
    if (GS.msgTimer <= 0) document.getElementById('msgBox').style.display = 'none';
  }
  if (GS.sharkHintTimer > 0) {
    GS.sharkHintTimer -= dt * 1000;
    if (GS.sharkHintTimer <= 0) document.getElementById('sharkHint').style.display = 'none';
  }

  // Update HUD
  document.getElementById('score').textContent = GS.score;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('storage').textContent = GS.warehouse.length;
  document.getElementById('zoneName').textContent = ZONES[GS.zone].name;
}

function updateRestaurant(dt) {
  GS.time += dt;

  // Spawn customers
  if (GS.tables.length > 0 && Math.random() < dt * 0.3) {
    const emptyTable = GS.tables.find(t => !t.customer);
    if (emptyTable && GS.warehouse.length > 0) {
      const warehouseByType = {};
      for (const w of GS.warehouse) {
        warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
      }
      const availableDishes = SUSHI_MENU.filter(d => warehouseByType[d.fishType] > 0);
      if (availableDishes.length > 0) {
        const order = availableDishes[Math.floor(Math.random() * availableDishes.length)];
        emptyTable.customer = {
          style: ['business', 'casual', 'lady', 'old'][Math.floor(Math.random() * 4)],
          order,
          patience: 1.0,
          state: 'waiting',
          servedTimer: 0
        };
      }
    }
  }

  // Update customers
  for (const t of GS.tables) {
    if (t.customer) {
      const c = t.customer;
      if (c.state === 'waiting') {
        c.patience -= dt * 0.06;
        if (c.patience <= 0) {
          GS.satisfaction = Math.max(0, GS.satisfaction - 10);
          spawnFloatingText(t.x, t.y - 60, '-10 满意度 😡', '#f44');
          t.customer = null;
        }
      } else if (c.state === 'served') {
        c.servedTimer += dt;
        c.eatPhase = (c.eatPhase || 0) + dt * 3.5; // eating animation speed
        if (c.servedTimer > 3.5) t.customer = null;
      }
    }
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= dt * 0.8;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Update flying dishes
  for (let i = flyingDishes.length - 1; i >= 0; i--) {
    const d = flyingDishes[i];
    d.progress += dt / d.dur;
    if (d.progress >= 1) flyingDishes.splice(i, 1);
  }

  // Update restaurant HUD
  document.getElementById('coins2').textContent = GS.coins;
  document.getElementById('satisfaction').textContent = GS.satisfaction;
  document.getElementById('storageCount').textContent = GS.warehouse.length;
}

// ============ INPUT ============
const keys = {};


document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (GS.scene === 'title' && (e.key === ' ' || e.key === 'Enter')) {
    e.preventDefault();
    GS._btnPressT = GS.time;
    startGame();
    return;
  }
  if (e.key === 'e' || e.key === 'E') {
    if (GS.scene === 'fishing') goAshore();
  }
  // Space bar — catch nearest fish to screen center
  if ((e.key === ' ' || e.key === 'Spacebar') && GS.scene === 'fishing') {
    e.preventDefault();
    const mx = cam.x + VW / 2;
    const my = cam.y + VH / 2;
    handleFishingClick(mx, my);
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseScreen.x = e.clientX - rect.left;
  mouseScreen.y = e.clientY - rect.top;
});

// Left-click to catch fish at cursor position
canvas.addEventListener('click', e => {
  if (GS.scene === 'title') {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const b = GS._titleBtnBounds;
    if (b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      GS._btnPressT = GS.time;
      startGame();
    }
    return;
  }
  if (GS.scene === 'fishing') {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) + cam.x;
    const my = (e.clientY - rect.top) + cam.y;
    handleFishingClick(mx, my);
  } else if (GS.scene === 'restaurant') {
    const rect = canvas.getBoundingClientRect();
    handleRestaurantClick(e.clientX - rect.left, e.clientY - rect.top);
  }
});

// ── Touch input — optimized for iOS responsiveness ──
// DRAG_THRESHOLD: 4px so even tiny swipes pan the camera immediately
const DRAG_THRESHOLD = 4;
// lastTouch tracks the previous position for delta-based panning (no accumulation lag)
let lastTouchX = 0, lastTouchY = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartPos = { x: t.clientX, y: t.clientY };
  lastTouchX = t.clientX;
  lastTouchY = t.clientY;
  touchIsDrag = false;
  touchActive = true;

  // Immediate press feedback on title button
  if (GS.scene === 'title') {
    const rect = canvas.getBoundingClientRect();
    const tx = t.clientX - rect.left;
    const ty = t.clientY - rect.top;
    const b = GS._titleBtnBounds;
    if (b && tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
      GS._btnPressT = GS.time;
    }
  }
  if (GS.scene === 'restaurant') {
    const rect = canvas.getBoundingClientRect();
    restaurantTouchStart = { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStartPos) return;
  const t = e.touches[0];

  // Delta from last frame (not from touchstart) — smooth, no rubber-band lag
  const dx = t.clientX - lastTouchX;
  const dy = t.clientY - lastTouchY;
  lastTouchX = t.clientX;
  lastTouchY = t.clientY;

  // Decide drag vs tap using total displacement from touchstart
  const totalDx = t.clientX - touchStartPos.x;
  const totalDy = t.clientY - touchStartPos.y;
  if (!touchIsDrag && Math.sqrt(totalDx * totalDx + totalDy * totalDy) > DRAG_THRESHOLD) {
    touchIsDrag = true;
  }

  if (touchIsDrag && GS.scene === 'fishing') {
    const maxCamX = Math.max(0, currentWW - VW);
    const maxCamY = Math.max(0, currentWH - VH);
    // Subtract delta: finger moves right → world scrolls left
    cam.x = Math.min(maxCamX, Math.max(0, cam.x - dx));
    cam.y = Math.min(maxCamY, Math.max(0, cam.y - dy));
    camTarget.x = cam.x;
    camTarget.y = cam.y;
  }

  // Restaurant dish drag: update cursor position for visual feedback
  if (GS.scene === 'restaurant' && GS.preparingDish) {
    const rect = canvas.getBoundingClientRect();
    mouseScreen.x = t.clientX - rect.left;
    mouseScreen.y = t.clientY - rect.top;
    touchIsDrag = true;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = t.clientX - rect.left;
  const ty = t.clientY - rect.top;

  if (GS.scene === 'restaurant') {
    if (touchIsDrag && GS.preparingDish) {
      handleRestaurantClick(tx, ty);
    } else if (!touchIsDrag) {
      handleRestaurantClick(tx, ty);
    }
    touchStartPos = null; touchIsDrag = false; return;
  }

  if (touchIsDrag) { touchStartPos = null; touchIsDrag = false; return; }

  // Pure tap
  if (GS.scene === 'title') {
    const b = GS._titleBtnBounds;
    if (b && tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
      GS._btnPressT = GS.time;
      startGame();
    }
  } else if (GS.scene === 'fishing') {
    const mx = tx + cam.x;
    const my = ty + cam.y;
    handleFishingClick(mx, my);
  }
  touchStartPos = null;
  touchIsDrag = false;
}, { passive: false });

function handleFishingClick(mx, my) {
  if (GS.warehouse.length >= GS.warehouseMax) {
    showMessage('🎒 仓库已满！请上岸卸货', 2000);
    return;
  }

  let nearest = null, nearestDist = Infinity;
  for (const f of fishes) {
    const dx = mx - f.x, dy = my - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // iOS fingers are larger — give generous hit area
    const touchBonus = (navigator.maxTouchPoints > 0) ? (IS_IOS ? 40 : 30) : 0;
    const hitRadius = f.size + 15 + (GS.upgradeNet ? 15 : 0) + touchBonus;
    if (dist < hitRadius && dist < nearestDist) {
      nearest = f;
      nearestDist = dist;
    }
  }

  if (!nearest) {
    // Ripple effect
    for (let i = 0; i < 5; i++) {
      bubbles.push({ x: mx + (Math.random()-0.5)*20, y: my + (Math.random()-0.5)*20, r: 2, vy: -(0.5+Math.random()), life: 0.8, dx: (Math.random()-0.5)*0.5 });
    }
    return;
  }

  // Click effect
  for (let i = 0; i < 8; i++) {
    particles.push({ x: nearest.x, y: nearest.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 1.0, color: nearest.bodyColor });
  }

  if (nearest.clicks === 1) {
    // Instant catch
    catchFish(nearest);
  } else if (nearest.type === 'shark' || nearest.clicks > 1) {
    // Multi-click catch
    if (!sharkClickState[nearest.id]) {
      sharkClickState[nearest.id] = { count: 0, timer: 1.5 };
      document.getElementById('sharkHint').style.display = 'block';
      GS.sharkHintTimer = 1500;
    }
    sharkClickState[nearest.id].count++;
    sharkClickState[nearest.id].timer = 1.5;

    if (sharkClickState[nearest.id].count >= nearest.clicks) {
      delete sharkClickState[nearest.id];
      document.getElementById('sharkHint').style.display = 'none';
      // Shark tries to escape when at last click
      if (nearest.type === 'shark') {
        nearest.scared = true;
        nearest.scaredTimer = 99;
      }
      catchFish(nearest);
    } else {
      spawnFloatingText(nearest.x, nearest.y - 20, `${sharkClickState[nearest.id].count}/${nearest.clicks}`, '#ffa');
    }
  }
}

function catchFish(f) {
  const idx = fishes.indexOf(f);
  if (idx === -1) return;
  fishes.splice(idx, 1);

  GS.score += f.score;
  GS.warehouse.push({ type: f.type, name: f.name, emoji: f.emoji, value: f.value });
  spawnFloatingText(f.x, f.y - 10, `+${f.score} 分  ${f.emoji}`, '#7ff');
  showMessage(`捕获 ${f.emoji} ${f.name}！+${f.score}分`, 1200);

  // Splash particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: f.x, y: f.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1.0, color: '#7ef' });
  }
}

function handleRestaurantClick(screenX, screenY) {
  // Inverse of drawRestaurant's scale+translate
  const scale = Math.min(VW / 900, VH / 600);
  const offsetX = (VW - 900 * scale) / 2;
  const offsetY = (VH - 600 * scale) / 2;
  const mx = (screenX - offsetX) / scale;
  const my = (screenY - offsetY) / scale;

  // Check sell all button
  if (mx >= 15 && mx <= 95 && my >= 545 && my <= 570) {
    sellAll();
    return;
  }

  // Check fish items in warehouse (sell individual)
  const warehouseByType = {};
  for (const w of GS.warehouse) {
    warehouseByType[w.type] = (warehouseByType[w.type] || 0) + 1;
  }
  let wy = 410;
  for (const ft of FISH_TYPES) {
    const cnt = warehouseByType[ft.type] || 0;
    if (cnt > 0) {
      // Sell button area
      if (mx >= 145 && mx <= 185 && my >= wy - 15 && my <= wy + 5) {
        // Sell one of this type
        const idx = GS.warehouse.findIndex(w => w.type === ft.type);
        if (idx !== -1) {
          const fish = GS.warehouse.splice(idx, 1)[0];
          GS.coins += fish.value;
          spawnFloatingText(165, wy - 20, `+${fish.value}💰`, '#ff4');
        }
        return;
      }
      // Select fish for serving
      if (mx >= 20 && mx <= 140 && my >= wy - 15 && my <= wy + 5) {
        GS.preparingDish = ft;
        spawnFloatingText(80, wy - 20, `选择: ${ft.name}`, '#adf');
        return;
      }
      wy += 22;
    }
  }

  // Check upgrade buttons
  const upgrades = [
    { x: 295, y: 543, w: 140, h: 40, cost: 200, action: 'net' },
    { x: 450, y: 543, w: 140, h: 40, cost: 300, action: 'speed' },
    { x: 605, y: 543, w: 140, h: 40, cost: 500, action: 'table' }
  ];
  for (const u of upgrades) {
    if (mx >= u.x && mx <= u.x + u.w && my >= u.y && my <= u.y + u.h) {
      if (GS.coins >= u.cost) {
        GS.coins -= u.cost;
        if (u.action === 'net') { GS.upgradeNet = true; showMessage('🎣 渔网已升级！捕鱼范围扩大！', 2000); }
        if (u.action === 'speed') { GS.upgradeSpeed = true; showMessage('🏃 潜水员速度提升！', 2000); }
        if (u.action === 'table') {
          if (GS.tables.length < 4) {
            addTable();
            showMessage('🏠 新桌位开放！可接待更多顾客！', 2000);
          } else {
            showMessage('餐厅已满员！', 1500);
          }
        }
      } else {
        showMessage(`💰 金币不足！需要 ${u.cost} 金币`, 1500);
      }
      return;
    }
  }

  // Serve customer - click on table with customer
  if (GS.preparingDish) {
    for (const t of GS.tables) {
      if (!t.customer) continue;
      const c = t.customer;
      const dx = mx - t.x, dy = my - t.y;
      if (Math.sqrt(dx*dx + dy*dy) < 60 && c.state === 'waiting') {
        if (c.order.fishType === GS.preparingDish.type) {
          // Serve!
          const idx = GS.warehouse.findIndex(w => w.type === GS.preparingDish.type);
          if (idx !== -1) {
            GS.warehouse.splice(idx, 1);
            const tip = Math.floor(c.patience > 0.7 ? c.order.price * 1.2 : c.order.price);
            GS.coins += tip;
            GS.score += Math.floor(c.order.price / 5);
            c.state = 'served';
            c.servedTimer = 0;
            c.servedEmoji = c.order.emoji;
            c.eatPhase = 0; // eating animation phase

            // Flying dish animation: from inventory panel → table (screen coords)
            const rScale = Math.min(VW / 900, VH / 600);
            const rOffX = (VW - 900 * rScale) / 2;
            const rOffY = (VH - 600 * rScale) / 2;
            flyingDishes.push({
              sx: rOffX + 100 * rScale,            // inventory panel center
              sy: rOffY + 430 * rScale,
              tx: rOffX + t.x * rScale,             // table screen pos
              ty: rOffY + (t.y + 10) * rScale,
              emoji: c.order.emoji,
              progress: 0,
              dur: 0.45
            });

            GS.preparingDish = null;
            if (c.patience > 0.8) {
              GS.satisfaction = Math.min(100, GS.satisfaction + 5);
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰 😊 快速服务！`, '#ff4');
            } else {
              spawnFloatingText(t.x, t.y - 80, `+${tip}💰`, '#ff4');
            }
          } else {
            showMessage('仓库里没有这种鱼了！', 1500);
            GS.preparingDish = null;
          }
        } else {
          spawnFloatingText(t.x, t.y - 80, '❌ 食材不对！', '#f44');
        }
        return;
      }
    }
  }
}

function sellAll() {
  if (GS.warehouse.length === 0) { showMessage('仓库是空的！', 1500); return; }
  let total = 0;
  for (const f of GS.warehouse) total += f.value;
  GS.coins += total;
  GS.warehouse = [];
  spawnFloatingText(55, 535, `+${total}💰 全部出售！`, '#ff4');
  showMessage(`出售所有鱼类！+${total} 金币`, 2000);
}

function addTable() {
  const positions = [
    { x: 220, y: 420 }, { x: 420, y: 420 }, { x: 620, y: 420 }, { x: 820, y: 420 }
  ];
  if (GS.tables.length < positions.length) {
    GS.tables.push({ ...positions[GS.tables.length], customer: null });
  }
}

// ============ SCENE TRANSITIONS ============
function goAshore() {
  if (GS.scene !== 'fishing') return;
  GS.scene = 'toshore';
  transitionProgress = 0;
}

window.goAshore = goAshore;

function goDiving() {
  if (GS.scene !== 'restaurant') return;
  GS.scene = 'todive';
  transitionProgress = 0;
  GS.preparingDish = null;
}

window.goDiving = goDiving;

function startTransitionToShore() {
  GS.scene = 'toshore';
  transitionProgress = 0;
}

// ============ MESSAGE ============
function showMessage(text, duration) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.style.display = 'block';
  GS.msgTimer = duration;
}

// ============ GAME LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, VW, VH);

  if (GS.scene === 'title') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'none';
    document.getElementById('shoreBtn').style.display = 'none';
    document.getElementById('diveBtn').style.display = 'none';
    GS.time += dt;
    drawTitle();
    requestAnimationFrame(loop);
    return;
  }

  if (GS.scene === 'fishing') {
    document.getElementById('fishingHud').style.display = 'flex';
    document.getElementById('restaurantHud').style.display = 'none';
    document.getElementById('shoreBtn').style.display = 'block';
    document.getElementById('diveBtn').style.display = 'none';

    // Apply camera transform for world-space drawing
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    drawBackground();
    drawDecorations();

    // Draw bubbles — photorealistic glass spheres with refraction
    for (const b of bubbles) {
      const bz = b.z ?? 0.3;
      const bScale = depthScale(bz);
      // Wobble: bubbles deform as they rise (faster = more wobble)
      const wobbleT = GS.time * 3.5 + (b.phase || b.x * 0.05);
      const wobbleX = 1 + Math.sin(wobbleT) * 0.07;
      const wobbleY = 1 - Math.sin(wobbleT) * 0.07;
      const rx = b.r * bScale * wobbleX;
      const ry = b.r * bScale * wobbleY;
      const baseAlpha = b.life * 0.85 * (1 - bz * 0.3);

      ctx.save();
      ctx.globalAlpha = baseAlpha;
      ctx.translate(b.x, b.y);

      // 1. Outer atmospheric glow (light scattering around bubble)
      const outerG = ctx.createRadialGradient(0, 0, ry * 0.5, 0, 0, rx * 2.0);
      outerG.addColorStop(0, 'rgba(140,220,255,0)');
      outerG.addColorStop(0.6, 'rgba(100,200,255,0.04)');
      outerG.addColorStop(1,  'rgba(60,160,230,0.0)');
      ctx.fillStyle = outerG;
      ctx.beginPath(); ctx.ellipse(0, 0, rx * 2.0, ry * 2.0, 0, 0, Math.PI * 2); ctx.fill();

      // 2. Bubble body — refraction tint (bottom-right brighter = light from top-left)
      const innerG = ctx.createRadialGradient(-rx * 0.2, -ry * 0.25, 0, rx * 0.15, ry * 0.15, rx * 1.05);
      innerG.addColorStop(0,   'rgba(215,248,255,0.22)');
      innerG.addColorStop(0.45,'rgba(120,210,255,0.07)');
      innerG.addColorStop(0.8, 'rgba(60,160,230,0.04)');
      innerG.addColorStop(1,   'rgba(30,120,200,0.08)');
      ctx.fillStyle = innerG;
      ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill();

      // 3. Rim light (thin bright ring)
      ctx.strokeStyle = `rgba(200,242,255,${0.5 + Math.sin(wobbleT * 0.8) * 0.15})`;
      ctx.lineWidth = Math.max(0.5, rx * 0.08);
      ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();

      // 4. Primary specular highlight (top-left bright lune)
      const hl1G = ctx.createRadialGradient(-rx * 0.28, -ry * 0.32, 0, -rx * 0.22, -ry * 0.25, rx * 0.3);
      hl1G.addColorStop(0, 'rgba(255,255,255,0.95)');
      hl1G.addColorStop(0.5, 'rgba(220,248,255,0.5)');
      hl1G.addColorStop(1, 'rgba(180,235,255,0)');
      ctx.fillStyle = hl1G;
      ctx.beginPath(); ctx.ellipse(-rx * 0.28, -ry * 0.32, rx * 0.26, ry * 0.16, -0.5, 0, Math.PI * 2); ctx.fill();

      // 5. Secondary micro highlight (tiny sparkle)
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(rx * 0.18, -ry * 0.52, rx * 0.07, 0, Math.PI * 2); ctx.fill();

      // 6. Bottom caustic — refracted light patch at bottom of bubble
      const causticG = ctx.createRadialGradient(rx * 0.1, ry * 0.55, 0, rx * 0.1, ry * 0.55, rx * 0.35);
      causticG.addColorStop(0, `rgba(180,245,255,${0.15 * baseAlpha})`);
      causticG.addColorStop(1, 'rgba(100,200,255,0)');
      ctx.fillStyle = causticG;
      ctx.beginPath(); ctx.ellipse(rx * 0.1, ry * 0.55, rx * 0.35, ry * 0.2, 0, 0, Math.PI * 2); ctx.fill();

      // 7. Depth haze tint overlay
      const bHaze = depthHazeAlpha(bz);
      if (bHaze > 0.02) {
        ctx.globalAlpha = baseAlpha * bHaze * 0.5;
        ctx.fillStyle = GS.zone === 2 ? 'rgba(2,8,20,1)' : 'rgba(6,45,100,1)';
        ctx.beginPath(); ctx.ellipse(0, 0, rx * 1.02, ry * 1.02, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // Draw particles with depth
    for (const p of particles) {
      const pz = p.z ?? 0.4;
      const ps = depthScale(pz) * 5;
      ctx.save();
      ctx.globalAlpha = p.life * (1 - pz * 0.5);
      const pG = ctx.createRadialGradient(p.x - 1, p.y - 1, 0, p.x, p.y, ps);
      pG.addColorStop(0, 'rgba(255,255,255,0.9)');
      pG.addColorStop(0.4, p.color || '#7ef');
      pG.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = pG;
      ctx.beginPath();
      ctx.arc(p.x, p.y, ps, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (const f of fishes) drawFish(f);
    drawDiver();
    drawFloatingTexts();

    // Restore camera transform — HUD drawn in screen space
    ctx.restore();

    // Camera follows mouse (PC only) — touch uses direct drag in touchmove
    if (GS.scene === 'fishing' && !touchActive) {
      const normX = mouseScreen.x / VW;
      const normY = mouseScreen.y / VH;
      camTarget.x = normX * Math.max(0, currentWW - VW);
      camTarget.y = normY * Math.max(0, currentWH - VH);
      cam.x += (camTarget.x - cam.x) * 0.04;
      cam.y += (camTarget.y - cam.y) * 0.04;
    }
    if (GS.scene === 'fishing') {
      cam.x = Math.min(Math.max(0, currentWW - VW), Math.max(0, cam.x));
      cam.y = Math.min(Math.max(0, currentWH - VH), Math.max(0, cam.y));
    }

    // Update diver — auto-wander around the viewport center
    {
      // Diver lazily follows the viewport center with gentle wandering
      const wanderX = cam.x + VW / 2 + Math.sin(GS.time * 0.4) * VW * 0.25;
      const wanderY = cam.y + VH / 2 + Math.sin(GS.time * 0.27 + 1.5) * VH * 0.2;
      const lerp = 0.006;
      diver.x += (wanderX - diver.x) * lerp;
      diver.y += (wanderY - diver.y) * lerp;
      if (wanderX > diver.x + 2) diver.dir = 1;
      else if (wanderX < diver.x - 2) diver.dir = -1;
      diver.x = Math.max(40, Math.min(currentWW - 40, diver.x));
      diver.y = Math.max(40, Math.min(currentWH - 80, diver.y));
    }

    updateFishing(dt);

  } else if (GS.scene === 'toshore') {
    document.getElementById('shoreBtn').style.display = 'none';
    document.getElementById('diveBtn').style.display = 'none';
    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    drawBackground();
    drawDecorations();
    for (const f of fishes) drawFish(f);
    drawDiver();
    ctx.restore();

    transitionProgress += dt * 1.5;
    drawTransition();

    if (transitionProgress >= 1) {
      GS.scene = 'restaurant';
      GS.oxygen = GS.oxygenMax;
      if (GS.tables.length === 0) { addTable(); addTable(); }
      document.getElementById('oxyBar').style.width = '100%';
      showMessage('欢迎回到岸上！经营你的寿司店吧！', 3000);
    }

  } else if (GS.scene === 'todive') {
    document.getElementById('shoreBtn').style.display = 'none';
    document.getElementById('diveBtn').style.display = 'none';
    drawRestaurant();
    transitionProgress += dt * 1.5;

    ctx.fillStyle = `rgba(0,30,80,${transitionProgress})`;
    ctx.fillRect(0, 0, VW, VH);

    if (transitionProgress >= 1) {
      GS.scene = 'fishing';
      updateWorldSize();
      diver.x = currentWW / 2;
      diver.y = currentWH / 2;
      cam.x = Math.max(0, Math.min(currentWW - VW, currentWW / 2 - VW / 2));
      cam.y = Math.max(0, Math.min(currentWH - VH, currentWH / 2 - VH / 2));
      camTarget.x = cam.x; camTarget.y = cam.y;
      fishes = [];
      generateDecorations();
      for (let i = 0; i < 28; i++) spawnFish(true);
      showMessage('🤿 再次潜入深海！', 2000);
    }

  } else if (GS.scene === 'restaurant') {
    document.getElementById('fishingHud').style.display = 'none';
    document.getElementById('restaurantHud').style.display = 'flex';
    document.getElementById('shoreBtn').style.display = 'none';
    document.getElementById('diveBtn').style.display = 'block';

    drawRestaurant();
    drawFloatingTexts();

    // Flying dish animations (screen space, on top of everything)
    for (const d of flyingDishes) {
      const p = d.progress;
      // Ease out cubic
      const ep = 1 - Math.pow(1 - p, 3);
      const x = d.sx + (d.tx - d.sx) * ep;
      // Arc upward via quadratic bezier (control point above midpoint)
      const cy = Math.min(d.sy, d.ty) - 80;
      const bx = d.sx + (d.tx - d.sx) * ep;
      const t2 = ep;
      const arcY = (1-t2)*(1-t2)*d.sy + 2*(1-t2)*t2*cy + t2*t2*d.ty;
      const scale = 0.6 + 0.4 * ep;
      ctx.save();
      ctx.translate(x, arcY);
      ctx.scale(scale, scale);
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Plate shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.ellipse(2, 6, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
      // Plate
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,140,80,0.4)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillText(d.emoji, 0, -4);
      ctx.restore();
    }

    // Cursor: if holding a dish, draw emoji following mouse
    if (GS.preparingDish) {
      const cx = mouseScreen.x, cy = mouseScreen.y;
      ctx.save();
      ctx.font = '22px serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      // Small plate under food
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.ellipse(cx + 14, cy + 22, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,140,80,0.4)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(cx + 14, cy + 22, 14, 5, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillText(GS.preparingDish.emoji, cx + 4, cy + 6);
      // "点击桌子上菜" hint near cursor
      ctx.fillStyle = 'rgba(40,20,0,0.75)';
      ctx.beginPath(); ctx.roundRect(cx + 28, cy + 2, 90, 20, 4); ctx.fill();
      ctx.fillStyle = '#fff8e8';
      ctx.font = '11px Microsoft YaHei';
      ctx.textAlign = 'left';
      ctx.fillText('点击桌子上菜', cx + 32, cy + 16);
      ctx.restore();
    }

    updateRestaurant(dt);
  }

  requestAnimationFrame(loop);
}

// ============ INIT ============
function startGame() {
  updateWorldSize();
  diver.x = currentWW / 2;
  diver.y = currentWH / 2;
  cam.x = Math.max(0, Math.min(currentWW - VW, currentWW / 2 - VW / 2));
  cam.y = Math.max(0, Math.min(currentWH - VH, currentWH / 2 - VH / 2));
  camTarget.x = cam.x; camTarget.y = cam.y;
  generateDecorations();
  fishes = [];
  for (let i = 0; i < 28; i++) spawnFish(true);
  GS.scene = 'fishing';
  const hint = (navigator.maxTouchPoints > 0) ? '🤿 滑动探索海洋，点击捕鱼！' : '🤿 移动鼠标探索海洋，点击或空格键捕鱼！';
  showMessage(hint, 4000);
}

function init() {
  updateWorldSize();
  diver.x = currentWW / 2;
  diver.y = currentWH / 2;
  cam.x = Math.max(0, Math.min(currentWW - VW, currentWW / 2 - VW / 2));
  cam.y = Math.max(0, Math.min(currentWH - VH, currentWH / 2 - VH / 2));
  camTarget.x = cam.x;
  camTarget.y = cam.y;
  mouseScreen.x = VW / 2;
  mouseScreen.y = VH / 2;
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
