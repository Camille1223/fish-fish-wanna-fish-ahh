<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- iOS fullscreen / standalone mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="深海捕鱼">
<meta name="mobile-web-app-capable" content="yes">
<!-- viewport-fit=cover fills the notch/home-indicator areas -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>深海捕鱼 & 寿司店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'Georgia', serif;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  body {
    display: flex; justify-content: center; align-items: center;
    /* Cover safe area (notch, home indicator) */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #gameCanvas {
    display: block;
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    /* dvh fills correctly on iOS Safari 15.4+; falls back to vh on older */
    width: 100dvw; height: 100dvh;
    touch-action: none;
    -webkit-touch-callout: none;
    cursor: pointer;
  }
  #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }

  /* ── iOS "Add to Home Screen" banner ── */
  #iosInstallBanner {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
    background: rgba(2, 12, 35, 0.97);
    border-top: 1px solid rgba(80,180,255,0.4);
    padding: 12px 20px 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    color: #a0e8ff; font-size: 13px; text-align: center;
    backdrop-filter: blur(12px);
    pointer-events: all;
  }
  #iosInstallBanner .banner-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  #iosInstallBanner .share-icon { font-size: 20px; }
  #iosInstallBanner .close-btn {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; color: rgba(160,220,255,0.6);
    font-size: 18px; cursor: pointer; padding: 4px 8px;
    pointer-events: all;
  }

  /* ── Portrait lock overlay ── */
  #rotateHint {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(2, 10, 30, 0.97);
    flex-direction: column; justify-content: center; align-items: center; gap: 20px;
    color: #a0e8ff; font-size: 18px; text-align: center;
  }
  #rotateHint .rotate-icon { font-size: 64px; animation: rotateAnim 1.6s ease-in-out infinite; }
  @keyframes rotateAnim {
    0%   { transform: rotate(0deg);   }
    40%  { transform: rotate(90deg);  }
    60%  { transform: rotate(90deg);  }
    100% { transform: rotate(0deg);   }
  }
  /* Show overlay only in portrait on mobile */
  @media (max-width: 768px) and (orientation: portrait) {
    #rotateHint { display: flex; }
  }

  /* ── Top HUD bar ── */
  .hud {
    position: absolute;
    top: env(safe-area-inset-top, 6px);
    left: env(safe-area-inset-left, 0px);
    right: env(safe-area-inset-right, 0px);
    display: flex; flex-wrap: wrap; align-items: center;
    padding: 4px 8px; gap: 4px;
  }
  .hud-item {
    background: rgba(2,15,40,0.78);
    border: 1px solid rgba(80,180,255,0.35);
    border-top: 1px solid rgba(140,220,255,0.5);
    border-radius: 8px;
    padding: 3px 8px;
    color: #b8e8ff;
    font-size: 11px;
    backdrop-filter: blur(8px);
    min-height: 28px;
    display: inline-flex; align-items: center;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,80,160,0.35), inset 0 1px 0 rgba(160,230,255,0.12);
  }
  /* Landscape: HUD on one row, slightly smaller */
  @media (orientation: landscape) {
    .hud { padding: 3px 6px; gap: 3px; }
    .hud-item { font-size: 10px; padding: 2px 7px; min-height: 24px; }
    .oxygen-bar { width: 60px !important; }
  }

  /* ── Shore / Dive action button ── */
  #shoreBtn, #diveBtn {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all; cursor: pointer;
    background: rgba(2,15,40,0.88);
    border: 1.5px solid rgba(200,240,255,0.5);
    border-top: 1.5px solid rgba(220,248,255,0.75);
    border-radius: 24px;
    padding: 9px 26px;
    color: #dff4ff;
    font-size: 15px;
    font-family: 'Microsoft YaHei', 'Georgia', serif;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,120,220,0.4), inset 0 1px 0 rgba(200,240,255,0.15);
    white-space: nowrap; z-index: 10;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  /* Landscape: smaller padding so button doesn't eat screen height */
  @media (orientation: landscape) {
    #shoreBtn, #diveBtn {
      padding: 6px 22px; font-size: 13px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
    }
  }
  #shoreBtn:hover { box-shadow: 0 4px 28px rgba(0,160,255,0.6); border-color: rgba(160,230,255,0.8); }
  #diveBtn { border-color: rgba(100,210,255,0.55); color: #a0e8ff; box-shadow: 0 4px 20px rgba(0,150,255,0.35), inset 0 1px 0 rgba(140,220,255,0.15); }
  #diveBtn:hover { box-shadow: 0 4px 28px rgba(0,180,255,0.65); }

  .oxygen-bar { width: 80px; height: 9px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(80,180,255,0.4); }
  .oxygen-fill { height: 100%; background: linear-gradient(90deg, #0080cc, #00c8e8, #40f0d0); border-radius: 6px; transition: width 0.3s; box-shadow: 0 0 8px rgba(0,200,240,0.7); }

  #msgBox { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) translateY(-40px); background: rgba(2,12,35,0.90); border: 1px solid rgba(80,180,255,0.5); border-top: 1px solid rgba(140,220,255,0.7); border-radius: 14px; padding: 9px 24px; color: #cce8ff; font-size: 15px; display: none; text-align: center; pointer-events: none; box-shadow: 0 6px 28px rgba(0,100,220,0.5), inset 0 1px 0 rgba(180,230,255,0.1); max-width: 88vw; backdrop-filter: blur(10px); }
  #sharkHint { position: fixed; top: 45%; left: 50%; transform: translateX(-50%); color: #ffee44; font-size: 14px; font-weight: bold; display: none; text-shadow: 0 0 16px rgba(255,160,0,0.9), 0 0 6px rgba(255,80,0,0.6); pointer-events: none; }
</style>
</head>
<body>
<!-- Rotate to landscape hint — shown via CSS media query in portrait on mobile -->
<div id="rotateHint">
  <div class="rotate-icon">📱</div>
  <div>请旋转手机<br>横屏游玩效果更佳</div>
</div>
<!-- iOS install prompt -->
<div id="iosInstallBanner">
  <button class="close-btn" onclick="document.getElementById('iosInstallBanner').style.display='none'">✕</button>
  <div class="banner-row">
    <span class="share-icon">⬆️</span>
    <span>点击 <strong>分享</strong> 按钮，选择 <strong>"添加到主屏幕"</strong>，即可全屏横屏游玩 🎮</span>
  </div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="hud" id="fishingHud">
    <div class="hud-item">🏆 <span id="score">0</span></div>
    <div class="hud-item">💰 <span id="coins">0</span></div>
    <div class="hud-item" style="display:flex;align-items:center;gap:6px;">
      🫧 <div class="oxygen-bar"><div class="oxygen-fill" id="oxyBar" style="width:100%"></div></div>
    </div>
    <div class="hud-item">🎒 <span id="storage">0</span>/20</div>
    <div class="hud-item" style="color:#adf;">区域: <span id="zoneName">浅海</span></div>
  </div>
  <div class="hud" id="restaurantHud" style="display:none;">
    <div class="hud-item">💰 <span id="coins2">0</span></div>
    <div class="hud-item">😊 满意度: <span id="satisfaction">100</span>%</div>
    <div class="hud-item">📦 仓库: <span id="storageCount">0</span>条</div>
  </div>
  <div id="msgBox"></div>
  <div id="sharkHint">🦈 快速点击鲨鱼 3 次！</div>
</div>
<!-- Action buttons: fixed bottom center, always visible -->
<button id="shoreBtn" style="display:none;" onclick="goAshore()">🏖️ 上岸</button>
<button id="diveBtn" style="display:none;" onclick="goDiving()">🤿 再次潜水</button>

<script>
// ── iOS detection ──
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const IS_STANDALONE = window.navigator.standalone === true; // "Add to Home Screen" mode

// Show iOS install banner if: iOS Safari (not standalone, not already dismissed)
if (IS_IOS && !IS_STANDALONE && !sessionStorage.getItem('iosBannerDismissed')) {
  // Delay slightly so page renders first
  setTimeout(() => {
    const banner = document.getElementById('iosInstallBanner');
    if (banner) banner.style.display = 'block';
  }, 2500);
}
document.getElementById('iosInstallBanner')?.querySelector('.close-btn')?.addEventListener('click', () => {
  sessionStorage.setItem('iosBannerDismissed', '1');
});

// Try to lock landscape on Android (iOS ignores this, relies on standalone manifest)
function tryLockLandscape() {
  if (!IS_IOS && screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
}
document.addEventListener('touchstart', tryLockLandscape, { once: true });
document.addEventListener('click', tryLockLandscape, { once: true });

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── Safari/iOS polyfill: ctx.roundRect not available before iOS 16 ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    while (r.length < 4) r.push(r[r.length - 1]);
    const [tl, tr, br, bl] = r.map(v => Math.min(v, Math.min(w / 2, h / 2)));
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.arcTo(x + w, y, x + w, y + tr, tr);
    this.lineTo(x + w, y + h - br);
    this.arcTo(x + w, y + h, x + w - br, y + h, br);
    this.lineTo(x + bl, y + h);
    this.arcTo(x, y + h, x, y + h - bl, bl);
    this.lineTo(x, y + tl);
    this.arcTo(x, y, x + tl, y, tl);
    this.closePath();
    return this;
  };
}

// Viewport size (matches window)
let VW = window.innerWidth;
let VH = window.innerHeight;
canvas.width = VW;
canvas.height = VH;

// World size (larger than viewport — camera scrolls through it)
const WW = 2000;
const WH = 1600;

// Legacy aliases used by restaurant / UI code
const W = WW;
const H = WH;

// Camera (top-left corner of viewport in world coords)
let cam = { x: 0, y: 0 };
let camTarget = { x: 0, y: 0 };
let mouseScreen = { x: 0, y: 0 };

// Dynamic world size — portrait vs landscape
let currentWW = WW;
let currentWH = WH;
function updateWorldSize() {
  currentWW = (VW < VH) ? 1200 : WW;
  currentWH = (VW < VH) ? 2800 : WH;
}
updateWorldSize();

// Touch state — drag vs tap discrimination
let touchStartPos = null;
let touchIsDrag = false;
let touchActive = false;
let restaurantTouchStart = null;

window.addEventListener('resize', handleResize);
// orientationchange fires before resize on iOS; we handle both
window.addEventListener('orientationchange', () => {
  // Small delay lets browser finish rotating before we read dimensions
  setTimeout(handleResize, 120);
});

function handleResize() {
  const wasPortrait = VW < VH;
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width = VW;
  canvas.height = VH;
  const isPortrait = VW < VH;
  updateWorldSize();

  // Re-clamp camera
  cam.x = Math.min(Math.max(0, currentWW - VW), Math.max(0, cam.x));
  cam.y = Math.min(Math.max(0, currentWH - VH), Math.max(0, cam.y));
  camTarget.x = cam.x;
  camTarget.y = cam.y;
  mouseScreen.x = VW / 2;
  mouseScreen.y = VH / 2;

  // If orientation actually flipped during gameplay, regenerate the scene
  if (wasPortrait !== isPortrait && GS.scene === 'fishing') {
    generateDecorations();
    fishes = [];
    for (let i = 0; i < 28; i++) spawnFish(true);
    // Re-centre camera on diver
    diver.x = currentWW / 2;
    diver.y = currentWH / 2;
    cam.x = Math.min(Math.max(0, currentWW - VW), Math.max(0, currentWW / 2 - VW / 2));
    cam.y = Math.min(Math.max(0, currentWH - VH), Math.max(0, currentWH / 2 - VH / 2));
    camTarget.x = cam.x;
    camTarget.y = cam.y;
  }
}

// ============ GAME STATE ============
const GS = {
  scene: 'title', // 'title' | 'fishing' | 'restaurant' | 'transition'
  score: 0,
  coins: 0,
  satisfaction: 100,
  oxygen: 100,
  oxygenMax: 100,
  warehouse: [], // {type, name, emoji, value}
  warehouseMax: 20,
  time: 0,
  zone: 0, // 0=浅海 1=珊瑚礁 2=深海
  zoneTimer: 0,
  weather: 'normal', // normal | current | dark
  weatherTimer: 0,
  restaurantLevel: 1,
  tables: [],
  preparingDish: null, // currently selected fish for serving
  satisfaction: 100,
  msgTimer: 0,
  sharkHintTimer: 0
};

// ============ FISH TYPES ============
const FISH_TYPES = [
  { type: 'clownfish', name: '小丑鱼',   emoji: '🐠', color: '#ff6b35', bodyColor: '#ff8c42', speed: 1.0, score: 10,  value: 15,  size: 18, clicks: 1, rarity: 0.14 },
  { type: 'tuna',      name: '金枪鱼',   emoji: '🐟', color: '#4a90d9', bodyColor: '#5ba3e8', speed: 1.6, score: 30,  value: 45,  size: 26, clicks: 1, rarity: 0.12 },
  { type: 'salmon',    name: '三文鱼',   emoji: '🐡', color: '#e07b54', bodyColor: '#f09b74', speed: 1.3, score: 40,  value: 60,  size: 23, clicks: 1, rarity: 0.11 },
  { type: 'puffer',    name: '河豚',     emoji: '🐡', color: '#a8c256', bodyColor: '#c8e276', speed: 1.0, score: 50,  value: 80,  size: 20, clicks: 1, rarity: 0.10, wobble: true },
  { type: 'crab',      name: '螃蟹',     emoji: '🦀', color: '#d94f3d', bodyColor: '#f06050', speed: 0.7, score: 60,  value: 90,  size: 21, clicks: 2, rarity: 0.09, sideways: true },
  { type: 'shark',     name: '大鲨鱼',   emoji: '🦈', color: '#557799', bodyColor: '#6688aa', speed: 2.5, score: 200, value: 300, size: 44, clicks: 3, rarity: 0.06, escapes: true },
  { type: 'jellyfish', name: '水母',     emoji: '🪼', color: '#dd88ff', bodyColor: '#eeb0ff', speed: 0.4, score: 25,  value: 35,  size: 20, clicks: 1, rarity: 0.11 },
  { type: 'turtle',    name: '海龟',     emoji: '🐢', color: '#4a9a5a', bodyColor: '#5ab86a', speed: 0.9, score: 80,  value: 120, size: 30, clicks: 2, rarity: 0.07 },
  { type: 'octopus',   name: '章鱼',     emoji: '🐙', color: '#cc5577', bodyColor: '#ee7799', speed: 1.1, score: 100, value: 150, size: 28, clicks: 2, rarity: 0.07 },
  { type: 'seahorse',  name: '海马',     emoji: '🐴', color: '#ffaa33', bodyColor: '#ffcc55', speed: 0.5, score: 70,  value: 100, size: 16, clicks: 1, rarity: 0.08 },
  { type: 'anglerfish',name: '安康鱼',   emoji: '🐟', color: '#334455', bodyColor: '#445566', speed: 1.2, score: 150, value: 200, size: 32, clicks: 2, rarity: 0.05 },
];

const SUSHI_MENU = [
  { name: '金枪鱼寿司', fishType: 'tuna',       price: 80,  emoji: '🍣' },
  { name: '三文鱼寿司', fishType: 'salmon',     price: 100, emoji: '🍣' },
  { name: '螃蟹手卷',   fishType: 'crab',       price: 120, emoji: '🌯' },
  { name: '河豚刺身',   fishType: 'puffer',     price: 150, emoji: '🍱' },
  { name: '鲨鱼大餐',   fishType: 'shark',      price: 500, emoji: '🎌' },
  { name: '小丑鱼汤',   fishType: 'clownfish',  price: 50,  emoji: '🍜' },
  { name: '章鱼烧',     fishType: 'octopus',    price: 180, emoji: '🐙' },
  { name: '海龟汤',     fishType: 'turtle',     price: 200, emoji: '🍵' },
];

// ============ ENTITIES ============
let diver = { x: WW / 2, y: WH / 2, vx: 0, vy: 0, dir: 1, bubbles: [], animTime: 0 };
let fishes = [];
let bubbles = [];
let decorations = [];
let particles = [];
let customers = [];
let floatingTexts = [];
let flyingDishes = []; // { x, y, tx, ty, emoji, t, dur }
let transitionProgress = 0;
let sharkClickState = {}; // fishId -> {count, timer}

// ============ ZONES ============
const ZONES = [
  { name: '浅海', bgTop: '#1a6a9a', bgBot: '#0d3d6b', light: 0.9, fishBonus: 1.0 },
  { name: '珊瑚礁', bgTop: '#0e5c7a', bgBot: '#0a3050', light: 0.7, fishBonus: 1.3 },
  { name: '深海', bgTop: '#0a2a4a', bgBot: '#051828', light: 0.4, fishBonus: 1.8 }
];

// ============ CORAL / SEAWEED GENERATION ============
function generateDecorations() {
  decorations = [];
  const z = GS.zone;
  const cW = currentWW, cH = currentWH;

  // 海草 (更多，分布更广) — near/mid foreground
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * cW;
    const dz = 0.05 + Math.random() * 0.45; // near foreground
    decorations.push({ type: 'seaweed', x, y: cH, height: 50 + Math.random() * 110, phase: Math.random() * Math.PI * 2, color: z === 2 ? '#1a4a2a' : '#2d8a4a', z: dz });
  }

  // 珊瑚 — near/mid
  const coralCount = z === 0 ? 6 : z === 1 ? 14 : 5;
  for (let i = 0; i < coralCount; i++) {
    decorations.push({ type: 'coral', x: Math.random() * cW, y: cH - 30 + Math.random() * 20, size: 22 + Math.random() * 35, color: z === 0 ? '#ff9b6d' : z === 1 ? '#ff6b9d' : '#8855ff', z: 0.1 + Math.random() * 0.5 });
  }

  // 岩石 — mid to far
  for (let i = 0; i < 10; i++) {
    decorations.push({ type: 'rock', x: Math.random() * cW, y: cH - 20 + Math.random() * 30, size: 18 + Math.random() * 32, color: z === 2 ? '#223344' : '#445566', z: 0.3 + Math.random() * 0.55 });
  }

  // 海星 — on the seabed, near
  if (z <= 1) {
    for (let i = 0; i < 7; i++) {
      decorations.push({ type: 'starfish', x: 40 + Math.random() * (cW - 80), y: cH - 15, size: 12 + Math.random() * 14, color: z === 0 ? '#ff7744' : '#ff44aa', angle: Math.random() * Math.PI, z: 0.05 + Math.random() * 0.25 });
    }
  }

  // 扇形珊瑚 — mid
  if (z === 1) {
    for (let i = 0; i < 5; i++) {
      decorations.push({ type: 'fan_coral', x: Math.random() * cW, y: cH - 10, height: 80 + Math.random() * 80, color: ['#ff6b9d','#ff9933','#33ccff','#ff55dd'][Math.floor(Math.random()*4)], phase: Math.random() * Math.PI * 2, z: 0.2 + Math.random() * 0.4 });
    }
  }

  // 城堡 — far background
  if (z >= 1 || Math.random() < 0.5) {
    decorations.push({ type: 'castle', x: 180 + Math.random() * (cW - 360), y: cH - 10, z: 0.65 + Math.random() * 0.3 });
  }

  // 沉船 — far background
  if (z === 2 || (z === 1 && Math.random() < 0.6)) {
    decorations.push({ type: 'shipwreck', x: 100 + Math.random() * (cW - 300), y: cH - 20, z: 0.6 + Math.random() * 0.35 });
  }

  // 气泡柱 — near
  for (let i = 0; i < 4; i++) {
    decorations.push({ type: 'vent', x: Math.random() * cW, y: cH - 10, phase: Math.random() * Math.PI * 2, z: 0.1 + Math.random() * 0.3 });
  }
}

function spawnFish(forceInViewport) {
  if (fishes.length >= 35) return;
  const zone = ZONES[GS.zone];
  const r = Math.random();
  let cumulative = 0;
  let type = FISH_TYPES[0];
  for (const ft of FISH_TYPES) {
    cumulative += ft.rarity;
    if (r < cumulative) { type = ft; break; }
  }
  const spd = type.speed * (0.8 + Math.random() * 0.4);
  let spawnX, spawnY, vxSign, vySign;
  const portrait = VW < VH;
  if (forceInViewport) {
    spawnX = cam.x + 60 + Math.random() * Math.max(1, VW - 120);
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = Math.random() < 0.5 ? -1 : 1;
    vySign = Math.random() < 0.5 ? -1 : 1;
  } else if (portrait) {
    // Portrait: fish swim vertically (enter from top/bottom)
    const side = Math.random() < 0.5 ? -1 : 1;
    spawnX = cam.x + 60 + Math.random() * Math.max(1, VW - 120);
    spawnY = side < 0 ? cam.y - 80 : cam.y + VH + 80;
    vxSign = Math.random() < 0.5 ? -1 : 1;
    vySign = side;
  } else {
    const side = Math.random() < 0.5 ? -1 : 1;
    spawnX = side < 0 ? cam.x - 80 : cam.x + VW + 80;
    spawnY = cam.y + 80 + Math.random() * Math.max(1, VH - 200);
    vxSign = side;
    vySign = Math.random() < 0.5 ? -1 : 1;
  }
  // z: 0=closest foreground, 1=farthest background
  // Bias: most fish in mid-range (0.25–0.75), fewer at extremes
  const fishZ = 0.15 + Math.random() * 0.85;
  fishes.push({
    id: Math.random().toString(36).substr(2),
    ...type,
    x: spawnX,
    y: spawnY,
    vx: portrait && !forceInViewport ? (Math.random() - 0.5) * spd : vxSign * spd,
    vy: portrait && !forceInViewport ? vySign * spd : (Math.random() - 0.5) * 0.6,
    phase: Math.random() * Math.PI * 2,
    hp: type.clicks,
    maxHp: type.clicks,
    scared: false,
    scaredTimer: 0,
    z: fishZ
  });
}

// ============ BUBBLES ============
function spawnBubble(x, y) {
  bubbles.push({ x, y, r: 3 + Math.random() * 5, vy: -(0.5 + Math.random() * 1.5), life: 1.0, dx: (Math.random() - 0.5) * 0.4, z: 0.1 + Math.random() * 0.6 });
}

// ============ DRAW FUNCTIONS ============
function drawBackground() {
  const z = ZONES[GS.zone];
  const darkMult = GS.weather === 'dark' ? 0.35 : 1.0;
  const isDeep = GS.zone === 2;
  const isCoral = GS.zone === 1;
  const t = GS.time;

  // ── Layer 0: Sky above water surface (world y < 0) ──
  // The water surface sits at world y = 0. If cam.y is near 0, sky is visible.
  const surfaceScreenY = -cam.y; // world y=0 in screen coords (after translate)
  if (surfaceScreenY > -VH * 0.5) {
    // Sky gradient above surface
    const skyTop = Math.min(surfaceScreenY, VH);
    const skyGrad = ctx.createLinearGradient(0, cam.y - VH, 0, 0);
    if (GS.weather === 'dark') {
      skyGrad.addColorStop(0, '#0a0a1a');
      skyGrad.addColorStop(1, '#1a1a35');
    } else {
      skyGrad.addColorStop(0, '#7ecbf5');
      skyGrad.addColorStop(0.5, '#b8e4ff');
      skyGrad.addColorStop(1, '#d9f0ff');
    }
    ctx.save();
    ctx.fillStyle = skyGrad;
    ctx.fillRect(cam.x, cam.y - VH, currentWW, VH);

    // Sun disc (if not dark)
    if (GS.weather !== 'dark') {
      const sunX = cam.x + currentWW * 0.72;
      const sunY = cam.y - VH * 0.45;
      const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 180);
      sunGlow.addColorStop(0, 'rgba(255,252,200,0.95)');
      sunGlow.addColorStop(0.08, 'rgba(255,240,120,0.7)');
      sunGlow.addColorStop(0.3, 'rgba(255,210,80,0.25)');
      sunGlow.addColorStop(1, 'rgba(255,180,40,0)');
      ctx.fillStyle = sunGlow;
      ctx.beginPath();
      ctx.arc(sunX, sunY, 180, 0, Math.PI * 2);
      ctx.fill();
      // Hard sun circle
      ctx.fillStyle = 'rgba(255,255,220,0.98)';
      ctx.beginPath();
      ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── Water surface waves (world y ≈ 0) ──
  // Draw even if surface is offscreen — only render when near top of viewport
  if (surfaceScreenY > -120 && surfaceScreenY < VH + 60) {
    ctx.save();

    // 3 layers of waves with different amplitudes/speeds/phases
    const waveLayers = [
      { amp: 11, freq: 0.012, speed: 0.9,  offset: 0,    color: 'rgba(180,235,255,0.45)', lw: 3.5 },
      { amp: 7,  freq: 0.019, speed: 1.35, offset: 2.1,  color: 'rgba(130,210,250,0.30)', lw: 2.2 },
      { amp: 4,  freq: 0.028, speed: 1.9,  offset: 4.7,  color: 'rgba(90,185,240,0.20)',  lw: 1.4 },
    ];

    // Fill ocean body from wave surface down (covers sky-water boundary)
    const baseWaveY = 0; // world y
    const fillGrad = ctx.createLinearGradient(0, baseWaveY, 0, baseWaveY + 80);
    fillGrad.addColorStop(0, GS.weather === 'dark' ? 'rgba(10,25,55,0.92)' : 'rgba(30,120,180,0.88)');
    fillGrad.addColorStop(1, 'rgba(8,60,120,0)');
    ctx.fillStyle = fillGrad;
    ctx.beginPath();
    ctx.moveTo(cam.x, baseWaveY);
    for (let x = cam.x; x <= cam.x + currentWW + 30; x += 12) {
      const wx = x;
      const wy = baseWaveY + Math.sin(wx * 0.013 + t * 1.1) * 10
                           + Math.sin(wx * 0.022 + t * 1.6) * 5
                           + Math.sin(wx * 0.038 + t * 0.7) * 3;
      ctx.lineTo(wx, wy);
    }
    ctx.lineTo(cam.x + currentWW, baseWaveY + 200);
    ctx.lineTo(cam.x, baseWaveY + 200);
    ctx.closePath();
    ctx.fill();

    // Wave crests
    for (const wl of waveLayers) {
      ctx.strokeStyle = wl.color;
      ctx.lineWidth = wl.lw;
      ctx.lineCap = 'round';
      ctx.beginPath();
      let first = true;
      for (let x = cam.x - 20; x <= cam.x + currentWW + 20; x += 10) {
        const wy = baseWaveY + Math.sin(x * wl.freq + t * wl.speed + wl.offset) * wl.amp
                             + Math.sin(x * wl.freq * 1.7 + t * wl.speed * 0.6 + wl.offset + 1) * (wl.amp * 0.4);
        first ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
        first = false;
      }
      ctx.stroke();
    }

    // Foam / sparkle highlights on wave peaks
    if (GS.weather !== 'dark') {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      for (let i = 0; i < 22; i++) {
        const fx = cam.x + (i * 197.3 + t * 60) % currentWW;
        const fy = baseWaveY + Math.sin(fx * 0.013 + t * 1.1) * 10 - 2;
        const fr = 1.2 + Math.sin(t * 3 + i) * 0.8;
        ctx.globalAlpha = 0.5 + Math.sin(t * 2.5 + i * 1.3) * 0.4;
        ctx.beginPath();
        ctx.arc(fx, fy, fr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Under-surface shimmer band
    const shimGrad = ctx.createLinearGradient(0, baseWaveY, 0, baseWaveY + 55);
    shimGrad.addColorStop(0, GS.weather === 'dark' ? 'rgba(60,90,150,0.18)' : 'rgba(160,230,255,0.22)');
    shimGrad.addColorStop(1, 'rgba(30,100,180,0)');
    ctx.fillStyle = shimGrad;
    ctx.fillRect(cam.x, baseWaveY, currentWW, 55);

    ctx.restore();
  }

  // ── Layer 1: Deep volumetric water gradient ──
  const gradTop = cam.y / currentWH;
  const gradBot = (cam.y + VH) / currentWH;

  // More realistic water colors per zone
  const waterColors = [
    // shallow: bright cyan-turquoise
    ['#0d7fa8','#0a6090','#083f6a','#041e3a'],
    // coral: deeper blue-green with emerald tint
    ['#0a5c78','#084a66','#063354','#031c35'],
    // deep: near-black abyssal blue
    ['#061828','#040f1e','#020a14','#01060d']
  ][GS.zone];

  const grad = ctx.createLinearGradient(0, 0, 0, VH);
  const dm = darkMult;
  grad.addColorStop(0,   shadeColor(waterColors[0], dm * (1 - gradTop * 0.5)));
  grad.addColorStop(0.3, shadeColor(waterColors[1], dm * (1 - (gradTop * 0.3 + gradBot * 0.1))));
  grad.addColorStop(0.7, shadeColor(waterColors[2], dm * (1 - gradBot * 0.25)));
  grad.addColorStop(1,   shadeColor(waterColors[3], dm * (1 - gradBot * 0.15)));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VW, VH);

  // ── Layer 2: Horizontal depth-haze bands + chromatic volume scatter ──
  if (GS.zone < 2 && GS.weather !== 'dark') {
    // Slowly drifting water color pulse — breathing effect
    const breathe = 0.5 + Math.sin(t * 0.18) * 0.5;
    for (let band = 0; band < 4; band++) {
      const by = cam.y + VH * (0.1 + band * 0.22) + Math.sin(t * 0.12 + band * 1.3) * 30;
      const bAlpha = (0.028 - band * 0.005) * (0.7 + breathe * 0.3);
      const bh = ctx.createLinearGradient(0, by - 50, 0, by + 50);
      bh.addColorStop(0, 'rgba(100,210,255,0)');
      bh.addColorStop(0.5, GS.zone === 0
        ? `rgba(60,185,255,${bAlpha})`
        : `rgba(40,160,220,${bAlpha})`);
      bh.addColorStop(1, 'rgba(30,140,200,0)');
      ctx.fillStyle = bh;
      ctx.fillRect(cam.x, by - 50, currentWW, 100);
    }
  }

  // ── Layer 2b: Surface glow band — bright haze near world y=0 ──
  if (GS.weather !== 'dark') {
    const surfScreenY = -cam.y;
    const surfBandH = 110;
    if (surfScreenY > -surfBandH && surfScreenY < VH) {
      ctx.save();
      const sg = ctx.createLinearGradient(0, 0, 0, surfBandH);
      sg.addColorStop(0,   GS.zone === 0 ? 'rgba(160,240,255,0.35)' : 'rgba(100,200,240,0.22)');
      sg.addColorStop(0.35, GS.zone === 0 ? 'rgba(80,200,248,0.15)'  : 'rgba(60,160,210,0.12)');
      sg.addColorStop(1,   'rgba(30,100,180,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(cam.x, 0, currentWW, surfBandH);

      // Animated refraction shimmer lines — chromatic split (RGB offset)
      for (let i = 0; i < 14; i++) {
        const lx = cam.x + (i * 211.7 + t * 70) % currentWW;
        const ly = 4 + Math.sin(t * 1.4 + i * 0.85) * 5;
        const lw = 22 + Math.sin(t * 2.1 + i) * 12;
        const la = 0.12 + Math.sin(t * 1.8 + i * 1.2) * 0.07;
        ctx.globalAlpha = la;
        // Red channel offset
        ctx.fillStyle = 'rgba(255,120,120,1)';
        ctx.beginPath(); ctx.ellipse(lx - 1.5, ly, lw * 0.9, 2, 0, 0, Math.PI * 2); ctx.fill();
        // Blue channel offset
        ctx.fillStyle = 'rgba(120,200,255,1)';
        ctx.beginPath(); ctx.ellipse(lx + 1.5, ly, lw, 2.2, 0, 0, Math.PI * 2); ctx.fill();
        // White core
        ctx.fillStyle = 'rgba(240,255,255,1)';
        ctx.beginPath(); ctx.ellipse(lx, ly, lw * 0.6, 1.5, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // ── Layer 3: Volumetric god rays — dual-pass with secondary scatter ──
  if (GS.zone <= 1 && GS.weather !== 'dark') {
    ctx.save();
    const rayCount = GS.zone === 0 ? 12 : 8;
    const rayFadeDepth = GS.zone === 0 ? currentWH * 0.60 : currentWH * 0.40;

    // Pass 1: wide soft secondary scatter (blue-tinted)
    for (let i = 0; i < rayCount; i++) {
      const baseX = currentWW * (i / rayCount) + currentWW * 0.04;
      const rx = baseX + Math.sin(t * 0.28 + i * 1.4) * 60;
      const spread = 90 + Math.sin(t * 0.15 + i * 0.7) * 40;
      const pulse = 0.5 + Math.sin(t * 0.9 + i * 2.1) * 0.5;
      const alpha = (GS.zone === 0 ? 0.022 : 0.012) * pulse;
      const g2 = ctx.createLinearGradient(0, 0, 0, rayFadeDepth * 1.2);
      g2.addColorStop(0,   `rgba(120,210,255,${alpha * 2})`);
      g2.addColorStop(0.3, `rgba(80,180,240,${alpha})`);
      g2.addColorStop(1,   'rgba(30,100,200,0)');
      ctx.fillStyle = g2;
      ctx.beginPath();
      ctx.moveTo(rx - 8, 0); ctx.lineTo(rx + 8, 0);
      ctx.lineTo(rx + spread, rayFadeDepth * 1.2);
      ctx.lineTo(rx - spread * 0.8, rayFadeDepth * 1.2);
      ctx.closePath(); ctx.fill();
    }

    // Pass 2: sharp bright primary rays (white-cyan)
    for (let i = 0; i < rayCount; i++) {
      const baseX = currentWW * (i / rayCount);
      const rx = baseX + Math.sin(t * 0.35 + i * 1.57) * 45;
      const spread = 40 + Math.sin(t * 0.22 + i) * 20;
      const pulse = 0.4 + Math.sin(t * 1.1 + i * 1.7) * 0.6; // strong flicker
      const alpha = (GS.zone === 0 ? 0.075 : 0.04) * pulse;
      const grad2 = ctx.createLinearGradient(0, 0, 0, rayFadeDepth);
      grad2.addColorStop(0,    `rgba(230,250,255,${alpha * 1.6})`);
      grad2.addColorStop(0.12, `rgba(180,235,255,${alpha * 1.1})`);
      grad2.addColorStop(0.4,  `rgba(110,200,245,${alpha * 0.5})`);
      grad2.addColorStop(1,    'rgba(40,130,210,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      const topW = 4 + Math.sin(t * 0.7 + i) * 2;
      const sway = Math.sin(t * 0.22 + i * 0.8) * 22;
      ctx.moveTo(rx - topW, 0); ctx.lineTo(rx + topW, 0);
      ctx.lineTo(rx + spread + sway, rayFadeDepth);
      ctx.lineTo(rx - spread * 0.7 + sway, rayFadeDepth);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // ── Layer 4: Caustic light patterns — sharp refractive network ──
  if (GS.zone <= 1 && GS.weather !== 'dark') {
    ctx.save();
    ctx.globalCompositeOperation = 'screen'; // additive blend → bright caustics pop

    const causticCount = GS.zone === 0 ? 38 : 20;
    const baseAlpha = GS.zone === 0 ? 0.11 : 0.055;

    for (let i = 0; i < causticCount; i++) {
      const seed = i * 137.508;
      const cx = cam.x + ((seed * 3.1 + GS.time * (GS.zone === 0 ? 22 : 14)) % (currentWW + 80)) - 40;
      // Depth-stratified rows
      const row = i % 7;
      const cy = cam.y + 15 + row * (VH * 0.13) + Math.sin(GS.time * 0.9 + seed * 0.08) * 28;
      const depthFade = Math.max(0, 1 - (cy - cam.y) / (VH * 1.1));
      if (depthFade <= 0) continue;

      const r = 8 + Math.sin(GS.time * 1.4 + i * 0.73) * 5;
      const squeeze = 0.3 + Math.sin(GS.time * 0.8 + i * 1.1) * 0.2;
      const rot = GS.time * 0.3 + i * 0.55;
      const alpha = (baseAlpha + Math.sin(GS.time * 2.2 + i) * baseAlpha * 0.6) * depthFade;

      // Sharp caustic ring (annular shape — bright edge, hollow center)
      const cg = ctx.createRadialGradient(cx, cy, r * 0.35, cx, cy, r);
      cg.addColorStop(0,   `rgba(180,245,255,0)`);
      cg.addColorStop(0.55, `rgba(220,252,255,${alpha * 1.4})`);
      cg.addColorStop(0.78, `rgba(255,255,240,${alpha * 2.2})`);
      cg.addColorStop(1,   `rgba(140,220,255,0)`);
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, r, r * squeeze, rot, 0, Math.PI * 2);
      ctx.fill();

      // Extra bright specular center dot
      if (alpha > baseAlpha * 0.8) {
        ctx.fillStyle = `rgba(255,255,255,${alpha * 1.8})`;
        ctx.beginPath();
        ctx.arc(cx + Math.sin(rot) * r * 0.2, cy - r * squeeze * 0.3, r * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── Layer 5: Bioluminescent particles (deep sea) — additive glow ──
  if (isDeep) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 42; i++) {
      const px = cam.x + (Math.sin(i * 2.3 + GS.time * 0.07) * 0.5 + 0.5) * currentWW;
      const py = cam.y + (Math.sin(i * 1.7 + GS.time * 0.055) * 0.5 + 0.5) * VH;
      const pulse = 0.5 + Math.sin(GS.time * (1.8 + (i % 5) * 0.4) + i * 0.9) * 0.5;
      const pr = 1.2 + pulse * 2.8;
      const hue = 160 + (i * 29) % 100; // teal-cyan-green
      const alpha = 0.25 + pulse * 0.65;
      // Large soft halo
      const glow = ctx.createRadialGradient(px, py, 0, px, py, pr * 9);
      glow.addColorStop(0,   `hsla(${hue},100%,78%,${alpha * 0.85})`);
      glow.addColorStop(0.25, `hsla(${hue},100%,65%,${alpha * 0.35})`);
      glow.addColorStop(0.6, `hsla(${hue + 20},90%,50%,${alpha * 0.1})`);
      glow.addColorStop(1,   `hsla(${hue},100%,40%,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(px, py, pr * 9, 0, Math.PI * 2); ctx.fill();
      // Inner glow ring
      const inner = ctx.createRadialGradient(px, py, 0, px, py, pr * 2.5);
      inner.addColorStop(0, `hsla(${hue + 30},100%,95%,${alpha})`);
      inner.addColorStop(1, `hsla(${hue},100%,70%,0)`);
      ctx.fillStyle = inner;
      ctx.beginPath(); ctx.arc(px, py, pr * 2.5, 0, Math.PI * 2); ctx.fill();
      // Bright hot core
      ctx.fillStyle = `hsla(${hue + 40},100%,98%,${Math.min(1, alpha * 1.4)})`;
      ctx.beginPath(); ctx.arc(px, py, pr * 0.7, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── Layer 6: Marine snow — multi-speed depth-layered particles ──
  ctx.save();
  const particleCount = isDeep ? 55 : isCoral ? 35 : 25;
  for (let i = 0; i < particleCount; i++) {
    const seed = i * 61.8;
    // 3 speed layers simulating near/mid/far depth
    const layer = i % 3; // 0=near fast, 1=mid, 2=far slow
    const speed = [14, 9, 5][layer];
    const size  = [1.4, 0.9, 0.5][layer];
    const alpha = [0.30, 0.18, 0.10][layer];
    const px = cam.x + ((seed * 7.3) % currentWW);
    const drift = Math.sin(GS.time * (0.4 - layer * 0.1) + i * 0.55) * (18 - layer * 5);
    const py = cam.y + ((seed * 4.1 + GS.time * speed) % currentWH);
    const fade = 0.4 + Math.sin(GS.time * 0.8 + i * 0.7) * 0.4;
    ctx.globalAlpha = alpha * fade;
    // Near particles get a tiny glint; far ones are plain white dots
    if (layer === 0) {
      const pg = ctx.createRadialGradient(px + drift - size, py - size, 0, px + drift, py, size * 2.5);
      pg.addColorStop(0, 'rgba(255,255,255,1)');
      pg.addColorStop(0.4, isDeep ? 'rgba(100,210,255,0.6)' : 'rgba(200,240,255,0.5)');
      pg.addColorStop(1, 'rgba(120,180,255,0)');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(px + drift, py, size * 2.5, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = isDeep ? 'rgba(100,200,255,1)' : 'rgba(210,245,255,1)';
      ctx.beginPath(); ctx.arc(px + drift, py, size, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── Layer 7: Underwater current streaks — always present, stronger in current weather ──
  {
    ctx.save();
    const streamCount = GS.weather === 'current' ? 16 : 7;
    const streamAlpha = GS.weather === 'current' ? 1.0 : 0.45;
    // Two current directions create cross-flow turbulence
    for (let i = 0; i < streamCount; i++) {
      const dir = i % 2 === 0 ? 1 : -0.3; // primary + weak counter
      const speed = (GS.weather === 'current' ? 130 : 55) * dir;
      const cx = cam.x + ((GS.time * speed + i * 220 + (i % 3) * 600) % (currentWW + 400)) - 200;
      const cy = cam.y + 40 + i * (VH / streamCount) + Math.sin(GS.time * 0.25 + i * 0.9) * 45;
      const len = 70 + Math.sin(i * 0.7) * 40;
      const thick = 4 + Math.sin(i * 1.3) * 2;
      const alpha = (0.06 + Math.sin(GS.time * 0.5 + i) * 0.04) * streamAlpha;
      const cg = ctx.createLinearGradient(cx - len * 0.4, cy, cx + len, cy);
      cg.addColorStop(0,   'rgba(120,210,255,0)');
      cg.addColorStop(0.15, `rgba(170,235,255,${alpha * 1.6})`);
      cg.addColorStop(0.55, `rgba(140,220,255,${alpha})`);
      cg.addColorStop(1,   'rgba(100,195,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx + len * 0.3, cy, len * 0.75, thick, Math.sin(i * 0.4) * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── Layer 8: Seabed — detailed sediment ──
  ctx.save();
  // Shadow cast on seabed edge
  const shadowH = isDeep ? 0 : 18;
  if (!isDeep) {
    const shadowG = ctx.createLinearGradient(0, currentWH - 50 - shadowH, 0, currentWH - 50);
    shadowG.addColorStop(0, 'rgba(0,0,0,0)');
    shadowG.addColorStop(1, 'rgba(0,20,40,0.45)');
    ctx.fillStyle = shadowG;
    ctx.beginPath();
    ctx.moveTo(0, currentWH);
    for (let x = 0; x <= currentWW; x += 20) {
      ctx.lineTo(x, currentWH - 32 + Math.sin(x * 0.033 + GS.time * 0.13) * 9 + 8);
    }
    ctx.lineTo(currentWW, currentWH); ctx.lineTo(0, currentWH);
    ctx.closePath();
    ctx.fill();
  }

  // Seabed main body
  const sandGrad = ctx.createLinearGradient(0, currentWH - 65, 0, currentWH);
  if (isDeep) {
    sandGrad.addColorStop(0, '#0b1a27');
    sandGrad.addColorStop(0.4, '#081218');
    sandGrad.addColorStop(1, '#040a10');
  } else if (GS.zone === 1) {
    sandGrad.addColorStop(0, '#c49555');
    sandGrad.addColorStop(0.3, '#a87840');
    sandGrad.addColorStop(0.7, '#8a6030');
    sandGrad.addColorStop(1, '#6a4520');
  } else {
    sandGrad.addColorStop(0, '#e0bc70');
    sandGrad.addColorStop(0.3, '#c8a055');
    sandGrad.addColorStop(0.7, '#a88040');
    sandGrad.addColorStop(1, '#886030');
  }
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, currentWH);
  for (let x = 0; x <= currentWW; x += 20) {
    ctx.lineTo(x, currentWH - 32 + Math.sin(x * 0.033 + GS.time * 0.13) * 9);
  }
  ctx.lineTo(currentWW, currentWH); ctx.lineTo(0, currentWH);
  ctx.closePath();
  ctx.fill();

  // Seabed surface ripple lines
  if (!isDeep) {
    for (let i = 0; i < 7; i++) {
      const alpha = 0.15 - i * 0.015;
      ctx.strokeStyle = `rgba(255,225,140,${alpha})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (let x = 0; x <= currentWW; x += 20) {
        const y = currentWH - 30 + i * 4.5 + Math.sin(x * 0.033 + GS.time * 0.13 + i * 0.4) * 6;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // Scattered sand grains (tiny bright dots)
    ctx.fillStyle = 'rgba(255,235,180,0.35)';
    for (let i = 0; i < 60; i++) {
      const gx = (i * 173.5) % currentWW;
      const gy = currentWH - 28 + (i % 5) * 5;
      ctx.beginPath();
      ctx.arc(gx, gy, 0.8 + (i % 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();

  // ── Layer 9: Depth fog planes (atmospheric perspective) ──
  // Multiple translucent planes at increasing depths give strong 3D layering
  ctx.save();
  const fogColor = isDeep
    ? [2, 8, 20]
    : GS.zone === 1
      ? [5, 35, 75]
      : [8, 55, 120];

  const fogPlanes = [
    { z: 0.35, alpha: 0.06 },
    { z: 0.55, alpha: 0.10 },
    { z: 0.72, alpha: 0.14 },
    { z: 0.88, alpha: 0.19 },
  ];
  for (const fp of fogPlanes) {
    // Each plane is a horizontal band that fades in from bottom (where seabed is)
    // and covers the full viewport, but stronger in the lower half
    const planeG = ctx.createLinearGradient(0, cam.y + VH * 0.3, 0, cam.y + VH);
    planeG.addColorStop(0, `rgba(${fogColor[0]},${fogColor[1]},${fogColor[2]},0)`);
    planeG.addColorStop(0.5, `rgba(${fogColor[0]},${fogColor[1]},${fogColor[2]},${fp.alpha * 0.6})`);
    planeG.addColorStop(1, `rgba(${fogColor[0]},${fogColor[1]},${fogColor[2]},${fp.alpha})`);
    ctx.fillStyle = planeG;
    ctx.fillRect(cam.x, cam.y, currentWW, currentWH);
  }

  // Strong far-distance fog wall at back of scene (z > 0.85)
  const backFogG = ctx.createLinearGradient(0, cam.y, 0, cam.y + VH * 0.6);
  backFogG.addColorStop(0, `rgba(${fogColor[0]},${fogColor[1]},${fogColor[2]},0.22)`);
  backFogG.addColorStop(1, `rgba(${fogColor[0]},${fogColor[1]},${fogColor[2]},0)`);
  ctx.fillStyle = backFogG;
  ctx.fillRect(cam.x, cam.y, currentWW, currentWH * 0.6);

  ctx.restore();
}

function shadeColor(hex, mult) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*mult)},${Math.round(g*mult)},${Math.round(b*mult)})`;
}

// ── Depth of Field helpers ──
// z: 0 = nearest foreground, 1 = farthest background
// Returns a scale multiplier: near objects are larger, far are smaller
function depthScale(z) {
  // Near (z=0): scale ~1.35, Far (z=1): scale ~0.45
  return 1.35 - z * 0.9;
}

// Returns how much blue-haze opacity to overlay (atmospheric perspective)
function depthHazeAlpha(z) {
  // Starts at z=0.2, maxes at z=1.0
  return Math.max(0, (z - 0.15) * 0.72);
}

// Returns motion parallax factor: near objects move at full speed, far slower
function depthParallax(z) {
  return 1.0 - z * 0.55;
}

// Returns blur radius approximation (we use shadowBlur as soft-focus proxy)
function depthBlur(z) {
  // Only blurs beyond z=0.5
  return Math.max(0, (z - 0.4) * 14);
}

// Apply depth-of-field overlay on top of a drawn object.
// Call AFTER drawing the object, ctx already saved/translated to object center.
// w, h are the half-extents of the object's bounding box in local coords.
function applyDepthHaze(z, w, h) {
  const alpha = depthHazeAlpha(z);
  if (alpha <= 0.01) return;
  // Blue-cyan water-haze tint
  const hazeColor = GS.zone === 2
    ? `rgba(2,8,20,${alpha})`          // deep: near-black
    : GS.zone === 1
      ? `rgba(5,40,80,${alpha})`        // coral: dark blue
      : `rgba(8,60,120,${alpha})`;      // shallow: ocean blue
  ctx.fillStyle = hazeColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 1.1, h * 1.1, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawDecorations() {
  // Sort by z descending so far objects draw first (painter's algorithm)
  const sorted = [...decorations].sort((a, b) => (b.z ?? 0.5) - (a.z ?? 0.5));

  // 先画阴影 (only for near/mid objects)
  for (const d of sorted) {
    const dz = d.z ?? 0.5;
    if (dz > 0.7) continue; // far objects have no readable shadow
    if (d.type === 'rock' || d.type === 'castle' || d.type === 'shipwreck') {
      const ds = depthScale(dz);
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${0.2 * (1 - dz * 0.5)})`;
      const sw = (d.type === 'castle' ? 120 : d.type === 'shipwreck' ? 180 : d.size * 1.1) * ds;
      const sh = (d.type === 'castle' ? 16 : d.type === 'shipwreck' ? 20 : d.size * 0.35) * ds;
      ctx.beginPath();
      ctx.ellipse((d.x || 0) + 8 * ds, (d.y || H) + 6 * ds, sw, sh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (const d of sorted) {
    const dz = d.z ?? 0.5;
    const ds = depthScale(dz);
    const dBlur = depthBlur(dz);

    ctx.save();
    // Apply depth scale from the decoration's anchor point
    ctx.translate(d.x || 0, d.y || 0);
    ctx.scale(ds, ds);
    ctx.translate(-(d.x || 0), -(d.y || 0));

    if (dBlur > 0) {
      ctx.shadowColor = GS.zone === 2 ? 'rgba(3,10,25,0.5)' : 'rgba(8,45,100,0.4)';
      ctx.shadowBlur = dBlur;
    }

    if (d.type === 'seaweed') {
      const sway = Math.sin(GS.time * 1.5 + d.phase) * 14;
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(d.x + 2, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 2, d.y - d.height * 0.35, d.x + sway + 2, d.y - d.height * 0.65, d.x + sway * 1.4 + 2, d.y - d.height);
      ctx.stroke();
      const swGrad = ctx.createLinearGradient(d.x, d.y, d.x + sway * 1.4, d.y - d.height);
      swGrad.addColorStop(0, d.color);
      swGrad.addColorStop(1, GS.zone === 2 ? '#2a6a3a' : '#50c870');
      ctx.strokeStyle = swGrad;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5, d.y - d.height * 0.35, d.x + sway, d.y - d.height * 0.65, d.x + sway * 1.4, d.y - d.height);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(d.x + 1, d.y);
      ctx.bezierCurveTo(d.x + sway * 0.5 + 1, d.y - d.height * 0.35, d.x + sway + 1, d.y - d.height * 0.65, d.x + sway * 1.4 + 1, d.y - d.height);
      ctx.stroke();
      for (let j = 0.3; j <= 0.85; j += 0.28) {
        const lx = d.x + sway * j * 1.4, ly = d.y - d.height * j;
        const la = Math.sin(GS.time * 1.8 + d.phase + j * 3) * 0.4;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(la + (j > 0.5 ? 0.3 : -0.3));
        const lG = ctx.createLinearGradient(-10, 0, 10, 0);
        lG.addColorStop(0, GS.zone === 2 ? '#1a5a2a' : '#30a850');
        lG.addColorStop(0.5, GS.zone === 2 ? '#2a7a3a' : '#50d870');
        lG.addColorStop(1, 'rgba(0,100,40,0)');
        ctx.fillStyle = lG;
        ctx.beginPath();
        ctx.ellipse(8, 0, 15, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // Depth haze on seaweed
      ctx.shadowBlur = 0;
      const hazeA = depthHazeAlpha(dz);
      if (hazeA > 0.01) {
        const hc = GS.zone === 2 ? `rgba(2,8,20,${hazeA * 0.7})` : `rgba(8,60,120,${hazeA * 0.7})`;
        ctx.strokeStyle = hc;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.bezierCurveTo(d.x + sway * 0.5, d.y - d.height * 0.35, d.x + sway, d.y - d.height * 0.65, d.x + sway * 1.4, d.y - d.height);
        ctx.stroke();
      }

    } else if (d.type === 'coral') {
      const branches = [
        { ox: 0,           oy: 0, r: d.size * 0.42, h: d.size * 0.65 },
        { ox: -d.size * 0.48, oy: 5, r: d.size * 0.3,  h: d.size * 0.48 },
        { ox: d.size * 0.44,  oy: 8, r: d.size * 0.25, h: d.size * 0.38 }
      ];
      for (const b of branches) {
        const bx = d.x + b.ox, by = d.y;
        const stemG = ctx.createLinearGradient(bx - b.r * 0.5, 0, bx + b.r * 0.5, 0);
        stemG.addColorStop(0, shadeColor(d.color, 0.55));
        stemG.addColorStop(0.35, d.color);
        stemG.addColorStop(0.6, shadeColor(d.color, 1.3));
        stemG.addColorStop(1, shadeColor(d.color, 0.7));
        ctx.fillStyle = stemG;
        ctx.fillRect(bx - b.r * 0.4, by - b.h, b.r * 0.8, b.h);
        const ballG = ctx.createRadialGradient(bx - b.r * 0.25, by - b.h - b.r * 0.3, b.r * 0.05, bx, by - b.h, b.r);
        ballG.addColorStop(0, shadeColor(d.color, 1.6));
        ballG.addColorStop(0.4, d.color);
        ballG.addColorStop(1, shadeColor(d.color, 0.5));
        ctx.fillStyle = ballG;
        ctx.beginPath();
        ctx.arc(bx, by - b.h, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(bx - b.r * 0.3, by - b.h - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }
      // Depth haze on coral
      ctx.shadowBlur = 0;
      applyDepthHaze(dz, d.size * 1.2, d.size * 1.4);
      const rockG = ctx.createRadialGradient(d.x + d.size * 0.3, d.y + d.size * 0.1, 0, d.x, d.y - d.size * 0.2, d.size * 1.2);
      rockG.addColorStop(0, '#667788');
      rockG.addColorStop(0.5, d.color);
      rockG.addColorStop(1, '#223344');
      ctx.fillStyle = rockG;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * 0.62, -0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.2, d.y - d.size * 0.2, d.size * 0.55, d.size * 0.28, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(d.x - d.size * 0.15, d.y - d.size * 0.28, d.size * 0.2, d.size * 0.1, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Depth haze on rock
      ctx.shadowBlur = 0;
      ctx.save();
      ctx.translate(d.x, d.y - d.size * 0.2);
      applyDepthHaze(dz, d.size * 1.1, d.size * 0.75);
      ctx.restore();
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.angle + GS.time * 0.05);
      const sfG = ctx.createRadialGradient(0, 0, 1, 0, 0, d.size);
      sfG.addColorStop(0, shadeColor(d.color, 1.5));
      sfG.addColorStop(1, shadeColor(d.color, 0.7));
      ctx.fillStyle = sfG;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = (i * Math.PI) / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? d.size : d.size * 0.42;
        const px = Math.cos(angle) * r, py = Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(-d.size * 0.2, -d.size * 0.2, d.size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (d.type === 'fan_coral') {
      ctx.save();
      ctx.translate(d.x, d.y);
      const sway = Math.sin(GS.time * 0.8 + d.phase) * 8;
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.85;
      const branches2 = 14;
      for (let i = 0; i < branches2; i++) {
        const t = i / (branches2 - 1);
        const bx = (t - 0.5) * d.height * 0.9 + sway * (1 - t);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(bx * 0.5, -d.height * 0.55, bx, -d.height);
        ctx.stroke();
      }
      // 连接弧线
      for (let lev = 0.3; lev <= 1.0; lev += 0.2) {
        ctx.beginPath();
        for (let i = 0; i < branches2; i++) {
          const t = i / (branches2 - 1);
          const bx = ((t - 0.5) * d.height * 0.9 + sway * (1 - t)) * lev;
          const by = -d.height * lev;
          i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

    } else if (d.type === 'castle') {
      drawCastle(d.x, d.y);
      // Depth haze over castle
      ctx.shadowBlur = 0;
      const castleHaze = depthHazeAlpha(dz);
      if (castleHaze > 0.01) {
        const hc = GS.zone === 2 ? `rgba(2,8,20,${castleHaze})` : `rgba(8,55,115,${castleHaze})`;
        ctx.fillStyle = hc;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y - 90, 80, 110, 0, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'shipwreck') {
      drawShipwreck(d.x, d.y);
      ctx.shadowBlur = 0;
      const wreckHaze = depthHazeAlpha(dz);
      if (wreckHaze > 0.01) {
        const hc = GS.zone === 2 ? `rgba(2,8,20,${wreckHaze})` : `rgba(8,55,115,${wreckHaze})`;
        ctx.fillStyle = hc;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y - 35, 120, 55, 0, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'vent') {
      // 海底气泡柱
      if (Math.random() < 0.15) {
        bubbles.push({ x: d.x + (Math.random() - 0.5) * 10, y: d.y - 10, r: 2 + Math.random() * 3, vy: -(0.4 + Math.random() * 0.8), life: 0.9, dx: (Math.random() - 0.5) * 0.3, z: dz });
      }
    }

    // Close the per-decoration ctx.save
    ctx.restore();
  }
}

function drawCastle(x, y) {
  ctx.save();
  ctx.translate(x, y);
  const scale = 0.9;
  ctx.scale(scale, scale);

  // 城墙主体
  const wallG = ctx.createLinearGradient(-60, -100, 60, 0);
  wallG.addColorStop(0, '#8899aa');
  wallG.addColorStop(0.5, '#6677aa');
  wallG.addColorStop(1, '#445588');
  ctx.fillStyle = wallG;
  ctx.fillRect(-60, -90, 120, 90);

  // 苔藓/藻类覆盖
  ctx.fillStyle = 'rgba(40,120,60,0.35)';
  for (let i = 0; i < 8; i++) {
    const mx = -55 + i * 16, my = -90 + Math.random() * 40;
    ctx.beginPath();
    ctx.ellipse(mx, my, 8 + Math.random() * 6, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城楼 (4个)
  const towerPositions = [-55, -20, 20, 55];
  for (const tx of towerPositions) {
    const towerG = ctx.createLinearGradient(tx - 14, -145, tx + 14, -90);
    towerG.addColorStop(0, '#99aabb');
    towerG.addColorStop(1, '#556688');
    ctx.fillStyle = towerG;
    ctx.fillRect(tx - 14, -145, 28, 60);
    // 垛口
    for (let j = 0; j < 3; j++) {
      ctx.fillStyle = towerG;
      ctx.fillRect(tx - 12 + j * 10, -158, 7, 16);
    }
    // 塔顶尖
    ctx.fillStyle = '#bb5544';
    ctx.beginPath();
    ctx.moveTo(tx, -175);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx + 14, -155);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,180,0.2)';
    ctx.beginPath();
    ctx.moveTo(tx - 2, -174);
    ctx.lineTo(tx - 14, -155);
    ctx.lineTo(tx - 6, -155);
    ctx.closePath();
    ctx.fill();
    // 小窗
    ctx.fillStyle = 'rgba(0,20,60,0.7)';
    ctx.beginPath();
    ctx.arc(tx, -120, 5, 0, Math.PI * 2);
    ctx.fill();
    // 窗户微光
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.arc(tx - 1, -121, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 城堡大门
  ctx.fillStyle = 'rgba(0,10,30,0.8)';
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.rect(-20, -38, 40, 38);
  ctx.fill();
  // 门框
  ctx.strokeStyle = '#556688';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, -38, 20, Math.PI, 0);
  ctx.moveTo(-20, -38); ctx.lineTo(-20, 0);
  ctx.moveTo(20, -38); ctx.lineTo(20, 0);
  ctx.stroke();
  // 门内发光
  const glowG = ctx.createRadialGradient(0, -20, 0, 0, -20, 22);
  glowG.addColorStop(0, 'rgba(80,150,255,0.25)');
  glowG.addColorStop(1, 'rgba(0,50,150,0)');
  ctx.fillStyle = glowG;
  ctx.beginPath();
  ctx.arc(0, -38, 19, Math.PI, 0);
  ctx.rect(-19, -38, 38, 38);
  ctx.fill();

  // 旗帜飘动
  const flagSway = Math.sin(GS.time * 2) * 6;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(0, -175);
  ctx.lineTo(flagSway + 22, -165 + Math.sin(GS.time * 3) * 3);
  ctx.lineTo(flagSway + 22, -155 + Math.sin(GS.time * 3 + 0.5) * 3);
  ctx.lineTo(0, -155);
  ctx.closePath();
  ctx.fill();
  // 旗杆
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -90); ctx.lineTo(0, -185);
  ctx.stroke();

  // 城墙高光
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(-60, -90, 20, 90);

  ctx.restore();
}

function drawShipwreck(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // 船壳阴影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(5, 5, 120, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // 船身主体
  const hullG = ctx.createLinearGradient(-110, -50, 110, 0);
  hullG.addColorStop(0, '#5a4020');
  hullG.addColorStop(0.4, '#7a5830');
  hullG.addColorStop(0.7, '#6a4825');
  hullG.addColorStop(1, '#3a2810');
  ctx.fillStyle = hullG;
  ctx.beginPath();
  ctx.moveTo(-110, -15);
  ctx.lineTo(-100, -50);
  ctx.lineTo(90, -50);
  ctx.lineTo(110, -20);
  ctx.lineTo(110, 0);
  ctx.lineTo(-110, 0);
  ctx.closePath();
  ctx.fill();

  // 船舷高光
  ctx.fillStyle = 'rgba(180,120,60,0.2)';
  ctx.fillRect(-100, -50, 190, 8);

  // 甲板 (倾斜破损)
  ctx.save();
  ctx.rotate(0.08);
  const deckG = ctx.createLinearGradient(0, -60, 0, -50);
  deckG.addColorStop(0, '#8a6840');
  deckG.addColorStop(1, '#6a4820');
  ctx.fillStyle = deckG;
  ctx.fillRect(-95, -68, 185, 18);
  // 甲板木纹
  ctx.strokeStyle = 'rgba(50,25,5,0.3)';
  ctx.lineWidth = 1;
  for (let i = -90; i < 90; i += 15) {
    ctx.beginPath(); ctx.moveTo(i, -68); ctx.lineTo(i, -50); ctx.stroke();
  }
  ctx.restore();

  // 折断的桅杆
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20, -68);
  ctx.lineTo(-30, -130);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-30, -130);
  ctx.lineTo(20, -100);  // 折断横臂
  ctx.stroke();
  // 破烂风帆
  ctx.fillStyle = 'rgba(200,180,140,0.35)';
  ctx.beginPath();
  ctx.moveTo(-30, -128);
  ctx.lineTo(15, -98);
  ctx.lineTo(0, -120);
  ctx.closePath();
  ctx.fill();

  // 炮口 (几个小洞)
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  for (const hx of [-60, -20, 20, 60]) {
    ctx.beginPath();
    ctx.ellipse(hx, -30, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 苔藓覆盖
  ctx.fillStyle = 'rgba(30,100,50,0.4)';
  for (let i = 0; i < 12; i++) {
    const mx = -100 + i * 18, my = -50 + Math.random() * 20;
    ctx.beginPath();
    ctx.ellipse(mx, my, 10 + Math.random() * 8, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 珊瑚生长
  ctx.fillStyle = '#ff6b9d';
  for (const [cx2, cy2, cr] of [[-80, -55, 8], [50, -52, 6], [85, -48, 7], [-30, -60, 5]]) {
    ctx.beginPath();
    ctx.arc(cx2, cy2, cr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(cx2 - cr * 0.25, cy2 - cr * 0.3, cr * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff6b9d';
  }

  ctx.restore();
}

function drawFish(f) {
  const fz = f.z ?? 0.5;
  const fScale = depthScale(fz);
  const fBlur  = depthBlur(fz);

  // ── Motion trail — bioluminescent wake behind fish ──
  if (!f.trail) f.trail = [];
  // Record trail point every frame
  const trailLen = f.type === 'shark' ? 14 : f.type === 'jellyfish' ? 8 : 10;
  f.trail.push({ x: f.x, y: f.y, t: GS.time });
  if (f.trail.length > trailLen) f.trail.shift();

  if (f.trail.length > 2 && fz < 0.65) {
    ctx.save();
    const trailColor = f.type === 'jellyfish'
      ? [200, 120, 255]
      : f.type === 'shark'
        ? [80, 180, 220]
        : [60, 200, 255];
    const trailAlpha = (0.18 - fz * 0.15) * (1 - fz * 0.5);
    for (let i = 1; i < f.trail.length; i++) {
      const age = (i / f.trail.length);
      const a = age * trailAlpha * fScale;
      const r = f.size * fScale * 0.18 * age;
      ctx.globalAlpha = a;
      const tg = ctx.createRadialGradient(f.trail[i].x, f.trail[i].y, 0, f.trail[i].x, f.trail[i].y, r * 2.5);
      tg.addColorStop(0, `rgba(${trailColor[0]},${trailColor[1]},${trailColor[2]},0.8)`);
      tg.addColorStop(1, `rgba(${trailColor[0]},${trailColor[1]},${trailColor[2]},0)`);
      ctx.fillStyle = tg;
      ctx.beginPath();
      ctx.arc(f.trail[i].x, f.trail[i].y, r * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 地面阴影 — scale shadow with depth, ripple on seabed surface
  if (f.y > currentWH - 250) {
    const dist = Math.max(0, currentWH - f.y);
    const shadowAlpha = Math.max(0, (1 - dist / 250)) * 0.4 * (1 - fz * 0.6);
    if (shadowAlpha > 0.01) {
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
      const sx = f.x + Math.sin(GS.time * 0.25 + f.x * 0.03) * 5;
      const distort = 1 + (1 - dist / 250) * 0.3; // shadow stretches as fish nears bottom
      ctx.beginPath();
      ctx.ellipse(sx, currentWH - 18, f.size * fScale * 1.2 * distort, f.size * fScale * 0.20, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.save();
  ctx.translate(f.x, f.y);

  // Apply depth scale + soft-focus (shadowBlur as DOF proxy)
  ctx.scale(fScale, fScale);
  if (fBlur > 0) {
    ctx.shadowColor = GS.zone === 2 ? 'rgba(5,15,30,0.55)' : 'rgba(10,50,120,0.45)';
    ctx.shadowBlur = fBlur;
  }

  const scaleX = f.vx < 0 ? -1 : 1;
  ctx.scale(scaleX, 1);

  const wobbleScale = f.wobble ? 1 + Math.sin(GS.time * 3 + f.phase) * 0.15 : 1;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const w = f.size, h = f.size * 0.6;

  if (f.type === 'shark') {
    const sharkCol = f.scared ? '#99aaaa' : f.bodyColor;
    // 身体底色阴影
    ctx.fillStyle = shadeColor(sharkCol, 0.5);
    ctx.beginPath();
    ctx.ellipse(2, 2, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 身体主渐变(球面光照)
    const sg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, w * 0.05, 0, 0, w * 1.1);
    sg.addColorStop(0, shadeColor(sharkCol, 1.5));
    sg.addColorStop(0.45, sharkCol);
    sg.addColorStop(1, shadeColor(sharkCol, 0.55));
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部浅色
    ctx.fillStyle = 'rgba(230,240,245,0.5)';
    ctx.beginPath();
    ctx.ellipse(w * 0.15, h * 0.3, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍
    const finG = ctx.createLinearGradient(-5, -h, 20, -h - 20);
    finG.addColorStop(0, shadeColor(f.scared ? '#778899' : f.color, 0.8));
    finG.addColorStop(1, shadeColor(f.scared ? '#778899' : f.color, 1.2));
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-5, -h + 2);
    ctx.lineTo(12, -h - 20);
    ctx.lineTo(22, -h + 2);
    ctx.closePath();
    ctx.fill();
    // 尾鳍
    ctx.fillStyle = f.scared ? '#889aaa' : f.color;
    ctx.beginPath();
    ctx.moveTo(-w, 0);
    ctx.lineTo(-w - 16, -13);
    ctx.lineTo(-w - 16, 13);
    ctx.closePath();
    ctx.fill();
    // 眼睛(高光)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.42, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(w * 0.42 + 1.5, -5.5, 2, 0, Math.PI * 2);
    ctx.fill();
    // 牙齿
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(w * 0.68, 4);
    ctx.lineTo(w * 0.78, 10);
    ctx.lineTo(w * 0.88, 4);
    ctx.fill();
    // HP条
    if (f.hp < f.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(-w, h + 5, w * 2, 7);
      ctx.fillStyle = '#f33';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 7);
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(-w, h + 5, w * 2 * (f.hp / f.maxHp), 3);
    }

  } else if (f.type === 'crab') {
    // 螃蟹 - 立体甲壳
    const cg = ctx.createRadialGradient(-w * 0.3, -h * 0.4, h * 0.1, 0, 0, w);
    cg.addColorStop(0, shadeColor(f.bodyColor, 1.5));
    cg.addColorStop(0.5, f.bodyColor);
    cg.addColorStop(1, shadeColor(f.bodyColor, 0.55));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 甲壳高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.35, w * 0.4, h * 0.25, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 蟹钳(立体)
    for (const side of [-1, 1]) {
      const cx = side * (w + 5);
      const clawG = ctx.createRadialGradient(cx - 2, -7, 1, cx, -5, 10);
      clawG.addColorStop(0, shadeColor(f.color, 1.4));
      clawG.addColorStop(1, shadeColor(f.color, 0.7));
      ctx.fillStyle = clawG;
      ctx.beginPath();
      ctx.arc(cx, -5, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx - 2, -7, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // 蟹腿
    for (let i = -1; i <= 1; i++) {
      ctx.strokeStyle = shadeColor(f.color, 0.9);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(i * 10, h);
      ctx.lineTo(i * 15 + Math.sin(GS.time * 4 + i) * 3, h + 13);
      ctx.stroke();
    }
    // 眼睛
    for (const ex of [-8, 8]) {
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex, -5, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(ex + 1, -6.5, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

  } else if (f.type === 'jellyfish') {
    // 水母 — already translated to (f.x, f.y) by outer ctx.translate
    const jPulse = 1 + Math.sin(GS.time * 2.5 + f.phase) * 0.12;
    // 伞体
    const jG = ctx.createRadialGradient(0, -w * 0.3, 0, 0, 0, w * jPulse);
    jG.addColorStop(0, 'rgba(220,150,255,0.85)');
    jG.addColorStop(0.5, 'rgba(180,100,240,0.55)');
    jG.addColorStop(1, 'rgba(140,60,200,0)');
    ctx.fillStyle = jG;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse, Math.PI, 0);
    ctx.fill();
    // 伞边高光
    ctx.strokeStyle = 'rgba(230,180,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, w * jPulse * 0.95, Math.PI, 0);
    ctx.stroke();
    // 触须
    ctx.strokeStyle = 'rgba(200,120,255,0.55)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 6; i++) {
      const tx = (i / 5 - 0.5) * w * 1.2;
      const waveA = Math.sin(GS.time * 2 + i * 0.8 + f.phase) * 8;
      ctx.beginPath();
      ctx.moveTo(tx, 0);
      ctx.quadraticCurveTo(tx + waveA, h * 1.5, tx + waveA * 0.5, h * 3);
      ctx.stroke();
    }
    // 发光中心
    ctx.fillStyle = 'rgba(255,200,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, -w * 0.2, w * 0.35, w * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    // restored by outer drawFish ctx.restore()

  } else if (f.type === 'turtle') {
    // 海龟 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    const swimAngle = Math.sin(GS.time * 1.5 + f.phase) * 0.08;
    ctx.rotate(swimAngle);
    // 龟壳
    const shellG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    shellG.addColorStop(0, '#6ac87a');
    shellG.addColorStop(0.5, '#3a8a4a');
    shellG.addColorStop(1, '#1a5a2a');
    ctx.fillStyle = shellG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 龟甲纹
    ctx.strokeStyle = 'rgba(0,60,20,0.4)';
    ctx.lineWidth = 1.2;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * w * 0.35, -h); ctx.lineTo(i * w * 0.35, h);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-w, 0); ctx.lineTo(w, 0); ctx.stroke();
    // 壳高光
    ctx.fillStyle = 'rgba(150,230,170,0.25)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, -h * 0.3, w * 0.45, h * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 头
    const headG = ctx.createRadialGradient(w * 0.6, -h * 0.1, 1, w * 0.7, 0, h * 0.7);
    headG.addColorStop(0, '#70c880');
    headG.addColorStop(1, '#2a6a3a');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.ellipse(w * 0.82, 0, h * 0.6, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // 眼
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.92, -h * 0.2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(w * 0.93, -h * 0.2, 2, 0, Math.PI * 2); ctx.fill();
    // 鳍
    const flipT = Math.sin(GS.time * 2 + f.phase) * 0.3;
    ctx.fillStyle = '#3a8a4a';
    ctx.save(); ctx.rotate(flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, h * 0.75, h * 0.7, h * 0.25, 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(-flipT);
    ctx.beginPath(); ctx.ellipse(-w * 0.3, -h * 0.75, h * 0.7, h * 0.25, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'octopus') {
    // 章鱼 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    // 头部
    const oG = ctx.createRadialGradient(-w * 0.2, -h * 0.3, 2, 0, 0, w);
    oG.addColorStop(0, shadeColor(f.bodyColor, 1.4));
    oG.addColorStop(0.5, f.bodyColor);
    oG.addColorStop(1, shadeColor(f.bodyColor, 0.6));
    ctx.fillStyle = oG;
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.2, w * 0.75, h * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    // 头部高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.25, -h * 0.55, w * 0.32, h * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // 8条触须
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI - Math.PI * 0.1;
      const wave = Math.sin(GS.time * 2 + i * 0.9 + f.phase) * 12;
      const ex = Math.cos(angle) * w * 0.6;
      const ey = h * 0.5 + Math.sin(angle) * h * 0.3;
      ctx.strokeStyle = shadeColor(f.color, 0.85);
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.bezierCurveTo(ex + wave, ey + h, ex + wave * 0.7, ey + h * 2, ex + wave * 0.3, ey + h * 2.8);
      ctx.stroke();
      // 吸盘
      ctx.fillStyle = shadeColor(f.bodyColor, 1.3);
      ctx.beginPath();
      ctx.arc(ex + wave * 0.5, ey + h * 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // 眼睛
    for (const ex2 of [-w * 0.28, w * 0.28]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex2, -h * 0.3, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(ex2 + 1, -h * 0.3, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(ex2 + 2, -h * 0.38, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

  } else if (f.type === 'seahorse') {
    // 海马 — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    const shBob = Math.sin(GS.time * 2.5 + f.phase) * 4;
    const shSway = Math.sin(GS.time * 1.5 + f.phase) * 0.12;
    ctx.rotate(shSway);
    // 躯干
    const shG = ctx.createLinearGradient(-w * 0.5, 0, w * 0.5, 0);
    shG.addColorStop(0, shadeColor(f.bodyColor, 0.7));
    shG.addColorStop(0.4, f.bodyColor);
    shG.addColorStop(1, shadeColor(f.bodyColor, 0.85));
    ctx.fillStyle = shG;
    ctx.beginPath();
    ctx.moveTo(0, -h * 1.8 + shBob);
    ctx.bezierCurveTo(w * 0.6, -h + shBob, w * 0.5, 0, w * 0.2, h);
    ctx.bezierCurveTo(w * 0.3, h * 1.5, 0, h * 2, -w * 0.2, h * 1.6);
    ctx.bezierCurveTo(-w * 0.4, h * 0.8, -w * 0.5, 0, -w * 0.1, -h + shBob);
    ctx.closePath();
    ctx.fill();
    // 脊背棘刺
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      const sy = (-h * 1.5 + i * h * 0.5 + shBob);
      ctx.beginPath();
      ctx.moveTo(w * 0.4, sy);
      ctx.lineTo(w * 0.7, sy - 5);
      ctx.stroke();
    }
    // 头部
    ctx.fillStyle = f.bodyColor;
    ctx.beginPath();
    ctx.ellipse(w * 0.1, -h * 1.7 + shBob, w * 0.45, h * 0.55, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // 嘴/吻
    ctx.strokeStyle = shadeColor(f.color, 0.8);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w * 0.45, -h * 1.85 + shBob);
    ctx.lineTo(w * 0.85, -h * 1.95 + shBob);
    ctx.stroke();
    // 眼
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(w * 0.25, -h * 1.85 + shBob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(w * 0.3, -h * 1.9 + shBob, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // 背鳍 (扇形抖动)
    ctx.fillStyle = 'rgba(255,200,80,0.55)';
    const finFlut = Math.sin(GS.time * 8 + f.phase) * 0.2;
    ctx.save();
    ctx.translate(-w * 0.15, -h * 0.6);
    ctx.rotate(finFlut);
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.55, h * 0.35, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

  } else if (f.type === 'anglerfish') {
    // 安康鱼 (深海) — already translated by outer ctx.translate(f.x, f.y)
    ctx.save();
    ctx.scale(f.vx < 0 ? -1 : 1, 1);
    // 发光诱饵
    const lureTime = GS.time * 3 + f.phase;
    const lurePulse = 0.7 + Math.sin(lureTime) * 0.3;
    const lureX = w * 0.3 + Math.sin(lureTime * 0.7) * 8;
    const lureY = -h * 2.2 + Math.sin(lureTime * 1.1) * 5;
    const lureGlow = ctx.createRadialGradient(lureX, lureY, 0, lureX, lureY, 15 * lurePulse);
    lureGlow.addColorStop(0, 'rgba(180,255,100,0.9)');
    lureGlow.addColorStop(0.4, 'rgba(100,220,50,0.5)');
    lureGlow.addColorStop(1, 'rgba(50,150,20,0)');
    ctx.fillStyle = lureGlow;
    ctx.beginPath();
    ctx.arc(lureX, lureY, 15 * lurePulse, 0, Math.PI * 2);
    ctx.fill();
    // 诱饵杆
    ctx.strokeStyle = '#556';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.bezierCurveTo(w * 0.2, -h * 1.5, w * 0.3, -h * 1.8, lureX, lureY);
    ctx.stroke();
    // 身体
    const afG = ctx.createRadialGradient(-w * 0.2, -h * 0.2, 3, 0, 0, w);
    afG.addColorStop(0, '#556677');
    afG.addColorStop(0.5, f.bodyColor);
    afG.addColorStop(1, '#1a2233');
    ctx.fillStyle = afG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 腹部斑纹
    ctx.fillStyle = 'rgba(100,120,140,0.4)';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.35, w * 0.55, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // 大嘴巴
    ctx.fillStyle = '#1a2233';
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, h * 0.3, w * 0.85, h * 0.1);
    ctx.quadraticCurveTo(w * 0.6, -h * 0.05, -w * 0.3, 0.1);
    ctx.closePath();
    ctx.fill();
    // 尖牙
    ctx.fillStyle = 'rgba(220,220,200,0.9)';
    for (let i = 0; i < 5; i++) {
      const tx2 = -w * 0.2 + i * w * 0.22;
      ctx.beginPath();
      ctx.moveTo(tx2, h * 0.1);
      ctx.lineTo(tx2 + 5, h * 0.28);
      ctx.lineTo(tx2 + 10, h * 0.1);
      ctx.fill();
    }
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.55, -h * 0.25, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1520';
    ctx.beginPath(); ctx.arc(w * 0.56, -h * 0.25, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(100,255,50,0.7)';
    ctx.beginPath(); ctx.arc(w * 0.58, -h * 0.28, 2, 0, Math.PI * 2); ctx.fill();
    // 胸鳍
    ctx.fillStyle = shadeColor(f.bodyColor, 0.7);
    ctx.beginPath();
    ctx.ellipse(-w * 0.3, h * 0.4, h * 0.5, h * 0.22, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const fishG = ctx.createRadialGradient(-w * 0.25, -h * 0.4, h * 0.05, 0, 0, w * 1.05);
    fishG.addColorStop(0, shadeColor(f.bodyColor, 1.7));
    fishG.addColorStop(0.35, shadeColor(f.bodyColor, 1.15));
    fishG.addColorStop(0.65, f.bodyColor);
    fishG.addColorStop(1, shadeColor(f.bodyColor, 0.45));
    ctx.fillStyle = fishG;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();

    // 鱼鳞 — realistic arc-row pattern
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.clip();
    const scaleRows = 4;
    const scaleCols = 6;
    for (let row = 0; row < scaleRows; row++) {
      for (let col = 0; col < scaleCols; col++) {
        const sx = -w * 0.7 + col * (w * 1.4 / scaleCols) + (row % 2) * (w * 0.7 / scaleCols);
        const sy = -h * 0.65 + row * (h * 1.3 / scaleRows);
        const sr = w * 0.22;
        ctx.globalAlpha = 0.09;
        ctx.strokeStyle = 'rgba(255,255,255,1)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, Math.PI * 0.1, Math.PI * 0.9);
        ctx.stroke();
        // Scale shimmer spot
        ctx.globalAlpha = 0.06;
        const scG = ctx.createRadialGradient(sx - sr * 0.2, sy - sr * 0.2, 0, sx, sy, sr);
        scG.addColorStop(0, 'rgba(255,255,255,0.8)');
        scG.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = scG;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // 腹部 — subsurface scattering glow
    const bellyG = ctx.createRadialGradient(w * 0.12, h * 0.22, 0, w * 0.12, h * 0.3, w * 0.55);
    bellyG.addColorStop(0, 'rgba(255,255,255,0.32)');
    bellyG.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    bellyG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = bellyG;
    ctx.beginPath();
    ctx.ellipse(w * 0.1, h * 0.28, w * 0.45, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 背鳍 — translucent with fin-ray lines
    const finAngle = Math.sin(GS.time * 2.5 + f.phase) * 0.06;
    ctx.save();
    ctx.rotate(finAngle);
    const finG = ctx.createLinearGradient(0, -h, 18, -h - 16);
    finG.addColorStop(0, shadeColor(f.color, 0.8) + 'cc');
    finG.addColorStop(1, shadeColor(f.color, 1.4) + '55');
    ctx.fillStyle = finG;
    ctx.beginPath();
    ctx.moveTo(-3, -h + 2);
    ctx.lineTo(8, -h - 13);
    ctx.lineTo(18, -h + 2);
    ctx.closePath();
    ctx.fill();
    // Fin rays
    ctx.strokeStyle = shadeColor(f.color, 1.2) + '88';
    ctx.lineWidth = 0.8;
    for (let r = 0; r < 3; r++) {
      const rx2 = -3 + r * 7;
      ctx.beginPath(); ctx.moveTo(rx2, -h + 2); ctx.lineTo(8 + (r - 1) * 3, -h - 11); ctx.stroke();
    }
    ctx.restore();

    // 尾鳍 — forked, translucent
    const tailFlap = Math.sin(GS.time * 3 + f.phase) * 0.08;
    ctx.save();
    ctx.rotate(tailFlap);
    const tailG = ctx.createLinearGradient(-w, 0, -w - 14, 0);
    tailG.addColorStop(0, shadeColor(f.color, 0.9) + 'dd');
    tailG.addColorStop(1, shadeColor(f.color, 1.2) + '44');
    ctx.fillStyle = tailG;
    // Upper lobe
    ctx.beginPath();
    ctx.moveTo(-w + 2, -1);
    ctx.lineTo(-w - 13, -h * 0.65);
    ctx.lineTo(-w - 5, -1);
    ctx.closePath();
    ctx.fill();
    // Lower lobe
    ctx.beginPath();
    ctx.moveTo(-w + 2, 1);
    ctx.lineTo(-w - 13, h * 0.65);
    ctx.lineTo(-w - 5, 1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // 眼睛 — realistic layered
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.arc(w * 0.5 + 1, -1.5, 5.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(w * 0.5, -2, 5, 0, Math.PI * 2); ctx.fill();
    // Iris gradient
    const irisG = ctx.createRadialGradient(w * 0.5, -2, 0, w * 0.5, -2, 3.5);
    irisG.addColorStop(0, '#111');
    irisG.addColorStop(0.6, '#222');
    irisG.addColorStop(1, '#333');
    ctx.fillStyle = irisG;
    ctx.beginPath(); ctx.arc(w * 0.5, -2, 3.5, 0, Math.PI * 2); ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(w * 0.5 + 0.3, -2, 2, 0, Math.PI * 2); ctx.fill();
    // Primary specular
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(w * 0.5 + 1.2, -3.5, 1.4, 0, Math.PI * 2); ctx.fill();
    // Secondary micro-highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(w * 0.5 - 1, -1, 0.7, 0, Math.PI * 2); ctx.fill();

    // 小丑鱼白条纹 — with subtle blue border for realism
    if (f.type === 'clownfish') {
      // Blue-edged white bars
      for (let bar = 0; bar < 2; bar++) {
        const bx3 = bar === 0 ? 0 : -w * 0.3;
        ctx.strokeStyle = 'rgba(50,100,180,0.6)';
        ctx.lineWidth = 4.5;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(bx3, -h + 1); ctx.lineTo(bx3, h - 1); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.88)';
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(bx3, -h + 1); ctx.lineTo(bx3, h - 1); ctx.stroke();
      }
    }

    // 河豚棘刺 — tapered spines
    if (f.type === 'puffer') {
      for (let a = 0; a < Math.PI * 2; a += 0.55) {
        const spineLen = 7 + Math.sin(a * 3) * 2;
        const sx2 = Math.cos(a) * w, sy2 = Math.sin(a) * h;
        const ex2 = Math.cos(a) * (w + spineLen), ey2 = Math.sin(a) * (h + spineLen);
        const spG = ctx.createLinearGradient(sx2, sy2, ex2, ey2);
        spG.addColorStop(0, shadeColor(f.color, 0.75));
        spG.addColorStop(1, shadeColor(f.color, 1.1) + '44');
        ctx.strokeStyle = spG;
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(sx2, sy2); ctx.lineTo(ex2, ey2); ctx.stroke();
      }
    }

    // 三文鱼侧线 + 粉红色调斑块
    if (f.type === 'salmon') {
      // Pink lateral blush
      const blushG = ctx.createLinearGradient(-w * 0.2, 0, w * 0.4, 0);
      blushG.addColorStop(0, 'rgba(255,100,60,0)');
      blushG.addColorStop(0.4, 'rgba(255,110,70,0.18)');
      blushG.addColorStop(1, 'rgba(255,100,60,0)');
      ctx.fillStyle = blushG;
      ctx.beginPath(); ctx.ellipse(w * 0.1, 0, w * 0.65, h * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      // Lateral line
      ctx.strokeStyle = 'rgba(255,140,90,0.65)';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-w * 0.55, 0);
      ctx.quadraticCurveTo(0, h * 0.12, w * 0.55, 0);
      ctx.stroke();
    }
  }

  // Depth haze overlay — tint with water color based on z depth
